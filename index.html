<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담심리사 1급 모의 문제은행 1000제</title>
<style>
  :root{
    --bg:#F1F4F2; --card:#FFFFFF; --ink:#1C2B28; --sub:#5C6B66;
    --teal:#1F6E5C; --teal-soft:#E2EFE9; --line:#D8E0DC;
    --red:#C0452F; --red-soft:#F8E7E2; --green:#2E7D52; --green-soft:#E3F1E8;
    --amber:#B07B22;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6; min-height:100vh;
  }
  .wrap{max-width:760px; margin:0 auto; padding:20px 16px 80px;}
  .topbar{display:flex; align-items:baseline; justify-content:space-between; gap:12px; padding:6px 2px 18px;}
  .brand{font-size:15px; font-weight:800; letter-spacing:-0.02em; color:var(--teal);}
  .brand small{font-weight:500; color:var(--sub); margin-left:8px; font-size:12px;}
  .timer{font-variant-numeric:tabular-nums; font-size:13px; color:var(--sub);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; box-shadow:0 1px 2px rgba(28,43,40,.04);}
  h1{font-size:26px; font-weight:800; letter-spacing:-0.03em; line-height:1.3;}
  .lead{color:var(--sub); font-size:14px; margin-top:8px;}

  .sec-label{font-size:12px; font-weight:700; color:var(--teal); letter-spacing:.08em; margin:26px 0 10px;}
  .subj{display:flex; align-items:center; gap:12px; padding:13px 14px; border:1.5px solid var(--line); border-radius:11px; margin-bottom:8px; cursor:pointer; background:#fff; transition:border-color .15s, background .15s;}
  .subj.on{border-color:var(--teal); background:var(--teal-soft);}
  .subj input{accent-color:var(--teal); width:17px; height:17px; flex:none;}
  .subj .nm{font-weight:600; font-size:15px; flex:1;}
  .subj .ct{font-size:12px; color:var(--sub); font-variant-numeric:tabular-nums;}

  .modes{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .mode{border:1.5px solid var(--line); border-radius:11px; padding:14px; cursor:pointer; background:#fff; transition:border-color .15s, background .15s;}
  .mode.on{border-color:var(--teal); background:var(--teal-soft);}
  .mode b{display:block; font-size:15px;}
  .mode span{font-size:12.5px; color:var(--sub);}
  .opt-row{display:flex; align-items:center; gap:10px; margin-top:14px; font-size:14px; color:var(--sub);}
  .opt-row input{accent-color:var(--teal); width:16px; height:16px;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:11px; padding:14px 22px; font-size:15.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:filter .15s, background .15s;}
  .btn:focus-visible, .opt:focus-visible, .subj:focus-visible, .pal button:focus-visible{outline:2.5px solid var(--teal); outline-offset:2px;}
  .btn-main{background:var(--teal); color:#fff; width:100%; margin-top:22px;}
  .btn-main:hover{filter:brightness(1.08);}
  .btn-main:disabled{background:#B9C7C1; cursor:not-allowed;}
  .btn-ghost{background:#fff; border:1.5px solid var(--line); color:var(--ink);}
  .btn-ghost:hover{background:var(--teal-soft);}

  /* quiz */
  .qmeta{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--sub); margin-bottom:6px;}
  .qmeta .tag{background:var(--teal-soft); color:var(--teal); font-weight:700; border-radius:6px; padding:3px 9px; font-size:12px;}
  .prog{height:5px; background:var(--line); border-radius:3px; overflow:hidden; margin:10px 0 20px;}
  .prog i{display:block; height:100%; background:var(--teal); border-radius:3px; transition:width .25s;}
  .qtext{font-size:17px; font-weight:700; letter-spacing:-0.01em; line-height:1.55; white-space:pre-line;}
  .qnum{color:var(--teal); margin-right:6px;}
  .passage{margin-top:14px; border:1px solid var(--line); border-left:4px solid var(--teal); background:#FAFCFB; border-radius:8px; padding:13px 15px; font-size:14.5px; color:#33423D; white-space:pre-line;}
  .opts{margin-top:18px; display:flex; flex-direction:column; gap:8px;}
  .opt{display:flex; gap:12px; align-items:flex-start; width:100%; text-align:left; background:#fff; border:1.5px solid var(--line); border-radius:11px; padding:12px 14px; font-size:15px; line-height:1.55; cursor:pointer; font-family:inherit; color:var(--ink); transition:border-color .12s, background .12s;}
  .opt:hover{border-color:#9DB5AC;}
  .opt .mk{flex:none; width:26px; height:26px; border-radius:50%; border:1.7px solid #8AA39A; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#54695F; margin-top:1px; transition:all .12s;}
  .opt.sel{border-color:var(--teal); background:var(--teal-soft);}
  .opt.sel .mk{background:var(--teal); border-color:var(--teal); color:#fff;}
  .opt.good{border-color:var(--green); background:var(--green-soft);}
  .opt.good .mk{background:var(--green); border-color:var(--green); color:#fff;}
  .opt.bad{border-color:var(--red); background:var(--red-soft);}
  .opt.bad .mk{background:var(--red); border-color:var(--red); color:#fff;}
  .opt:disabled{cursor:default;}
  .fb{margin-top:14px; border-radius:10px; padding:12px 15px; font-size:14.5px; font-weight:600;}
  .fb.ok{background:var(--green-soft); color:var(--green);}
  .fb.no{background:var(--red-soft); color:var(--red);}
  .navrow{display:flex; gap:8px; margin-top:18px;}
  .navrow .btn{flex:1; margin-top:0;}

  /* OMR palette */
  .pal-label{font-size:12px; font-weight:700; color:var(--sub); letter-spacing:.06em; margin:20px 0 8px;}
  .pal{display:grid; grid-template-columns:repeat(auto-fill,minmax(40px,1fr)); gap:6px;}
  .pal button{border:1.5px solid var(--line); background:#fff; border-radius:8px; padding:7px 0; font-size:12.5px; font-weight:700; color:var(--sub); cursor:pointer; font-family:inherit; font-variant-numeric:tabular-nums;}
  .pal button.done{background:var(--teal-soft); border-color:var(--teal); color:var(--teal);}
  .pal button.now{outline:2px solid var(--teal); outline-offset:1px;}

  /* result */
  .score-hero{text-align:center; padding:10px 0 18px;}
  .score-hero .big{font-size:54px; font-weight:800; letter-spacing:-0.04em; color:var(--teal); line-height:1.1;}
  .score-hero .big small{font-size:22px; color:var(--sub); font-weight:600;}
  .score-hero p{color:var(--sub); font-size:14px; margin-top:4px;}
  .sline{display:flex; justify-content:space-between; align-items:center; padding:11px 4px; border-bottom:1px dashed var(--line); font-size:14.5px;}
  .sline:last-child{border-bottom:none;}
  .sline b{font-variant-numeric:tabular-nums;}
  .pass{color:var(--green); font-weight:700; font-size:12.5px; margin-left:8px;}
  .fail{color:var(--red); font-weight:700; font-size:12.5px; margin-left:8px;}
  .wrong-item{border:1px solid var(--line); border-radius:11px; padding:15px; margin-bottom:10px; background:#fff;}
  .wrong-item .wq{font-size:14.5px; font-weight:700; line-height:1.5;}
  .wrong-item .wa{font-size:13.5px; margin-top:8px; line-height:1.6;}
  .wa .you{color:var(--red); font-weight:700;}
  .wa .ans{color:var(--green); font-weight:700;}
  .hidden{display:none !important;}
  @media (max-width:480px){
    .card{padding:18px 15px;}
    h1{font-size:22px;}
    .modes{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>

let MOCK;
try {
  MOCK = JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(__D), c => c.charCodeAt(0))));

/* ---------- state ---------- */
const app=document.getElementById("app");
const timerEl=document.getElementById("timer");
let S=null, tick=null;

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function fmt(sec){const m=Math.floor(sec/60),s=sec%60;return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;}
function startTimer(){S.start=Date.now();timerEl.textContent="00:00";tick=setInterval(()=>{timerEl.textContent=fmt(Math.floor((Date.now()-S.start)/1000));},1000);}
function stopTimer(){if(tick){clearInterval(tick);tick=null;}if(S&&S.start)S.elapsed=Math.floor((Date.now()-S.start)/1000);}
function expHTML(q){return q.ex?`<div style="margin-top:10px;padding:12px 14px;background:#EEF4F1;border-radius:10px;font-size:14px;color:#33463F;line-height:1.6">💡 ${esc(q.ex)}</div>`:"";}

/* ---------- exam sets (모의고사 회차) ---------- */
const EXAM_ROUNDS=7;
function buildExamSet(r){
  let qs=[];
  MOCK.forEach((s,i)=>{
    const sorted=s.questions.slice().sort((a,b)=>a.n-b.n);
    const pick=sorted.filter((_,idx)=>idx%EXAM_ROUNDS===r).slice(0,25);
    pick.forEach(q=>qs.push({...q,subj:i,src:"모의"}));
  });
  return qs;
}

/* ---------- start screen ---------- */
function renderStart(){

  const mT=MOCK.reduce((t,s)=>t+s.questions.length,0);
  app.innerHTML=`

    <p class="lead">5과목 × 200문항 = 총 ${mT}문항 · 해설 포함 · 실전 모의고사 ${EXAM_ROUNDS}회차</p>
    <div style="margin:14px 0 18px;padding:14px 16px;background:#FBF7EE;border:1px solid #E8DFC8;border-radius:12px;font-size:13.5px;color:#5A523F;line-height:1.7">

      · 구조 검증을 거쳤으나 내용 오류가 있을 수 있습니다. <b>오류 발견 시 과목·문항 번호와 함께 댓글로 제보</b>해 주시면 다음 판에 반영합니다.<br>
      · 각 회차에는 암기·사례형부터 조합형(ㄱㄴㄷ)·이해형까지 고르게 섞여 있습니다. 해설의 <b>〔저빈도 심화〕</b> 표시는 출제 비중이 낮은 심화 문항입니다.<br>
      · 채점은 실제 기준(과목 40점 미만 과락 + 전체 평균 60점)을 따릅니다.<br>
      <span style="color:#8A8068">제작·배포 : 거북이심리상담센터</span>
    </div>
    <div class="sec-label">학습 방식</div>
    <div class="modes" id="ways">
      <div class="mode on" data-w="free" role="button" tabindex="0"><b>자유 연습</b><span>과목과 모드를 직접 선택</span></div>
      <div class="mode" data-w="exam" role="button" tabindex="0"><b>실전 모의고사</b><span>회차별 5과목 × 25문항 = 125문항</span></div>

          <span class="ct">${s.questions.length}문항</span>

  function bindPick(boxId,cb){
    document.querySelectorAll("#"+boxId+" .mode").forEach(el=>{

      el.addEventListener("click",pick);
      el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();}});
    });
  }
  bindPick("ways",el=>{
    const exam=el.dataset.w==="exam";
    document.getElementById("freeOpts").style.display=exam?"none":"";
    document.getElementById("examOpts").style.display=exam?"":"none";
  });
  bindPick("modes");
  app.querySelectorAll("#freeOpts .subj").forEach(el=>{

      el.classList.toggle("on",el.querySelector("input").checked);

      if(doShuffle)qs=shuffle(qs);
      S={mode,qs,cur:0,ans:new Array(qs.length).fill(null),checked:new Array(qs.length).fill(false)};
    }
    startTimer(); renderQ();
  });
}

    ${q.box?`<div class="passage">${esc(q.box)}</div>`:""}
    <div class="opts">
      ${q.opts.map((o,k)=>{
        let cls="opt";
        if(exam){ if(picked===k)cls+=" sel"; }
        else if(done){ if(k===q.a)cls+=" good"; else if(picked===k)cls+=" bad"; }
        else if(picked===k)cls+=" sel";
        return `<button class="${cls}" data-k="${k}" ${(!exam&&done)?"disabled":""}><span class="mk">${CIRC[k]}</span><span>${esc(o)}</span></button>`;
      }).join("")}
    </div>
    <div id="fb"></div>
    <div class="navrow">
      <button class="btn btn-ghost" id="btn-prev" ${i===0?"disabled":""}>← 이전</button>
      ${exam
        ? (i===n-1?`<button class="btn btn-main" id="btn-submit" style="margin-top:0">제출하고 채점</button>`:`<button class="btn btn-ghost" id="btn-next">다음 →</button>`)
        : (done
            ? (i===n-1?`<button class="btn btn-main" id="btn-finish" style="margin-top:0">결과 보기</button>`:`<button class="btn btn-main" id="btn-next" style="margin-top:0">다음 →</button>`)
            : `<button class="btn btn-main" id="btn-check" style="margin-top:0" ${picked===null?"disabled":""}>정답 확인</button>`)
      }
    </div>
    ${exam?`<div class="pal-label">답안 표기 현황 (눌러서 이동)</div>
    <div class="pal">${S.qs.map((_,k)=>`<button data-j="${k}" class="${S.ans[k]!==null?"done":""}${k===i?" now":""}">${k+1}</button>`).join("")}</div>
    <button class="btn btn-ghost" id="btn-submit-any" style="width:100%;margin-top:14px">여기까지 제출하고 채점</button>`:""}
  </div>`;

  if(!exam&&done){
    document.getElementById("fb").innerHTML=
      (picked===q.a?`<div class="fb ok">정답입니다!</div>`
                   :`<div class="fb no">오답입니다. 정답은 ${CIRC[q.a]} ${esc(q.opts[q.a])}</div>`)
      +expHTML(q);
  }
  app.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{
    if(!exam&&S.checked[i])return;
    S.ans[i]=+b.dataset.k; renderQ();
  }));
  const prev=document.getElementById("btn-prev");
  if(prev)prev.addEventListener("click",()=>{S.cur--;renderQ();});
  const next=document.getElementById("btn-next");
  if(next)next.addEventListener("click",()=>{S.cur++;renderQ();});
  const chk=document.getElementById("btn-check");
  if(chk)chk.addEventListener("click",()=>{S.checked[i]=true;renderQ();});
  const fin=document.getElementById("btn-finish");
  if(fin)fin.addEventListener("click",renderResult);
  const sub=document.getElementById("btn-submit");
  if(sub)sub.addEventListener("click",confirmSubmit);
  const subAny=document.getElementById("btn-submit-any");
  if(subAny)subAny.addEventListener("click",confirmSubmit);
  app.querySelectorAll(".pal button").forEach(b=>b.addEventListener("click",()=>{S.cur=+b.dataset.j;renderQ();}));
}
function confirmSubmit(){
  const blank=S.ans.filter(a=>a===null).length;
  if(blank>0&&!confirm(`아직 ${blank}문항이 비어 있습니다. 그대로 제출할까요? (빈 문항은 오답 처리)`))return;
  renderResult();
}

/* ---------- result ---------- */
function renderResult(){
  stopTimer();
  const n=S.qs.length;
  let correct=0; const bySubj={}, wrong=[];
  S.qs.forEach((q,i)=>{
    if(!bySubj[q.subj])bySubj[q.subj]={ok:0,all:0};
    bySubj[q.subj].all++;
    if(S.ans[i]===q.a){correct++;bySubj[q.subj].ok++;}
    else wrong.push(i);
  });
  const pct=Math.round(correct/n*100);
  app.innerHTML=`
  <div class="card">
    <div class="score-hero">
      <div class="big">${pct}<small>점</small></div>
      <p>${n}문항 중 ${correct}문항 정답 · 소요시간 ${fmt(S.elapsed||0)}</p>
    </div>
    <div class="sec-label">과목별 결과</div>
    ${Object.keys(bySubj).map(k=>{
      const s=bySubj[k], p=Math.round(s.ok/s.all*100);
      const badge=p<40?`<span class="fail">과락(40 미만)</span>`:(p>=60?`<span class="pass">통과권</span>`:`<span class="fail">40~59 주의</span>`);
      return `<div class="sline"><span>${esc(MOCK[k].name)}${badge}</span><b>${s.ok}/${s.all} (${p}%)</b></div>`;
    }).join("")}
    ${(()=>{
      const ps=Object.keys(bySubj).map(k=>Math.round(bySubj[k].ok/bySubj[k].all*100));
      const avg=Math.round(ps.reduce((a,b)=>a+b,0)/ps.length);
      const gwarak=ps.filter(p=>p<40).length;
      const ok=avg>=60&&gwarak===0;
      return `<div class="sline" style="border-top:2px solid var(--line);margin-top:4px"><span>실제 시험 기준 <small style="color:var(--sub)">(각 과목 40점↑ + 평균 60점↑)</small></span><b style="color:${ok?"var(--teal)":"#B3261E"}">평균 ${avg}점 · ${ok?"합격권":(gwarak?`과락 ${gwarak}과목`:"평균 미달")}</b></div>`;
    })()}
    <div class="navrow" style="margin-top:22px">
      ${wrong.length?`<button class="btn btn-main" id="btn-retry" style="margin-top:0">틀린 ${wrong.length}문항 다시 풀기</button>`:""}
      <button class="btn btn-ghost" id="btn-home">처음으로</button>
    </div>
    ${wrong.length?`<div class="sec-label">오답 리뷰</div>
    ${wrong.map(i=>{
      const q=S.qs[i], my=S.ans[i];
      return `<div class="wrong-item">
        <div class="wq">${i+1}. ${esc(q.q)} <span style="color:var(--sub);font-weight:500">[${esc(MOCK[q.subj].name)} · ${q.src} ${q.n}번]</span></div>
        <div class="wa"><span class="you">내 답 : ${my===null?"무응답":CIRC[my]+" "+esc(q.opts[my])}</span><br><span class="ans">정답 : ${CIRC[q.a]} ${esc(q.opts[q.a])}</span></div>
        ${expHTML(q)}
      </div>`;
    }).join("")}`:`<p class="lead" style="text-align:center;margin-top:10px">전 문항 정답입니다. 완벽합니다! 🎉</p>`}
  </div>`;
  const retry=document.getElementById("btn-retry");
  if(retry)retry.addEventListener("click",()=>{
    const qs=wrong.map(i=>S.qs[i]);
    S={mode:S.mode,qs,cur:0,ans:new Array(qs.length).fill(null),checked:new Array(qs.length).fill(false)};
    startTimer(); renderQ();
  });
  document.getElementById("btn-home").addEventListener("click",renderStart);
}

if (window.__DATAERR) {
  app.innerHTML = '<div class="card"><h1>데이터 오류</h1><p class="lead">문항 데이터가 손상되었습니다. 파일을 복사·업로드하는 과정에서 내용 일부가 잘렸을 가능성이 큽니다. 원본 파일을 다시 받아 통째로(수정 없이) 업로드해 주세요.</p></div>';
} else { renderStart(); }
</script>
