<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담심리사 1급 모의 문제은행 1000제</title>
<style>
  :root{
    --bg:#F1F4F2; --card:#FFFFFF; --ink:#1C2B28; --sub:#5C6B66;
    --teal:#1F6E5C; --teal-soft:#E2EFE9; --line:#D8E0DC;
    --red:#C0452F; --red-soft:#F8E7E2; --green:#2E7D52; --green-soft:#E3F1E8;
    --amber:#B07B22;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6; min-height:100vh;
  }
  .wrap{max-width:760px; margin:0 auto; padding:20px 16px 80px;}
  .topbar{display:flex; align-items:baseline; justify-content:space-between; gap:12px; padding:6px 2px 18px;}
  .brand{font-size:15px; font-weight:800; letter-spacing:-0.02em; color:var(--teal);}
  .brand small{font-weight:500; color:var(--sub); margin-left:8px; font-size:12px;}
  .timer{font-variant-numeric:tabular-nums; font-size:13px; color:var(--sub);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; box-shadow:0 1px 2px rgba(28,43,40,.04);}
  h1{font-size:26px; font-weight:800; letter-spacing:-0.03em; line-height:1.3;}
  .lead{color:var(--sub); font-size:14px; margin-top:8px;}

  .sec-label{font-size:12px; font-weight:700; color:var(--teal); letter-spacing:.08em; margin:26px 0 10px;}
  .subj{display:flex; align-items:center; gap:12px; padding:13px 14px; border:1.5px solid var(--line); border-radius:11px; margin-bottom:8px; cursor:pointer; background:#fff; transition:border-color .15s, background .15s;}
  .subj.on{border-color:var(--teal); background:var(--teal-soft);}
  .subj input{accent-color:var(--teal); width:17px; height:17px; flex:none;}
  .subj .nm{font-weight:600; font-size:15px; flex:1;}
  .subj .ct{font-size:12px; color:var(--sub); font-variant-numeric:tabular-nums;}

  .modes{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .mode{border:1.5px solid var(--line); border-radius:11px; padding:14px; cursor:pointer; background:#fff; transition:border-color .15s, background .15s;}
  .mode.on{border-color:var(--teal); background:var(--teal-soft);}
  .mode b{display:block; font-size:15px;}
  .mode span{font-size:12.5px; color:var(--sub);}
  .opt-row{display:flex; align-items:center; gap:10px; margin-top:14px; font-size:14px; color:var(--sub);}
  .opt-row input{accent-color:var(--teal); width:16px; height:16px;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:11px; padding:14px 22px; font-size:15.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:filter .15s, background .15s;}
  .btn:focus-visible, .opt:focus-visible, .subj:focus-visible, .pal button:focus-visible{outline:2.5px solid var(--teal); outline-offset:2px;}
  .btn-main{background:var(--teal); color:#fff; width:100%; margin-top:22px;}
  .btn-main:hover{filter:brightness(1.08);}
  .btn-main:disabled{background:#B9C7C1; cursor:not-allowed;}
  .btn-ghost{background:#fff; border:1.5px solid var(--line); color:var(--ink);}
  .btn-ghost:hover{background:var(--teal-soft);}

  /* quiz */
  .qmeta{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--sub); margin-bottom:6px;}
  .qmeta .tag{background:var(--teal-soft); color:var(--teal); font-weight:700; border-radius:6px; padding:3px 9px; font-size:12px;}
  .prog{height:5px; background:var(--line); border-radius:3px; overflow:hidden; margin:10px 0 20px;}
  .prog i{display:block; height:100%; background:var(--teal); border-radius:3px; transition:width .25s;}
  .qtext{font-size:17px; font-weight:700; letter-spacing:-0.01em; line-height:1.55; white-space:pre-line;}
  .qnum{color:var(--teal); margin-right:6px;}
  .passage{margin-top:14px; border:1px solid var(--line); border-left:4px solid var(--teal); background:#FAFCFB; border-radius:8px; padding:13px 15px; font-size:14.5px; color:#33423D; white-space:pre-line;}
  .opts{margin-top:18px; display:flex; flex-direction:column; gap:8px;}
  .opt{display:flex; gap:12px; align-items:flex-start; width:100%; text-align:left; background:#fff; border:1.5px solid var(--line); border-radius:11px; padding:12px 14px; font-size:15px; line-height:1.55; cursor:pointer; font-family:inherit; color:var(--ink); transition:border-color .12s, background .12s;}
  .opt:hover{border-color:#9DB5AC;}
  .opt .mk{flex:none; width:26px; height:26px; border-radius:50%; border:1.7px solid #8AA39A; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#54695F; margin-top:1px; transition:all .12s;}
  .opt.sel{border-color:var(--teal); background:var(--teal-soft);}
  .opt.sel .mk{background:var(--teal); border-color:var(--teal); color:#fff;}
  .opt.good{border-color:var(--green); background:var(--green-soft);}
  .opt.good .mk{background:var(--green); border-color:var(--green); color:#fff;}
  .opt.bad{border-color:var(--red); background:var(--red-soft);}
  .opt.bad .mk{background:var(--red); border-color:var(--red); color:#fff;}
  .opt:disabled{cursor:default;}
  .fb{margin-top:14px; border-radius:10px; padding:12px 15px; font-size:14.5px; font-weight:600;}
  .fb.ok{background:var(--green-soft); color:var(--green);}
  .fb.no{background:var(--red-soft); color:var(--red);}
  .navrow{display:flex; gap:8px; margin-top:18px;}
  .navrow .btn{flex:1; margin-top:0;}

  /* OMR palette */
  .pal-label{font-size:12px; font-weight:700; color:var(--sub); letter-spacing:.06em; margin:20px 0 8px;}
  .pal{display:grid; grid-template-columns:repeat(auto-fill,minmax(40px,1fr)); gap:6px;}
  .pal button{border:1.5px solid var(--line); background:#fff; border-radius:8px; padding:7px 0; font-size:12.5px; font-weight:700; color:var(--sub); cursor:pointer; font-family:inherit; font-variant-numeric:tabular-nums;}
  .pal button.done{background:var(--teal-soft); border-color:var(--teal); color:var(--teal);}
  .pal button.now{outline:2px solid var(--teal); outline-offset:1px;}

  /* result */
  .score-hero{text-align:center; padding:10px 0 18px;}
  .score-hero .big{font-size:54px; font-weight:800; letter-spacing:-0.04em; color:var(--teal); line-height:1.1;}
  .score-hero .big small{font-size:22px; color:var(--sub); font-weight:600;}
  .score-hero p{color:var(--sub); font-size:14px; margin-top:4px;}
  .sline{display:flex; justify-content:space-between; align-items:center; padding:11px 4px; border-bottom:1px dashed var(--line); font-size:14.5px;}
  .sline:last-child{border-bottom:none;}
  .sline b{font-variant-numeric:tabular-nums;}
  .pass{color:var(--green); font-weight:700; font-size:12.5px; margin-left:8px;}
  .fail{color:var(--red); font-weight:700; font-size:12.5px; margin-left:8px;}
  .wrong-item{border:1px solid var(--line); border-radius:11px; padding:15px; margin-bottom:10px; background:#fff;}
  .wrong-item .wq{font-size:14.5px; font-weight:700; line-height:1.5;}
  .wrong-item .wa{font-size:13.5px; margin-top:8px; line-height:1.6;}
  .wa .you{color:var(--red); font-weight:700;}
  .wa .ans{color:var(--green); font-weight:700;}
  .hidden{display:none !important;}
  @media (max-width:480px){
    .card{padding:18px 15px;}
    h1{font-size:22px;}
    .modes{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">상담심리사 1급 모의 1000제<small>자체 제작 문제은행</small></div>
    <div class="timer" id="timer"></div>
  </div>
  <div id="app"></div>
</div>
<script>
const CIRC=["①","②","③","④","⑤"];
const MOCK=[{"name":"상담 및 심리치료이론","questions":[{"n":1,"q":"받아들이기 어려운 충동이나 욕구를 사회적으로 용인되는 건설적인 활동으로 전환하는 방어기제는?","opts":["억압","승화","투사","반동형성","전치"],"a":1,"ex":"승화는 가장 성숙한 방어기제로 분류되며, 공격 충동을 운동이나 예술로 표출하는 것이 대표적 예이다."},{"n":2,"q":"역전이에 대한 설명으로 옳지 않은 것은?","opts":["상담자가 내담자에게 갖는 무의식적 정서 반응이다.","상담자의 미해결 갈등에서 비롯될 수 있다.","현대 정신역동에서는 내담자를 이해하는 단서로 활용되기도 한다.","상담자는 교육분석과 수퍼비전을 통해 역전이를 다룰 수 있다.","내담자가 과거 중요 인물에 대한 감정을 상담자에게 옮기는 것이다."],"a":4,"ex":"④는 전이(transference)에 대한 설명이다. 역전이는 방향이 반대(상담자→내담자)이다."},{"n":3,"q":"아들러(Adler)의 개인심리학에 대한 설명으로 옳지 않은 것은?","opts":["인간의 행동은 과거의 외상 경험에 의해 결정된다고 본다.","생활양식은 대략 4~5세경에 형성된다고 본다.","사회적 관심은 정신건강의 중요한 지표이다.","출생순위가 성격 형성에 영향을 미친다고 본다.","열등감은 보편적인 것으로 성장의 동력이 될 수 있다."],"a":0,"ex":"아들러는 결정론이 아닌 목적론적 관점을 취한다. 행동은 과거가 아닌 가상적 목표를 향해 움직인다."},{"n":4,"q":"체계적 둔감법의 실시 절차를 순서대로 바르게 나열한 것은?","box":"ㄱ. 불안위계표 작성\nㄴ. 근육이완 훈련\nㄷ. 이완 상태에서 위계에 따라 불안 자극에 단계적으로 노출","opts":["ㄱ-ㄴ-ㄷ","ㄷ-ㄱ-ㄴ","ㄴ-ㄱ-ㄷ","ㄱ-ㄷ-ㄴ","ㄴ-ㄷ-ㄱ"],"a":2,"ex":"월피(Wolpe)의 체계적 둔감법은 이완훈련→불안위계 작성→둔감화 순으로 진행되며, 상호억제 원리에 기반한다."},{"n":5,"q":"도박 행동처럼 소거에 대한 저항이 가장 큰 강화계획은?","opts":["고정간격 강화","변동간격 강화","고정비율 강화","변동비율 강화","연속 강화"],"a":3,"ex":"변동비율(VR) 계획은 언제 강화가 주어질지 예측할 수 없어 높은 반응률과 가장 강한 소거 저항을 보인다."},{"n":6,"q":"엘리스(Ellis)의 합리정서행동치료(REBT)에 대한 설명으로 옳지 않은 것은?","opts":["ABCDE 모델에 따라 상담이 진행된다.","비합리적 신념을 적극적으로 논박한다.","정서적 문제의 직접적 원인은 선행사건 그 자체라고 본다.","인지적·정서적·행동적 기법을 통합적으로 사용한다.","‘반드시 ~해야 한다’는 당위적 사고를 비합리적 신념의 핵심으로 본다."],"a":2,"ex":"REBT의 핵심 가정은 사건(A)이 아니라 그 사건에 대한 신념(B)이 정서적 결과(C)를 만든다는 것이다."},{"n":7,"q":"하나의 부정적 사건을 근거로 관련 없는 상황에까지 결론을 확대 적용하는 벡(Beck)의 인지왜곡은?","opts":["임의적 추론","선택적 추상화","개인화","과잉일반화","이분법적 사고"],"a":3,"ex":"임의적 추론은 증거 없이 결론 내리기, 선택적 추상화는 일부 세부에만 근거해 전체를 해석하는 것이다."},{"n":8,"q":"로저스(Rogers)가 제시한 치료적 변화의 핵심 조건에 해당하지 않는 것은?","opts":["무조건적 긍정적 존중","공감적 이해","진실성(일치성)","상담자와 내담자의 심리적 접촉","전이에 대한 정확한 해석"],"a":4,"ex":"전이 해석은 정신분석의 기법이다. 인간중심 접근은 기법보다 상담자의 태도적 조건을 강조한다."},{"n":9,"q":"게슈탈트 치료의 접촉경계혼란 중 타인의 가치관이나 신념을 자신의 것으로 무비판적으로 받아들이는 것은?","opts":["투사","내사","반전","융합","편향"],"a":1,"ex":"내사(introjection)는 ‘씹지 않고 삼킨’ 외부 가치이다. 투사는 자기 것을 타인에게 돌리는 것, 반전은 타인에게 할 행동을 자신에게 하는 것이다."},{"n":10,"q":"글래서(Glasser)의 현실치료에 대한 설명으로 옳지 않은 것은?","opts":["전이 분석을 핵심 치료 기법으로 사용한다.","전행동은 활동, 사고, 감정, 생리반응으로 구성된다.","생존, 사랑과 소속, 힘, 자유, 즐거움의 다섯 가지 기본욕구를 가정한다.","선택이론에 기반을 두고 있다.","내담자의 변명을 수용하지 않는다."],"a":0,"ex":"현실치료는 전이를 다루지 않고 현재의 행동 선택과 책임에 초점을 둔다."},{"n":11,"q":"교류분석(TA)에서 어른(A) 자아상태에 대한 설명으로 옳은 것은?","opts":["양육적이거나 비판적인 태도로 반응한다.","부모로부터 내사된 가치관에 따라 행동한다.","자유롭고 충동적으로 감정을 표현한다.","순응적이고 타인의 눈치를 보며 행동한다.","현실을 객관적으로 평가하고 합리적으로 판단한다."],"a":4,"ex":"①⑤는 어버이(P), ③④는 어린이(C) 자아상태에 해당한다. 어른(A)은 ‘지금-여기’의 컴퓨터 같은 정보처리 기능이다."},{"n":12,"q":"얄롬(Yalom)이 제시한 실존적 심리치료의 네 가지 궁극적 관심사가 아닌 것은?","opts":["죽음","열등감","소외(고립)","무의미","자유"],"a":1,"ex":"열등감은 아들러 이론의 핵심 개념이다."},{"n":13,"q":"해결중심 상담에서 문제가 일어나지 않았거나 덜 심각했던 때를 탐색하는 질문 기법은?","opts":["예외질문","기적질문","척도질문","대처질문","관계성질문"],"a":0,"ex":"예외질문은 내담자가 이미 가진 해결책과 자원을 발견하게 한다."},{"n":14,"q":"동기강화상담(MI)의 기본 핵심기술(OARS)에 해당하지 않는 것은?","opts":["열린 질문하기","인정하기","직면하기","요약하기","반영적 경청하기"],"a":2,"ex":"MI는 직면과 논쟁을 지양하고 ‘저항과 함께 구르기’를 강조한다."},{"n":15,"q":"수용전념치료(ACT)의 6가지 핵심 치료과정에 해당하지 않는 것은?","opts":["수용","인지적 탈융합","맥락으로서의 자기","비합리적 신념 논박","가치 명료화"],"a":3,"ex":"논박은 REBT의 기법이다. ACT는 사고의 내용을 바꾸기보다 사고와의 관계를 바꾼다(탈융합)."},{"n":16,"q":"상담에서 비밀보장의 예외 상황에 해당하지 않는 것은?","opts":["내담자가 자신을 해칠 명백한 위험이 있는 경우","아동학대가 의심되는 경우","제3자에게 명백하고 임박한 위해의 위험이 있는 경우","법원이 정보 공개를 명령한 경우","내담자가 상담 약속에 반복적으로 지각하는 경우"],"a":4,"ex":"지각은 상담에서 다룰 주제일 뿐 비밀보장 예외 사유가 아니다."},{"n":17,"q":"보딘(Bordin)이 제시한 작업동맹의 구성요소를 모두 고른 것은?","box":"ㄱ. 목표에 대한 합의\nㄴ. 과제에 대한 합의\nㄷ. 정서적 유대\nㄹ. 전이의 해소","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ"],"a":3,"ex":"작업동맹은 목표 합의, 과제 합의, 정서적 유대의 세 요소로 구성된다."},{"n":18,"q":"단기상담에 적합한 내담자의 특징으로 거리가 먼 것은?","opts":["만성적인 성격적 문제로 전반적인 기능 손상이 있다.","발달과정상의 일시적 문제를 겪고 있다.","환경 변화로 인한 적응상의 어려움이 있다.","문제 발생 이전의 기능 수준이 양호하다.","호소문제가 비교적 구체적이다."],"a":0,"ex":"만성적 성격 문제는 장기적 접근이 필요한 대표적 사례이다."},{"n":19,"q":"반두라(Bandura)의 관찰학습 과정을 순서대로 바르게 나열한 것은?","opts":["파지-주의-동기화-운동재생","주의-운동재생-파지-동기화","주의-파지-운동재생-동기화","동기화-주의-파지-운동재생","주의-동기화-파지-운동재생"],"a":2,"ex":"모델에 주의를 기울이고, 기억(파지)하고, 행동으로 재생하고, 동기가 있을 때 수행된다."},{"n":20,"q":"정신분석에서 통찰을 실제 생활 장면에 반복적으로 적용하며 변화를 공고히 하는 과정은?","opts":["자유연상","훈습","해석","직면","명료화"],"a":1,"ex":"훈습(working through)은 한 번의 통찰로 끝나지 않고 저항을 반복적으로 다루어 가는 과정이다."},{"n":21,"q":"라자루스의 BASIC-ID 구성요소와 그 의미의 연결이 옳지 않은 것은?","opts":["B - 행동(Behavior)","D - 방어기제(Defense)","S - 감각(Sensation)","C - 인지(Cognition)","A - 정서(Affect)"],"a":1,"ex":"D는 약물/생물학(Drugs/Biology)을 의미한다. I는 심상(Imagery)과 대인관계(Interpersonal)로 두 번 쓰인다."},{"n":22,"q":"초자아의 처벌과 양심의 가책에 대한 두려움에서 비롯되는 프로이트의 불안 유형은?","opts":["현실 불안","신경증적 불안","분리 불안","실존적 불안","도덕적 불안"],"a":4,"ex":"신경증적 불안은 원초아의 충동이 의식으로 뚫고 나와 처벌받을까 두려워하는 것으로, 두려움의 원천이 다르다."},{"n":23,"q":"말러(Mahler)의 분리-개별화 과정의 하위단계를 순서대로 바르게 나열한 것은?","opts":["분화 → 연습 → 재접근 → 대상항상성 형성","분화 → 재접근 → 연습 → 대상항상성 형성","연습 → 분화 → 재접근 → 대상항상성 형성","재접근 → 분화 → 연습 → 대상항상성 형성","분화 → 연습 → 대상항상성 형성 → 재접근"],"a":0,"ex":"걸음마로 세상을 탐험하는 연습기 다음에, 다시 엄마에게 돌아오고 싶은 양가감정의 재접근기가 온다. 이 순서가 자주 출제된다."},{"n":24,"q":"위니컷(Winnicott)의 이론에 대한 설명으로 옳지 않은 것은?","opts":["‘충분히 좋은 어머니’는 완벽한 어머니를 의미하지 않는다.","중간대상은 내적 세계와 외적 현실을 잇는 과도기적 경험이다.","거짓자기는 환경에 순응하면서 참자기를 보호하기 위해 형성된다.","중간대상은 병리적 집착의 산물이므로 조기에 제거되어야 한다.","안아주는 환경(holding environment) 개념은 치료 관계에도 적용된다."],"a":3,"ex":"담요·인형 같은 중간대상은 정상 발달의 일부로, 불안을 견디게 돕는 건강한 현상이다."},{"n":25,"q":"코헛(Kohut)의 자기심리학에서 제시하는 자기대상 욕구를 모두 고른 것은?","box":"ㄱ. 거울(반영) 욕구\nㄴ. 이상화 욕구\nㄷ. 쌍둥이(동반자) 욕구\nㄹ. 처벌 욕구","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ"],"a":3,"ex":"인정받고 싶고(거울), 강한 대상과 연결되고 싶고(이상화), 비슷한 존재와 함께하고 싶은(쌍둥이) 세 가지 욕구이다."},{"n":26,"q":"게슈탈트 치료의 알아차림-접촉 주기를 순서대로 바르게 나열한 것은?","opts":["감각 → 에너지 동원 → 알아차림 → 접촉 → 행동","알아차림 → 감각 → 행동 → 에너지 동원 → 접촉","감각 → 알아차림 → 에너지 동원 → 행동 → 접촉","알아차림 → 에너지 동원 → 감각 → 행동 → 접촉","감각 → 알아차림 → 행동 → 에너지 동원 → 접촉"],"a":2,"ex":"배경에서 감각이 떠올라 게슈탈트로 알아차려지고, 에너지를 모아 행동하여 환경과 접촉한 뒤 다시 물러난다."},{"n":27,"q":"발표 불안이 있는 학생이 발표를 회피하자 불안이 줄어들었고, 이후 회피행동이 더 늘어났다. 회피행동을 유지시키는 학습 기제는?","opts":["정적 강화","부적 강화","정적 처벌","부적 처벌","소거"],"a":1,"ex":"혐오자극(불안)의 ‘제거’가 행동(회피)을 ‘증가’시키므로 부적 강화이다. 처벌은 행동을 감소시킨다는 점에서 구별된다."},{"n":28,"q":"불안위계 없이 가장 강한 불안 유발 자극에 장시간 직접 노출시켜 불안 반응의 소거를 유도하는 기법은?","opts":["체계적 둔감법","혐오치료","홍수법","토큰경제","조형"],"a":2,"ex":"체계적 둔감법은 이완과 함께 약한 자극부터 점진적으로 접근한다는 점에서 대비된다."},{"n":29,"q":"벡(Beck)의 인지치료가 엘리스의 REBT와 구별되는 특징으로 가장 적절한 것은?","opts":["자동적 사고를 협력적 경험주의를 통해 가설처럼 검증한다.","철학적·논리적 논박을 핵심 기법으로 사용한다.","당위적 신념(must, should)을 병리의 핵심으로 강조한다.","사고보다 정서가 선행한다고 가정한다.","무조건적 자기수용을 직접적으로 가르친다."],"a":0,"ex":"REBT는 직접적 논박과 설득, 인지치료는 소크라테스식 질문과 행동실험을 통한 공동 검증이 상대적 특징이다."},{"n":30,"q":"시험에서 95점을 받고도 틀린 5점에만 주의를 기울여 시험 전체를 망쳤다고 평가하는 인지왜곡은?","opts":["과잉일반화","개인화","임의적 추론","재앙화","선택적 추상화"],"a":4,"ex":"전체 맥락을 무시하고 부정적 세부에만 근거해 결론 내리는 ‘정신적 여과’이다. 과잉일반화는 한 사건을 다른 상황으로 확대하는 것."},{"n":31,"q":"번(Berne)의 게임 공식에서 ‘반응’ 이후의 진행 순서로 옳은 것은?","box":"콘(con) + 김미크(gimmick) = 반응(response) → (  ) → (  ) → (  )","opts":["전환 → 혼란 → 결말","혼란 → 전환 → 결말","결말 → 전환 → 혼란","전환 → 결말 → 혼란","혼란 → 결말 → 전환"],"a":0,"ex":"게임은 표면적 교류(반응)가 이어지다 역할이 갑자기 ‘전환’되고, ‘혼란’을 거쳐 익숙한 불쾌감인 ‘결말(라켓감정)’로 끝난다."},{"n":32,"q":"교류분석에서 어린 시절 가족이 허용하지 않았던 진짜 감정을 대체하여 학습된 이차적 감정을 지칭하는 개념은?","opts":["스트로크","에누리 우표(스탬프)","디스카운트","라켓 감정","인생각본"],"a":3,"ex":"예컨대 분노가 금지된 가정에서 자란 사람이 화가 날 상황마다 슬픔을 느끼는 경우이다. 스탬프는 라켓감정을 모아두는 것."},{"n":33,"q":"프랭클(Frankl)의 의미치료에서 불면에 대한 과도한 주의와 걱정을 다른 곳으로 돌리게 하는 기법은?","opts":["역설적 의도","탈숙고","소크라테스식 대화","태도 수정","직면"],"a":1,"ex":"역설적 의도는 반대로 증상(잠들지 않기)을 일부러 의도하게 하는 기법으로, 둘이 쌍으로 출제된다."},{"n":34,"q":"현실치료의 WDEP 체계에서 E단계에 해당하는 상담자의 활동으로 가장 적절한 것은?","opts":["내담자가 진정으로 원하는 것을 탐색한다.","내담자의 현재 행동이 무엇인지 파악한다.","현재 행동이 원하는 것을 얻는 데 효과적인지 스스로 평가하게 한다.","실행 가능한 구체적 계획을 수립한다.","변명을 수용하고 처벌을 활용한다."],"a":2,"ex":"E(Evaluation)는 상담자의 평가가 아니라 내담자의 ‘자기평가’라는 점이 핵심이다."},{"n":35,"q":"여성주의 치료에서 남녀 간의 차이를 실제보다 축소하거나 무시하는 경향을 지칭하는 개념은?","opts":["알파 편견","의식 고양","성역할 분석","권력 분석","베타 편견"],"a":4,"ex":"알파 편견은 차이를 과장하여 분리와 불평등을 정당화하는 것, 베타 편견은 차이를 무시하여 여성 고유의 경험을 지우는 것이다."},{"n":36,"q":"내면에서 명령하고 비난하는 상전(topdog)과 무력하게 변명하는 하인(underdog)의 분열을 대화시켜 통합을 돕는 게슈탈트 기법은?","opts":["꿈 작업","머물러 있기","신체 자각","과장하기","두 의자 기법"],"a":4,"ex":"상전-하인의 내적 갈등은 자기 고문 게임으로 불리며, 두 의자 대화를 통해 양극의 통합을 시도한다."},{"n":37,"q":"힐(Hill)의 상담 3단계 조력기술 모형을 순서대로 바르게 나열한 것은?","opts":["탐색 → 통찰 → 실행","통찰 → 탐색 → 실행","탐색 → 실행 → 통찰","실행 → 탐색 → 통찰","통찰 → 실행 → 탐색"],"a":0,"ex":"내담자 중심으로 탐색하고, 정신역동적으로 통찰을 얻고, 행동주의적으로 실행하는 통합 모형이다."},{"n":38,"q":"동생을 몹시 질투하는 아이가 오히려 동생에게 지나칠 정도로 다정하게 행동한다. 해당하는 방어기제는?","opts":["취소","반동형성","대치","합리화","동일시"],"a":1,"ex":"취소(undoing)는 이미 행한 것을 의례적 행동으로 무효화하는 것(예: 때린 후 과도한 선물)이라는 점에서 구별된다."},{"n":39,"q":"동기강화상담에서 ‘변화대화(change talk)’에 해당하는 내담자의 진술은?","opts":["“전 원래 이런 사람이라 안 바뀌어요.”","“끊어봤자 금방 다시 피우게 될걸요.”","“스트레스 때문에 어쩔 수 없어요.”","“담배를 끊으면 아이 건강에 좋을 것 같아요.”","“지금은 그럴 때가 아닌 것 같아요.”"],"a":3,"ex":"변화의 욕구·능력·이유·필요(DARN)를 담은 진술이 변화대화이며, 상담자는 이를 선택적으로 반영·강화한다."},{"n":40,"q":"프로차스카(Prochaska)의 범이론적 모형에서 변화단계를 순서대로 바르게 나열한 것은?","opts":["전숙고 → 준비 → 숙고 → 실행 → 유지","숙고 → 전숙고 → 준비 → 실행 → 유지","전숙고 → 숙고 → 준비 → 실행 → 유지","준비 → 전숙고 → 숙고 → 실행 → 유지","전숙고 → 숙고 → 실행 → 준비 → 유지"],"a":2,"ex":"단계에 따라 개입 전략이 달라진다. 전숙고 단계에는 실행 전략보다 의식 고양·동기 작업이 적합하다."},{"n":41,"q":"정신분석에서 해석 제시의 원칙으로 옳지 않은 것은?","opts":["내용을 해석하기에 앞서 저항과 방어를 먼저 다룬다.","내담자가 받아들일 준비가 되었을 때 제시한다.","표면적인 것에서 심층적인 것으로 나아간다.","상담 초기부터 깊은 무의식적 갈등을 직접 해석하는 것이 효과적이다.","해석은 단정이 아닌 가설의 형태로 제시될 수 있다."],"a":3,"ex":"준비되지 않은 조기 해석은 저항을 강화하거나 주지화된 수용에 그치기 쉽다."},{"n":42,"q":"프로이트의 꿈 이론에 대한 설명으로 옳지 않은 것은?","opts":["발현몽이 잠재몽보다 더 깊은 무의식적 의미를 담고 있다.","잠재몽은 위장되어 있는 무의식적 소망을 담고 있다.","압축과 전치 등의 꿈작업을 통해 잠재내용이 위장된다.","꿈은 소망충족의 기능을 갖는다고 본다.","발현몽은 깨어나서 기억하는 꿈의 표면적 내용이다."],"a":0,"ex":"분석의 방향은 발현몽에서 출발해 자유연상을 거쳐 잠재몽(숨은 의미)으로 나아간다."},{"n":43,"q":"아들러학파의 격려(encouragement)가 칭찬과 구별되는 특징으로 가장 적절한 것은?","opts":["성취 결과에 대해 조건적으로 주어진다.","평가자 우위의 수직적 관계를 전제한다.","결과보다 노력과 향상의 과정에 초점을 둔다.","실패 상황에서는 사용할 수 없다.","외적 보상에 대한 동기를 강화한다."],"a":2,"ex":"칭찬은 잘했을 때만 주어지는 평가이지만, 격려는 실패하고 낙담한 순간에도 줄 수 있다."},{"n":44,"q":"융의 이론에서 중년기 이후 의식과 무의식이 통합되어 고유한 전체로서의 자기를 실현해 가는 과정은?","opts":["자아팽창","개성화","적극적 상상","콤플렉스","동시성"],"a":1,"ex":"개성화(individuation)는 페르소나와의 동일시에서 벗어나 그림자·아니마/아니무스를 통합하는 평생의 과정이다."},{"n":45,"q":"융의 심리학적 유형론에서 합리적(판단) 기능으로 짝지어진 것은?","opts":["사고 - 감각","감각 - 직관","사고 - 직관","감정 - 감각","사고 - 감정"],"a":4,"ex":"사고와 감정은 판단의 준거를 갖는 합리적 기능, 감각과 직관은 정보를 받아들이는 비합리적(지각) 기능이다."},{"n":46,"q":"게임을 좋아하는 아이에게 숙제를 마치면 게임을 허용하기로 했다. 발생 빈도가 높은 행동을 낮은 행동의 강화물로 사용하는 이 원리는?","opts":["용암법","조형","프리맥 원리","자극통제","상반행동 차별강화"],"a":2,"ex":"‘할머니의 법칙’이라고도 불린다. 강화물이 물건이 아니라 ‘선호 활동’이라는 점이 특징이다."},{"n":47,"q":"행동수정 기법과 그 설명의 연결이 옳지 않은 것은?","opts":["조형 - 목표행동에 점진적으로 가까워지는 반응을 차별적으로 강화한다.","연쇄 - 복잡한 행동을 단위 행동으로 나누어 순서대로 연결해 학습시킨다.","용암법 - 행동을 유발하던 촉구(prompt)를 점진적으로 제거한다.","자극통제 - 표적행동 자체에 혐오자극을 직접 연합시킨다.","타임아웃 - 정적 강화를 받을 기회로부터 일시적으로 격리한다."],"a":3,"ex":"혐오자극의 직접 연합은 혐오치료이다. 자극통제는 행동에 선행하는 변별자극을 조절하는 것이다(예: 침대에서는 잠만 자기)."},{"n":48,"q":"인지치료에서 자동적 사고가 의미하는 바를 반복적으로 질문하여 그 기저의 핵심신념에 도달하는 기법은?","opts":["사고중지","하향 화살표 기법","인지적 예행연습","탈파국화","재귀인"],"a":1,"ex":"“그것이 사실이라면 당신에게 어떤 의미인가요?”를 반복하며 중간신념을 거쳐 핵심신념으로 내려간다."},{"n":49,"q":"회의 분위기가 가라앉자 ‘내가 무언가 잘못했기 때문일 거야’라고 생각한다. 해당하는 인지왜곡은?","opts":["개인화","독심술","명명하기","재앙화","당위 진술"],"a":0,"ex":"자신과 무관할 수 있는 외부 사건의 원인을 자신에게 돌리는 왜곡이다. 독심술은 타인의 생각을 증거 없이 단정하는 것."},{"n":50,"q":"게슈탈트 치료에서 회피해 오던 불편한 감정을 피하지 않고 충분히 경험하여 견디도록 돕는 기법은?","opts":["과장하기","자기 부분과의 대화","반대로 하기","순회하기","머물러 있기"],"a":4,"ex":"감정을 회피하면 미해결과제로 남는다. 머물러 있기는 알아차림의 연속선에서 감정을 완결짓도록 돕는다."},{"n":51,"q":"프랭클이 제시한 삶의 의미를 실현하는 가치의 원천을 모두 고른 것은?","box":"ㄱ. 창조적 가치 (일과 행위를 통해)\nㄴ. 경험적 가치 (사랑과 아름다움의 체험을 통해)\nㄷ. 태도적 가치 (피할 수 없는 고통에 대한 태도 선택을 통해)\nㄹ. 물질적 가치 (소유와 축적을 통해)","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ"],"a":3,"ex":"바꿀 수 없는 운명 앞에서도 태도를 선택할 자유가 있다는 태도적 가치가 의미치료의 고유한 공헌이다."},{"n":52,"q":"로저스가 말한 ‘충분히 기능하는 사람’의 특징으로 옳지 않은 것은?","opts":["위협적인 경험에 대한 방어와 왜곡","실존적인 삶의 태도","자신의 유기체적 경험에 대한 신뢰","창조성","경험에 대한 개방성"],"a":0,"ex":"방어와 왜곡은 가치의 조건화에 매인 부적응 상태의 특징이다."},{"n":53,"q":"교류분석에서 ‘성공해야 한다’, ‘완벽해야 한다’처럼 부모의 어버이 자아상태에서 주로 언어적으로 전달되는 메시지는?","opts":["금지령","허가","대항금지령(드라이버)","스트로크","라켓"],"a":2,"ex":"금지령(~하지 마라)은 부모의 어린이 자아에서 비언어적으로 전달된다는 점에서 대비된다."},{"n":54,"q":"현실치료에서 좋은 계획의 조건으로 옳지 않은 것은?","opts":["단순해야 한다.","현실적으로 달성 가능해야 한다.","측정 가능하고 구체적이어야 한다.","내담자가 스스로 통제할 수 있는 것이어야 한다.","계획이 실패하면 그에 상응하는 처벌이 따라야 한다."],"a":4,"ex":"현실치료는 처벌과 변명을 모두 배제하고, 실패한 계획은 재계획의 대상일 뿐이라고 본다."},{"n":55,"q":"“0점에서 10점 중 지금 3점이라면, 4점이 되었을 때 무엇이 지금과 달라져 있을까요?”에 해당하는 해결중심 질문은?","opts":["기적질문","척도질문","예외질문","관계성질문","대처질문"],"a":1,"ex":"척도질문은 변화를 수량화하고, ‘한 단계’의 작은 변화를 구체적 행동 언어로 번역하게 한다."},{"n":56,"q":"동기강화상담의 정신(spirit)과 원리에 대한 설명으로 옳지 않은 것은?","opts":["문제를 즉시 바로잡으려는 교정반사를 적극 활용한다.","변화 동기는 내담자 내부에서 유발되도록 한다.","내담자의 자율성을 존중한다.","공감을 표현하고 저항과 함께 구른다.","내담자와의 협동을 중시한다."],"a":0,"ex":"교정반사(righting reflex)는 오히려 내담자의 반대편 논거(유지대화)를 강화하므로 억제해야 할 반응이다."},{"n":57,"q":"우울증의 재발 방지를 위해 인지치료의 요소와 마음챙김 명상을 결합하여 개발된 프로그램은?","opts":["MBSR","EMDR","DBT","ACT","MBCT"],"a":4,"ex":"MBSR(스트레스 감소)을 모태로 하되, 반추적 사고 패턴과의 탈동일시를 통해 우울 재발을 막는 데 특화되었다."},{"n":58,"q":"변증법적 행동치료(DBT)의 기술훈련 모듈을 모두 고른 것은?","box":"ㄱ. 마음챙김\nㄴ. 고통감내\nㄷ. 정서조절\nㄹ. 대인관계 효율성\nㅁ. 인지재구성","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ, ㅁ"],"a":3,"ex":"네 모듈 중 마음챙김과 고통감내는 수용 지향, 정서조절과 대인관계 효율성은 변화 지향 기술로 묶인다."},{"n":59,"q":"상담 초기 구조화에 포함될 내용으로 적절하지 않은 것은?","opts":["상담 시간, 빈도, 기간에 관한 안내","비밀보장과 그 한계에 대한 설명","성공적인 상담 결과에 대한 확정적 보장","상담료와 취소 규정에 대한 안내","상담자와 내담자의 역할에 대한 안내"],"a":2,"ex":"결과 보장은 비윤리적이며, 구조화는 약속이 아니라 상담이라는 협동 작업의 틀을 합의하는 과정이다."},{"n":60,"q":"특정 이론 체계에 매이지 않고, 효과가 입증된 다양한 기법을 내담자와 문제에 맞게 선택적으로 사용하는 심리치료 통합의 접근은?","opts":["이론적 통합","기술적 절충주의","공통요인 접근","동화적 통합","단일학파 접근"],"a":1,"ex":"이론적 통합은 이론 수준의 융합(예: 순환적 정신역동), 공통요인 접근은 모든 치료에 공통된 변화 기제 탐색이다."},{"n":61,"q":"내담자가 매 회기 10분 이상 지각하고 회기 중에는 침묵으로 일관한다. 정신역동적 관점에서 가장 적절한 개입은?","opts":["치료 구조를 어기는 것이므로 즉시 상담을 종결한다.","지각과 침묵이 상담 관계에서 갖는 의미를 함께 탐색한다.","지각을 못 본 척하고 남은 시간만 충실히 진행한다.","다음부터 회기 시간을 줄이겠다고 통보한다.","과제를 늘려 침묵할 시간을 없앤다."],"a":1,"ex":"행동으로 나타나는 저항은 제거할 문제가 아니라 그 자체가 해석과 탐색의 재료가 된다."},{"n":62,"q":"실연당한 사람이 “그 사람은 어차피 나와 맞지 않았어, 잘된 일이야”라고 말한다. 해당하는 방어기제는?","opts":["주지화","부인","퇴행","투사","합리화"],"a":4,"ex":"이솝우화의 ‘신 포도’형 합리화이다. 주지화는 정서를 차단한 채 추상적 사고로만 다루는 것이라는 점에서 다르다."},{"n":63,"q":"암 진단을 받은 환자가 불안이나 슬픔의 표현 없이 생존율 통계와 치료 기전에 대해서만 상세히 이야기한다. 해당하는 방어기제는?","opts":["부인","억압","주지화","반동형성","승화"],"a":2,"ex":"사실 자체는 수용하되 그에 따르는 정서를 분리해 지적 활동으로 처리한다. 사실까지 인정하지 않으면 부인이다."},{"n":64,"q":"아들러학파에서 내담자의 생활양식을 평가하기 위해 사용하는 대표적인 기법은?","opts":["자유연상","단추 누르기","역설적 의도","초기기억 분석","사고중지"],"a":3,"ex":"초기기억은 사실 여부보다 ‘무엇을 어떻게 기억하기로 선택했는가’가 현재의 생활양식을 드러낸다고 본다."},{"n":65,"q":"토큰경제 운영의 원칙으로 옳지 않은 것은?","opts":["토큰 지급 기준을 비공개로 수시로 변경한다.","행동 직후 즉시 토큰을 지급한다.","교환할 수 있는 강화물을 다양하게 마련한다.","표적행동을 명확하게 정의한다.","점진적으로 사회적·자연적 강화로 전환해 간다."],"a":0,"ex":"기준의 예측 가능성과 일관성이 토큰경제의 생명이다. 기준이 불투명하면 행동-결과 수반성 학습이 무너진다."},{"n":66,"q":"공황장애 치료에서 과호흡, 어지러움, 심계항진 등의 신체감각을 의도적으로 유발하여 둔감화하는 노출 방식은?","opts":["실제 상황 노출","심상 노출","점진적 모델링","가상현실 노출","내부감각(자극감응) 노출"],"a":4,"ex":"공황의 핵심이 신체감각에 대한 파국적 해석이므로, 감각 자체에 대한 노출이 필요하다."},{"n":67,"q":"“모든 사람에게 사랑받아야만 나는 가치 있는 사람이다”라는 신념에서 REBT가 주목하는 핵심 문제는?","opts":["현실적인 선호의 표현이라는 점","절대적이고 당위적인 요구라는 점","경험적으로 검증된 사실이라는 점","적응을 돕는 합리적 신념이라는 점","무조건적 자기수용의 표현이라는 점"],"a":1,"ex":"‘~하면 좋겠다(선호)’가 ‘~해야만 한다(요구)’로 격상될 때 정서 장해가 생긴다고 본다."},{"n":68,"q":"벡(Beck)이 제시한 우울증의 인지삼제(cognitive triad)를 모두 고른 것은?","box":"ㄱ. 자기에 대한 부정적 관점\nㄴ. 세상(경험)에 대한 부정적 관점\nㄷ. 미래에 대한 부정적 관점\nㄹ. 과거에 대한 부정적 관점","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ"],"a":3,"ex":"‘나는 무가치하고, 세상은 가혹하며, 미래는 절망적이다’의 세 축이다. 과거가 아닌 미래라는 점이 함정 포인트."},{"n":69,"q":"자신의 적대감을 인정하지 않은 채 “사람들이 나를 미워한다”라고 일관되게 지각한다. 게슈탈트의 접촉경계혼란 중 무엇에 해당하는가?","opts":["내사","반전","투사","융합","편향"],"a":2,"ex":"자기 것으로 알아차리지 못한 부분이 타인에게서 지각된다. 반전은 타인에게 향할 에너지를 자신에게 돌리는 것이다."},{"n":70,"q":"내담자가 “엄마는 항상 동생 편만 들어요. 저는 뭘 해도 소용없어요”라고 말했다. 가장 공감적인 반응은?","opts":["“애를 써도 알아주지 않는 것 같아 서운하고 힘이 빠지는군요.”","“어머니께서도 나름의 사정이 있으셨을 거예요.”","“왜 그렇게 생각하게 되었는지 논리적으로 설명해 볼래요?”","“동생과 자신을 비교하지 않는 게 좋겠어요.”","“긍정적인 면을 찾아보면 어떨까요?”"],"a":0,"ex":"공감은 충고·해명·심문이 아니라 내담자의 내적 참조틀에서 감정을 따라가 언어화하는 것이다."},{"n":71,"q":"사회적으로 성공한 중년 내담자가 “이룰 만큼 이뤘는데 모든 것이 공허하다”라고 호소한다. 실존주의 상담에서 우선적으로 다룰 주제는?","opts":["강화계획의 재조정","비합리적 신념의 논박","변별자극의 통제","초기기억과 출생순위","실존적 공허와 삶의 의미"],"a":4,"ex":"프랭클이 말한 실존적 공허는 결핍이 아니라 의미의 부재에서 오며, 성취 이후에 오히려 선명해질 수 있다."},{"n":72,"q":"남편이 “지금 몇 시야?”라고 묻자(어른→어른), 아내가 “또 늦었다고 잔소리하려는 거지? 당신이나 잘해!”라고 답했다. 이 교류의 유형은?","opts":["상보 교류","이면 교류","교차 교류","평행 교류","개방 교류"],"a":2,"ex":"발신된 자아상태(A→A)와 다른 자아상태(P→C)에서 응답이 돌아와 화살표가 교차하며, 대화가 단절되기 쉽다."},{"n":73,"q":"표면적으로는 사무적인 대화가 오가지만 심리적 수준에서는 다른 메시지가 함께 전달되는, 게임의 기초가 되는 교류는?","opts":["이면 교류","교차 교류","상보 교류","직접 교류","일치 교류"],"a":0,"ex":"사회적 수준과 심리적 수준의 메시지가 이중으로 흐르며, 게임의 결말은 심리적 수준이 결정한다."},{"n":74,"q":"상담자가 “그렇게 행동하는 것이 당신이 원하는 관계를 얻는 데 도움이 되고 있습니까?”라고 물었다. WDEP 중 어느 단계의 개입인가?","opts":["바람 탐색(W)","현재 행동 탐색(D)","계획 수립(P)","자기평가 촉진(E)","변명 차단"],"a":3,"ex":"판단의 주체를 상담자가 아닌 내담자에게 두는 것이 현실치료식 자기평가의 핵심이다."},{"n":75,"q":"“상담을 신청하신 후 오늘 오시기까지 사이에 조금이라도 나아진 점이 있었나요?”에 해당하는 해결중심 기법은?","opts":["기적질문","면담 전 변화에 대한 질문","관계성질문","대처질문","척도질문"],"a":1,"ex":"변화는 상담 전부터 이미 시작된다는 전제에서, 내담자가 만든 변화를 해결의 단서로 활용한다."},{"n":76,"q":"내담자가 “어차피 술은 못 끊어요. 끊을 생각도 없고요”라고 말했다. 동기강화상담에서 가장 적절한 반응은?","opts":["“지금으로서는 끊어야 할 이유를 찾기 어렵다고 느끼시는군요.”라고 반영한다.","“그러다 큰일 납니다.”라고 경고한다.","“끊으셔야 합니다. 건강이 우선이에요.”라고 설득한다.","“그 생각이 왜 잘못되었는지 알려드릴게요.”라고 논박한다.","변화 의지가 없으므로 상담을 종결한다."],"a":0,"ex":"유지대화에 논쟁으로 맞서면 저항이 강화된다. 반영은 저항과 함께 구르며 내담자가 자기 말을 다시 듣게 한다."},{"n":77,"q":"“나는 쓸모없어”라는 생각이 들 때 “나는 ‘내가 쓸모없다는 생각’을 하고 있구나”라고 바꾸어 말하게 했다. 해당하는 ACT 과정은?","opts":["수용","현재 순간과의 접촉","가치 명료화","인지적 탈융합","전념 행동"],"a":3,"ex":"생각의 내용을 바꾸지 않고 생각과의 거리(관계)를 바꾼다. 생각은 사실이 아니라 정신적 사건일 뿐이다."},{"n":78,"q":"위기개입의 원칙으로 옳지 않은 것은?","opts":["가능한 한 신속하게 개입한다.","내담자와 주변인의 안전 확보를 최우선으로 한다.","사회적 지지 자원을 적극적으로 연결한다.","현재의 문제와 대처 능력의 회복에 초점을 둔다.","성격의 근본적 재구조화를 일차 목표로 삼는다."],"a":4,"ex":"위기개입은 위기 이전 기능 수준의 회복이 목표인 단기적·집중적 개입이다. 성격 작업은 위기가 안정된 후의 과제다."},{"n":79,"q":"사례개념화에 포함될 요소로 가장 거리가 먼 것은?","opts":["내담자의 호소문제와 증상","문제의 촉발 요인과 유지 요인","상담자의 개인적 취향과 선호","내담자의 강점과 가용 자원","이론에 근거한 개입 계획"],"a":2,"ex":"사례개념화는 내담자에 대한 설명적 가설과 개입의 청사진이며, 상담자 요인은 수퍼비전에서 별도로 다룬다."},{"n":80,"q":"가까운 지인이 자신의 자녀 상담을 의뢰해 왔다. 가장 적절한 대처는?","opts":["지인의 부탁을 거절하는 것 자체가 비윤리적이므로 무조건 수락한다.","다중관계로 인한 객관성 저해 가능성을 평가하고, 필요시 다른 상담자에게 의뢰한다.","지인에게 알리지 않고 비밀리에 상담을 진행한다.","상담료를 받지 않으면 다중관계 문제가 사라지므로 무료로 진행한다.","정식 상담 대신 메신저로 조언만 제공한다."],"a":1,"ex":"다중관계의 핵심 쟁점은 금전이 아니라 판단의 객관성과 내담자 복지이다. 위험 평가와 대안 마련이 윤리적 절차다."},{"n":81,"q":"정신분석 치료에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 자유연상의 기본 규칙은 떠오르는 모든 것을 검열 없이 말하는 것이다.\nㄴ. 전이신경증은 치료를 방해하므로 발생 즉시 제거하는 것이 원칙이다.\nㄷ. 훈습은 동일한 갈등을 다양한 맥락에서 반복적으로 다루어 가는 과정이다.\nㄹ. 분석가의 익명성·중립성·절제의 태도는 전이의 발달을 촉진하기 위한 것이다.","opts":["ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"전이신경증은 제거 대상이 아니라 유아기 갈등이 치료실 안으로 들어온 것으로, 분석의 핵심 작업 재료가 된다."},{"n":82,"q":"애착이론에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 안정 애착의 성인은 친밀성과 자율성의 균형을 이룬다.\nㄴ. 회피 애착은 애착체계의 과활성화(hyperactivating) 전략을 주로 사용한다.\nㄷ. 내적작동모델은 자기와 타인에 대한 표상을 포함한다.\nㄹ. 성인애착면접(AAI)은 애착 경험 서술의 일관성을 평가한다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":3,"ex":"과활성화(매달림·과경계)는 불안 애착의 전략이고, 회피 애착은 비활성화(거리두기·욕구 축소) 전략을 쓴다."},{"n":83,"q":"내담자가 상담자에게 분노를 표출했으나, 예상했던 처벌이나 거절 대신 수용적이고 이해하는 반응을 경험하면서 변화가 일어났다. 알렉산더(Alexander)가 명명한 이 변화 기제는?","opts":["카타르시스","주지화된 통찰","역조건형성","대리학습","교정적 정서체험"],"a":4,"ex":"과거 관계에서 학습된 기대가 새로운 관계 경험에 의해 반증되는 것으로, 통찰 없이도 변화가 일어날 수 있음을 시사했다."},{"n":84,"q":"단기 정신역동치료에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 치료 초점(focus)을 설정하여 제한된 갈등 주제를 집중적으로 다룬다.\nㄴ. 치료자의 적극성이 고전적 정신분석보다 높다.\nㄷ. 내담자 선별 기준이 비교적 엄격한 편이다.\nㄹ. 시간 제한을 두지 않는 것이 원칙이다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"시간 제한 자체가 치료적 압력으로 활용된다. 초점화·적극성·선별이 단기 역동의 3대 특징이다."},{"n":85,"q":"길버트(Gilbert)의 자비중심치료(CFT)에 대한 설명으로 옳지 않은 것은?","opts":["위협, 추동, 진정(친화)의 세 가지 정서조절체계 모델에 기반한다.","자기비판에 대한 논리적 논박이 변화의 핵심 기제이다.","자비로운 자기 심상화 등의 훈련을 활용한다.","높은 수치심과 자기비난을 보이는 내담자를 위해 개발되었다.","진화심리학과 애착이론에 이론적 뿌리를 둔다."],"a":1,"ex":"CFT는 ‘옳은 생각을 알아도 위안이 안 되는’ 내담자를 위해, 논박이 아니라 진정 체계의 활성화(자비 경험)를 변화 기제로 본다."},{"n":86,"q":"웰스(Wells)의 메타인지치료(MCT)가 전통적 인지치료와 구별되는 점으로 가장 적절한 것은?","opts":["사고의 내용보다 걱정·반추라는 사고 과정과 그에 대한 메타인지적 신념을 다룬다.","자동적 사고의 내용을 수정하는 데 집중한다.","행동 실험의 사용을 금지한다.","무의식적 갈등의 해석을 핵심 기법으로 한다.","강화계획의 재조정을 일차 목표로 한다."],"a":0,"ex":"‘걱정은 통제 불가능하다’, ‘걱정이 나를 보호한다’ 같은 걱정에 대한 신념이 표적이 된다."},{"n":87,"q":"영(Young)의 심리도식치료에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 초기 부적응 도식은 아동기의 미충족된 핵심 정서 욕구에서 비롯된다고 본다.\nㄴ. 도식 양식(mode)은 순간순간 활성화되는 도식과 반응의 상태를 말한다.\nㄷ. 제한된 재양육(limited reparenting)이 치료 관계 전략으로 사용된다.\nㄹ. 도식은 성인기에 처음 형성된다고 가정한다.","opts":["ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"치료자가 윤리적 경계 안에서 미충족 욕구를 부분적으로 충족시켜 주는 것이 제한된 재양육의 핵심이다."},{"n":88,"q":"그린버그(Greenberg)의 정서중심치료(EFT)에 대한 설명으로 옳지 않은 것은?","opts":["정서를 적응적 정보의 원천으로 본다.","일차 정서, 이차 정서, 도구적 정서를 구분한다.","빈 의자, 두 의자 작업 등 게슈탈트 계열 과제를 활용한다.","정서는 통제해야 할 대상일 뿐 변화의 자원이 아니라고 본다.","‘정서로 정서를 변화시킨다’는 원리를 따른다."],"a":3,"ex":"부적응적 일차 정서(예: 수치심)에 접근한 뒤 다른 적응적 정서(예: 건강한 분노)로 변형하는 것이 EFT의 변화 공식이다."},{"n":89,"q":"심리치료 공통요인 연구에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 작업동맹의 질은 이론적 접근과 무관하게 성과를 예측하는 일관된 변인이다.\nㄴ. 도도새 평결은 치료 접근 간 효과 차이가 크다는 결론을 의미한다.\nㄷ. 기대와 희망 요인도 치료 성과에 기여한다.\nㄹ. 공통요인 관점은 특정 기법의 효과를 전면 부정하는 입장이다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ"],"a":1,"ex":"도도새 평결(‘모두가 이겼으니 모두 상을 받아야 한다’)은 접근 간 효과의 ‘동등성’을 가리킨다. 공통요인론도 기법을 부정하기보다 상대적 비중을 묻는다."},{"n":90,"q":"증거기반실천(EBP)의 세 가지 구성 요소를 모두 고른 것은?","box":"ㄱ. 활용 가능한 최선의 연구 증거\nㄴ. 임상가의 전문성\nㄷ. 내담자의 특성, 문화, 선호\nㄹ. 기관의 수익성","opts":["ㄱ","ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":3,"ex":"EBP는 ‘연구가 시키는 대로’가 아니라, 증거·전문성·내담자 요인의 세 다리가 통합된 의사결정 과정이다."},{"n":91,"q":"수(Sue) 등이 제시한 다문화 상담 역량의 구성 차원으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 상담자 자신의 가정, 가치, 편견에 대한 인식\nㄴ. 문화적으로 다른 내담자의 세계관에 대한 이해\nㄷ. 문화적으로 적절한 개입 전략과 기술\nㄹ. 내담자의 주류문화 동화를 촉진하는 능력","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"동화의 촉진은 역량이 아니라 문화적 강요에 해당할 수 있다. 인식-지식-기술의 3차원 모델이 정답 틀이다."},{"n":92,"q":"비대면(원격) 상담의 윤리적 실천에 대한 설명으로 옳지 않은 것은?","opts":["위기 대응은 대면과 동일하게 가능하므로 별도의 비상 계획은 불필요하다.","내담자 소재 지역의 위기 개입 자원을 사전에 파악해 둔다.","기술 장애 발생 시의 대안적 연락 방법을 미리 합의한다.","내담자의 신원을 확인하는 절차를 마련한다.","플랫폼의 보안과 암호화 수준을 확인한다."],"a":0,"ex":"원격 상황의 위기 개입은 물리적 접근이 불가능하므로, 소재지·비상연락처·현지 자원을 포함한 별도 계획이 필수다."},{"n":93,"q":"정기적 성과 모니터링(매 회기 성과·동맹 척도 측정과 피드백)에 대한 설명으로 가장 적절한 것은?","opts":["측정 행위 자체가 치료동맹을 훼손하므로 금지된다.","종결 시점에 한 번만 측정하는 것이 표준이다.","연구 장면에서만 사용하도록 제한된다.","측정 결과는 내담자에게 공개하지 않는 것이 원칙이다.","악화 사례의 조기 식별과 치료 성과 향상에 기여한다는 근거가 있다."],"a":4,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 상담자는 악화 사례를 잘 감지하지 못한다는 연구들이 있으며, 체계적 피드백이 이 맹점을 보완한다."},{"n":94,"q":"수퍼(Super)의 진로발달이론에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 진로발달은 전 생애에 걸친 과정이다.\nㄴ. 직업 선택은 자기개념을 직업적으로 표현하는 과정이다.\nㄷ. 성장-탐색-확립-유지-쇠퇴의 단계를 제시하였다.\nㄹ. 진로성숙은 청소년기에 완성되어 이후 변하지 않는다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":3,"ex":"대순환 안에 소순환(재탐색)이 있다는 것이 수퍼 이론의 현대적 의의로, 발달은 평생 재순환한다."},{"n":95,"q":"크럼볼츠(Krumboltz)의 계획된 우연 이론에서 우연한 사건을 진로 기회로 전환하는 데 필요한 기술을 모두 고른 것은?","box":"ㄱ. 호기심\nㄴ. 인내심\nㄷ. 융통성\nㄹ. 완벽주의","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"호기심·인내심·융통성·낙관성·위험감수의 다섯 기술이다. 완벽주의는 오히려 우연 기회의 활용을 막는다."},{"n":96,"q":"통합발달모델(IDM)에서 수준 1 수퍼바이지의 특징으로 가장 적절한 것은?","opts":["높은 동기와 높은 불안을 보이며 구조화된 지도를 선호한다.","자율성이 높아 비지시적 수퍼비전을 선호한다.","자기와 내담자에 대한 인식이 균형 있게 통합되어 있다.","역전이 자각이 안정적으로 확립되어 있다.","사례개념화 능력이 완숙한 단계이다."],"a":0,"ex":"수준 1은 ‘잘하고 싶지만 어떻게 해야 할지 모르는’ 상태로, 모호함을 견디기 어려워 명확한 지침을 원한다."},{"n":97,"q":"내담자-상담자 관계에서 일어나는 역동이 상담자-수퍼바이저 관계에서 유사하게 재연되는 현상은?","opts":["역할 연기","삼각측정","모델링","구조화","평행과정"],"a":4,"ex":"예컨대 무력감을 호소하는 내담자를 만나는 수련생이 수퍼비전에서 똑같이 무력하게 행동하는 경우로, 그 자체가 수퍼비전의 자료가 된다."},{"n":98,"q":"사전동의(informed consent)에 대한 설명으로 옳지 않은 것은?","opts":["내담자의 이해 수준을 확인하는 과정을 포함한다.","서면 서명을 받는 1회성 절차로 완결된다.","상담 중 새로운 기법이나 녹음 도입 시 다시 동의를 구한다.","미성년 내담자에게는 발달 수준에 맞는 설명을 제공한다.","비용, 비밀보장의 한계 등 주요 정보를 포함한다."],"a":1,"ex":"사전동의는 문서가 아니라 ‘과정’이다. 상담의 조건이 변할 때마다 갱신되는 지속적 대화로 이해해야 한다."},{"n":99,"q":"상담자의 가치와 관련된 윤리적 태도로 가장 적절한 것은?","opts":["가치의 영향 가능성을 인식하되, 내담자에게 자신의 가치를 강요하지 않도록 지속적으로 점검한다.","가치관이 다른 내담자는 즉시 다른 상담자에게 의뢰하는 것이 원칙이다.","상담자는 완전한 가치중립을 유지할 수 있으며 그것이 의무이다.","내담자를 상담자의 가치 쪽으로 설득하는 것이 전문성이다.","가치가 개입될 수 있는 주제는 상담에서 다루지 않는다."],"a":0,"ex":"가치 차이를 이유로 한 의뢰는 차별로 판단될 수 있다. 핵심은 중립의 ‘가장’이 아니라 영향에 대한 자각과 관리다."},{"n":100,"q":"상담의 종결과 의뢰에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 상담이 더 이상 도움이 되지 않는다고 판단되면 대안과 함께 종결·의뢰를 논의한다.\nㄴ. 내담자가 연락 없이 오지 않으면 별도의 조치 없이 기록만 닫으면 된다.\nㄷ. 의뢰 시에는 내담자의 동의 하에 필요한 정보를 인계한다.\nㄹ. 종결은 상담 초기부터 준비되는 과정으로 볼 수 있다.","opts":["ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"일방적 중단(no-show 종결)에도 추수 연락과 정리의 기회 제공이 권고된다. 유기(abandonment)와 종결은 다르다."},{"n":101,"q":"한국상담심리학회 윤리강령상, 상담관계가 종결된 이후 내담자와 성적 관계를 맺지 않아야 하는 최소 기간은?","opts":["1년","2년","3년","5년","기간 제한이 없으므로 종결 즉시 가능하다"],"a":2,"ex":"강령은 ‘적어도 3년’을 명시하고, 그 후에라도 가능하면 갖지 않도록 규정한다. 숫자가 그대로 출제되는 조항이다."},{"n":102,"q":"윤리강령상 공공기관이나 교육기관의 보관 연한 규정에 해당하지 않는 경우, 상담기록 보관의 원칙은?","opts":["1년 이내","3년 이내","5년 이내","10년 이내","영구 보관"],"a":1,"ex":"기관 규정이 있으면 그것을 따르고, 없으면 3년 이내 보관이 원칙이다. 보관 기간 경과 기록은 파기해야 한다."},{"n":103,"q":"윤리강령의 다중 관계 조항에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 가까운 친구나 친인척, 지인을 내담자로 받아들이면 다중 관계가 되므로 다른 전문가에게 의뢰한다.\nㄴ. 의도하지 않게 다중 관계가 시작된 경우에도 적절한 조치를 취해야 한다.\nㄷ. 자신이 평가를 해야 하는 입장에 있는 사람은 다른 전문가에게 의뢰한다.\nㄹ. 내담자와 상담료 이외의 금전적 거래는 소액인 경우 허용된다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"강령은 상담료 이외의 ‘어떠한’ 금전적·물질적 거래도 금지한다. 금액의 크고 작음은 면책 사유가 아니다."},{"n":104,"q":"윤리강령상 내담자의 선물 수령 여부를 결정할 때 고려하도록 명시된 사항이 아닌 것은?","opts":["상담 관계에 미치는 영향","선물의 의미","내담자와 상담자의 동기","현행법 위반 여부","어떤 경우에도 즉시 거절해야 한다는 원칙"],"a":4,"ex":"강령은 일률적 금지가 아니라 ‘신중한 숙고’를 요구한다. 문화적 의미가 있는 선물의 기계적 거절이 관계를 해칠 수도 있기 때문이다."},{"n":105,"q":"내담자에게 감염성이 있는 치명적 질병이 있다는 확실한 정보를 가졌을 때, 위험에 노출된 제3자에게 정보를 공개하기 전 상담심리사가 확인해야 할 사항은?","opts":["내담자가 그 사람에게 질병을 알렸는지, 또는 스스로 알릴 의도가 있는지","제3자의 직업과 사회적 지위","보건당국에 대한 신고가 먼저 완료되었는지 여부","내담자 가족 전체의 동의 여부","질병의 치료 비용"],"a":0,"ex":"공개는 최후의 수단이다. 내담자가 스스로 알리도록 하는 것이 자율성을 보존하는 우선 경로다."},{"n":106,"q":"법원이 내담자의 동의 없이 상담 관련 정보를 요구할 경우, 윤리강령에 따른 상담심리사의 대응은?","opts":["요구받은 즉시 기록 전체를 제출한다.","법원의 요구라도 무조건 거부하는 것이 강령상 의무이다.","해당 기록을 즉시 폐기한다.","내담자의 권익이 침해되지 않도록 법원과 조율한다.","내담자에게 알리지 않고 조용히 제출한다."],"a":3,"ex":"전면 제출도, 전면 거부도 아닌 ‘조율’이 강령의 표현이다. 공개가 불가피해도 최소한의 정보만 공개한다."},{"n":107,"q":"현행법과 윤리강령의 관계에 대한 윤리강령의 입장으로 옳은 것은?","opts":["어떤 경우에도 윤리강령이 현행법에 우선한다.","동료들과 다수결로 정한다.","둘이 충돌하면 소속 기관의 방침을 따른다.","상담자가 재량으로 선택한다.","현행법을 우선 적용하되, 윤리강령이 더 엄격한 기준을 설정하고 있다면 윤리강령을 따른다."],"a":4,"ex":"‘법은 바닥, 윤리는 천장’으로 기억하면 된다. 법이 허용해도 강령이 금지하면 하지 않는 것이다."},{"n":108,"q":"다른 상담심리사의 윤리강령 위반을 알게 되었고 그 위반이 심각한 해를 끼치지 않는 경우, 강령이 제시하는 1차적 대응은?","opts":["즉시 상벌윤리위원회에 신고한다.","내담자들에게 알린다.","소속 기관장에게 보고한다.","언론에 제보한다.","우선 해당 상담심리사에게 윤리문제가 있음을 인식시킨다."],"a":4,"ex":"비공식적 해결이 1차, 실질적 해를 입히거나 개별 시도로 해결되지 않으면 위원회 신고가 2차다. 단계 구조가 출제 포인트다."},{"n":109,"q":"윤리강령의 사회적 책임 조항에 대한 설명으로 옳지 않은 것은?","opts":["필요시 무료 혹은 저가의 보수로 사회적 공헌 활동에 참여한다.","내담자 의뢰나 소개와 관련한 비용은 관례에 따라 수취할 수 있다.","책정된 상담료가 적절하지 않을 때 대안적 서비스를 받도록 돕는다.","상담비용 책정 시 내담자의 재정상태를 고려한다.","공적인 자리에서 개인 의견을 말할 때는 그것이 개인적 의견임을 분명히 한다."],"a":1,"ex":"의뢰·소개 비용의 수취와 요구는 명시적으로 금지된다. ‘소개비’ 관행은 강령 위반이다."},{"n":110,"q":"상담기록의 열람에 대한 윤리강령의 입장으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 내담자가 합당한 선에서 기록 열람을 요청하면 열람할 수 있도록 한다.\nㄴ. 열람이 내담자에게 해악을 끼친다고 사료될 경우 열람을 제한할 수 있다.\nㄷ. 열람을 제한하는 경우 그 이유를 명기한다.\nㄹ. 복수 내담자의 기록은 요청한 내담자에게 전체를 공개한다.","opts":["ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"복수 내담자(부부, 가족)의 경우 각 개인에게 직접 해당되는 부분만 공개하고 타인 정보는 보호해야 한다."},{"n":111,"q":"윤리강령의 집단상담 조항에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 집단 목표에 부합하는 집단원들을 모집한다.\nㄴ. 집단참여자를 물리적 피해나 심리적 외상으로부터 보호하기 위해 충분히 주의한다.\nㄷ. 다중관계가 될 수 있는 가까운 친구나 지인을 집단원으로 받아들이지 않는다.\nㄹ. 집단상담이 끝난 후에는 집단원과 사적인 관계를 맺어도 무방하다.","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"강령은 집단상담 ‘종결 후’의 사적 관계 형성·유지도 금지한다. 개인상담의 3년 조항과 별도로 기억해야 한다."},{"n":112,"q":"윤리강령상 상담 교육자가 평가대상이 되는 학생과 상담 관계를 맺지 않는다는 원칙의 예외로 명시된 것은?","opts":["학교 현장에서 교육의 목적으로 이루어지는 집단상담","학생이 강력히 원하는 개인상담","예외는 인정되지 않는다.","무료로 진행되는 상담","방학 중에 이루어지는 상담"],"a":0,"ex":"교육 목적의 집단상담(실습 집단 등)만이 명시된 예외다. 개인상담은 예외에 포함되지 않는다."},{"n":113,"q":"윤리강령의 홍보 조항에 대한 설명으로 옳지 않은 것은?","opts":["자신의 자격과 상담경력을 정확하게 홍보해야 한다.","기대되는 상담 효과를 정확하게 알려야 한다.","후원사 등이 잘못된 진술을 하는 경우 시정하도록 노력한다.","홍보에 활용하기 위해 내담자에게 소감문 작성이나 사진 촬영을 요청하고, 거절 시 불이익을 고지할 수 있다.","실제로 활동하지 않는 상담기관이 자신의 이름을 홍보에 사용하지 않도록 해야 한다."],"a":3,"ex":"소감문·사진 촬영의 ‘강요’는 명시적 금지 사항이다. 불이익 고지는 강요의 한 형태다."},{"n":114,"q":"윤리강령의 수련감독 조항에 대한 설명으로 옳지 않은 것은?","opts":["수련감독자는 내담자의 복지를 우선적으로 고려하도록 수련생을 지도한다.","수련감독자는 수련생이 자신의 자격요건을 내담자에게 명확히 알리도록 지도한다.","수련감독자와 수련생은 성적 혹은 연애 관계를 갖지 않는다.","객관성 유지가 힘든 가족, 친구, 동료와는 수련감독 관계를 맺지 않는 것이 원칙이다.","주 수련감독자는 수련생이 요청하면 역량과 무관하게 자격 심사를 추천한다."],"a":4,"ex":"추천은 ‘합당한 역량을 모두 갖추었다고 여겨질 때에만’ 한다. 추천 자체가 평가적·윤리적 행위다."},{"n":115,"q":"윤리강령의 심리평가 조항에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 자신이 훈련받은 검사와 평가만을 수행해야 하며, 이는 온라인 검사에도 해당된다.\nㄴ. 표준화된 조건에서 시행되지 않은 검사는 그 내용을 기록하고 결과의 타당성을 의심하거나 무효 처리할 수 있다.\nㄷ. 진단이 내담자나 다른 사람들에게 해가 된다고 판단되면 진단 혹은 결과 보고를 유보할 수 있다.\nㄹ. 공인된 검사의 일부는 발행자의 허가 없이도 수정하여 사용할 수 있다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"검사의 무허가 사용·재발행·수정은 금지된다. ‘진단 유보 가능’ 조항은 진단의 함의를 숙고하라는 취지로 자주 출제된다."},{"n":116,"q":"내담자가 “남편이 또 약속을 어겼어요. 이번이 세 번째예요”라고 말하자 상담자가 “기대를 걸었던 만큼 실망과 화가 크시겠어요”라고 반응했다. 이 반응 기술은?","opts":["재진술","직면","해석","감정 반영","요약"],"a":3,"ex":"재진술은 내용을 되돌려주는 것이고, 반영은 말 속에 담긴 감정을 언어화해 주는 것이다. 이 반응의 초점은 사실이 아니라 정서다."},{"n":117,"q":"상담자가 “지금 이 순간, 제가 질문할 때마다 말씀을 멈추시는 것 같은데, 저와의 사이에서 어떤 일이 일어나고 있는 걸까요?”라고 말했다. 사용된 기술은?","opts":["즉시성","명료화","요약","정보 제공","자기개방"],"a":0,"ex":"즉시성은 ‘지금-여기’의 상담 관계 자체를 대화의 주제로 올리는 고급 기술로, 관계 패턴이 회기 안에서 재연될 때 유용하다."},{"n":118,"q":"직면(confrontation)의 사용 원칙으로 옳지 않은 것은?","opts":["충분한 신뢰 관계가 형성된 후에 사용한다.","말과 행동, 진술 간의 구체적인 불일치에 근거한다.","내담자를 처벌하거나 이기기 위한 목적으로 사용하지 않는다.","불일치를 지적한 후 내담자의 반응을 탐색한다.","상담 첫 회기에 가장 효과적인 기술이다."],"a":4,"ex":"직면은 관계라는 저금에서 인출하는 기술이다. 잔고(신뢰)가 쌓이기 전의 직면은 공격으로 경험되기 쉽다."},{"n":119,"q":"상담 면접에서 질문 사용에 대한 설명으로 옳지 않은 것은?","opts":["개방형 질문은 내담자의 탐색을 촉진한다.","폐쇄형 질문은 구체적 정보 확인에 유용하다.","연속적인 질문 공세는 내담자를 수동적으로 만들 수 있다.","질문이 많을수록 상담의 깊이는 비례하여 깊어진다.","‘왜’ 질문은 방어를 유발할 수 있어 신중히 사용한다."],"a":3,"ex":"질문 과다는 면접을 심문으로 바꾼다. 반영·요약 같은 비질문 반응이 오히려 탐색을 깊게 하는 경우가 많다."},{"n":120,"q":"접수면접에서 다루는 내용으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 호소문제와 내방 경위\nㄴ. 위기 수준(자해·타해 위험)의 선별\nㄷ. 기관 서비스에 대한 안내와 배정 결정\nㄹ. 핵심 갈등에 대한 심층 해석","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"접수면접은 평가와 배정의 절차이지 치료 개입의 장이 아니다. 심층 해석은 본 상담의 작업이다."},{"n":121,"q":"상담 목표 설정의 원칙으로 옳지 않은 것은?","opts":["내담자가 원하는 변화와 연결되어야 한다.","상담자가 전문적 판단에 따라 일방적으로 결정하여 통보한다.","내담자의 자원과 현실을 고려하여 실현 가능해야 한다.","구체적이고 달성 여부를 확인할 수 있어야 한다.","상담이 진행되면서 수정·재협상될 수 있다."],"a":1,"ex":"목표는 합의의 산물이다. 보딘의 작업동맹 요소(목표 합의)와 연결해 두면 좋다."},{"n":122,"q":"마이켄바움(Meichenbaum)의 스트레스 면역 훈련의 단계를 순서대로 바르게 나열한 것은?","opts":["개념화 → 기술 획득과 시연 → 적용과 완수","기술 획득 → 개념화 → 적용과 완수","적용 → 개념화 → 기술 획득","개념화 → 적용 → 기술 획득","기술 획득 → 적용 → 개념화"],"a":0,"ex":"문제를 함께 이해하고(개념화), 대처 기술을 연습한 뒤(획득·시연), 점진적 스트레스 상황에 적용(완수)하는 ‘심리적 예방접종’ 구조다."},{"n":123,"q":"우울증에 대한 행동활성화(BA) 치료의 핵심 원리로 가장 적절한 것은?","opts":["무의식적 갈등의 해석","가계도 작성","불안 위계에 따른 이완 훈련","꿈 분석을 통한 통찰","회피 행동을 줄이고 보상과 가치가 있는 활동을 점진적으로 늘려 정적 강화의 접촉을 회복시킨다."],"a":4,"ex":"기분이 나아지면 움직이는 것이 아니라, 움직여야 기분이 나아진다는 ‘바깥에서 안으로’의 원리에 기반한다."},{"n":124,"q":"문제해결치료(PST)에서 대안 생성(브레인스토밍) 단계의 핵심 규칙은?","opts":["가장 현실적인 안 하나만 낸다.","과거의 실패 원인을 분석한다.","즉시 실행 계획을 세운다.","질보다 양을 추구하며 판단과 평가를 유보한다.","전문가가 정답을 제시한다."],"a":3,"ex":"생성과 평가를 분리하는 것이 핵심이다. 평가가 일찍 개입하면 대안의 폭이 좁아진다."},{"n":125,"q":"갓프레드슨(Gottfredson)의 제한-타협 이론에서 진로 타협 시 가장 마지막까지 포기하지 않으려는 요소는?","opts":["흥미","성역할(성유형)","사회적 지위(명성)","급여 수준","근무 지역"],"a":1,"ex":"타협의 순서는 흥미 → 지위 → 성역할이다. 자기개념의 핵심에 가까울수록 늦게 포기된다."},{"n":126,"q":"사회인지진로이론(SCCT)의 핵심 변인을 모두 고른 것은?","box":"ㄱ. 자기효능감\nㄴ. 결과기대\nㄷ. 개인적 목표\nㄹ. 유전적으로 고정된 적성","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":3,"ex":"반두라 이론을 진로에 적용한 모델로, 세 변인의 상호작용이 흥미 형성과 선택, 수행을 설명한다."},{"n":127,"q":"홀랜드 이론에서 개인의 흥미 코드가 SAE처럼 육각형에서 서로 인접한 유형들로 구성되어 있을 때 높다고 평가되는 것은?","opts":["일관성","변별성","정체성","일치성","계측성"],"a":0,"ex":"변별성은 유형 간 점수 차이의 뚜렷함, 일치성은 개인 유형과 환경 유형의 부합을 가리킨다. 세 개념의 변별이 단골 문항이다."},{"n":128,"q":"게슈탈트 치료의 꿈 작업에 대한 설명으로 가장 적절한 것은?","opts":["꿈의 각 요소를 자기의 투사로 보고, 내담자가 그 요소가 ‘되어’ 직접 말하고 행동해 보게 한다.","꿈은 무의식적 소망의 위장이므로 자유연상으로 해석한다.","꿈 일기를 분석하여 상담자가 정답 해석을 제공한다.","꿈은 무의미한 신경 활동이므로 다루지 않는다.","꿈의 내용을 행동 계약으로 전환한다."],"a":0,"ex":"해석(분석) 대신 동일시와 실연을 통해 소외된 자기 부분과의 접촉을 회복하는 것이 게슈탈트식 꿈 작업이다."},{"n":129,"q":"개인상담 회기 중 내담자가 깊은 이야기를 한 직후 침묵이 흘렀다. 상담자의 반응으로 가장 적절한 것은?","opts":["어색함을 막기 위해 즉시 새 질문을 던진다.","침묵을 견디며 내담자가 경험을 소화할 시간을 주고, 필요하면 침묵의 의미를 부드럽게 다룬다.","분위기 전환을 위해 농담을 한다.","회기를 조기 종료한다.","상담자가 자신의 이야기로 공백을 채운다."],"a":1,"ex":"의미 있는 개방 직후의 침묵은 통합의 시간인 경우가 많다. 침묵을 못 견디는 것이 누구인지 자문할 필요가 있다."},{"n":130,"q":"내담자가 상담자를 “선생님은 제 인생에서 만난 유일하게 완벽한 분”이라며 과도하게 이상화한다. 가장 적절한 개입은?","opts":["칭찬이므로 감사히 수용하고 넘어간다.","더 완벽하게 보이도록 노력한다.","즉시 상담을 종결한다.","상담자의 단점 목록을 제시하여 반박한다.","이상화가 상담 관계와 내담자의 관계 패턴에서 갖는 의미를 다룬다."],"a":4,"ex":"이상화는 전이의 한 형태로, 평가절하로 반전되기 쉽다. 만족도, 반박도 아닌 ‘탐색’이 치료적 반응이다."},{"n":131,"q":"단회상담(single-session)의 특징으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 호소문제 중 가장 절실한 하나에 초점을 맞춘다.\nㄴ. 내담자의 강점과 기존 자원을 적극 활용한다.\nㄷ. 회기 내에서 시도 가능한 구체적인 과제나 해결의 단서를 도출한다.\nㄹ. 성격 구조의 근본적 재구성을 목표로 한다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"이번이 마지막 만남일 수 있다는 전제로 설계된다. 깊이의 포기가 아니라 초점의 선택이다."},{"n":132,"q":"로저스가 제시한 치료적 변화의 필요충분조건에 포함되지 않는 것은?","opts":["두 사람의 심리적 접촉","내담자의 불일치(취약하거나 불안한) 상태","상담자의 일치성과 무조건적 긍정적 존중, 공감적 이해","상담자의 정확한 진단과 처방","내담자가 상담자의 존중과 공감을 어느 정도 지각하는 것"],"a":3,"ex":"여섯 조건 어디에도 진단은 없다. 마지막 조건(내담자의 지각)이 자주 누락되는 출제 포인트다."},{"n":133,"q":"“사람들이 내 발표를 지루해할 것이다”라는 자동적 사고를 가진 내담자와 함께, 실제 발표 후 청중 3명에게 피드백을 받아 오기로 계획하였다. 이 개입은?","opts":["사고중지","자유연상","홍수법","역설적 의도","행동 실험"],"a":4,"ex":"협력적 경험주의의 구현으로, 신념을 논쟁이 아닌 ‘자료’로 검증한다. 노출과 달리 목적이 불안 감소가 아니라 신념 검증이다."},{"n":134,"q":"REBT에서 말하는 무조건적 자기수용(USA)의 의미로 가장 적절한 것은?","opts":["자신의 모든 행동을 잘했다고 평가하는 것","행동과 수행은 평가하되, 그것으로 존재 전체의 가치를 매기지 않는 것","타인의 평가를 전혀 듣지 않는 것","자기 평가를 항상 긍정적으로 유지하는 것","실수를 인정하지 않는 것"],"a":1,"ex":"‘이번 발표는 못했다’(행동 평가)와 ‘나는 무가치하다’(존재 평가)의 분리가 핵심이다."},{"n":135,"q":"하나의 주된 이론적 기반을 유지하면서 다른 접근의 개념과 기법을 선택적으로 흡수해 가는 심리치료 통합의 방식은?","opts":["동화적 통합","기술적 절충주의","공통요인 접근","이론적 통합","무선적 절충"],"a":0,"ex":"‘인지치료를 기반으로 게슈탈트 기법을 흡수’하는 식이다. 기반 이론의 유무가 기술적 절충과의 차이다."},{"n":136,"q":"융의 개념 중 사회적 요구에 맞추어 외부에 내보이는 공적인 얼굴이자 적응의 가면을 지칭하는 것은?","opts":["그림자","아니마","페르소나","자기(Self)","콤플렉스"],"a":2,"ex":"페르소나 자체는 적응에 필요하지만, 그것과 과도하게 동일시될 때 참된 자기와의 괴리가 문제가 된다."},{"n":137,"q":"융의 ‘그림자’에 대한 설명으로 가장 적절한 것은?","opts":["의식적으로 계발한 사회적 기술","지능의 한 요인","남성 속의 여성성","집단무의식의 긍정적 원형만을 지칭","자아가 인정하지 않는 자신의 부정적·열등한 측면으로, 타인에게 투사되기 쉽다."],"a":4,"ex":"이유 없이 강하게 미운 사람은 내 그림자의 거울일 수 있다. 그림자의 의식화가 개성화의 첫 관문이다."},{"n":138,"q":"아들러의 생활양식 유형론에서 사회적 관심은 낮고 활동 수준은 높은 유형은?","opts":["지배형","기생형(획득형)","회피형","사회적 유용형","관조형"],"a":0,"ex":"기생형은 활동 수준도 낮게 의존하고, 회피형은 둘 다 낮다. 건강한 유형은 사회적 관심과 활동이 모두 높은 사회적 유용형이다."},{"n":139,"q":"아들러 이론에서 ‘사적 논리(private logic)’의 의미로 가장 적절한 것은?","opts":["과학적으로 검증된 추론 규칙","개인이 자신과 세상에 대해 가진 주관적 신념 체계로, 공동감각(common sense)과 어긋날 때 부적응을 낳는다.","집단이 합의한 규범","논리학의 한 분야","의식적 의사결정 전략"],"a":1,"ex":"‘나는 특별해야만 가치 있다’ 같은 사적 논리는 본인에게는 자명하지만, 공동체 감각의 검증을 통과하지 못한다."},{"n":140,"q":"자기감찰(self-monitoring) 기법에 대한 설명으로 가장 적절한 것은?","opts":["기록은 평가 목적일 뿐 행동에 영향을 주지 않는다.","무의식적 갈등을 기록하는 기법이다.","상담자가 내담자 몰래 행동을 관찰하는 것이다.","표적행동을 스스로 관찰·기록하는 것만으로도 행동이 바람직한 방향으로 변하는 반응성(reactivity) 효과가 나타날 수 있다.","아동에게는 사용할 수 없다."],"a":3,"ex":"흡연 개비 수를 적는 것만으로 흡연이 주는 현상처럼, 측정 자체가 개입이 된다. 평가와 개입의 경계가 흐려지는 지점이다."},{"n":141,"q":"혐오치료의 적용에 대한 설명으로 옳지 않은 것은?","opts":["바람직하지 않은 행동에 혐오 자극을 연합시키는 기법이다.","고전적 조건형성 원리에 기반한다.","내담자의 충분한 동의와 윤리적 검토가 선행되어야 한다.","대안 행동의 학습과 병행될 때 효과가 유지되기 쉽다.","효과가 확실하므로 다른 기법보다 항상 우선적으로 적용한다."],"a":4,"ex":"혐오치료는 침습성 때문에 덜 제한적인 대안이 없을 때 최후 수단으로 고려되는 것이 윤리적 원칙이다."},{"n":142,"q":"인지치료의 소크라테스식 질문에 대한 설명으로 가장 적절한 것은?","opts":["상담자가 정해 둔 결론으로 몰아가는 유도 심문이다.","빠른 답변을 압박하는 속사포 질문이다.","내담자가 스스로 증거를 검토하고 대안적 관점을 발견하도록 돕는 안내된 발견의 대화법이다.","폐쇄형 질문만으로 구성된다.","철학 수업에서만 사용된다."],"a":2,"ex":"‘그 생각의 근거는? 반대 증거는? 친구가 같은 상황이라면 뭐라고 말해 주겠는가?’처럼 결론이 아니라 사고 과정을 연다."},{"n":143,"q":"벡의 인지 위계에서 ‘만약 ~라면 ~이다’ 형태의 가정과 삶의 규칙들로 구성되어, 핵심신념과 자동적 사고를 매개하는 수준은?","opts":["자동적 사고","중간신념","핵심신념","스키마 양식","상위 인지"],"a":1,"ex":"‘완벽하지 않으면 거부당한다(중간신념)’가 ‘나는 무능하다(핵심신념)’를 보호하는 보상 전략으로 기능한다."},{"n":144,"q":"비행기가 30분 연착되자 “이번 출장은 완전히 망했고 계약도 끝장날 것”이라고 생각한다. 해당하는 인지왜곡은?","opts":["독심술","개인화","명명하기","재앙화","감정적 추론"],"a":3,"ex":"최악의 결과를 과대평가하고 대처 가능성을 과소평가하는 왜곡으로, 불안 장애의 단골 사고 패턴이다."},{"n":145,"q":"게슈탈트 치료의 알아차림 영역 중 생각, 상상, 판단, 해석이 일어나는 곳으로, 과도하게 활성화되면 현재와의 접촉을 방해하는 영역은?","opts":["중간 영역","내부 영역(신체 감각)","외부 영역(감각을 통한 환경 지각)","초월 영역","행동 영역"],"a":0,"ex":"‘지금 무엇이 보이고 느껴지는가’ 대신 머릿속 해설에 사는 상태다. 중간 영역 비우기가 현재 접촉 훈련의 핵심이다."},{"n":146,"q":"게슈탈트 이론에서 ‘미해결 과제’에 대한 설명으로 가장 적절한 것은?","opts":["완료하지 못한 행정 업무","기억력의 결함","미래에 대한 계획 부족","충분히 경험되고 표현되지 못한 감정과 욕구가 배경으로 물러나지 못한 채 현재의 접촉을 방해하는 것","과제 수행 기술의 부족"],"a":3,"ex":"표현되지 못한 분노나 애도가 전경으로 계속 떠오르려 하면서 에너지를 묶어 둔다. 빈 의자 작업의 표적이 된다."},{"n":147,"q":"롤로 메이(May)의 구분에서 정상 불안과 신경증적 불안의 차이로 가장 적절한 것은?","opts":["정상 불안은 존재하지 않는다.","정상 불안은 성인에게만, 신경증적 불안은 아동에게만 나타난다.","정상 불안은 치료가 필요하고 신경증적 불안은 불필요하다.","두 불안은 강도만 다를 뿐 질적으로 같다.","정상 불안은 위협에 비례하고 건설적으로 직면할 수 있는 불안이며, 신경증적 불안은 위협에 비례하지 않고 억압과 회피를 동반한다."],"a":4,"ex":"실존주의는 불안의 제거가 아니라 정상 불안과 더불어 사는 능력을 치료 목표로 본다."},{"n":148,"q":"교류분석의 시간의 구조화 여섯 가지 중 가장 깊은 수준의 진솔한 교류로, 위험도와 보상이 모두 가장 큰 것은?","opts":["의례(ritual)","친밀(intimacy)","활동(activity)","게임(game)","잡담(pastime)"],"a":1,"ex":"철수→의례→잡담→활동→게임→친밀 순으로 교류의 깊이와 심리적 위험이 커진다. 게임은 친밀의 왜곡된 대용품이다."},{"n":149,"q":"교류분석의 스트로크 이론에 대한 설명으로 가장 적절한 것은?","opts":["스트로크 기아 상태에서는 무스트로크보다 부정적 스트로크라도 얻으려는 행동이 나타날 수 있다.","인간은 부정적 스트로크를 어떤 경우에도 회피한다.","스트로크는 물질적 보상만을 의미한다.","성인에게는 스트로크가 필요 없다.","스트로크는 언어적 형태로만 존재한다."],"a":0,"ex":"문제행동으로라도 관심을 끄는 아동의 행동이 그 예다. ‘무시당하느니 혼나는 게 낫다’는 스트로크 경제의 논리다."},{"n":150,"q":"해결중심상담에서 “그 어려운 상황에서 어떻게 그렇게 하실 생각을 했어요?”라고 묻는 칭찬의 유형은?","opts":["직접 칭찬","자기 칭찬","간접 칭찬","평가적 칭찬","조건부 칭찬"],"a":2,"ex":"간접 칭찬은 성공의 ‘방법’을 묻는 질문 형태로, 내담자가 스스로 유능성의 증거를 말하게 만든다."},{"n":151,"q":"해결중심상담의 첫 회기 공식 과제(formula first session task)의 내용은?","opts":["문제의 원인을 일기로 분석해 오기","문제가 가장 심했던 순간을 기록해 오기","다음 회기까지 삶에서 ‘계속 일어나기를 바라는 것’이 무엇인지 관찰해 오기","가족의 잘못 목록 작성해 오기","증상 빈도 그래프 그리기"],"a":2,"ex":"시선을 문제에서 ‘유지하고 싶은 것’으로 돌리는 과제로, 예외와 자원의 발견을 구조적으로 유도한다."},{"n":152,"q":"ACT에서 가치(value)와 목표(goal)의 구별로 가장 적절한 것은?","opts":["가치는 도달하면 완료되는 지점이고, 목표는 방향이다.","가치는 타인이 정해 주는 것이다.","둘은 동일한 개념이다.","목표는 측정할 수 없다.","가치는 지속적으로 추구하는 삶의 방향이고, 목표는 그 방향 위에서 달성 가능한 구체적 지점이다."],"a":4,"ex":"‘좋은 부모 되기’는 가치, ‘주 3회 아이와 저녁 먹기’는 목표다. 목표는 완료되지만 가치는 완료되지 않는 나침반이다."},{"n":153,"q":"동기강화상담의 네 가지 과정을 순서대로 바르게 나열한 것은?","opts":["계획 → 유발 → 초점 맞추기 → 관계 형성","초점 맞추기 → 관계 형성 → 계획 → 유발","유발 → 계획 → 관계 형성 → 초점 맞추기","관계 형성 → 초점 맞추기 → 유발 → 계획","관계 형성 → 유발 → 초점 맞추기 → 계획"],"a":3,"ex":"engaging-focusing-evoking-planning. 계단처럼 앞 과정이 뒤 과정의 토대가 되며, 필요시 앞 단계로 되돌아간다."},{"n":154,"q":"사비카스(Savickas)의 진로구성주의 상담에 대한 설명으로 가장 적절한 것은?","opts":["적성검사 점수와 직업의 기계적 매칭을 핵심으로 한다.","내담자의 커리어 스토리를 통해 생애 주제를 구성하고, 진로를 자기 이야기의 다음 장으로 설계하도록 돕는다.","유전적 적성만이 진로를 결정한다고 본다.","흥미는 진로와 무관하다고 본다.","집단 검사만 사용한다."],"a":1,"ex":"‘검사가 말해주는 나’에서 ‘이야기로 구성하는 나’로의 전환이며, 진로불확실성이 큰 시대의 포스트모던적 응답이다."},{"n":155,"q":"파슨스(Parsons)의 특성요인이론에서 현명한 직업 선택의 세 요소를 모두 고른 것은?","box":"ㄱ. 자신에 대한 명확한 이해\nㄴ. 직업 세계에 대한 지식\nㄷ. 두 정보 간의 합리적 추론(매칭)\nㄹ. 우연한 기회의 수용","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"진로상담의 출발점이 된 고전 모델이다. ㄹ(우연)은 크럼볼츠의 현대적 개념으로, 시대를 섞는 것이 함정 패턴이다."},{"n":156,"q":"“시험을 망치면 내 인생은 끝”이라는 생각에 휩싸여 극심한 공포를 느끼는 내담자가 있다. REBT의 ABC 모형에서 이 공포(정서적 결과)의 직접적 원인은?","opts":["‘망치면 끝’이라는 신념","시험이라는 선행사건","공포라는 결과 자체","상담자의 논박","과거의 시험 실패 경험"],"a":0,"ex":"같은 시험(A)을 앞두고도 신념(B)에 따라 정서(C)가 달라진다. A가 아니라 B가 C를 만든다는 것이 REBT의 핵심 가정이다."},{"n":157,"q":"엘리스의 REBT가 벡의 인지치료와 구별되는 상대적 특징으로 가장 적절한 것은?","opts":["자동적 사고의 행동 실험 검증을 강조한다.","협력적 경험주의를 핵심 자세로 삼는다.","소크라테스식 질문만을 사용한다.","당위적·요구적 신념에 대한 직접적이고 철학적인 논박을 강조한다.","무의식적 갈등의 해석에 집중한다."],"a":3,"ex":"벡은 ‘함께 검증하자’, 엘리스는 ‘그 당위가 논리적으로 성립하는가’로 결이 다르다. 양방향으로 출제될 수 있다."},{"n":158,"q":"늦은 밤 인적 없는 골목에서 낯선 사람이 따라올 때 느끼는 두려움은 프로이트의 불안 유형 중 무엇에 해당하는가?","opts":["분리 불안","신경증적 불안","도덕적 불안","거세 불안","현실 불안"],"a":4,"ex":"외부의 실제 위험에 대한 자아의 반응으로, 적응적 기능을 하는 불안이다."},{"n":159,"q":"뚜렷한 외부 위협이 없는데도 자신 안의 충동이 통제를 벗어나 터져 나올 것 같은 막연한 두려움을 느낀다. 해당하는 불안 유형은?","opts":["신경증적 불안","현실 불안","도덕적 불안","실존적 불안","상태 불안"],"a":0,"ex":"원초아의 충동이 의식을 뚫고 나올 것에 대한 자아의 두려움이다. 위협의 원천이 ‘외부’가 아니라 ‘내부 충동’이다."},{"n":160,"q":"부모 간병을 시설에 맡긴 후 객관적으로 잘못한 일이 없는데도 ‘불효’라는 생각에 끊임없이 가책을 느낀다. 해당하는 불안 유형은?","opts":["현실 불안","도덕적 불안","신경증적 불안","예기 불안","특성 불안"],"a":1,"ex":"내면화된 초자아의 기준을 어겼다는 지각에서 오는 죄책감형 불안이다. 세 유형은 ‘두려움의 원천’으로 구분한다."},{"n":161,"q":"중요한 발표를 앞둔 직장인이 “주말 가족 여행 동안에는 발표 걱정을 하지 않겠다”고 의식적으로 마음먹고 실제로 그렇게 했다. 해당하는 방어(대처)기제는?","opts":["억압","억제","해리","부인","격리"],"a":1,"ex":"억제(suppression)는 의식적·자발적 미루기로 성숙한 기제이고, 억압(repression)은 무의식적 밀어내기라는 점이 결정적 차이다."},{"n":162,"q":"동료를 몹시 싫어하는 사람이 정작 “저 사람이 나를 싫어한다”고 확신한다. 해당하는 방어기제는?","opts":["전치","주지화","반동형성","합리화","투사"],"a":4,"ex":"전치는 감정의 ‘대상’이 바뀌는 것이고, 투사는 감정의 ‘소유자’가 바뀌는 것이다. 둘의 변별이 단골 포인트다."},{"n":163,"q":"안전벨트를 매지 않으면 경고음이 계속 울리고, 매는 순간 멈춘다. 운전자의 벨트 착용이 늘었다면 작동한 학습 기제는?","opts":["정적 강화","정적 처벌","부적 강화","부적 처벌","소거"],"a":2,"ex":"혐오자극(경고음)의 제거가 행동(착용)을 증가시켰다. ‘제거(부적)+증가(강화)’의 2단계 판정을 연습하는 문항이다."},{"n":164,"q":"지각한 직원에게 추가 업무가 부과되자 지각이 줄었다. 작동한 학습 기제는?","opts":["부적 강화","부적 처벌","정적 강화","정적 처벌","자극 일반화"],"a":3,"ex":"혐오자극(추가 업무)의 ‘제시(정적)’가 행동을 ‘감소(처벌)’시켰다. 163번과 짝지어 사분면을 완성해 보라."},{"n":165,"q":"번(Berne)의 게임 공식 “(  ) + 김미크(상대의 약점) = 반응 → 전환 → 혼란 → 결말”에서 괄호에 들어갈 것은?","opts":["콘(con, 숨은 초대)","스트로크","라켓","허가","각본"],"a":0,"ex":"게임은 겉다른 속뜻을 담은 미끼(콘)가 상대의 약점(김미크)에 걸리며 시작된다."},{"n":166,"q":"아이가 울 때마다 부모가 말없이 고개를 돌리고 자리를 떠났다. 아이는 ‘슬픔을 보이면 버림받는다’는 결론을 내렸다. 교류분석에서 이렇게 전달된 메시지는?","opts":["대항금지령","금지령","허가","스트로크","어른 자아 메시지"],"a":1,"ex":"‘느끼지 마라’류의 금지령은 부모의 어린이 자아에서 주로 비언어적으로 전달된다. 언어적 ‘~해라’는 대항금지령이다."},{"n":167,"q":"아내가 “오늘 회의 몇 시야?”(어른→어른)라고 묻자 남편이 “나한테 왜 그래! 맨날 나만 갖고 그래!”(어린이→어버이)라고 답했다. 이 교류는?","opts":["상보 교류","활동 교류","이면 교류","의례적 교류","교차 교류"],"a":4,"ex":"기대된 자아상태(A)가 아닌 다른 자아상태에서 응답이 와 벡터가 교차했고, 대화는 단절 위기를 맞는다."},{"n":168,"q":"판매원이 “이 모델은 고객님께는 좀 부담스러우실 수도 있겠네요”라고 말한다. 사회적 수준은 정보 제공이지만 심리적 수준에서는 자존심을 자극해 구매를 유도하고 있다. 이 교류는?","opts":["상보 교류","교차 교류","평행 교류","이면 교류","직접 교류"],"a":3,"ex":"두 수준의 메시지가 동시에 흐르고 결과는 심리적 수준이 결정한다. 게임은 이면 교류의 연쇄로 진행된다."},{"n":169,"q":"흡연자가 “6개월 안에는 끊을 생각이 있는데, 아직 구체적으로 시작한 건 없어요”라고 말한다. TTM의 변화단계는?","opts":["전숙고","준비","숙고","실행","유지"],"a":2,"ex":"전숙고는 6개월 내 의도 없음, 준비는 1개월 내 실행 의도와 작은 시도가 있는 단계다. 시간 기준이 변별 단서다."},{"n":170,"q":"“지난주 월요일부터 담배를 한 대도 안 피우고 있어요. 아직 한 달도 안 됐지만요.” TTM의 변화단계는?","opts":["실행","준비","숙고","유지","종결"],"a":0,"ex":"행동 변화가 시작된 후 6개월까지가 실행, 6개월 이상 지속되면 유지 단계로 본다."},{"n":171,"q":"상담자가 여성 내담자의 분노를 남성 내담자와 완전히 동일한 틀로만 해석하여, 그 분노가 놓인 사회문화적 맥락과 성별 경험의 차이를 고려하지 않았다. 여성주의 치료의 관점에서 해당하는 편견은?","opts":["알파 편견","권력 편견","감마 편견","확증 편향","베타 편견"],"a":4,"ex":"베타 편견은 차이를 ‘무시·축소’하여 여성 고유의 경험을 지우는 것이다. 사례 속 동사가 ‘과장’인지 ‘무시’인지를 보라."},{"n":172,"q":"“여성은 본성적으로 양육적이므로 경력보다 육아에 적합하다”는 신념에 해당하는 편견은?","opts":["알파 편견","베타 편견","제도적 평등","성역할 분석","의식 고양"],"a":0,"ex":"성차를 과장·본질화하여 분리와 불평등을 정당화하는 알파 편견의 전형이다. 171번과 한 쌍으로 정리하라."},{"n":173,"q":"말러의 분리-개별화 과정 중, 걸음마로 세상을 누비던 유아가 다시 어머니에게 매달리는 듯한 양가적 행동을 보이며 분리불안이 재점화되는 시기는?","opts":["정상적 자폐기","공생기","연습기","재접근기","대상항상성 형성기"],"a":3,"ex":"‘자유롭고 싶지만 버려지기는 싫은’ 재접근기 위기의 해결 양상이 이후 대상항상성의 질을 좌우한다고 본다."},{"n":174,"q":"소개팅에서 한 번 거절당한 후 “나는 누구에게도 선택받지 못할 것”이라고 결론 내린다. 해당하는 인지왜곡은?","opts":["선택적 추상화","과잉일반화","개인화","독심술","당위 진술"],"a":1,"ex":"단일 사건을 무관한 미래 전체로 확장했다. 한 사건 ‘안의 일부’에 매몰되는 선택적 추상화와 확장 방향이 다르다."},{"n":175,"q":"강의 평가에서 칭찬 댓글 열 개를 받고도 비판 댓글 하나만 반복해서 읽으며 “강의를 망쳤다”고 평가한다. 해당하는 인지왜곡은?","opts":["과잉일반화","재앙화","선택적 추상화","명명하기","임의적 추론"],"a":2,"ex":"전체 맥락(10:1)을 무시하고 부정적 세부 하나로 전체를 판단하는 정신적 여과다. 174번과 쌍으로 변별하라."},{"n":176,"q":"“그 꿈에서 반복해서 쫓기는 것은, 아버지에게 인정받지 못할까 봐 두려워하던 마음과 연결되어 있는 것 같습니다.” 사용된 면접 기술은?","opts":["재진술","해석","명료화","요약","즉시성"],"a":1,"ex":"해석은 내담자가 아직 보지 못한 의미·연결을 제시한다는 점에서, 이미 말한 것을 정리하는 반영·요약과 수준이 다르다."},{"n":177,"q":"내담자가 “그냥 다 그렇잖아요, 아시죠?”라고 모호하게 말하자 상담자가 “‘다 그렇다’는 게 구체적으로 어떤 의미인지 조금 더 말씀해 주시겠어요?”라고 물었다. 사용된 기술은?","opts":["자기개방","직면","해석","명료화","요약"],"a":3,"ex":"명료화는 모호한 메시지의 의미를 분명히 하는 기술로, 상담자의 이해 점검과 내담자의 자기 탐색을 함께 돕는다."},{"n":178,"q":"요약 기술의 기능으로 옳지 않은 것은?","opts":["흩어진 주제들을 묶어 핵심을 부각한다.","회기의 전환점이나 마무리에서 방향을 정리한다.","내담자가 말하지 않은 새로운 사실 정보를 추가한다.","내담자가 자신의 이야기를 조망하게 돕는다.","여러 회기에 걸친 흐름을 연결한다."],"a":2,"ex":"요약은 내담자가 내놓은 재료의 재구성이다. 새 의미의 ‘추가’는 해석의 영역으로 넘어가는 것이다."},{"n":179,"q":"역전이에 대한 현대적 관점으로 가장 적절한 것은?","opts":["상담자가 자각하고 검토한다면 내담자의 대인관계 패턴을 이해하는 중요한 정보원이 될 수 있다.","역전이는 치료의 오염물이므로 느끼는 즉시 상담을 중단한다.","역전이는 수련이 끝나면 사라진다.","역전이는 내담자에게 즉시 모두 공개해야 한다.","역전이를 느끼지 않는 것이 유능함의 증거이다."],"a":0,"ex":"‘제거할 잡음’에서 ‘활용할 신호’로 관점이 이동했다. 단, 자각과 수퍼비전이라는 전제가 붙는다."},{"n":180,"q":"비밀보장의 예외에 해당하는 것을 모두 고른 것은?","box":"ㄱ. 내담자가 자신이나 타인을 해칠 명백하고 임박한 위험\nㄴ. 아동학대·노인학대 등 법적 신고 의무 사항\nㄷ. 법원의 적법한 정보 제출 명령\nㄹ. 내담자가 유명인이어서 동료들이 궁금해하는 경우","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"예외는 ‘보호’를 위해 존재하지 ‘호기심’을 위해 존재하지 않는다. 예외 상황에서도 최소한의 정보만 공개한다."},{"n":181,"q":"자살 위험이 있는 내담자에 대한 개입 원칙으로 옳지 않은 것은?","opts":["자살 사고에 대해 직접적이고 차분하게 질문한다.","치명적 수단에 대한 접근을 제한하는 방안을 함께 마련한다.","고위험 시기에 혼자 있지 않도록 지지 체계를 연결한다.","구체적인 안전 계획을 함께 수립한다.","“비밀은 끝까지 지켜주겠다”고 약속하여 신뢰를 얻는다."],"a":4,"ex":"지킬 수 없는 비밀 약속은 생명 보호 의무와 충돌하는 순간 신뢰를 더 크게 무너뜨린다. 한계의 정직한 고지가 원칙이다."},{"n":182,"q":"재난·위기 직후의 심리적 응급처치(PFA)의 원칙으로 가장 적절한 것은?","opts":["안전 확보, 안정화, 정보 제공, 지지 체계와의 연결을 우선하고, 외상 서술의 강요는 피한다.","모든 생존자에게 외상 경험의 상세한 진술을 의무적으로 시킨다.","즉시 장기 심리치료 계약을 맺는다.","진단명을 빠르게 부여한다.","혼자 견디도록 격려한다."],"a":0,"ex":"강요된 집단 디브리핑의 효과에 대한 회의적 근거 이후, ‘말하게 하기’보다 ‘안전하게 하기’가 초기 개입의 표준이 되었다."},{"n":183,"q":"상담자 소진의 예방과 관리에 대한 설명으로 옳지 않은 것은?","opts":["사례 수와 난이도를 조절한다.","정기적인 수퍼비전과 동료 자문을 활용한다.","일과 삶의 경계를 유지하고 자기돌봄을 실천한다.","혼자 견디는 것이 전문가다운 태도이므로 어려움을 드러내지 않는다.","필요시 개인상담을 받는다."],"a":3,"ex":"고립은 소진의 결과이자 가속 장치다. 윤리강령도 자기 점검과 자문 요청을 전문가의 ‘의무’로 규정한다."},{"n":184,"q":"상담에서 저항이 나타나는 형태로 옳은 것을 모두 고른 것은?","box":"ㄱ. 반복되는 지각과 결석\nㄴ. 중요하지 않은 잡담으로 회기 채우기\nㄷ. 합의한 과제의 반복적 미이행\nㄹ. 감정을 배제한 주지화된 보고","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":4,"ex":"저항은 거부만이 아니라 ‘협조의 모양을 한 회피’로도 온다. 형태를 알아보는 것이 다루기의 첫걸음이다."},{"n":185,"q":"종결을 준비할 시점임을 시사하는 신호로 옳은 것을 모두 고른 것은?","box":"ㄱ. 합의한 목표가 상당 부분 달성됨\nㄴ. 내담자가 회기 밖에서 스스로 문제를 다루는 빈도 증가\nㄷ. 다룰 내용이 줄고 회기가 일상 보고 중심이 됨\nㄹ. 상담자에 대한 의존이 갈수록 심화됨","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"의존의 심화는 종결 신호가 아니라 다루어야 할 주제다. 종결은 상태가 아니라 ‘과정’으로 준비된다."},{"n":186,"q":"재발 방지(relapse prevention) 계획의 핵심 요소로 가장 적절한 것은?","opts":["재발은 없을 것이라고 확언하기","고위험 상황을 미리 식별하고 대처 반응을 구체적으로 리허설하며, 일시적 실수(lapse)와 전면적 재발(relapse)을 구분해 두기","증상이 사라졌으므로 계획 불필요","재발 시 상담 실패로 규정하기","고위험 상황의 회피만을 유일한 전략으로 삼기"],"a":1,"ex":"한 번의 실수를 ‘다 끝났다’로 해석하는 절제 위반 효과가 전면 재발의 방아쇠가 된다. 실수의 의미 처리가 계획의 일부다."},{"n":187,"q":"내담자를 다른 전문가에게 의뢰할 때의 원칙으로 옳지 않은 것은?","opts":["의뢰 사실을 알리지 않고 일방적으로 상담을 종료한다.","의뢰에 대한 내담자의 동의를 구한다.","적절한 의뢰처 정보를 제공하고 연계를 돕는다.","의뢰의 사유를 내담자에게 설명한다.","의뢰 후 연계가 이루어졌는지 확인하는 것이 바람직하다."],"a":0,"ex":"설명 없는 중단은 유기(abandonment)다. 의뢰는 관계의 단절이 아니라 돌봄의 이전이어야 한다."},{"n":188,"q":"프로이트와 에릭슨의 발달이론이 공유하는 기본 전제로 가장 적절한 것은?","opts":["발달은 청소년기에 완결된다.","각 발달 시기의 욕구와 과업이 적절히 다루어지는 것이 이후의 건강한 성격 발달의 토대가 된다.","발달 단계의 순서는 개인마다 완전히 다르다.","초기 경험은 성인기 성격과 무관하다.","발달은 환경과 무관하게 유전만으로 결정된다."],"a":1,"ex":"두 이론 모두 단계적·점성적 관점을 공유한다. 차이는 추동(성) 중심이냐 심리사회적 위기 중심이냐, 그리고 전생애 확장 여부다."},{"n":189,"q":"에릭슨 이론에서 또래와의 비교 속에 과제 수행과 성취의 경험을 쌓으며 근면성을 형성해 가는 시기는 프로이트의 어느 단계에 대응하는가?","opts":["구강기","항문기","남근기","생식기","잠복기"],"a":4,"ex":"성 추동이 잠잠해진 잠복기의 에너지가 학업·기술·또래 활동으로 향하며, 실패가 누적되면 열등감이 자리 잡는다."},{"n":190,"q":"“불안은 제거할 병리가 아니라 유한한 존재로 살아가는 인간의 조건이며, 상담의 과제는 내담자가 자신의 선택에 대한 책임을 회복하고 의미를 발견하도록 돕는 것이다.” 이 관점에 해당하는 접근은?","opts":["행동치료","교류분석","현실치료","실존주의 상담","합리정서행동치료"],"a":3,"ex":"죽음·자유·고립·무의미라는 궁극적 관심사와의 대면이 실존적 작업의 중심이다."},{"n":191,"q":"인지행동 접근의 가장 기본적인 전제로 적절한 것은?","opts":["감정을 바꾸려면 먼저 무의식을 분석해야 한다.","행동은 사고와 독립적으로 변화한다.","사건에 대한 해석과 사고가 달라지면 정서와 행동도 달라진다.","정서는 타고난 기질로 고정되어 있다.","통찰 없이는 어떤 변화도 불가능하다."],"a":2,"ex":"‘사건 그 자체가 아니라 사건에 대한 견해가 사람을 흔든다’는 에픽테토스의 명제가 이 접근의 출발점이다."},{"n":192,"q":"인지왜곡과 사례의 연결로 옳지 않은 것은?","opts":["독심술 - “회의에서 부장이 말이 없었던 건 내 기획이 형편없다고 생각하기 때문이다.”","흑백논리 - “일등이 아니면 전부 실패다.”","개인화 - “모임 분위기가 가라앉은 건 다 나 때문이다.”","과잉일반화 - “발표 직전이라 심장이 빨리 뛴다.”","감정적 추론 - “불안한 걸 보니 실제로 위험한 상황이 분명하다.”"],"a":3,"ex":"발표 전 심박 증가는 왜곡이 아니라 정상적 각성이다. 과잉일반화는 단일 사건을 전체로 확장하는 사고를 가리킨다."},{"n":193,"q":"교류분석에서 어린 시절 부모의 메시지에 따라 형성된 인생각본에 대한 설명으로 가장 적절한 것은?","opts":["각본은 성인기에 처음 작성된다.","각본은 의식적 계획표를 뜻한다.","각본은 유전적으로 결정된다.","각본은 한번 형성되면 수정이 불가능하다.","금지령과 대항금지령 등 초기 메시지에 대한 아동의 결단으로 형성되며, 자각과 재결단을 통해 다시 쓸 수 있다."],"a":4,"ex":"각본 분석의 희망은 ‘결단된 것은 재결단될 수 있다’는 데 있다. 결정론처럼 보이는 개념 안에 변화 가능성이 내장되어 있다."},{"n":194,"q":"여성주의 치료에서 성차를 실제보다 과장하여 남녀를 본질적으로 다른 존재로 분리하고, 이를 근거로 불평등한 처우를 정당화하는 경향을 지칭하는 개념은?","opts":["알파 편견","감마 편견","베타 편견","역차별","중립 편향"],"a":0,"ex":"알파는 차이의 과장, 베타는 차이의 무시다. 둘 다 여성의 실제 경험을 왜곡한다는 점에서 같은 동전의 양면이다."},{"n":195,"q":"상담자의 전문적 책임에 대한 설명으로 옳지 않은 것은?","opts":["자신의 역량 범위 안에서 서비스를 제공한다.","내담자가 호소하는 모든 문제의 해결을 보장할 책임이 있다.","상담의 한계와 위험성을 내담자에게 알린다.","지속적인 교육과 자기 점검의 의무를 진다.","내담자의 복지를 일차적 책임으로 삼는다."],"a":1,"ex":"상담자의 책임은 ‘결과의 보장’이 아니라 ‘과정의 성실성’이다. 효과 보장은 오히려 비윤리적 과장에 해당한다."},{"n":196,"q":"말러의 분리-개별화 이론에서 하위 단계의 순서로 옳은 것은?","opts":["분화기 → 연습기 → 재접근기 → 대상항상성 형성기","연습기 → 분화기 → 재접근기 → 대상항상성","재접근기 → 연습기 → 분화기 → 공생기","대상항상성 → 재접근기 → 연습기 → 분화기","연습기 → 재접근기 → 분화기 → 대상항상성"],"a":0,"ex":"정상적 자폐와 공생의 전단계를 지나 분화-연습-재접근-대상항상성의 궤도를 밟는다. 순서 자체가 반복 출제된다."},{"n":197,"q":"대상관계이론의 개념 설명으로 옳지 않은 것은?","opts":["분리(splitting) - 좋은 대상과 나쁜 대상을 통합하지 못하고 갈라서 지각하는 원초적 방어","대상항상성 - 대상이 눈앞에 없거나 좌절을 주어도 안정된 내적 표상을 유지하는 능력","중간대상 - 담요나 인형처럼 어머니를 대신하여 불안을 달래 주는 대상","투사적 동일시 - 자기의 일부를 상대에게 투사하고 상대가 그렇게 느끼고 행동하도록 압력을 가하는 과정","분리(splitting) - 아동이 양육자로부터 신체적으로 독립하는 발달 과업"],"a":4,"ex":"방어기제로서의 splitting과 발달 과업으로서의 separation은 한국어로 같은 ‘분리’로 번역되어 단골 함정이 된다."},{"n":198,"q":"실존주의 상담에 대한 설명으로 옳지 않은 것은?","opts":["인간을 자기 인식 능력과 선택의 자유를 지닌 존재로 본다.","죽음에 대한 자각이 오히려 현재의 삶을 충실하게 만들 수 있다고 본다.","치료 관계 자체의 진실한 만남을 중시한다.","구체적인 기법의 표준화된 매뉴얼을 갖춘 기법 중심 접근이다.","의미는 주어지는 것이 아니라 발견하고 창조하는 것으로 본다."],"a":3,"ex":"실존주의는 기법의 체계가 아니라 인간을 보는 태도의 체계다. 기법은 다른 접근에서 빌려 쓰되 철학이 그것을 통제한다."},{"n":199,"q":"아들러 학파에서 내담자의 자기패배적 행동이 가진 숨은 목적과 대가를 드러내어, 그 행동의 ‘맛을 떨어뜨리는’ 기법은?","opts":["단추 누르기","스프에 침 뱉기","마치 ~인 것처럼 행동하기","수렁 피하기","초기기억 분석"],"a":1,"ex":"행동을 금지하는 것이 아니라 그 행동의 숨은 이득을 의식화시켜 더 이상 ‘순진하게’ 반복할 수 없게 만든다."},{"n":200,"q":"교류분석의 게임 진행 공식에서 빈칸의 순서가 옳은 것은? “콘 + 김미크 → ( ) → ( ) → ( ) → 결말”","opts":["혼란 - 반응 - 전환","전환 - 반응 - 혼란","반응 - 전환 - 혼란","반응 - 혼란 - 전환","전환 - 혼란 - 반응"],"a":2,"ex":"미끼가 약점에 걸려 표면적 교류(반응)가 이어지다 역할이 갑자기 뒤바뀌고(전환), 어리둥절함(혼란)을 거쳐 익숙한 불쾌감(결말)으로 끝난다."},{"n":201,"q":"현실치료 WDEP 모형의 절차를 순서대로 나열한 것은?","opts":["계획 수립 → 자기평가 → 행동 탐색 → 바람 탐색","바람 탐색 → 계획 수립 → 행동 탐색 → 자기평가","자기평가 → 바람 탐색 → 계획 수립 → 행동 탐색","행동 탐색 → 계획 수립 → 바람 탐색 → 자기평가","바람 탐색 → 현재 행동 탐색 → 자기평가 → 계획 수립"],"a":4,"ex":"원하는 것(W)을 분명히 한 뒤에야 지금 하는 것(D)의 평가(E)가 의미를 갖고, 평가 위에서만 계획(P)이 선다."},{"n":202,"q":"상담 중기에 나타날 수 있는 현상으로 보기 어려운 것은?","opts":["저항의 표면화와 정체감","상담 초기의 이상화된 기대가 지속되는 허니문 상태의 유지","상담 성과에 대한 의심과 동요","전이 감정의 활성화","핵심 문제에 대한 본격적인 작업"],"a":1,"ex":"허니문은 초기 현상이며, 중기는 그것이 깨지는 자리에서 진짜 작업이 시작되는 시기다."},{"n":203,"q":"문자 기반으로 비실시간 진행되며, 내담자가 자신의 글을 작성하는 과정에서 정리 효과를 얻고 상담자는 답변을 숙고할 시간을 가질 수 있는 사이버상담의 형태는?","opts":["화상상담","채팅상담","게시판(이메일)상담","전화상담","메타버스상담"],"a":2,"ex":"비동시성은 즉시 개입의 한계인 동시에, 쓰기 치료적 효과와 숙고된 응답이라는 고유한 장점의 원천이다."},{"n":204,"q":"상담자의 윤리적 의사결정을 돕는 A-B-C-D-E 모형의 구성 요소가 아닌 것은?","opts":["평가(Assessment)","이익(Benefit)","결과(Consequences)","즉각적 실행(Doing)","의무(Duty)"],"a":3,"ex":"모형의 마지막 E는 실행이 아니라 교육(Education)이다. 윤리적 결정은 행동 전의 ‘숙고 절차’를 구조화한 것이다."},{"n":205,"q":"역전이에 대한 설명으로 옳지 않은 것은?","opts":["유능한 상담자는 역전이를 전혀 경험하지 않는다.","내담자의 대인관계 패턴이 유발하는 반응일 수도 있다.","자각되지 못한 역전이는 상담을 왜곡시킬 수 있다.","수퍼비전과 자기 분석이 역전이 관리의 통로가 된다.","상담자의 미해결 갈등에서 비롯될 수 있다."],"a":0,"ex":"역전이의 부재가 아니라 역전이에 대한 ‘자각과 활용’이 전문성의 지표다."},{"n":206,"q":"상담 기술과 반응 예시의 연결이 적절하지 않은 것은?","opts":["재진술 - “이직을 할지 남을지 사이에서 오가고 계시는군요.”","감정 반영 - “말씀하시는 동안 서운함이 묻어나는 것 같아요.”","명료화 - “당신 생각이 잘못되었다는 걸 이제 인정하세요.”","개방형 질문 - “그 일이 있고 나서 어떤 마음이 드셨나요?”","요약 - “오늘 다룬 이야기를 묶어 보면 관계와 일, 두 갈래였네요.”"],"a":2,"ex":"명료화는 모호함을 푸는 질문이지 판결이 아니다. 마지막 예시는 기술이 아니라 비난이다."},{"n":207,"q":"수업 태도가 좋아진 학생에게 그 주의 청소 당번을 면제해 주었더니 좋은 태도가 더 늘었다. 적용된 행동 원리는?","opts":["부적 강화","정적 강화","정적 처벌","부적 처벌","소거"],"a":0,"ex":"혐오스러운 의무(청소)의 ‘제거’가 행동을 ‘증가’시켰다. 보상을 주는 정적 강화와 혼동하기 쉬운 지점이다."},{"n":208,"q":"체계적 둔감법의 실시 순서로 옳은 것은?","opts":["불안위계 작성 → 이완훈련 → 단계적 노출","이완훈련 → 불안위계 작성 → 위계의 낮은 단계부터 이완과 짝지어 상상 노출","단계적 노출 → 이완훈련 → 불안위계 작성","최고 불안 장면 노출 → 이완훈련 → 위계 작성","이완훈련 → 최고 단계 즉시 노출 → 위계 작성"],"a":1,"ex":"이완이라는 양립 불가능 반응을 먼저 장착한 뒤, 위계의 사다리를 아래에서부터 오르는 역조건형성 절차다."},{"n":209,"q":"REBT의 논박 과정을 구성하는 세 요소로 옳은 것은?","opts":["자각 - 접촉 - 통합","공감 - 직면 - 해석","관찰 - 기록 - 강화","수용 - 전념 - 탈융합","탐지 - 반박 - 변별"],"a":4,"ex":"비합리적 신념을 찾아내고(탐지), 논리·경험·실용의 축으로 따져 묻고(반박), 합리적 신념과 구별(변별)하는 3D 과정이다."},{"n":210,"q":"성폭력 피해 생존자가 보일 수 있는 심리적 반응 과정에 대한 이해로 가장 적절한 것은?","opts":["모든 생존자가 동일한 순서로 동일한 반응을 보인다.","부정 반응이 나타나면 상담을 중단한다.","분노 반응은 병리적이므로 즉시 교정한다.","충격과 부정, 우울, 공포, 분노 등의 반응이 나타날 수 있으며 그 순서와 양상에는 개인차가 있으므로 단계를 내담자에게 강요하지 않는다.","반응이 없으면 피해가 없었던 것이다."],"a":3,"ex":"단계 모델은 지도이지 일정표가 아니다. ‘정상적 반응의 정상화’가 초기 개입의 핵심이며, 무반응 또한 충격의 한 형태일 수 있다."},{"n":211,"q":"라자루스의 중다양식치료 BASIC-ID에서 각 영역의 연결로 옳지 않은 것은?","opts":["B - 행동","A - 정서","D - 약물·생물학적 요인","I - 심상","S - 사회적 지위"],"a":4,"ex":"S는 감각(Sensation)이다. 두 개의 I(심상, 대인관계)와 함께 약어의 세부가 출제 포인트가 된다."},{"n":212,"q":"말을 전혀 하지 않는 아동에게 처음에는 입 모양만 움직여도, 다음에는 작은 소리를 내면, 그 다음에는 단어를 말하면 강화를 주어 점차 문장 말하기에 도달하게 했다. 적용된 기법은?","opts":["홍수법","혐오치료","타임아웃","조성(shaping)","자극 일반화"],"a":3,"ex":"목표 행동에 대한 점진적 접근(successive approximation)을 차례로 강화하는 조작적 기법의 정수다."}]},{"name":"심리진단 및 평가","questions":[{"n":1,"q":"K-WAIS-IV의 4개 지표에 해당하지 않는 것은?","opts":["언어이해","지각추론","작업기억","처리속도","유동추론"],"a":4,"ex":"유동추론은 WISC-V/WAIS-V 체계의 지표이다. K-WAIS-IV는 언어이해·지각추론·작업기억·처리속도로 구성된다."},{"n":2,"q":"MMPI-2에서 문항 내용과 무관한 무선반응의 비일관성을 탐지하는 타당도척도는?","opts":["TRIN","VRIN","F","K","L"],"a":1,"ex":"TRIN은 모두 ‘그렇다’ 또는 모두 ‘아니다’로 답하는 고정반응 경향을 탐지한다."},{"n":3,"q":"자신을 지나치게 도덕적이고 바람직하게 보이려는, 비교적 세련되지 못한 방어적 시도를 반영하는 MMPI-2 척도는?","opts":["L","K","S","F","Fb"],"a":0,"ex":"K척도는 보다 세련되고 은밀한 방어성을 반영한다는 점에서 L과 구별된다."},{"n":4,"q":"반사회적 행동, 권위와의 갈등, 충동성과 가장 관련이 깊은 MMPI-2 임상척도는?","opts":["2번(D)","4번(Pd)","7번(Pt)","0번(Si)","3번(Hy)"],"a":1,"ex":"4번 척도(반사회성)는 규범 위반, 가정 불화, 권위 갈등과 관련된다."},{"n":5,"q":"엑스너(Exner) 종합체계에 따른 로샤 검사에 대한 설명으로 옳지 않은 것은?","opts":["반응영역(location)을 채점한다.","결정인(determinants)을 채점한다.","검사자가 표준화된 절차 없이 주관적 직관으로 해석하는 체계이다.","평범반응(P)을 채점한다.","형태질(form quality)을 평가한다."],"a":2,"ex":"엑스너 체계의 핵심은 실시·채점·해석의 표준화이다."},{"n":6,"q":"주제통각검사(TAT)에 대한 설명으로 옳지 않은 것은?","opts":["머레이(Murray)의 욕구-압력 이론에 기초한다.","모호한 대인관계 장면이 담긴 그림 카드를 사용한다.","수검자에게 그림을 보고 이야기를 만들도록 한다.","좌우대칭의 잉크반점 카드 10장으로 구성된다.","투사적 검사로 분류된다."],"a":3,"ex":"잉크반점 10장은 로샤 검사이다."},{"n":7,"q":"HTP 검사에서 ‘나무’ 그림이 주로 반영하는 것으로 가장 적절한 것은?","opts":["가정환경과 가족관계","사회적 가면과 대인기술","의식 수준의 자기상과 환경과의 상호작용","지적 능력 수준","무의식적이고 심층적인 자기상"],"a":4,"ex":"일반적으로 집은 가정환경, 사람은 의식에 가까운 자기상, 나무는 보다 깊고 무의식적인 자기상을 반영한다고 본다."},{"n":8,"q":"벤더게슈탈트검사(BGT)에 대한 설명으로 옳지 않은 것은?","opts":["9개의 기하학적 도형으로 구성된다.","시각-운동 협응 능력을 평가한다.","기질적 뇌손상 선별에 활용될 수 있다.","언어이해능력 측정이 주된 목적이다.","검사 배터리 초반에 완충검사로 유용하다."],"a":3,"ex":"BGT는 도형 모사 과제로 언어 능력의 영향을 거의 받지 않는 것이 장점이다."},{"n":9,"q":"T점수 70의 의미로 가장 적절한 것은?","opts":["정확히 평균 수준이다.","평균보다 2표준편차 낮으며 하위 약 2%에 해당한다.","평균보다 2표준편차 높으며 상위 약 2%에 해당한다.","평균보다 1표준편차 높으며 상위 약 16%에 해당한다.","백분위 70에 해당한다."],"a":2,"ex":"T점수는 평균 50, 표준편차 10이다. T=70은 z=+2.0으로 상위 약 2.3%이다."},{"n":10,"q":"웩슬러 지능검사에서 IQ 85~115 사이에 포함되는 사람의 비율은 약 몇 %인가?","opts":["약 34%","약 50%","약 68%","약 95%","약 99%"],"a":2,"ex":"평균 100, 표준편차 15이므로 85~115는 ±1SD 구간이며 정규분포에서 약 68%가 포함된다."},{"n":11,"q":"동일한 검사를 동일한 대상에게 일정한 시간 간격을 두고 두 번 실시하여 추정하는 신뢰도는?","opts":["검사-재검사 신뢰도","동형검사 신뢰도","반분신뢰도","문항내적합치도","채점자간 신뢰도"],"a":0,"ex":"검사-재검사 신뢰도는 안정성 계수라고도 하며, 기억·연습 효과와 시간 간격 설정이 문제될 수 있다."},{"n":12,"q":"검사가 측정하고자 하는 이론적 구성개념을 실제로 측정하는 정도를 의미하며, 수렴·변별 증거로 확인되는 타당도는?","opts":["구인(구성)타당도","안면타당도","공인타당도","내용타당도","예언타당도"],"a":0,"ex":"구인타당도는 요인분석, 다특성-다방법 행렬 등으로 검증한다."},{"n":13,"q":"심리검사 사용 윤리에 대한 설명으로 옳지 않은 것은?","opts":["검사 실시 자격을 갖춘 사람이 실시해야 한다.","수검자에게 사전동의를 받아야 한다.","검사 결과의 비밀을 보장해야 한다.","검사 목적에 적합한 도구를 선택해야 한다.","해석 없이 점수만 전달하는 것이 가장 객관적이고 바람직하다."],"a":4,"ex":"결과는 수검자가 이해할 수 있는 방식으로 적절한 해석과 함께 전달되어야 한다."},{"n":14,"q":"문장완성검사(SCT)에 대한 설명으로 옳지 않은 것은?","opts":["미완성 문장을 완성하게 하는 검사이다.","가족, 대인관계, 자기개념 등 영역별 태도를 파악할 수 있다.","투사적 검사로 분류된다.","규준에 기반한 객관적 채점이 주된 해석 방식이다.","실시가 간편하고 집단 실시가 가능하다."],"a":3,"ex":"SCT는 주로 반응 내용에 대한 질적 분석으로 해석한다."},{"n":15,"q":"TCI에서 기질(temperament) 차원에 해당하지 않는 것은?","opts":["자극추구","자율성","사회적 민감성","인내력","위험회피"],"a":1,"ex":"자율성, 연대감, 자기초월은 성격(character) 차원에 해당한다."},{"n":16,"q":"새로운 문제를 해결하는 추론 능력으로, 연령 증가에 따라 감소하는 경향을 보이는 카텔(Cattell)의 지능 개념은?","opts":["결정지능","정서지능","사회지능","실용지능","유동지능"],"a":4,"ex":"결정지능은 교육과 경험으로 축적되어 성인기 이후에도 비교적 유지·증가한다."},{"n":17,"q":"간이정신상태검사(MMSE)에 대한 설명으로 옳지 않은 것은?","opts":["치매 등 인지장애의 선별에 사용된다.","지남력, 기억력, 주의집중 등을 평가한다.","짧은 시간 내에 실시할 수 있다.","성격특성과 정서상태를 종합적으로 평가한다.","확정 진단 도구가 아닌 선별 도구이다."],"a":3,"ex":"MMSE는 인지기능 선별검사로 성격·정서 평가 도구가 아니다."},{"n":18,"q":"행동평가에 대한 설명으로 옳지 않은 것은?","opts":["선행사건-행동-결과(ABC)를 분석한다.","행동의 원인을 무의식적 갈등에서 찾는 것을 기본 가정으로 한다.","행동은 상황 특수적이라고 가정한다.","표적행동의 조작적 정의가 중요하다.","자연관찰, 자기보고, 자기감찰 등을 활용한다."],"a":1,"ex":"무의식적 갈등은 정신역동적 평가의 가정이다."},{"n":19,"q":"표준화 검사에서 규준(norm)의 의미로 가장 적절한 것은?","opts":["검사의 실시와 채점 절차를 통일한 것","문항의 난이도와 변별도","개인의 점수를 상대적으로 해석하기 위한 비교 집단의 점수 자료","검사의 신뢰도 계수","검사의 합격 기준 점수"],"a":2,"ex":"규준은 대표성 있는 표본에서 얻은 점수 분포로, 원점수를 백분위·표준점수로 변환하는 기준이 된다."},{"n":20,"q":"웩슬러 지능검사에서 작업기억을 측정하는 소검사는?","opts":["숫자","토막짜기","공통성","기호쓰기","행렬추론"],"a":0,"ex":"토막짜기·행렬추론은 지각추론, 공통성은 언어이해, 기호쓰기는 처리속도에 해당한다."},{"n":21,"q":"MMPI-2에서 4-9/9-4 상승 코드타입의 일반적 특징으로 가장 적절한 것은?","opts":["우울과 불안, 신체화 경향","수동-공격적이고 의존적인 대인관계","사고장애와 사회적 철수","반사회적 행동화, 충동성, 낮은 좌절인내력","강박적 반추와 완벽주의"],"a":3,"ex":"4번(반사회성)의 규범 경시에 9번(경조증)의 높은 에너지가 결합되어 행동화 가능성이 커지는 코드이다."},{"n":22,"q":"정신과 환자 집단에서도 드물게 반응하는 문항들로 구성되어, 실제 정신병리와 증상 과대보고를 구별하는 데 유용한 MMPI-2 타당도척도는?","opts":["F","Fp","Fb","FBS","K"],"a":1,"ex":"F척도는 실제 심한 병리에서도 상승할 수 있으나, Fp는 환자 규준 기준이라 과대보고 탐지에 더 특이적이다."},{"n":23,"q":"MMPI-2에서 K교정 점수가 적용되는 임상척도를 모두 고른 것은?","box":"ㄱ. 1번(Hs)\nㄴ. 4번(Pd)\nㄷ. 6번(Pa)\nㄹ. 7번(Pt)\nㅁ. 8번(Sc)","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ, ㅁ","ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㅁ","ㄷ, ㄹ, ㅁ"],"a":1,"ex":"K교정은 1번(.5K), 4번(.4K), 7번(1K), 8번(1K), 9번(.2K)에 적용된다. 9번까지 포함하면 다섯 척도이다."},{"n":24,"q":"로샤 종합체계에서 전체 반응 중 순수형태반응의 비율로, 경험에 대한 개방성과 자극의 단순화 경향을 반영하는 지표는?","opts":["EA","X-%","Lambda","Zd","Afr"],"a":2,"ex":"Lambda가 높으면 복잡한 자극 장면을 단순하게 처리하며 정서적 관여를 회피하는 경향을 시사한다."},{"n":25,"q":"로샤 형태질(FQ) 채점기호와 의미의 연결이 옳지 않은 것은?","opts":["- : 왜곡 없이 정확하게 지각된 흔한 반응","o : 흔히 지각되는 보통의 적절한 형태 반응","u : 드물지만 반점 윤곽에 크게 어긋나지 않는 반응","none : 형태가 사용되지 않은 반응","+ : 형태를 우수하고 정교하게 사용한 반응"],"a":0,"ex":"마이너스(-)는 반점의 특징을 무시하거나 왜곡한 반응으로, 현실검증력 문제와 관련해 해석된다."},{"n":26,"q":"K-WAIS-IV 소검사와 지표의 연결이 옳지 않은 것은?","opts":["공통성 - 언어이해","토막짜기 - 지각추론","숫자 - 작업기억","동형찾기 - 처리속도","산수 - 처리속도"],"a":4,"ex":"산수는 작업기억 지표의 소검사이다. 처리속도는 동형찾기·기호쓰기(·지우기)로 구성된다."},{"n":27,"q":"웩슬러 지능검사의 일반능력지표(GAI)에 대한 설명으로 옳은 것은?","opts":["언어이해와 지각추론 소검사들로 구성된다.","네 가지 지표점수를 모두 합산한 추정치이다.","작업기억과 처리속도 소검사들로 구성된다.","운동 속도만을 측정한다.","전체 IQ보다 항상 낮게 산출된다."],"a":0,"ex":"작업기억·처리속도로 구성되는 것은 인지효능지표(CPI)이다. GAI는 둘의 영향을 배제한 능력 추정에 쓰인다."},{"n":28,"q":"가설 전환 능력과 보속 오류 등을 통해 전두엽 실행기능을 평가하는 대표적인 신경심리검사는?","opts":["문장완성검사","보스턴 이름대기검사","웩슬러 기억검사","16PF","위스콘신 카드분류검사(WCST)"],"a":4,"ex":"규칙이 바뀌어도 이전 분류 기준을 고집하는 보속반응은 전두엽 기능 저하의 지표로 해석된다."},{"n":29,"q":"부모 보고를 통해 아동·청소년의 내재화 및 외현화 문제행동을 평가하는 표준화된 행동평가척도는?","opts":["사회성숙도검사","아동용 주제통각검사(CAT)","시지각 발달검사","아동·청소년 행동평가척도(CBCL)","집-나무-사람 검사"],"a":3,"ex":"CBCL은 불안/우울 등 내재화 척도와 공격행동 등 외현화 척도로 구성된 차원적 평가도구이다."},{"n":30,"q":"백분위 75에 대한 해석으로 옳은 것은?","opts":["전체 문항의 75%를 맞혔다.","평균보다 75점 높다.","규준집단에서 약 75%의 사람이 그 점수 이하이다.","상위 75%에 해당한다.","T점수 75와 동일한 의미이다."],"a":2,"ex":"백분위는 정답률(백분율)과 자주 혼동된다. 백분위 75는 상위 25% 위치를 의미한다."},{"n":31,"q":"점수 분포를 9개 구간으로 나누어 표시하며 평균 5, 표준편차 약 2를 갖는 표준점수는?","opts":["z점수","T점수","편차 IQ","스테나인","백분위"],"a":3,"ex":"스테나인(stanine)은 standard nine의 줄임말로, 학교 장면의 성취도 보고에 자주 쓰인다."},{"n":32,"q":"측정의 표준오차(SEM)에 대한 설명으로 옳지 않은 것은?","opts":["진점수 추정의 신뢰구간 설정에 사용된다.","검사의 신뢰도가 높을수록 작아진다.","신뢰도가 1.0이면 SEM은 검사의 표준편차와 같아진다.","관찰점수 주변의 오차 범위에 대한 정보를 준다.","SEM = SD × √(1-신뢰도) 로 산출된다."],"a":2,"ex":"신뢰도가 1.0이면 오차가 없다는 뜻이므로 SEM은 0이 된다."},{"n":33,"q":"문항분석에 대한 설명으로 옳지 않은 것은?","opts":["문항난이도(P)는 정답 비율로, 값이 클수록 쉬운 문항이다.","문항변별도는 상위집단과 하위집단의 정답률 차이로 추정할 수 있다.","문항-총점 간 상관으로 변별도를 추정할 수 있다.","난이도가 중간 수준일 때 변별도가 최대화될 수 있다.","변별도가 음수인 문항은 변별력이 우수한 좋은 문항이다."],"a":4,"ex":"변별도가 음수라는 것은 하위집단이 오히려 더 많이 맞혔다는 뜻으로, 수정·삭제 대상 문항이다."},{"n":34,"q":"투사적 검사의 특징으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 반응의 자유도가 높다.\nㄴ. 채점자간 신뢰도 확보가 상대적으로 어렵다.\nㄷ. 수검자가 의도적으로 방어하기가 상대적으로 어렵다.\nㄹ. 규준에 따른 객관적 해석이 용이하다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄹ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":3,"ex":"ㄹ은 객관적 검사의 장점이다. 투사검사는 모호한 자극으로 방어를 우회하지만 신뢰도 확보가 과제이다."},{"n":35,"q":"그림검사(HTP, DAP 등) 해석 시 유의사항으로 옳지 않은 것은?","opts":["하나의 그림 특징은 하나의 심리적 의미와 일대일로 대응된다.","전체적 인상과 구조적 요소를 함께 고려한다.","면담 및 다른 검사 자료와 통합하여 해석한다.","수검자의 발달 수준을 고려한다.","단일 지표만으로 확정적 해석을 내리지 않는다."],"a":0,"ex":"같은 특징도 맥락에 따라 의미가 달라지므로 가설 생성 도구로 보는 것이 안전하다."},{"n":36,"q":"삭스(Sacks)의 문장완성검사(SSCT)에서 측정하는 네 가지 영역을 모두 고른 것은?","box":"ㄱ. 가족\nㄴ. 성\nㄷ. 대인관계\nㄹ. 자기개념\nㅁ. 직업적성","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ, ㅁ","ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"],"a":2,"ex":"가족·성·대인관계·자기개념의 4영역 15개 태도로 구성된다."},{"n":37,"q":"검사-재검사 신뢰도에 대한 설명으로 옳지 않은 것은?","opts":["실시 간격이 짧으면 기억효과로 신뢰도가 과대추정될 수 있다.","기분처럼 수시로 변동하는 상태 변인의 측정에 가장 적합하다.","비교적 안정적인 특성 변인의 측정에 적합하다.","안정성 계수라고도 불린다.","실시 간격이 길면 실제 변화가 개입되어 과소추정될 수 있다."],"a":1,"ex":"상태 변인은 시간에 따라 변하는 것이 정상이므로 재검사 신뢰도로 평가하기에 부적합하다."},{"n":38,"q":"국가자격시험처럼 사전에 설정된 일정 수준의 도달 여부로 합격을 판정하는 평가 방식은?","opts":["준거참조평가","규준참조평가","상대평가","역동적 평가","수행평가"],"a":0,"ex":"규준참조는 타인과의 상대적 위치, 준거참조는 절대적 기준 도달 여부에 관심을 둔다."},{"n":39,"q":"구조화 면담과 비구조화 면담의 비교로 옳지 않은 것은?","opts":["구조화 면담은 면담자간 신뢰도가 높다.","비구조화 면담은 라포 형성과 융통성 있는 탐색에 유리하다.","구조화 면담은 훈련된 초보 면담자도 일정 수준으로 시행할 수 있다.","반구조화 면담은 두 방식의 절충 형태이다.","비구조화 면담은 면담자의 주관과 편향의 영향을 적게 받는다."],"a":4,"ex":"비구조화 면담은 면담자의 숙련도와 편향에 크게 좌우되는 것이 단점이다."},{"n":40,"q":"자기보고식 검사의 제한점으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 사회적 바람직성에 따른 반응 왜곡\nㄴ. 묵종 경향성 등 반응 경향성의 영향\nㄷ. 수검자의 자기 통찰 수준에 의존\nㄹ. 실시와 채점이 비효율적임","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":3,"ex":"실시·채점의 효율성은 오히려 자기보고식 검사의 대표적 장점이다."},{"n":41,"q":"MMPI-2 재구성 임상척도(RC)를 개발한 주된 목적으로 가장 적절한 것은?","opts":["검사 문항 수를 늘려 신뢰도를 높이기 위해","임상척도들의 높은 상호상관의 원인인 공통요인(의기소침)을 분리하여 변별타당도를 높이기 위해","타당도척도를 대체하기 위해","수검자의 응답 시간을 단축하기 위해","성격을 유형으로 분류하기 위해"],"a":1,"ex":"RCd(의기소침)를 따로 추출하고 각 척도의 핵심 구성개념만 남겨, 척도 간 중복 해석 문제를 줄이고자 했다."},{"n":42,"q":"만성적인 불안과 우울, 죄책감, 반추적인 걱정과 완벽주의적 경향을 시사하는 MMPI-2 상승 코드타입은?","opts":["1-3/3-1","4-9/9-4","2-7/7-2","6-8/8-6","3-4/4-3"],"a":2,"ex":"2번(우울)과 7번(강박불안)의 동반 상승으로, 심리적 고통을 스스로 호소하는 신경증적 프로파일의 대표격이다."},{"n":43,"q":"심리적 갈등을 신체증상으로 전환하며 부인과 억압 방어를 사용하는 경향을 시사하는, 이른바 ‘전환 V’와 관련된 코드타입은?","opts":["1-3/3-1","2-7/7-2","4-9/9-4","6-8/8-6","7-8/8-7"],"a":0,"ex":"1번·3번이 상승하고 2번이 상대적으로 낮아 V자 형태를 이루며, 심리적 불편감의 부인이 특징이다."},{"n":44,"q":"로샤 구조요약에서 인간운동반응(M)과 가중치 유채색반응(WSumC)의 관계로 개인의 문제해결 및 대처 양식을 나타내는 지표는?","opts":["es(경험자극)","EB(체험형)","D점수","Zd","X+%"],"a":1,"ex":"M 우세는 내향형(사고형), WSumC 우세는 외향형(감정형) 대처 양식을 시사한다."},{"n":45,"q":"로샤에서 평범반응(P)이 적절한 수준으로 나타날 때 시사하는 바로 가장 적절한 것은?","opts":["현실검증력의 손상","정서 표현의 억제","강한 충동성","사고의 비약","관습적이고 일상적인 지각의 가용성"],"a":4,"ex":"P가 지나치게 적으면 비관습적 지각, 지나치게 많으면 경직된 동조 경향의 가설을 세울 수 있다."},{"n":46,"q":"K-WISC-IV의 지각추론지표가 K-WISC-V에서 분리되어 신설된 두 개의 지표는?","opts":["시공간 지표와 작업기억 지표","언어이해 지표와 작업기억 지표","처리속도 지표와 양적추론 지표","시공간 지표와 유동추론 지표","유동추론 지표와 처리속도 지표"],"a":3,"ex":"K-WISC-V는 언어이해·시공간·유동추론·작업기억·처리속도의 5지표 체계이다."},{"n":47,"q":"표준 절차에 따른 검사 실시가 끝난 후, 추가 단서나 시간을 제공하여 수검자의 잠재 능력과 실패 원인을 탐색하되 그 결과를 표준 점수에는 반영하지 않는 절차는?","opts":["연습 시행","라포 형성","역순 실시 규칙","중지 규칙","한계검증"],"a":4,"ex":"점수 산출용이 아니라 질적 해석(왜 틀렸는가, 단서가 주어지면 가능한가)을 위한 절차이다."},{"n":48,"q":"지표점수 간 차이의 임상적 해석에서 고려할 사항으로 옳지 않은 것은?","opts":["규준집단에서 그 차이가 나타나는 빈도(기저율)를 확인한다.","통계적으로 유의한 차이는 곧 임상적 비정상성을 의미한다.","측정의 오차 가능성을 고려한다.","수검 당시의 태도와 상황 요인을 함께 고려한다.","다른 검사 및 면담 자료와 통합하여 해석한다."],"a":1,"ex":"통계적으로 유의한 차이도 규준집단에서 드물지 않게 나타날 수 있어, 유의성과 희소성(기저율)은 구분해야 한다."},{"n":49,"q":"색상 단어의 글자색을 말하게 할 때 단어 의미의 자동적 처리를 억제해야 하는 과제로, 주로 억제적 통제와 선택적 주의를 평가하는 검사는?","opts":["보스턴 이름대기검사","토막짜기","스트룹 검사","레이 복합도형검사","숫자 외우기"],"a":2,"ex":"간섭 조건의 수행 저하가 클수록 전두엽의 억제 기능 저하를 시사한다."},{"n":50,"q":"치매와 구별되는 노인 우울증(가성치매)의 인지 저하 양상으로 가장 적절한 것은?","opts":["“모르겠다”는 반응이 흔하고 자신의 기억력 저하를 적극적으로 호소한다.","인지 저하를 축소하거나 부인하는 경향이 있다.","서서히 발병하여 가족이 먼저 변화를 알아챈다.","초기부터 지남력 상실이 뚜렷하다.","수행 저하에 대한 병식이 없다."],"a":0,"ex":"치매는 결손을 감추려 하고(작화 등), 우울에 의한 저하는 호소가 결손보다 크며 비교적 급성 경과를 보이는 경향이 있다."},{"n":51,"q":"사회성숙도검사(적응행동척도)에 대한 설명으로 옳지 않은 것은?","opts":["지적장애 진단 시 지능검사와 상호보완적으로 활용된다.","적응행동 수준을 평가한다.","주 양육자의 보고나 면담을 통해 실시할 수 있다.","수검 아동의 직접 수행 결과만으로 점수가 산출된다.","자조, 이동, 의사소통 등의 영역을 포함한다."],"a":3,"ex":"적응행동 평가는 일상 장면에 대한 정보가 필요하므로 보호자 보고가 핵심 자료원이 된다."},{"n":52,"q":"홀랜드(Holland)의 육각형 모형에서 예술형(A)과 가장 거리가 먼(비일관성이 큰) 유형은?","opts":["현실형(R)","관습형(C)","사회형(S)","진취형(E)","탐구형(I)"],"a":1,"ex":"육각형에서 마주 보는 유형 간 상관이 가장 낮다. A의 대각은 C(관습형), R의 대각은 S(사회형)이다."},{"n":53,"q":"NEO-PI-R에 대한 설명으로 옳지 않은 것은?","opts":["성격 5요인 모델에 기반한다.","각 요인은 6개의 하위 국면(facet)으로 구성된다.","성격을 차원적으로 측정한다.","요인 점수와 국면 점수를 함께 해석할 수 있다.","응답자를 16가지 성격유형으로 분류하는 것이 목적이다."],"a":4,"ex":"16가지 유형 분류는 MBTI식 유형론적 접근이다. NEO는 연속 차원에서의 개인차를 기술한다."},{"n":54,"q":"컴퓨터 기반 자동해석 보고서의 활용에 대한 설명으로 옳지 않은 것은?","opts":["해석 가설을 생성하는 자료로 활용한다.","임상가가 타당성을 검토한 후 다른 자료와 통합한다.","임상가의 검토 없이 그대로 최종 평가 보고서로 제공한다.","자동해석의 근거와 한계를 인식하고 사용한다.","수검자의 개인적 맥락 정보와 대조하며 활용한다."],"a":2,"ex":"자동해석은 규준 기반의 일반적 진술이므로, 개별 사례에의 적용 책임은 검사자에게 있다."},{"n":55,"q":"외국에서 개발된 심리검사를 국내에서 사용하기 위한 절차로 옳지 않은 것은?","opts":["원판의 외국 규준을 그대로 적용하여 해석한다.","번역-역번역 절차로 언어적 등가성을 확보한다.","문항의 문화적 적절성을 검토한다.","국내 표본으로 새로운 규준을 수집한다.","측정 동일성(불변성)을 통계적으로 검증한다."],"a":0,"ex":"규준은 문화·언어 집단에 따라 달라지므로, 번안 검사는 국내 규준 수집과 타당화 연구가 필수적이다."},{"n":56,"q":"아동 심리검사 실시 과정의 유의사항으로 옳지 않은 것은?","opts":["발달 수준에 맞는 언어로 지시한다.","검사 전 라포 형성에 충분한 시간을 들인다.","피로 징후가 보여도 일정상 모든 검사를 한 회기에 강행한다.","필요시 휴식을 제공하거나 회기를 분할한다.","검사 수행 중의 행동관찰을 해석 자료로 활용한다."],"a":2,"ex":"피로와 동기 저하는 수행을 체계적으로 떨어뜨려 과소추정을 낳으므로 검사의 타당성을 직접 위협한다."},{"n":57,"q":"새로 개발한 우울검사가 기존 우울검사와는 높은 상관을, 지능검사와는 낮은 상관을 보였다. 이를 통해 확보된 타당도 증거는?","opts":["수렴 및 변별 증거(구인타당도)","내용타당도","예언타당도","안면타당도","검사-재검사 신뢰도"],"a":0,"ex":"같은 구인과는 수렴하고 다른 구인과는 변별되는 양상이 구인타당도의 핵심 증거이다."},{"n":58,"q":"검사 점수와 준거 측정치를 같은 시점에 수집하여 상관을 구함으로써 확인하는 타당도는?","opts":["구인타당도","예언타당도","내용타당도","안면타당도","공인(공존)타당도"],"a":4,"ex":"예언타당도는 준거를 미래 시점에 측정한다는 점에서만 다르다. 시간 차가 감별 포인트이다."},{"n":59,"q":"심리평가 보고서 작성의 원칙으로 옳지 않은 것은?","opts":["보고서를 읽는 사람이 이해할 수 있는 언어로 쓴다.","의뢰 사유에 답하는 방향으로 작성한다.","검사 자료, 면담, 행동관찰을 통합하여 기술한다.","전문용어를 최대한 많이 사용하여 전문성을 드러낸다.","수검자의 약점뿐 아니라 강점과 자원도 포함한다."],"a":3,"ex":"보고서의 목적은 과시가 아니라 소통이다. 수신자(교사, 부모, 의뢰자)에 맞춘 언어 선택이 전문성이다."},{"n":60,"q":"동적 가족화(KFD)에 대한 설명으로 옳지 않은 것은?","opts":["가족이 ‘무엇인가 하고 있는’ 모습을 그리도록 지시한다.","표준화된 규준 점수에 따라 자동적으로 판정한다.","아동이 지각하는 가족 내 역동을 파악하는 데 활용된다.","인물의 행위(action) 내용도 해석 요소이다.","인물 간 거리, 구획화, 크기 등이 해석의 단서가 된다."],"a":1,"ex":"KFD는 질적·가설생성적 도구로, 면담과 다른 자료를 통한 교차 확인이 필요하다."},{"n":61,"q":"담임교사가 “아이가 그냥 좀 이상해서요”라며 심리검사를 의뢰하였다. 평가자가 가장 먼저 해야 할 일은?","opts":["곧바로 종합심리검사를 실시한다.","가장 비싼 검사 도구부터 예약한다.","의뢰 사유와 평가 질문을 구체화하는 면담을 한다.","교사의 인상을 그대로 평가 결론으로 채택한다.","아동에게 예상 진단명을 먼저 알려준다."],"a":2,"ex":"모호한 의뢰 사유를 답할 수 있는 질문으로 번역하는 것이 평가 설계의 출발점이다. 검사 선정은 그 다음이다."},{"n":62,"q":"주의력 문제로 의뢰된 아동의 평가에 대한 설명으로 옳지 않은 것은?","opts":["지능검사로 전반적 인지 수준을 확인한다.","연속수행검사 단독 결과만으로 ADHD를 확진한다.","부모와 교사의 행동평정 자료를 수집한다.","연속수행검사(CPT)를 활용할 수 있다.","여러 장면에서 수집한 정보를 통합하여 판단한다."],"a":1,"ex":"ADHD 평가의 핵심은 두 장면 이상의 다중 정보원 통합이다. 단일 검사는 확진 도구가 될 수 없다."},{"n":63,"q":"MMPI-2에서 L=65T, K=68T, F=42T인 프로파일이 시사하는 수검 태도는?","opts":["증상의 과대보고","무선적 반응","심각한 정신병리의 솔직한 보고","방어적인 긍정왜곡","묵종적 반응"],"a":3,"ex":"L·K 동반 상승과 F 저하는 ‘잘 보이려는’ 방어적 태도의 전형으로, 임상척도의 과소추정 가능성을 함께 고려해야 한다."},{"n":64,"q":"MMPI-2에서 F=95T, VRIN은 정상 범위, Fp가 상승했다. 가장 적절한 해석적 고려는?","opts":["무선반응이므로 즉시 폐기한다.","전형적인 방어적 프로파일로 본다.","채점 오류로 단정한다.","지적 능력의 저하로 단정한다.","증상 과대보고 또는 도움 요청(cry for help)의 가능성을 맥락과 함께 검토한다."],"a":4,"ex":"VRIN 정상은 무선반응을 배제해 준다. 남는 가설은 실제 심한 고통, 과장, 의도적 부정왜곡이며 맥락(평가 상황, 이득)이 판별 단서다."},{"n":65,"q":"웩슬러 검사에서 처리속도 지표만 유의하게 낮은 아동의 해석으로 옳지 않은 것은?","opts":["처리속도 저하이므로 곧바로 지적장애로 판정한다.","소근육 운동 협응의 문제를 검토한다.","검사 동기와 피로의 영향을 검토한다.","우울·불안 등 정서적 요인의 영향을 검토한다.","신경학적 요인의 가능성을 검토한다."],"a":0,"ex":"지적장애 판단은 전반적 지능과 적응행동 기준이다. 단일 지표 저하는 여러 가설을 낳는 출발점일 뿐이다."},{"n":66,"q":"로샤 검사에서 전체 반응수(R)가 14개 미만으로 나타났다. 적절한 조치는?","opts":["정상 프로토콜로 간주하고 해석한다.","반응이 적을수록 신뢰롭다고 판단한다.","반응수 부족으로 구조요약 해석의 타당성이 제한되므로 지침에 따라 재실시를 고려한다.","지능이 높다는 증거로 해석한다.","정신증의 확정 근거로 삼는다."],"a":2,"ex":"종합체계는 14개 미만 프로토콜의 해석적 타당성을 인정하지 않으며, 지시를 보완한 재실시를 권한다."},{"n":67,"q":"검사 내내 산만하고 자주 자리를 이탈한 아동의 지능검사 결과가 ‘평균 하’ 수준으로 나왔다. 가장 적절한 해석은?","opts":["수행 저해 요인을 고려할 때 현재 결과는 최소 추정치일 수 있다.","검사 자체가 무효이므로 어떤 정보도 얻을 수 없다.","아동의 최대 능력치를 정확히 반영한 결과이다.","지적장애로 확정한다.","재검사는 어떤 경우에도 불필요하다."],"a":0,"ex":"행동관찰은 점수의 ‘의미’를 결정한다. 같은 점수라도 수행 조건에 따라 능력의 하한 추정치가 될 수 있다."},{"n":68,"q":"문장완성검사에서 아버지 관련 문항마다 “무섭다”, “피하고 싶다”는 반응이 반복되었다. 가장 적절한 다음 단계는?","opts":["아버지의 학대를 확정적 사실로 결론 내린다.","부와 관련된 갈등 가설을 세우고 면담과 다른 자료로 확인한다.","우연한 반응이므로 무시한다.","아버지를 불러 직접 추궁한다.","검사를 즉시 중단한다."],"a":1,"ex":"투사 자료는 가설 생성용이다. 반복 주제는 중요한 신호이지만 검증은 면담·관찰·타 검사와의 수렴으로 한다."},{"n":69,"q":"BGT에서 도형 모사를 마친 후 기억을 더듬어 다시 그리게 하는 회상(recall) 절차의 주된 목적은?","opts":["운동 속도의 평가","언어 표현 능력의 평가","성격 유형의 분류","도덕성 발달의 평가","단기 시각기억의 평가"],"a":4,"ex":"모사 단계가 시각-운동 협응을 본다면, 회상 단계는 시각 자극의 부호화와 인출 기능에 대한 추가 정보를 준다."},{"n":70,"q":"BDI처럼 타당도척도가 없는 자기보고식 단일척도를 해석할 때 가장 적절한 태도는?","opts":["반응 왜곡이 자동으로 걸러진다고 본다.","점수가 높으면 면담 없이 진단을 확정한다.","점수가 낮으면 우울이 없다고 보장한다.","반응 왜곡을 탐지할 장치가 없으므로 면담·행동관찰과 교차 확인한다.","컷오프 점수만으로 입원 여부를 결정한다."],"a":3,"ex":"단일척도는 선별과 변화 추적에 유용하지만, 수검 태도 정보가 없어 다른 자료와의 수렴 확인이 필수다."},{"n":71,"q":"20년 전에 제작된 규준을 가진 지능검사를 현재 수검자에게 사용할 때의 문제로 가장 적절한 것은?","opts":["규준 노후화(플린 효과 등)로 점수 해석이 왜곡될 수 있어 최신 규준 사용이 원칙이다.","최신 규준일수록 해석이 더 부정확해진다.","규준은 시간이 지나도 변하지 않으므로 문제가 없다.","검사 문항 수가 자동으로 줄어든다.","신뢰도가 자동으로 높아진다."],"a":0,"ex":"세대에 따른 수행 상승(플린 효과)으로 낡은 규준은 점수를 부풀린다. 경계선 판정 사례에서 특히 치명적이다."},{"n":72,"q":"지체장애가 있는 수검자의 심리검사 실시에 대한 설명으로 옳지 않은 것은?","opts":["필요한 합리적 조정(시간, 반응 방식 등)을 제공한다.","조정이 측정하려는 구인에 미치는 영향을 고려한다.","필요시 대안적 검사 도구를 고려한다.","해석 시 조정에 따른 한계를 명시한다.","표준 절차를 수정한 사실은 보고서에 기록하지 않는다."],"a":4,"ex":"절차 수정의 투명한 기록은 결과를 읽는 사람이 해석의 한계를 알 수 있게 하는 윤리적 의무다."},{"n":73,"q":"심리검사의 보안에 대한 설명으로 옳지 않은 것은?","opts":["검사 자료는 사용 자격을 갖춘 사람이 관리한다.","수검자가 요청하면 문항 전체와 정답 키를 제공한다.","문항과 채점 키의 공개는 검사의 타당성을 훼손할 수 있다.","결과 피드백은 이해 가능한 형태로 제공한다.","검사 구매와 사용에 관한 자격 규정을 준수한다."],"a":1,"ex":"수검자의 알 권리는 ‘결과와 의미에 대한 설명’으로 충족하는 것이지, 검사 도구 자체의 공개를 뜻하지 않는다."},{"n":74,"q":"평가 결과 피드백 면담에 대한 설명으로 옳지 않은 것은?","opts":["수검자의 강점도 함께 전달한다.","수검자가 질문할 기회를 충분히 준다.","숫자와 진단명만 나열하고 질문은 받지 않는다.","수검자의 이해 수준에 맞는 언어를 사용한다.","결과에 따른 후속 계획을 함께 논의한다."],"a":2,"ex":"피드백은 일방적 통보가 아니라 치료적 개입의 일부(치료적 평가)로 기능할 수 있다."},{"n":75,"q":"홀랜드 흥미검사 결과만으로 내담자의 진로를 확정하지 않는 가장 중요한 이유는?","opts":["흥미검사의 신뢰도는 항상 0에 가깝기 때문에","흥미는 평생 단 한 번도 변하지 않기 때문에","검사 결과는 언제나 사실과 반대이기 때문에","흥미 외에 적성, 가치, 현실적 여건 등의 정보가 통합되어야 하기 때문에","진로는 전적으로 우연에 의해 결정되기 때문에"],"a":3,"ex":"흥미(하고 싶다)와 적성(할 수 있다), 가치(중요하다)는 다른 축이다. 진로 의사결정은 다축 정보의 통합 과정이다."},{"n":76,"q":"노인 수검자의 인지기능 평가에서 고려할 사항으로 옳지 않은 것은?","opts":["감각 저하는 검사 결과에 영향을 주지 않으므로 무시한다.","복용 중인 약물의 영향을 확인한다.","교육 수준을 고려한 규준을 활용한다.","청력·시력 등 감각 기능의 저하 여부를 확인한다.","우울 등 정서적 문제의 공존 여부를 평가한다."],"a":0,"ex":"듣지 못해 틀린 것과 몰라서 틀린 것은 전혀 다른 의미다. 감각 확인은 노인 평가의 기본 절차다."},{"n":77,"q":"문화적 배경이 다른 수검자의 심리평가에 대한 설명으로 옳지 않은 것은?","opts":["검사 언어에 대한 능숙도를 확인한다.","문화적 가치가 응답 양식에 미치는 영향을 고려한다.","주류문화 규준을 기계적으로 적용하여 해석한다.","통역자 활용 시의 한계를 인식한다.","검사의 문화 간 등가성을 검토한다."],"a":2,"ex":"규준이 전제하는 모집단과 수검자가 다르면 같은 점수도 다른 의미를 가진다. 기계적 적용은 오진단의 지름길이다."},{"n":78,"q":"수업 중 아동의 공격행동이 발생할 때마다 그 빈도와 전후 맥락을 기록하는 행동관찰 방법은?","opts":["시간표집법","사건표집법","평정척도법","일화기록법","체크리스트법"],"a":1,"ex":"시간표집은 정해진 시간 간격마다 행동 발생 여부를 기록한다는 점에서 다르다. 저빈도 행동에는 사건표집이 적합하다."},{"n":79,"q":"두 관찰자의 범주 판단 일치도를 우연에 의한 일치를 교정하여 산출하는 지수는?","opts":["피어슨 적률상관","크론바흐 알파","결정계수","카파(κ) 계수","표준오차"],"a":3,"ex":"단순 일치율은 우연 일치를 포함해 과대평가될 수 있다. 카파는 이를 빼고 계산한 보수적 지수다."},{"n":80,"q":"지능은 평균 수준, MMPI-2에서 2-7 상승, SCT에서 자기비하 주제 반복, 면담에서 수면곤란을 호소한다. 가장 적절한 통합적 가설은?","opts":["정신병적 장애의 활성기","반사회적 성격 경향","증상의 의도적 가장","지적 기능의 전반적 저하","우울과 불안을 중심으로 한 정서적 어려움"],"a":4,"ex":"여러 자료원이 같은 방향(불쾌 정서, 자기비하, 생리적 증상)으로 수렴하는 것이 통합 해석의 근거가 된다."},{"n":81,"q":"신뢰도 .91, 표준편차 15인 지능검사에서 관찰점수 100인 수검자의 약 95% 신뢰구간으로 가장 적절한 것은? (SEM≒4.5)","opts":["약 95.5 ~ 104.5","약 91 ~ 109","정확히 100","약 85 ~ 115","약 70 ~ 130"],"a":1,"ex":"95% 구간은 관찰점수 ±2SEM(약 ±9)이다. 점수를 점이 아닌 ‘구간’으로 보고하는 근거가 된다."},{"n":82,"q":"규준점수에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. T점수 60은 z점수 1.0에 해당한다.\nㄴ. 백분위 50은 z점수 0에 해당한다.\nㄷ. 스테나인 5는 평균
