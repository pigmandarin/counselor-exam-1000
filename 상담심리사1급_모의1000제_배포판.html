 부근의 수행을 의미한다.\nㄹ. z점수 -1.0은 백분위 약 34에 해당한다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"z=-1.0의 백분위는 약 16이다. 34%는 평균과 -1SD ‘사이’의 면적이라는 점에서 혼동을 유발한다."},{"n":83,"q":"MMPI-2에서 VRIN은 정상 범위이고 TRIN이 80T(‘그렇다’ 방향)로 상승하였다. 시사되는 반응 태도는?","opts":["무선적 반응","세련된 방어적 태도","‘아니다’ 방향의 고정반응 경향","‘그렇다’ 방향의 고정반응(묵종) 경향","심각한 병리의 정확한 보고"],"a":3,"ex":"VRIN이 정상이므로 무선반응은 배제되고, TRIN의 방향성 상승은 내용과 무관한 묵종적 응답 세트를 가리킨다."},{"n":84,"q":"로샤 검사의 실시에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 채점은 반응단계와 질문단계의 정보를 종합하여 확정한다.\nㄴ. 질문단계의 목적은 새로운 반응을 추가로 끌어내는 것이다.\nㄷ. 질문단계에서는 비유도적인 표준 질문을 사용한다.\nㄹ. 반응 시간과 수검 행동도 해석 자료가 된다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"질문단계는 ‘어디서, 무엇 때문에 그렇게 보였는지’를 확인하는 절차이지 반응을 늘리는 단계가 아니다."},{"n":85,"q":"CHC(Cattell-Horn-Carroll) 지능 모델에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. Gf-Gc 이론과 캐럴의 3층 모델을 통합한 것이다.\nㄴ. 현대 지능검사 개발의 주요한 이론적 기반이 되고 있다.\nㄷ. 일반요인(g)의 존재를 전면 부정하는 모델이다.\nㄹ. 광범위 능력에 유동추론(Gf), 결정지능(Gc), 시각처리(Gv) 등이 포함된다.","opts":["ㄱ, ㄴ","ㄱ, ㄹ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"3층 구조의 최상층에 일반요인이 위치한다. K-WISC-V의 5지표 체계도 CHC의 영향을 받았다."},{"n":86,"q":"문항반응이론(IRT)에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 문항특성곡선으로 문항의 속성을 기술한다.\nㄴ. 문항 모수가 피험자 표본에 의존하지 않는 불변성이 장점이다.\nㄷ. 고전검사이론보다 강한 가정(일차원성 등)을 요구한다.\nㄹ. 피험자 능력과 문항 난이도를 동일한 척도 위에 놓을 수 없다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":3,"ex":"능력과 난이도를 같은 척도(θ)에 두는 것이 IRT의 핵심 아이디어로, 적응검사를 가능하게 한다."},{"n":87,"q":"컴퓨터화 적응검사(CAT)에 대한 설명으로 옳지 않은 것은?","opts":["문항반응이론에 기반한다.","적은 문항으로도 정밀한 측정이 가능하다.","질 좋은 대규모 문항은행이 필요하다.","수검자의 응답에 따라 다음 문항의 난이도가 조정된다.","모든 수검자가 동일한 문항을 동일한 순서로 풀게 된다."],"a":4,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 수검자마다 다른 문항 세트를 풀게 되는 것이 적응검사의 정의적 특징이다."},{"n":88,"q":"유병률이 낮은 일반 집단에서 선별검사의 양성 결과를 해석할 때 가장 적절한 태도는?","opts":["유병률(기저율)이 낮을수록 양성예측도가 낮아지므로 위양성 가능성을 신중히 고려한다.","양성이면 해당 장애가 거의 확실하다고 본다.","민감도 수치만 확인하면 충분하다.","특이도는 해석과 무관하다.","기저율은 검사 해석에 영향을 주지 않는다."],"a":0,"ex":"우수한 검사도 희귀 조건에서는 양성의 다수가 위양성일 수 있다. 선별 양성은 확진이 아니라 정밀평가의 신호다."},{"n":89,"q":"선별검사의 민감도(sensitivity)에 대한 정의로 옳은 것은?","opts":["실제 장애가 있는 사람 중 검사에서 양성으로 판정되는 비율","장애가 없는 사람 중 검사에서 음성으로 판정되는 비율","양성 판정자 중 실제 장애가 있는 사람의 비율","음성 판정자 중 실제 정상인 사람의 비율","전체 수검자 중 정확히 분류된 비율"],"a":0,"ex":"①은 특이도, ③은 양성예측도, ④는 음성예측도이다. 네 지표의 분모가 무엇인지로 구분한다."},{"n":90,"q":"지능검사 도중 수검자가 힌트를 요구하자 검사자가 정답의 단서를 제공하였다. 이에 대한 평가로 가장 적절한 것은?","opts":["라포 형성을 위한 바람직한 융통성이다.","채점에 반영하지 않으면 아무 문제가 없다.","검사 보고서에 기록할 필요가 없는 사항이다.","수검자의 실제 지능을 더 정확히 반영하게 된다.","표준 실시 절차를 벗어나 점수의 규준 비교 타당성을 훼손한다."],"a":4,"ex":"규준은 표준 절차를 전제로 수집된 것이다. 잠재력 탐색이 목적이라면 표준 실시 후 한계검증으로 분리해야 한다."},{"n":91,"q":"MMPI-2는 우울을 시사하는데 면담과 행동관찰에서는 기능이 양호해 보인다. 가장 적절한 처리 방식은?","opts":["불일치의 원인(수검 태도, 시점, 상황, 방어)을 검토하고 추가 정보로 가설을 정교화한다.","면담 인상을 항상 우선시한다.","객관적 검사 결과를 항상 우선시한다.","두 결과의 산술 평균으로 결론 낸다.","불일치 사실은 보고서에서 제외한다."],"a":0,"ex":"자료 간 불일치는 오류가 아니라 정보다. ‘잘 기능하는 모습 뒤의 우울’ 자체가 임상적으로 의미 있는 가설이 된다."},{"n":92,"q":"심리검사 사용 역량에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 검사의 선택과 해석에 대한 최종 책임은 평가자에게 있다.\nㄴ. 충분한 훈련을 받지 않은 사람에게 검사 실시를 위임해서는 안 된다.\nㄷ. 채점 보조 인력의 활용은 어떤 경우에도 금지된다.\nㄹ. 역량 범위를 벗어난 도구는 수련과 자문 없이 사용하지 않는다.","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"적절한 훈련과 감독 하의 보조 활용은 가능하다. 금지되는 것은 ‘무자격자에게 책임을 넘기는 것’이다."},{"n":93,"q":"양육권 분쟁 중인 부모의 한쪽이 자녀의 심리평가 결과 전체를 요구해 왔다. 가장 적절한 대처는?","opts":["요구하는 즉시 원자료를 포함해 전부 제공한다.","어떤 경우에도 무조건 거부한다.","다른 쪽 부모에게 비밀리에 먼저 알려준다.","법정대리권과 동의의 범위, 아동의 복지를 검토하고 필요시 기관·법률 자문을 구한다.","분쟁이 끝날 때까지 기록을 폐기한다."],"a":3,"ex":"법적 권리와 아동 최선의 이익이 충돌할 수 있는 장면이다. 절차적 신중함 자체가 윤리적 보호 장치가 된다."},{"n":94,"q":"투사적 검사의 타당도 논쟁에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 로샤의 일부 지표는 타당도 증거가 비교적 잘 축적되어 있다.\nㄴ. 투사적 검사 전반이 모든 목적에서 타당성이 입증되었다.\nㄷ. 다른 자료에 더해 주는 정보량, 즉 증분타당도가 도구 선택의 기준이 된다.\nㄹ. 이 논쟁은 지표별·목적별 근거 기반 해석의 중요성을 시사한다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"‘투사검사는 다 좋다/다 나쁘다’는 양극단 모두 근거와 맞지 않는다. 지표 단위의 차별적 평가가 현재의 결론이다."},{"n":95,"q":"핀(Finn)의 치료적 평가 모델에 대한 설명으로 가장 적절한 것은?","opts":["정보 수집만을 목적으로 하는 전통적 평가 모델이다.","평가자와 수검자의 접촉을 최소화하는 모델이다.","법원 명령에 의한 강제 평가를 말한다.","집단용 선별검사의 한 형태이다.","수검자가 평가 질문 작성에 참여하고, 평가 과정 자체를 치료적 개입으로 설계한다."],"a":4,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 평가의 ‘대상’이던 수검자를 ‘협력자’로 위치시키며, 피드백 회기가 변화의 핵심 장면이 된다."},{"n":96,"q":"K-WAIS-IV 결과 해석의 일반적 절차로 가장 적절한 것은?","opts":["소검사 분산 분석부터 시작해 전체 IQ로 올라간다.","전체 IQ(및 그 단일성 검토) → 지표점수 분석 → 소검사·질적 분석의 순서로 진행한다.","질적 분석만으로 해석을 완결한다.","지표점수는 무시하고 전체 IQ만 보고한다.","행동관찰은 해석 과정에서 제외한다."],"a":1,"ex":"지표 간 편차가 크면 전체 IQ의 대표성이 떨어지므로, 단일성 검토가 해석의 첫 관문이 된다."},{"n":97,"q":"회사가 직원의 심리평가 결과 전체 제출을 요구해 왔다. 가장 적절한 대처는?","opts":["원자료를 포함한 전체 자료를 제공한다.","사전 동의의 범위를 확인하고, 평가 목적에 필요한 최소한의 정보를 적절한 형태로 제공한다.","무조건 거부하는 것이 유일한 윤리적 선택이다.","구두로만 전달하고 기록을 남기지 않는다.","수검자 모르게 제공한다."],"a":1,"ex":"제3자 의뢰 평가에서는 ‘누가 내담자인가’와 정보 제공 범위를 평가 시작 전에 구조화하는 것이 최선의 예방책이다."},{"n":98,"q":"경도인지장애(MCI)에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 주관적인 인지 저하 호소와 객관적 검사상의 저하가 함께 나타난다.\nㄴ. 일상생활 기능은 대체로 유지된다.\nㄷ. 치매로 이행할 위험이 높은 상태로 간주된다.\nㄹ. 모든 MCI는 예외 없이 치매로 진행된다.","opts":["ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"일상 기능의 유지 여부가 치매와의 경계선이다. 회복되거나 유지되는 사례도 있어 ㄹ은 과잉 일반화다."},{"n":99,"q":"문제행동의 기능적 행동평가(FBA)에 대한 설명으로 가장 적절한 것은?","opts":["행동의 형태가 같으면 기능도 항상 같다.","선행사건 정보는 기능 분석과 무관하다.","기능 평가는 처벌의 강도를 정하기 위한 절차이다.","행동의 기능이 확인되면 같은 기능을 가진 적응적 대체행동을 가르칠 수 있다.","결과(후속자극)의 조작은 금지된다."],"a":3,"ex":"‘왜 하는가’를 알면 ‘무엇으로 바꿀까’가 보인다. 동일 기능 대체행동 교수가 긍정적 행동지원의 핵심 논리다."},{"n":100,"q":"심리평가 기록의 보존과 관리에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 관련 법령과 학회 규정에 따른 보존 기간을 준수한다.\nㄴ. 기록 폐기 시에는 복구가 불가능한 방법을 사용한다.\nㄷ. 전자 기록은 접근 권한을 관리한다.\nㄹ. 보존 기간이 지난 기록은 제3자에게 임의로 양도할 수 있다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":3,"ex":"보존 기간 만료는 ‘안전한 폐기’의 시점이지 ‘처분의 자유’를 의미하지 않는다."},{"n":101,"q":"정신상태검사(MSE)의 평가 항목으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 외모와 행동, 면담 태도\nㄴ. 사고의 과정과 내용\nㄷ. 기분과 정동, 지각(환각 유무)\nㄹ. 3대에 걸친 가족력의 도식화","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"MSE는 ‘지금 이 자리’의 정신 기능 단면 평가다. 가족력은 병력 청취의 영역이고, 도식화는 가계도의 일이다."},{"n":102,"q":"기분(mood)과 정동(affect)의 구별로 가장 적절한 것은?","opts":["기분은 지속적인 주관적 정서 상태, 정동은 면담 중 관찰되는 정서 표현이다.","기분은 관찰되는 표현, 정동은 주관적 보고이다.","두 용어는 완전히 동일하다.","정동은 아동에게만 사용한다.","기분은 검사로만 측정된다."],"a":0,"ex":"‘기분은 기후, 정동은 날씨’라는 비유로 기억하면 된다. ‘우울한 기분, 제한된 정동’처럼 함께 기술된다."},{"n":103,"q":"자유회상에서는 수행이 저조했으나 재인(recognition) 과제에서 수행이 크게 회복되었다. 시사되는 기억 손상의 단계는?","opts":["부호화의 결함","저장(공고화)의 결함","절차기억의 결함","감각기억의 결함","인출의 결함"],"a":4,"ex":"단서가 주어지면 꺼낼 수 있다는 것은 정보가 들어 있다는 뜻이다. 알츠하이머형(부호화·저장 결함)은 재인에서도 회복이 적다."},{"n":104,"q":"웩슬러 지능검사에서 사회적 상황에 대한 이해와 관습적 판단 능력을 주로 반영하는 언어이해 소검사는?","opts":["공통성","어휘","숫자","상식","이해"],"a":4,"ex":"‘편지를 주우면 어떻게 해야 하나요?’류의 문항으로, 사회적 판단과 실용적 지식을 본다."},{"n":105,"q":"MMPI-2의 0번 척도(Si)가 의미 있게 상승한 경우 시사되는 특징은?","opts":["사회적 내향성, 대인관계 회피와 수줍음","과도한 사교성과 자기과시","신체 증상에 대한 집착","반사회적 충동성","사고의 기괴함"],"a":0,"ex":"0번은 병리 척도라기보다 성격 차원에 가까워, 다른 임상척도의 표현 방식을 조절하는 역할로도 해석된다."},{"n":106,"q":"MMPI-2의 9번 척도(Ma)가 현저히 낮은 경우(T 40 미만) 시사되는 바로 가장 적절한 것은?","opts":["높은 활력과 충동성","낮은 에너지 수준, 활동성과 동기의 저하","과대한 자기상","사고 비약","무선 반응"],"a":1,"ex":"척도는 높을 때만이 아니라 낮을 때도 정보를 준다. 2번 상승과 9번 저하의 조합은 우울 양상을 강화하는 해석 단서다."},{"n":107,"q":"로샤 종합체계에서 사회적 기술과 대처 자원의 부족, 일상 요구에 대한 대처 곤란을 시사하는 군집 지표는?","opts":["PTI(지각-사고 지표)","OBS(강박성 지표)","DEPI(우울 지표)","HVI(과경계 지표)","CDI(대처결함 지표)"],"a":4,"ex":"DEPI가 정서적 고통의 신호라면, CDI는 만성적인 대처 자원 결핍의 신호로 대인관계 문제와 관련이 깊다."},{"n":108,"q":"로샤와 TAT의 자극 속성 비교로 가장 적절한 것은?","opts":["TAT가 로샤보다 자극이 더 구조화되어 있어 대인관계 주제가 보다 직접적으로 드러난다.","로샤가 TAT보다 자극이 더 구조화되어 있다.","두 검사의 자극 구조화 수준은 동일하다.","TAT는 자극이 전혀 없는 검사이다.","로샤는 언어 자극, TAT는 청각 자극을 사용한다."],"a":0,"ex":"잉크반점(비구조적)과 대인 장면 그림(중간 구조화)의 차이로, 끌어내는 자료의 수준도 달라진다."},{"n":109,"q":"인물화 검사(DAP)의 표준적 실시 절차로 가장 적절한 것은?","opts":["반드시 가족 전체를 그리게 한다.","제한 시간 1분을 엄수한다.","눈을 감고 그리게 한다.","사람을 한 명 그리게 한 후, 처음 그린 인물과 반대 성별의 사람을 추가로 그리게 한다.","집과 나무를 먼저 그리게 한다."],"a":3,"ex":"동성-이성 두 장이 표준이며, 어느 성을 먼저 그렸는지도 해석 가설의 단서로 논의된다."},{"n":110,"q":"아동 놀이평가에 대한 설명으로 가장 적절한 것은?","opts":["언어 능력이 충분한 아동에게만 사용한다.","놀이는 아동의 자연스러운 표현 매체이므로, 놀이 주제와 양상을 통해 내적 경험과 발달 수준에 대한 가설을 얻는다.","놀이 내용은 무작위이므로 해석 가치가 없다.","표준화 점수가 자동 산출된다.","부모는 관찰에서 배제하는 것이 원칙이다."],"a":1,"ex":"언어 보고가 제한된 아동에게 놀이는 곧 언어다. 구조화 수준과 관찰 틀을 갖추면 평가 자료가 된다."},{"n":111,"q":"성취도검사와 적성검사의 구별로 가장 적절한 것은?","opts":["성취도검사는 미래 잠재력을, 적성검사는 과거 학습 결과를 측정한다.","성취도검사는 과거 학습의 결과를, 적성검사는 미래 학습이나 수행의 잠재력을 추정한다.","두 검사는 측정 목적이 동일하다.","적성검사는 성격검사의 일종이다.","성취도검사는 규준이 필요 없다."],"a":1,"ex":"같은 문항도 ‘무엇을 추론하려는가’에 따라 성취 측정이 되기도, 적성 추정이 되기도 한다. 구분의 축은 추론의 방향이다."},{"n":112,"q":"속도검사(speed test)와 역량검사(power test)의 구별로 옳은 것은?","opts":["속도검사는 쉬운 문항을 제한 시간 내 얼마나 빨리·많이 푸는가를, 역량검사는 시간 여유 속에서 난이도 상승 문항을 어디까지 풀 수 있는가를 본다.","역량검사는 반드시 시간 제한이 더 엄격하다.","속도검사는 어려운 문항만으로 구성된다.","두 검사의 신뢰도 추정 방식은 완전히 동일해도 된다.","역량검사에서는 난이도가 모두 동일하다."],"a":0,"ex":"속도검사에 반분신뢰도를 그대로 쓰면 과대추정되는 문제(앞서 출제)와 연결해 이해하면 좋다."},{"n":113,"q":"객관적 성격검사의 상대적 장점으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 실시와 채점이 표준화되어 효율적이다.\nㄴ. 채점자간 신뢰도가 높다.\nㄷ. 규준에 따른 상대적 해석이 용이하다.\nㄹ. 수검자의 의도적 반응 왜곡이 원천적으로 불가능하다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"객관검사도 왜곡 가능하다. 그래서 타당도척도가 필요한 것이며, ㄹ이 전형적 과장 진술이다."},{"n":114,"q":"검사 규준집단의 대표성에 대한 설명으로 옳지 않은 것은?","opts":["규준집단은 검사 대상 모집단을 잘 대표해야 한다.","연령, 성별, 지역, 교육수준 등의 분포를 고려해 표집한다.","규준집단과 특성이 크게 다른 수검자의 해석에는 주의가 필요하다.","편의표집으로 모은 소수의 대학생 규준이라도 전 연령에 일반화할 수 있다.","규준집단의 크기와 구성은 점수 해석의 질에 영향을 준다."],"a":3,"ex":"‘누구와 비교한 점수인가’가 규준 해석의 전부다. 대학생 규준으로 노인을 해석하면 비교 자체가 무의미해진다."},{"n":115,"q":"선별검사의 컷오프 점수를 낮추면(더 많은 사람이 양성 판정) 일반적으로 나타나는 변화는?","opts":["민감도와 특이도가 모두 상승한다.","민감도와 특이도는 컷오프와 무관하다.","민감도는 하락하고 특이도는 상승한다.","민감도와 특이도가 모두 하락한다.","민감도는 상승하고 특이도는 하락한다."],"a":4,"ex":"그물코를 좁히면 실제 사례를 놓치는 일은 줄지만(민감도↑) 멀쩡한 사람도 걸린다(특이도↓). 목적에 따른 트레이드오프 선택이다."},{"n":116,"q":"심리검사 상황에서 수검자의 높은 검사 불안에 대한 검사자의 적절한 대처가 아닌 것은?","opts":["검사 목적과 절차를 충분히 안내하여 불확실성을 줄인다.","라포 형성에 시간을 들인다.","필요시 휴식을 제공한다.","불안 관련 행동관찰을 기록하여 해석에 참고한다.","불안은 수행에 영향을 주지 않으므로 고려할 필요가 없다."],"a":4,"ex":"높은 상태불안은 특히 주의·작업기억 과제의 수행을 떨어뜨린다. 점수의 의미를 조건과 함께 읽어야 한다."},{"n":117,"q":"청소년 평가에서 자기보고와 부모보고가 크게 불일치할 때 가장 적절한 태도는?","opts":["부모 보고가 항상 정확하므로 우선한다.","청소년 보고가 항상 정확하므로 우선한다.","둘의 평균을 내어 보고한다.","정보원 간 불일치는 흔하며, 각 정보원이 관찰하는 장면과 관점의 차이 자체를 임상 정보로 활용한다.","불일치 자료는 폐기한다."],"a":3,"ex":"내재화 증상은 본인이, 외현화 행동은 타인이 더 잘 본다는 것이 정보원 연구의 일반적 발견이다."},{"n":118,"q":"위기 선별 면담에서 자살 사고에 대해 직접적으로 질문하는 것에 대한 설명으로 가장 적절한 것은?","opts":["직접적이고 차분한 질문은 위험을 높이지 않으며, 정확한 평가와 개입의 출발점이 된다는 것이 일반적인 임상적 합의이다.","질문 자체가 자살 사고를 심어줄 수 있으므로 피해야 한다.","서면 설문으로만 확인해야 한다.","보호자가 동석할 때만 질문할 수 있다.","위험이 명백할 때만 질문한다."],"a":0,"ex":"묻지 않으면 평가할 수 없다. 회피적 태도가 오히려 ‘이 이야기는 하면 안 되는 것’이라는 메시지를 줄 수 있다."},{"n":119,"q":"문장완성검사(SCT)의 실시에 대한 설명으로 옳지 않은 것은?","opts":["깊이 생각하기보다 떠오르는 대로 빠르게 완성하도록 안내한다.","모든 문항에 응답하도록 격려한다.","문항당 제한 시간을 10초로 엄격히 통제하는 것이 표준이다.","응답 후 필요시 추가 질문(질문 단계)을 할 수 있다.","생략하거나 지운 문항도 해석적 단서가 된다."],"a":2,"ex":"전체 소요 시간은 참고하되 문항별 초 단위 통제는 표준 절차가 아니다. ‘떠오르는 대로’가 투사를 끌어내는 장치다."},{"n":120,"q":"검사 도구의 판(version) 사용에 대한 설명으로 가장 적절한 것은?","opts":["구판이 익숙하므로 개정판이 나와도 계속 구판을 쓰는 것이 바람직하다.","개정판이 출시되어 타당화된 후에는 합리적 기간 내에 개정판으로 이행하는 것이 원칙이다.","판의 선택은 검사 결과에 영향을 주지 않는다.","개정판과 구판의 규준은 언제나 호환된다.","판 정보는 보고서에 기재할 필요가 없다."],"a":1,"ex":"구판 사용은 낡은 규준·문항으로 평가하는 것과 같다. 윤리강령의 ‘시대에 뒤떨어진 도구 사용 금지’ 조항과 연결된다."},{"n":121,"q":"웩슬러 지능검사의 토막짜기 소검사가 주로 측정하는 능력은?","opts":["어휘 지식","시공간 구성 능력과 비언어적 문제해결","청각적 단기기억","사회적 판단","읽기 유창성"],"a":1,"ex":"전체를 부분으로 분석하고 재구성하는 능력을 보며, 지각추론(시공간) 지표의 핵심 소검사다."},{"n":122,"q":"MMPI-2의 6번 척도(Pa)가 의미 있게 상승한 경우 시사되는 특징은?","opts":["사회적 외향성","신체 기능에 대한 집착","대인관계에서의 예민함, 의심, 피해의식적 경향","높은 성취 동기","낮은 에너지"],"a":2,"ex":"중간 수준 상승은 대인 민감성으로, 현저한 상승은 투사와 피해사고 가능성으로 해석의 결이 달라진다."},{"n":123,"q":"MMPI-2의 7번 척도(Pt) 상승과 가장 관련이 깊은 특징은?","opts":["만성적 불안, 강박적 걱정, 완벽주의와 자기회의","충동적 행동화","과대한 자기상","사회적 무관심","기괴한 지각 경험"],"a":0,"ex":"7번은 ‘심리적 고통의 온도계’로 불리며, 2번과 함께 상승하면 신경증적 고통 호소의 전형이 된다."},{"n":124,"q":"MMPI-2에서 8번 척도(Sc)가 80T 이상으로 단독 상승했을 때의 해석으로 가장 적절한 것은?","opts":["반드시 조현병으로 진단한다.","신체 건강 문제만을 의미한다.","항상 무효 프로파일이다.","지적 우수성의 지표다.","사고·지각의 혼란 가능성과 함께, 심한 상황적 위기나 도움 요청의 표현 가능성도 함께 검토한다."],"a":4,"ex":"척도 상승은 진단이 아니라 가설이다. 8번 극단 상승은 정신증 외에도 극심한 고통의 ‘비명’일 수 있다."},{"n":125,"q":"MMPI-2 임상척도 해석에서 일반적으로 임상적 의미가 있다고 보는 T점수 기준은?","opts":["50T 이상","55T 이상","65T 이상","80T 이상","100T 이상"],"a":2,"ex":"MMPI 원판의 70T에서 MMPI-2는 65T로 조정되었다. 60~64T는 준임상 수준으로 참고한다."},{"n":126,"q":"MMPI-2의 결정적 문항(critical items)의 용도로 가장 적절한 것은?","opts":["임상척도 점수를 산출하는 핵심 채점 문항이다.","문항 수를 줄이기 위한 단축형이다.","타당도척도를 대체한다.","자살 사고, 정신증적 경험 등 즉각적 주의가 필요한 내용을 점검하고 면담에서 확인할 단서로 활용한다.","규준 산출용 문항이다."],"a":3,"ex":"문항 수준의 응답은 신뢰도가 낮아 단독 해석은 금물이지만, ‘무엇을 물어볼 것인가’의 지도가 된다."},{"n":127,"q":"로샤 검사에서 인간운동반응(M)이 풍부하고 형태질이 양호할 때 시사되는 바로 가장 적절한 것은?","opts":["현실검증력의 붕괴","내적 관념 활동과 심리적 자원, 공감 능력의 가용성","운동 기능의 손상","무조건적인 정신증적 상태","검사 거부적 태도"],"a":1,"ex":"M은 ‘멈추고 생각하는 능력’과 관련된다. 다만 M-(마이너스 형태질)는 왜곡된 대인지각의 신호로 결이 다르다."},{"n":128,"q":"로샤 검사에서 유채색 반응이 주로 관련되는 심리적 영역은?","opts":["정서적 반응성과 정서 표현의 조절","운동 협응","어휘력","산술 능력","시력"],"a":0,"ex":"형태가 색을 통제하는가(FC), 색이 형태를 압도하는가(CF, C)가 정서 조절의 성숙도 가설로 이어진다."},{"n":129,"q":"심리검사 배터리의 실시 순서 배치에 대한 설명으로 가장 적절한 것은?","opts":["가장 위협적인 검사를 첫 순서에 배치한다.","수검자가 무작위로 고른다.","순서는 결과에 영향을 주지 않는다.","항상 알파벳 순서로 실시한다.","라포와 수검 부담을 고려하여 비교적 중립적이고 구조화된 검사를 앞에, 정서적 부담이 큰 검사를 라포 형성 후에 배치하는 것이 일반적이다."],"a":4,"ex":"BGT가 완충검사로 앞에 놓이는 이유와 같은 논리다. 순서 자체가 검사 태도와 자료의 질에 영향을 준다."},{"n":130,"q":"심리검사 실시 환경에 대한 설명으로 옳지 않은 것은?","opts":["방음과 독립성이 확보된 공간에서 실시한다.","조명, 온도 등 물리적 조건을 점검한다.","방해 요소(전화, 출입)를 차단한다.","개방된 복도에서 실시해도 결과에 영향이 없다.","검사 환경에 대한 특이사항은 기록한다."],"a":3,"ex":"학회 윤리강령도 기관 운영자에게 ‘평가에 적합한 독립 공간’ 제공 책임을 명시하고 있다."},{"n":131,"q":"덴버 발달선별검사(DDST)의 평가 영역을 모두 고른 것은?","box":"ㄱ. 개인-사회성\nㄴ. 미세운동-적응\nㄷ. 언어\nㄹ. 전체운동","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":4,"ex":"네 영역 모두 포함된다. 선별검사이므로 ‘의심’ 결과는 진단이 아니라 정밀평가 의뢰의 신호다."},{"n":132,"q":"K-WPPSI가 대상으로 하는 연령대는?","opts":["영아기(0~2세)","초등학생 전체","유아기(만 2세 6개월~7세 7개월)","청소년기","성인기"],"a":2,"ex":"웩슬러 3종 세트의 연령 분담(WPPSI-유아, WISC-아동·청소년, WAIS-성인)은 기본 암기 사항이다."},{"n":133,"q":"MBTI에 대한 설명으로 옳지 않은 것은?","opts":["융의 심리유형론에 기초한다.","외향-내향, 감각-직관, 사고-감정, 판단-인식의 네 지표를 사용한다.","자기이해와 의사소통 교육 장면에서 활용된다.","정신장애의 임상 진단 도구로 공인되어 있다.","유형론적 접근으로 개인을 범주에 배정한다."],"a":3,"ex":"MBTI는 정상 성격의 선호 경향 도구다. 진단·선발 목적의 오남용이 대표적인 윤리 문제로 거론된다."},{"n":134,"q":"성격평가질문지(PAI)의 특징으로 가장 적절한 것은?","opts":["4점 평정척도를 사용하며 임상척도 외에 치료고려 척도와 대인관계 척도를 포함한다.","예/아니오 2점 응답만 사용한다.","투사적 검사로 분류된다.","아동 전용 검사이다.","타당도척도가 없다."],"a":0,"ex":"증상의 정도를 평정하게 하는 4점 척도와 치료 계획 관련 척도(공격성, 자살관념, 치료거부 등)가 MMPI와의 차별점이다."},{"n":135,"q":"스트롱 직업흥미검사의 일반직업분류(GOT)가 기반으로 하는 이론적 틀은?","opts":["프로이트의 심리성적 발달","홀랜드의 RIASEC 6유형","매슬로의 욕구위계","빅파이브 성격 모델","피아제의 인지발달"],"a":1,"ex":"GOT(6개 일반직업분류) 아래 기본흥미척도, 개인특성척도가 위계적으로 배치된 구조다."},{"n":136,"q":"노인우울척도(GDS)의 특징으로 가장 적절한 것은?","opts":["예/아니오의 단순한 응답 방식으로 노인의 응답 부담을 줄였고, 신체 증상 문항의 비중을 낮추었다.","7점 리커트 척도로 응답 부담이 크다.","투사적 그림검사이다.","보호자만 응답할 수 있다.","아동·노인 공용 검사이다."],"a":0,"ex":"노년기에는 신체 증상이 우울과 무관하게도 흔하므로, 신체 문항 의존을 줄인 것이 설계의 핵심이다."},{"n":137,"q":"안면타당도(face validity)에 대한 설명으로 가장 적절한 것은?","opts":["요인분석으로 검증되는 통계적 타당도이다.","수검자가 보기에 검사가 그럴듯해 보이는 정도로, 심리측정적 타당도는 아니지만 수검 동기와 협조에 영향을 줄 수 있다.","예언타당도의 다른 이름이다.","타당도 중 가장 중요한 유형이다.","전문가만 판단할 수 있다."],"a":1,"ex":"안면타당도가 높으면 수검 동기는 좋아지지만 반응 왜곡도 쉬워진다는 양면이 있다."},{"n":138,"q":"행동관찰의 간격기록법에서 부분간격기록(partial interval)에 대한 설명으로 옳은 것은?","opts":["간격 내내 행동이 지속되어야 발생으로 기록한다.","행동의 빈도를 정확히 산출한다.","간격 중 한 번이라도 행동이 나타나면 발생으로 기록하며, 행동 발생을 과대추정하는 경향이 있다.","고빈도 행동에만 사용할 수 없다.","지속시간을 직접 측정한다."],"a":2,"ex":"전체간격기록은 반대로 과소추정 경향이 있다. 어느 쪽의 오차를 감수할지는 표적행동의 성격에 달려 있다."},{"n":139,"q":"아동 심리평가의 결과 전달에 대한 설명으로 가장 적절한 것은?","opts":["보호자에게만 전달하고 아동에게는 알리지 않는 것이 원칙이다.","진단명만 통보하면 충분하다.","문서 우송으로 갈음한다.","학교에 먼저 통보한다.","보호자 면담과 함께, 아동 본인에게도 발달 수준에 맞는 언어로 결과의 의미를 설명해 주는 것이 바람직하다."],"a":4,"ex":"아동도 평가의 당사자다. 자기 이해를 돕는 피드백은 평가의 치료적 활용이기도 하다."},{"n":140,"q":"단일 검사가 아닌 검사 배터리 접근을 사용하는 근거로 가장 적절한 것은?","opts":["검사 비용을 늘리기 위해서","보고서 분량을 늘리기 위해서","수검자를 지치게 하여 방어를 깨기 위해서","단일 검사의 오차와 한계를 보완하고, 여러 자료원의 수렴과 불일치를 통해 가설의 타당성을 높이기 위해서","법적 의무이기 때문에"],"a":3,"ex":"평가의 논리는 삼각측량이다. 한 검사에서 나온 가설은 다른 자료에서의 수렴 여부로 강화되거나 기각된다."},{"n":141,"q":"MMPI-2에서 K교정이 적용되지 않는 임상척도는?","opts":["1번(Hs)","2번(D)","7번(Pt)","8번(Sc)","9번(Ma)"],"a":1,"ex":"K교정 5인방(1·4·7·8·9)의 역방향 문항이다. 2·3·6·0번은 교정하지 않는다."},{"n":142,"q":"로샤에서 Lambda가 지나치게 높은 프로토콜의 해석 가설로 가장 적절한 것은?","opts":["풍부한 정서적 관여","복잡한 내적 경험의 과잉 표현","현실검증력의 우수성 보장","자극 장면을 단순화하고 관여를 최소화하는 회피적·경제적 처리 경향","높은 지능의 직접 증거"],"a":3,"ex":"높은 L은 ‘복잡한 것을 안 보기로 한’ 스타일이다. 방어적 수검 태도와도 관련되어 다른 지표의 과소산출을 의심하게 한다."},{"n":143,"q":"백분위 30에 대한 해석으로 옳은 것은?","opts":["문항의 30%를 맞혔다.","규준집단에서 약 30%의 사람이 그 점수 이하에 위치한다.","상위 30%에 해당한다.","T점수 30과 같다.","평균에서 30점 아래다."],"a":1,"ex":"백분위 30은 하위 30% 지점, 즉 상위 70% 경계라는 뜻이다. 정답률(%)과의 혼동이 단골 함정이다."},{"n":144,"q":"신뢰도 .84, 표준편차 10인 검사에서 관찰점수 100인 수검자의 약 68% 신뢰구간은? (SEM=10×√0.16=4)","opts":["98~102","92~108","96~104","90~110","88~112"],"a":2,"ex":"68% 구간은 ±1SEM이다. ±2SEM(92~108)은 약 95% 구간으로, 두 구간을 혼동하지 않아야 한다."},{"n":145,"q":"T점수 70에 해당하는 z점수와 대략적인 백분위는?","opts":["z=1.0, 백분위 84","z=1.5, 백분위 93","z=3.0, 백분위 99.9","z=2.0, 백분위 약 98","z=0.7, 백분위 76"],"a":3,"ex":"T=50+10z이므로 T70은 z2.0이다. z1=84, z2=98의 두 좌표는 외워둘 가치가 있다."},{"n":146,"q":"K-WISC-V의 소검사와 지표의 연결이 옳지 않은 것은?","opts":["무게비교 - 처리속도","토막짜기 - 시공간","행렬추리 - 유동추론","숫자 - 작업기억","공통성 - 언어이해"],"a":0,"ex":"무게비교는 양적 추론을 요구하는 유동추론 소검사다. 처리속도는 기호쓰기·동형찾기가 담당한다."},{"n":147,"q":"웩슬러 검사의 시작점·역순 규칙·중지 규칙에 대한 설명으로 가장 적절한 것은?","opts":["모든 수검자가 1번 문항부터 끝 문항까지 전부 푼다.","역순 규칙은 처리속도 소검사에만 적용된다.","수검자가 원하는 문항만 골라 푼다.","중지 규칙은 검사자가 임의로 정한다.","연령별 시작점에서 출발하되 초반 문항에서 만점을 받지 못하면 역순으로 내려가고, 연속 실패 기준에 도달하면 중지하여 효율성과 좌절 최소화를 도모한다."],"a":4,"ex":"규칙의 목적은 ‘짧게, 그러나 정확하게’다. 규칙 위반 실시는 점수 타당성을 직접 훼손한다."},{"n":148,"q":"웩슬러 지능검사에서 FSIQ 70~79 범위에 해당하는 분류 명칭은?","opts":["평균 하","매우 낮음","경계선","평균","최우수"],"a":2,"ex":"70~79는 경계선(borderline) 범위로, 지적장애 평가에서는 적응행동 평가와의 통합 판단이 특히 중요해지는 구간이다."},{"n":149,"q":"선로잇기검사(TMT)의 B형이 A형에 비해 추가적으로 요구하는 인지 기능은?","opts":["단순 운동 속도","사회적 판단","장기기억 인출","어휘 지식","숫자-문자 간 전환을 요구하는 인지적 유연성(set-shifting)"],"a":4,"ex":"A형은 주사와 처리속도, B형은 거기에 전환 능력이 더해진다. B-A 차이나 B/A 비율이 실행기능 지표로 활용된다."},{"n":150,"q":"레이 복합도형검사(RCFT)에 대한 설명으로 가장 적절한 것은?","opts":["복잡한 도형의 모사와 지연 회상을 통해 시공간 구성능력과 시각기억을 평가하며, 모사 과정의 전략과 조직화 수준도 질적 분석 대상이 된다.","언어 유창성을 평가한다.","청각적 주의폭을 평가한다.","사회적 인지를 평가한다.","표준화 점수가 산출되지 않는다."],"a":0,"ex":"조각조각 베끼는 단편적 접근은 조직화 능력 저하의 단서가 되며, 부호화의 질이 회상 수행을 예측한다."},{"n":151,"q":"제한 시간 내에 특정 음소(예: ‘ㄱ’)로 시작하는 단어를 최대한 많이 말하게 하는 과제가 주로 평가하는 기능은?","opts":["언어 유창성과 전략적 인출(전두엽 기능)","서술기억의 공고화","시공간 구성","운동 협응","사회적 판단"],"a":0,"ex":"음소 유창성은 전두엽의 전략적 탐색에, 의미(범주) 유창성은 측두엽의 의미망에 상대적으로 더 의존한다."},{"n":152,"q":"상태-특성 불안검사(STAI)의 설계 원리로 가장 적절한 것은?","opts":["불안을 단일 차원으로만 측정한다.","투사적 기법을 사용한다.","아동 전용 검사이다.","‘지금 이 순간’의 일시적 상태불안과 비교적 안정적인 성향인 특성불안을 구분하여 측정한다.","행동관찰로만 채점한다."],"a":3,"ex":"상태-특성의 구분은 ‘시험 직전의 떨림’과 ‘원래 불안이 많은 사람’을 분리해서 보게 해 준다."},{"n":153,"q":"벤더-게슈탈트 검사(BGT)의 활용에 대한 설명으로 옳지 않은 것은?","opts":["시각-운동 협응과 발달적 성숙의 평가에 활용된다.","전체 지능지수(FSIQ)를 산출한다.","검사 배터리의 도입부에서 완충검사로 활용된다.","수검 태도와 행동 관찰의 기회를 제공한다.","기질적 뇌손상의 선별 단서를 얻는 데 활용되어 왔다."],"a":1,"ex":"BGT는 지능검사가 아니다. ‘도형 9장으로 IQ 산출’은 검사 목적의 혼동을 노린 함정이다."},{"n":154,"q":"동형검사 신뢰도에 대한 설명으로 가장 적절한 것은?","opts":["같은 검사를 두 번 실시한 상관이다.","속도검사에는 사용할 수 없다.","채점자 두 명의 일치도이다.","문항 내적 일관성의 지표이다.","내용과 난이도가 동등한 두 검사형 간의 상관으로, 기억효과를 줄일 수 있으나 진정한 동형 검사의 제작이 어렵다는 한계가 있다."],"a":4,"ex":"재검사 신뢰도의 기억효과 문제를 피하는 대안이지만, ‘동형’의 입증 자체가 까다롭다는 비용이 따른다."},{"n":155,"q":"반분신뢰도에서 스피어만-브라운 공식을 적용하는 이유는?","opts":["문항 수를 줄이기 위해","두 반분의 평균을 내기 위해","검사를 반으로 나누면 길이 축소로 신뢰도가 과소추정되므로 전체 길이 기준으로 교정하기 위해","타당도를 산출하기 위해","채점 시간을 줄이기 위해"],"a":2,"ex":"신뢰도는 검사 길이의 함수다. 반분 상관은 ‘반쪽짜리 검사’의 신뢰도이므로 원래 길이로 되돌리는 교정이 필요하다."},{"n":156,"q":"정답/오답으로 채점되는 이분 문항 검사의 내적합치도를 추정하는 데 적합한 계수는?","opts":["KR-20","스피어만 로","피어슨 r","파이 계수","카파"],"a":0,"ex":"KR-20은 이분 문항용 내적합치도로, 크론바흐 알파의 특수한 경우에 해당한다."},{"n":157,"q":"여러 구인을 여러 방법으로 측정하여 수렴타당도와 변별타당도의 증거를 동시에 검토하는 체계적 틀은?","opts":["문항반응 행렬","경로도","요인 회전","다특성-다방법 행렬(MTMM)","산점도"],"a":3,"ex":"같은 구인-다른 방법의 상관(수렴)이 다른 구인-같은 방법의 상관(방법 변량)보다 커야 한다는 논리를 표로 구현한 것이다."},{"n":158,"q":"검사가 너무 쉬워 대부분의 수검자가 최고점 부근에 몰려 상위 수준의 변별이 불가능한 현상은?","opts":["바닥 효과","천장 효과","연습 효과","후광 효과","회귀 효과"],"a":1,"ex":"영재 평가에 일반용 검사를 쓰면 천장에 닿는다. 점수 분포의 모양이 도구 적합성의 첫 진단 지표다."},{"n":159,"q":"검사가 너무 어려워 대부분의 수검자가 최저점 부근에 몰리는 현상과 그 함의로 옳은 것은?","opts":["천장 효과로, 검사를 더 어렵게 만들어야 한다.","연습 효과로, 재검사가 필요하다.","바닥 효과로, 하위 수준 간의 변별이 불가능해진다.","무선 오차가 사라진 상태다.","신뢰도가 자동으로 높아진다."],"a":2,"ex":"심한 장애군 평가에 어려운 검사를 쓰면 ‘모두 0점 부근’이 되어 변화 측정도 불가능해진다."},{"n":160,"q":"실제 우울장애 환자 100명 중 검사에서 85명이 양성으로 판정되었다. 이 검사의 민감도는?","opts":["15%","50%","85%","100%","산출 불가"],"a":2,"ex":"민감도의 분모는 ‘실제 환자’다. 85/100=85%. 놓친 15명이 위음성이다."},{"n":161,"q":"검사 양성 판정자 200명 중 실제 장애가 있는 사람이 120명이었다. 이때 120/200이 의미하는 지표는?","opts":["민감도","유병률","특이도","음성예측도","양성예측도"],"a":4,"ex":"분모가 ‘양성 판정자’이면 양성예측도다. 네 지표는 분모 확인만으로 즉시 구분된다."},{"n":162,"q":"다음 중 준거참조평가에 해당하는 것은?","opts":["수능 표준점수에 따른 상대 서열","운전면허 시험의 합격 기준 점수 도달 여부 판정","모집단 내 백분위 산출","반 등수 산출","IQ의 편차점수 해석"],"a":1,"ex":"비교 대상이 ‘남’이면 규준참조, ‘기준선’이면 준거참조다. 자격·면허 시험이 후자의 전형이다."},{"n":163,"q":"구조화 면담을 선택하는 것이 가장 적절한 상황은?","opts":["주제가 정해지지 않은 탐색적 대화","라포 형성이 극도로 어려운 위기 내담자의 첫 만남","자유로운 탐색이 필요한 장기 심리치료 초기","아동과의 놀이 기반 첫 면담","여러 평가자가 참여하는 대규모 역학 연구에서 진단의 일관성이 최우선일 때"],"a":4,"ex":"구조화의 값은 일관성, 비용은 융통성이다. ‘무엇이 더 중요한 상황인가’로 도구를 고른다."},{"n":164,"q":"문제행동의 기능 평가를 위한 ABC 기록에서 A, B, C가 뜻하는 것은?","opts":["선행사건-행동-후속결과","능력-행동-결론","태도-신념-대처","평가-기초선-비교","주의-균형-통제"],"a":0,"ex":"행동의 앞(유발 맥락)과 뒤(유지 결과)를 함께 적어야 행동의 ‘기능’이 보인다."},{"n":165,"q":"다음 중 지속시간 기록법이 가장 적합한 표적행동은?","opts":["욕설의 횟수","자리 이탈의 횟수","숙제 제출 여부","한 번 시작되면 길게 이어지는 울음의 길이","급우 때리기의 빈도"],"a":3,"ex":"이산적 행동은 빈도로, 연속적 행동은 지속시간으로 잰다. 측정 단위는 행동의 성질이 결정한다."},{"n":166,"q":"수검자가 로샤의 한 카드에서 ‘피’를 본 것에 대해 평가자가 곧바로 “공격성이 높은 사람”이라고 결론지었다. 이 해석의 문제점은?","opts":["채점 기호의 오류","질문 단계의 누락","단일 반응에 근거한 과잉 해석으로, 프로토콜 전체 맥락과 다른 자료와의 통합 없이 단정한 것","반응 시간의 미기록","카드 순서의 오류"],"a":2,"ex":"한 반응은 가설 하나의 씨앗일 뿐이다. 빈도, 맥락, 구조요약 전체 속에서만 의미가 결정된다."},{"n":167,"q":"검사에 냉소적인 비자발적 청소년 수검자에 대한 대처로 가장 적절한 것은?","opts":["검사의 목적과 결과의 쓰임을 솔직하게 설명하고, 가능한 범위의 선택권을 주어 협조의 토대를 만든다.","태도가 나쁘므로 결과지에 ‘측정 불가’로만 기록한다.","보호자의 권위로 강제한다.","수검자가 모르게 평가를 진행한다.","무조건 다음으로 연기한다."],"a":0,"ex":"청소년의 저항은 통제 상실감에 비례한다. 정보와 선택권의 제공이 가장 경제적인 동기화 전략이다."},{"n":168,"q":"MMPI-2에서 무응답(?) 문항 수에 대한 일반적 지침으로 옳은 것은?","opts":["무응답은 모두 ‘그렇다’로 처리한다.","무응답은 많을수록 솔직한 것이다.","10개만 넘어도 즉시 무효다.","30개 이상이면 프로토콜 전체의 타당성을 의심하고 해석에 주의하며, 가능하면 무응답을 줄이도록 격려한다.","무응답 수는 해석과 무관하다."],"a":3,"ex":"무응답은 결측이 아니라 정보(회피, 우유부단, 비협조)다. 실시 단계에서 ‘가급적 모두 응답’ 안내가 먼저다."},{"n":169,"q":"채점 오류를 줄이기 위한 절차로 가장 적절한 것은?","opts":["빠른 채점을 위해 검산을 생략한다.","채점 기준의 숙지, 이중 채점 또는 검산, 환산표 적용의 재확인 절차를 거친다.","대략적인 인상으로 점수를 부여한다.","원점수와 환산점수를 혼용한다.","피로할 때 몰아서 채점한다."],"a":1,"ex":"단순 가산 오류와 환산표 행 밀림은 가장 흔하고 가장 치명적인 오류다. 절차가 주의력을 대신해 준다."},{"n":170,"q":"“성적이 갑자기 떨어진 중학생의 학습부진 원인 평가” 의뢰에 대한 검사 구성으로 가장 적절한 것은?","opts":["지능검사 단독","성격검사 단독","학업성취도 검사 단독","흥미검사 단독","지능·기초학습기능·정서(우울/불안)·주의력을 포괄하고 면담과 행동평정을 통합하는 배터리"],"a":4,"ex":"‘갑자기’라는 단서는 능력 문제만이 아니라 정서·환경 변인의 개입을 시사한다. 의뢰 질문이 배터리를 설계한다."},{"n":171,"q":"교사에게 전달하는 평가 보고서의 권고사항 작성으로 가장 적절한 것은?","opts":["‘지시는 한 번에 한 단계씩, 자리는 교사 가까이 배치’처럼 교실에서 실행 가능한 구체적 행동 수준의 권고","‘아동을 더 사랑해 주세요’와 같은 추상적 당부","‘좌반구 기능의 비효율성 개선 요망’과 같은 전문 용어 중심 기술","진단명만 기재","권고사항 생략"],"a":0,"ex":"보고서의 가치는 수신자가 ‘내일 아침에 무엇을 달리할 수 있는가’로 결정된다."},{"n":172,"q":"같은 수학 문항 세트라도 ‘지난 학기 교육과정을 얼마나 익혔는가’를 물으면 (가)검사가 되고, ‘앞으로 수학 심화과정을 얼마나 잘 해낼 것인가’를 추정하는 데 쓰면 (나)검사가 된다. (가), (나)의 짝으로 옳은 것은?","opts":["적성 - 성취","속도 - 역량","지능 - 성격","규준 - 준거","성취 - 적성"],"a":4,"ex":"성취와 적성을 가르는 것은 문항이 아니라 추론의 방향(과거 학습 vs 미래 잠재력)이다."},{"n":173,"q":"문항분석에서 문항변별도에 대한 설명으로 옳은 것은?","opts":["전체 수검자 중 정답자의 비율이다.","변별도가 0에 가까울수록 좋은 문항이다.","문항의 길이를 뜻한다.","검사 총점 상위 집단과 하위 집단의 해당 문항 정답률 차이 등으로 추정하며, 그 문항이 능력 수준을 얼마나 잘 가려내는지를 나타낸다.","난이도와 동일한 개념이다."],"a":3,"ex":"상위 집단이 더 많이 틀리는 문항(음의 변별도)은 채점 오류나 결함 문항의 신호다."},{"n":174,"q":"문항내적 일관성 계수로 신뢰도를 추정할 때의 전제로 가장 적절한 것은?","opts":["문항들이 서로 이질적인 내용일수록 정확하다.","문항들이 동일한 구인을 측정하는 동질적 문항이라는 가정이 충족되어야 한다.","문항 수가 적을수록 좋다.","검사를 두 번 실시해야 한다.","채점자가 두 명 이상이어야 한다."],"a":1,"ex":"여러 하위 구인이 섞인 검사에서 전체 알파는 낮게 나올 수 있으며, 이는 검사의 결함이 아니라 차원성의 문제다."},{"n":175,"q":"문항변별도와 검사의 측정학적 속성의 관계로 가장 적절한 것은?","opts":["변별도가 높으면 신뢰도는 반드시 낮아진다.","변별도는 신뢰도와 무관하다.","변별도가 높은 문항들로 구성될수록 검사의 신뢰도가 높아지는 경향이 있다.","변별도는 난이도가 결정한다.","변별도가 0인 문항이 이상적이다."],"a":2,"ex":"개인차를 잘 가려내는 문항이 모일수록 점수의 일관성도 좋아진다. 문항분석이 검사 개정의 출발점인 이유다."},{"n":176,"q":"어떤 척도가 매번 거의 같은 점수를 산출하지만 정작 측정하려던 우울이 아니라 사회적 바람직성을 재고 있었다. 이 상황에 대한 기술로 옳은 것은?","opts":["신뢰도는 높을 수 있으나 타당도는 낮다.","신뢰도와 타당도가 모두 높다.","신뢰도와 타당도가 모두 낮다.","타당도는 높으나 신뢰도가 낮다.","신뢰도가 높으므로 타당도도 자동으로 높다."],"a":0,"ex":"일관되게 ‘딴 것’을 재는 자가 있을 수 있다. 신뢰도는 타당도의 필요조건일 뿐이라는 명제의 사례 버전이다."},{"n":177,"q":"평균 50, 표준편차 10인 정규분포에서 50점과 70점 사이에 들어가는 사례의 비율은 약 얼마인가?","opts":["34%","48%","50%","68%","95%"],"a":1,"ex":"평균~+1SD가 약 34%, +1SD~+2SD가 약 14%이므로 합쳐 약 48%다. 정규곡선의 면적 좌표는 암기해 둘 가치가 있다."},{"n":178,"q":"웩슬러 지능검사의 지능지수 산출 방식에 대한 설명으로 옳은 것은?","opts":["정신연령을 생활연령으로 나눈 비율 IQ를 사용한다.","검사자가 인상으로 판정한다.","문항 정답 수를 그대로 IQ로 쓴다.","동일 연령 규준집단 내에서의 상대적 위치를 나타내는 편차 IQ(평균 100, 표준편차 15)를 사용한다.","연령이 높을수록 IQ가 자동으로 낮아지는 구조다."],"a":3,"ex":"비율 IQ는 성인에서 의미를 잃는다. ‘또래 중 어디쯤’이라는 편차 점수 발상이 웩슬러의 기여다."},{"n":179,"q":"우반구 손상 환자의 웩슬러 프로파일에서 상대적으로 가장 보존되기 쉬운 소검사는?","opts":["토막짜기","행렬추리","어휘","퍼즐","기호쓰기"],"a":2,"ex":"어휘는 과학습된 결정지능 과제로 손상에 가장 둔감해, 병전 지능 추정의 단서(hold 검사)로 쓰여 왔다."},{"n":180,"q":"MMPI-2 상승척도쌍의 일반적 해석 가설로 옳지 않은 것은?","opts":["4-9 상승 - 충동적 행동화와 반사회적 경향","1-3 상승 - 심리적 갈등의 신체화 경향","2-7 상승 - 불안과 우울이 동반된 신경증적 고통","6-8 상승 - 의심과 사고 혼란 등 정신증적 과정 가능성","4-9 상승 - 깊은 죄책감과 행동 억제"],"a":4,"ex":"4-9의 임상 초상은 죄책감의 ‘부재’에 가깝다. 코드타입의 방향을 뒤집은 선지가 전형적 함정이다."},{"n":181,"q":"로샤 검사의 반응단계 실시 지침으로 옳은 것은?","opts":["카드당 반응 수를 검사자가 1개로 제한한다.","“사람들이 보통 뭐라고 하나요?”라는 질문에 평범반응을 알려준다.","반응이 늦으면 정답 예시를 보여준다.","수검자가 카드를 돌리지 못하게 한다.","“이것이 무엇으로 보입니까?” 외의 유도나 암시 없이, 수검자의 자발적 반응을 그대로 기록한다."],"a":4,"ex":"표준 실시의 생명은 비유도성이다. 검사자의 친절한 힌트 하나가 프로토콜 전체의 비교 가능성을 무너뜨린다."},{"n":182,"q":"로샤 카드의 자극 속성에 대한 설명으로 옳지 않은 것은?","opts":["전체 10장의 카드로 구성된다.","카드 VIII는 무채색 카드다.","카드 VIII부터 X까지는 전체가 유채색이다.","수검자의 카드 회전은 기록의 대상이 된다.","유채색 카드와 무채색 카드가 섞여 있다."],"a":1,"ex":"VIII~X의 유채색 구간은 정서 자극에 대한 반응 변화를 관찰하는 창이 된다. 색채충격 개념과 연결된다."},{"n":183,"q":"HTP 검사의 구조적(형식적) 해석 요소에 해당하지 않는 것은?","opts":["그림의 크기","필압과 선의 질","종이에서의 위치","그려진 인물이 입은 옷의 브랜드 추정","지우개 사용의 빈도"],"a":3,"ex":"구조 해석은 ‘어떻게 그렸는가’를 본다. 단일 구조 지표의 단정적 해석(예: 대칭=정신병)은 금물이라는 원칙도 함께 기억하라."},{"n":184,"q":"문장완성검사(SCT) 반응의 형식적 분석 대상으로 보기 어려운 것은?","opts":["응답을 생략하거나 지운 문항","반응 시간과 문장의 길이","수검자의 혈액형","전체적인 필체의 변화","문법적 일탈과 반복되는 표현"],"a":2,"ex":"내용 분석과 별도로 ‘어떻게 썼는가’의 형식 분석이 정보를 더한다. 생략 문항은 회피 주제의 표지일 수 있다."},{"n":185,"q":"행동관찰에서 관찰자 오류를 줄이는 방법으로 적절하지 않은 것은?","opts":["하루 전체의 인상을 모아 저녁에 한꺼번에 회상하여 기록한다.","관찰자 훈련과 일치도 점검을 실시한다.","관찰 단위를 더 작고 구체적으로 나눈다.","관찰 직후 즉시 기록한다.","표적행동의 조작적 정의를 명확히 한다."],"a":0,"ex":"회상 기록은 기억 왜곡과 후광효과의 통로다. 관찰의 질은 ‘정의-훈련-즉시 기록-일치도 확인’의 사슬로 지켜진다."},{"n":186,"q":"최빈값, 중앙값, 평균의 관계에 대한 설명으로 옳은 것은?","opts":["어떤 분포에서든 세 값은 항상 일치한다.","정적 편포에서는 평균이 가장 작다.","좌우대칭의 정규분포에서는 세 값이 일치한다.","부적 편포에서는 평균이 가장 크다.","중앙값은 극단값의 영향을 가장 크게 받는다."],"a":2,"ex":"편포에서는 평균이 꼬리 쪽으로 끌려간다(정적 편포: 최빈값<중앙값<평균). 극단값에 강한 것은 중앙값이다."},{"n":187,"q":"채점자가 모든 수검자의 점수에 일률적으로 5점을 더해 주었다. 분포의 변화로 옳은 것은?","opts":["평균과 표준편차가 모두 5점씩 커진다.","분포의 모양이 정규분포로 바뀐다.","평균은 그대로이고 표준편차만 커진다.","평균과 표준편차 모두 변하지 않는다.","평균은 5점 커지지만 표준편차는 변하지 않는다."],"a":4,"ex":"상수의 가산은 분포를 통째로 평행이동시킬 뿐 산포(개인차)는 건드리지 못한다. 상수를 ‘곱하면’ 그때 SD도 변한다."},{"n":188,"q":"객관적 검사와 비교한 투사적 검사의 특징으로 옳지 않은 것은?","opts":["자극이 모호하여 반응의 자유도가 크다.","채점자간 신뢰도가 객관적 검사보다 일반적으로 높다.","의도적인 인상 관리가 상대적으로 어렵다.","채점과 해석에서 평가자의 숙련이 크게 요구된다.","개인의 독특한 내적 세계가 드러나기 쉽다."],"a":1,"ex":"투사검사의 강점(풍부함)과 약점(낮은 채점자간 일치)은 같은 뿌리, 즉 자극과 채점의 비구조성에서 나온다."},{"n":189,"q":"개인용 지능검사와 비교한 집단용 지능검사의 특징으로 옳은 것은?","opts":["수검 동기와 이해도를 개별적으로 확인하고 통제하기 어렵다.","수검자 개개인의 검사 행동을 풍부하게 관찰할 수 있다.","라포 형성이 더 정밀하게 이루어진다.","한계검증 절차를 자유롭게 적용할 수 있다.","실시 비용과 시간이 더 많이 든다."],"a":0,"ex":"집단검사의 효율은 ‘개인에 대한 정보의 얕음’이라는 대가를 치른다. 선별엔 집단검사, 진단엔 개인검사가 짝이다."},{"n":190,"q":"하나의 검사를 한 번 실시한 자료만으로 문항 간 일관성에 근거해 신뢰도를 추정하는 계수는?","opts":["카파 계수","검사-재검사 상관","동형검사 상관","크론바흐 알파","급내상관"],"a":3,"ex":"두 번 실시(재검사·동형)나 복수 채점자(카파·ICC)가 필요 없는, 가장 널리 보고되는 신뢰도 지표다."},{"n":191,"q":"카텔의 16PF에 대한 설명으로 옳은 것은?","opts":["요인분석으로 추출한 원천특질을 측정하며, 지능(추리력)을 성격 요인의 하나로 포함한다.","투사적 기법으로 성격을 평가한다.","정신병리 진단 전용 도구다.","문항 수가 10개 미만이다.","아동 전용 검사다."],"a":0,"ex":"B요인(추리력)의 존재는 ‘지능도 성격 기술의 한 차원’이라는 카텔의 관점을 보여준다."},{"n":192,"q":"성격 5요인 중 경험에 대한 개방성이 높은 사람에게 가장 기대되는 특징은?","opts":["변화에 대한 강한 저항","엄격한 규칙 준수","높은 불안과 정서 불안정","타인에 대한 무조건적 순응","새로운 생각과 경험에 대한 호기심과 상상력"],"a":4,"ex":"개방성은 지적 호기심, 심미성, 비관습성의 묶음이다. 성실성(규칙·질서)과 혼동하지 않아야 한다."},{"n":193,"q":"성격평가질문지(PAI)의 치료고려 척도에 해당하지 않는 것은?","opts":["공격성(AGG)","자살관념(SUI)","치료거부(RXR)","알코올문제(ALC)","비지지(NON)"],"a":3,"ex":"알코올·약물 문제는 임상척도에 속한다. 치료고려 척도는 치료의 ‘계획과 장애물’에 대한 정보를 모아 둔 구획이다."},{"n":194,"q":"MMPI-2에서 분노와 공격성의 ‘표현 방향’에 대한 해석 가설로 가장 적절한 것은?","opts":["2번(D) 상승은 공격성이 외부로 폭발하는 신호다.","4번(Pd) 상승은 분노의 완전한 부재를 뜻한다.","2번(D) 상승은 공격성이 자기에게로 향하는 경향과, 4번(Pd) 상승은 외부로 표출되는 경향과 관련지어 해석할 수 있다.","0번(Si) 상승은 신체적 폭력의 직접 지표다.","척도 점수는 공격성 해석과 무관하다."],"a":2,"ex":"같은 분노라도 안으로 향하면 우울의 얼굴을, 밖으로 향하면 행동화의 얼굴을 한다는 고전적 해석 틀이다."},{"n":195,"q":"TCI에서 ‘타인을 자신의 일부로 받아들이고 공감하며 협력하는 정도’를 반영하는 성격 차원은?","opts":["자율성","연대감","자기초월","위험회피","사회적 민감성"],"a":1,"ex":"성격 3차원 중 대인 축이 연대감이다. 자율성(자기 축), 자기초월(우주 축)과 함께 성숙의 좌표를 이룬다."},{"n":196,"q":"형사책임 감정 등 법정 장면에서 MMPI-2를 해석할 때 특별히 점검해야 할 지표의 조합으로 가장 적절한 것은?","opts":["L척도와 0번 척도","F척도, F-K 지표, 비전형 관련 척도 등 과대보고(부정왜곡) 탐지 지표","K척도 단독","2번과 7번 척도만","Si척도와 Ma척도"],"a":1,"ex":"법적 이득이 걸린 평가에서는 증상 과장의 동기가 구조적으로 존재한다. 수검 태도 분석이 해석의 관문이 된다."}]},{"name":"성격심리 및 정신병리","questions":[{"n":1,"q":"DSM-5 주요우울삽화의 진단기준에 대한 설명으로 옳지 않은 것은?","opts":["증상이 2주 이상 거의 매일 지속되어야 한다.","증상이 6개월 이상 지속되어야 진단할 수 있다.","9개 증상 중 5개 이상이 나타나야 한다.","사회적·직업적 기능의 손상을 초래해야 한다.","우울 기분 또는 흥미·즐거움의 상실 중 하나 이상이 포함되어야 한다."],"a":1,"ex":"6개월 기준은 범불안장애 등에 해당한다. 주요우울삽화는 2주 기준이다."},{"n":2,"q":"제2형 양극성장애에 대한 설명으로 옳은 것은?","opts":["조증삽화가 1회 이상 있어야 진단된다.","정신병적 증상이 반드시 동반되어야 한다.","경조증삽화와 주요우울삽화가 있고 조증삽화는 없다.","주요우울삽화 없이 경조증삽화만으로 진단된다.","순환성장애와 동일한 진단이다."],"a":2,"ex":"조증삽화가 한 번이라도 있으면 제1형으로 진단된다."},{"n":3,"q":"조현병의 음성증상에 해당하는 것은?","opts":["환각","망상","와해된 언어","긴장성 행동","감퇴된 정서표현"],"a":4,"ex":"음성증상은 정상 기능의 결핍(무의욕, 무언어, 정서적 둔마 등)을, 양성증상은 과잉·왜곡(환각, 망상 등)을 의미한다."},{"n":4,"q":"공황장애에 대한 설명으로 옳지 않은 것은?","opts":["예기치 못한 공황발작이 반복적으로 나타난다.","추가 발작에 대한 지속적인 걱정(예기불안)이 동반된다.","광장공포증이 동반될 수 있다.","공황발작은 반드시 특정 자극 상황에서만 발생한다.","발작은 보통 수 분 이내에 최고조에 이른다."],"a":3,"ex":"공황장애의 핵심은 ‘예기치 못한(unexpected)’ 발작이다. 특정 자극에 국한되면 특정공포증 등을 고려한다."},{"n":5,"q":"강박장애에 대한 설명으로 옳지 않은 것은?","opts":["강박행동은 쾌락을 얻기 위한 목적으로 수행된다.","강박행동은 불안이나 고통을 줄이기 위해 수행된다.","증상은 대체로 자아이질적으로 경험된다.","노출 및 반응방지(ERP)가 효과적인 치료법이다.","강박사고는 침투적이고 원치 않는 것으로 경험된다."],"a":0,"ex":"강박행동은 즐거움이 아니라 불안 감소·중화가 목적이라는 점에서 중독 행동과 구별된다."},{"n":6,"q":"DSM-5의 PTSD 증상 군집에 해당하지 않는 것은?","opts":["침습 증상","관계사고와 기괴한 신념","인지와 기분의 부정적 변화","각성과 반응성의 현저한 변화","외상 관련 자극의 지속적 회피"],"a":1,"ex":"관계사고·기괴한 신념은 조현형 성격장애 등의 특징이다."},{"n":7,"q":"DSM-5 성격장애 분류에서 B군에 해당하지 않는 것은?","opts":["회피성 성격장애","경계선 성격장애","연극성 성격장애","자기애성 성격장애","반사회성 성격장애"],"a":0,"ex":"회피성은 강박성·의존성과 함께 C군(불안·두려움)에 속한다."},{"n":8,"q":"경계선 성격장애의 특징으로 옳지 않은 것은?","opts":["실제적·상상적 유기를 피하기 위한 필사적 노력","이상화와 평가절하를 오가는 불안정한 대인관계","친밀한 관계를 원하지 않는 정서적 무관심과 고립","반복적인 자해 행동이나 자살 위협","현저한 정체감 혼란"],"a":2,"ex":"⑤는 조현성 성격장애의 특징이다. 경계선은 오히려 관계에 강렬하게 매달린다."},{"n":9,"q":"신경성 폭식증과 구별되는 신경성 식욕부진증의 핵심 진단 특징은?","opts":["폭식 삽화의 존재","부적절한 보상행동","체중과 체형이 자기평가에 미치는 과도한 영향","유의하게 낮은 체중","날씬함에 대한 강한 추구"],"a":3,"ex":"두 장애 모두 체중·체형에 대한 과도한 관심을 보이지만, 유의한 저체중은 식욕부진증의 필수 기준이다."},{"n":10,"q":"ADHD의 DSM-5 진단기준에 대한 설명으로 옳지 않은 것은?","opts":["몇몇 증상이 12세 이전에 나타나야 한다.","부주의 또는 과잉행동-충동성 증상이 기준 개수 이상이어야 한다.","증상이 두 가지 이상의 장면(예: 가정과 학교)에서 나타나야 한다.","사회적·학업적 기능의 저하를 초래해야 한다.","증상이 한 가지 상황에서만 나타나도 진단할 수 있다."],"a":4,"ex":"단일 상황에서만 나타나는 문제는 상황 특수적 요인을 시사하므로 두 장면 이상이 요구된다."},{"n":11,"q":"자폐스펙트럼장애의 DSM-5 핵심 진단 영역을 모두 고른 것은?","box":"ㄱ. 사회적 의사소통과 상호작용의 지속적 결함\nㄴ. 제한적이고 반복적인 행동·관심·활동\nㄷ. 지적 능력의 저하\nㄹ. 언어발달의 지연","opts":["ㄱ","ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"지적장애나 언어지연은 필수 기준이 아니며 명시자(specifier)로 기록된다."},{"n":12,"q":"해리성 정체성장애에 대한 설명으로 옳은 것은?","opts":["둘 이상의 구별되는 성격 상태가 존재한다.","중요한 자전적 정보의 회상 불능만 단독으로 나타난다.","자신이나 주변이 비현실적으로 느껴지는 경험이 핵심이다.","의도적으로 증상을 꾸며내는 것이다.","뇌손상 등 기질적 원인에 의한 기억상실이다."],"a":0,"ex":"①은 해리성 기억상실, ③은 이인증/비현실감 장애에 해당한다."},{"n":13,"q":"DSM-5 신체증상장애에 대한 설명으로 옳지 않은 것은?","opts":["고통스러운 신체증상이 존재한다.","증상과 관련된 과도한 생각, 감정, 행동이 핵심 기준이다.","증상이 의학적으로 설명되지 않아야만 진단할 수 있다.","건강에 대한 높은 수준의 불안이 동반될 수 있다.","증상 상태가 대개 6개월 이상 지속된다."],"a":2,"ex":"DSM-5에서는 의학적 설명 가능 여부와 무관하게, 증상에 대한 부적응적 반응(인지·정서·행동)이 진단의 핵심이 되었다."},{"n":14,"q":"프로이트 이론에서 초자아가 형성되는 주된 시기와 기제로 옳은 것은?","opts":["구강기 - 고착","항문기 - 배변훈련","성기기 - 친밀감 형성","잠복기 - 승화","남근기 - 동일시"],"a":4,"ex":"오이디푸스 갈등의 해결 과정에서 동성 부모에 대한 동일시를 통해 초자아가 형성된다."},{"n":15,"q":"에릭슨의 심리사회적 발달단계에서 청소년기의 발달 위기는?","opts":["신뢰감 대 불신감","자율성 대 수치심과 회의","근면성 대 열등감","정체감 대 역할혼미","친밀감 대 고립감"],"a":3,"ex":"친밀감 대 고립감은 성인 초기의 과업이다."},{"n":16,"q":"성격 5요인 모델에서 타인에 대한 신뢰, 이타성, 협조성과 관련되는 요인은?","opts":["외향성","우호성","신경증","성실성","개방성"],"a":1,"ex":"우호성(agreeableness)이 낮으면 냉소적·적대적 경향과 관련된다."},{"n":17,"q":"로저스의 성격이론에 대한 설명으로 옳지 않은 것은?","opts":["가치의 조건화는 심리적 건강을 촉진하는 과정이다.","자기개념과 유기체적 경험의 불일치가 부적응을 낳는다.","무조건적 긍정적 존중은 건강한 자기 발달을 촉진한다.","충분히 기능하는 사람을 건강한 인간상으로 제시한다.","인간에게는 실현경향성이 있다고 가정한다."],"a":0,"ex":"가치의 조건화는 타인의 인정을 받기 위해 자기 경험을 왜곡하게 만들어 불일치의 원인이 된다."},{"n":18,"q":"융(Jung)의 이론에서 모든 인류에게 보편적으로 존재하며 원형의 저장소가 되는 정신 구조는?","opts":["개인무의식","아니마","그림자","집단무의식","페르소나"],"a":3,"ex":"그림자·아니마/아니무스 등은 집단무의식 안의 원형들이다."},{"n":19,"q":"물질사용장애에서 ‘내성(tolerance)’에 대한 설명으로 옳은 것은?","opts":["사용을 중단했을 때 불쾌한 신체 증상이 나타나는 것","물질에 대한 강한 갈망을 느끼는 것","동일한 효과를 얻기 위해 점점 더 많은 양이 필요해지는 것","사용량을 조절하려는 시도가 반복적으로 실패하는 것","신체적으로 위험한 상황에서도 물질을 사용하는 것"],"a":2,"ex":"①은 금단(withdrawal)에 대한 설명이다."},{"n":20,"q":"적대적 반항장애와 구별되는 품행장애의 특징으로 가장 적절한 것은?","opts":["분노와 과민한 기분","권위자와의 논쟁적 행동","보복적인 태도","어른의 요구에 따르지 않는 거부적 태도","타인의 기본 권리를 침해하는 공격적·반사회적 행동"],"a":4,"ex":"품행장애는 사람·동물에 대한 공격, 재산 파괴, 사기·절도 등 권리 침해와 규범 위반이 핵심이다."},{"n":21,"q":"기분삽화와 독립적으로 망상이나 환각이 2주 이상 존재해야 진단되며, 질병 기간의 대부분 동안 기분삽화가 동반되는 장애는?","opts":["조현병","단기 정신병적 장애","조현양상장애","망상장애","조현정동장애"],"a":4,"ex":"‘기분삽화 없이 2주 이상의 정신병 증상’ 기준이 조현정동장애와 정신병적 양상 동반 기분장애를 가르는 핵심이다."},{"n":22,"q":"조현양상장애의 지속 기간 기준으로 옳은 것은?","opts":["1일 이상 1개월 미만","1개월 이상 6개월 미만","6개월 이상","2주 이상","1년 이상"],"a":1,"ex":"1개월 미만은 단기 정신병적 장애, 6개월 이상은 조현병이다. 기간 삼총사로 묶어 암기하면 좋다."},{"n":23,"q":"망상장애에 대한 설명으로 옳지 않은 것은?","opts":["1개월 이상 지속되는 망상이 핵심 증상이다.","망상 주제와 관련되지 않은 영역의 기능은 비교적 유지된다.","색정형, 과대형, 질투형, 피해형 등의 하위유형이 있다.","전반적이고 심각한 기능의 황폐화가 특징적이다.","조현병 진단기준 A를 충족한 적이 없어야 한다."],"a":3,"ex":"기능 황폐화는 조현병의 특징이다. 망상장애는 망상 영역 밖에서는 기괴해 보이지 않을 수 있다."},{"n":24,"q":"지속성 우울장애(기분저하증)에 대한 설명으로 옳지 않은 것은?","opts":["성인의 경우 2년 이상 우울 기분이 지속되어야 한다.","아동·청소년은 1년 기준이며 과민한 기분으로 나타날 수 있다.","증상이 심각하면 기간과 무관하게 진단할 수 있다.","증상이 없는 기간이 연속 2개월을 초과하면 안 된다.","요구되는 동반 증상의 가짓수가 주요우울삽화보다 적다."],"a":2,"ex":"지속성 우울장애의 정체성은 심각도가 아니라 ‘만성성(기간)’에 있다."},{"n":25,"q":"파괴적 기분조절부전장애(DMDD)에 대한 설명으로 옳지 않은 것은?","opts":["분노폭발 사이의 기분은 대체로 정상적으로 유지된다.","분노폭발이 평균 주 3회 이상 나타난다.","6세 이전이나 18세 이후에는 처음 진단할 수 없다.","아동 양극성장애의 과잉진단 문제로 DSM-5에 신설되었다.","만성적인 과민성과 심한 분노폭발이 핵심이다."],"a":0,"ex":"폭발 사이에도 거의 매일, 하루 대부분 과민하거나 화난 기분이 지속된다는 점이 핵심 기준이다."},{"n":26,"q":"대중교통 이용, 개방된 공간, 줄 서기 등 즉시 벗어나기 어렵거나 도움받기 어려운 상황에 대한 현저한 공포를 보이는 장애는?","opts":["사회불안장애","분리불안장애","특정공포증","공황장애","광장공포증"],"a":4,"ex":"사회불안은 ‘부정적 평가’에 대한 두려움, 광장공포는 ‘탈출 곤란·도움 부재’에 대한 두려움으로 핵심 인지가 다르다."},{"n":27,"q":"DSM-5 분리불안장애에 대한 설명으로 옳지 않은 것은?","opts":["아동·청소년의 기간 기준은 4주 이상이다.","성인의 기간 기준은 6개월 이상이다.","애착대상과의 분리나 상실에 대한 과도한 공포가 핵심이다.","발달 단계상 아동기에만 진단이 가능하다.","DSM-5부터 성인에게도 진단할 수 있게 되었다."],"a":3,"ex":"DSM-5에서 신경증적 장애의 발병 연령 제한(18세 이전)이 삭제되어 성인 진단이 가능해졌다."},{"n":28,"q":"타인이 보기에 사소하거나 관찰되지 않는 외모의 결함에 집착하며, 거울 확인·과도한 치장 등의 반복행동을 보이는 장애는?","opts":["질병불안장애","신체증상장애","신체이형장애","전환장애","저장장애"],"a":2,"ex":"신체이형장애는 DSM-5에서 강박 및 관련 장애 범주로 이동했다. 걱정의 초점이 ‘질병’이 아니라 ‘외모’이다."},{"n":29,"q":"전환장애(기능성 신경학적 증상장애)에 대한 설명으로 옳은 것은?","opts":["증상이 알려진 신경학적 질환의 양상과 양립하지 않는 임상 소견을 보인다.","수의적 운동·감각 증상을 의도적으로 꾸며내는 것이다.","심리적 스트레스 요인의 확인이 진단의 필수 조건이다.","‘아름다운 무관심’이 공식 진단기준에 포함된다.","18세 이전에만 발병한다."],"a":0,"ex":"DSM-5에서 심리적 요인 확인과 의도성 배제 요건이 삭제되고, 신경학적 비양립성이라는 양성 소견이 핵심이 되었다."},{"n":30,"q":"이인증/비현실감 장애에 대한 설명으로 옳지 않은 것은?","opts":["이인증은 자신의 사고·감정·신체로부터 분리된 듯한 경험이다.","현실검증력의 상실이 핵심 진단기준이다.","경험 중에도 현실검증력은 손상되지 않는다.","해리장애 범주로 분류된다.","비현실감은 주변 환경이 낯설고 비현실적으로 느껴지는 경험이다."],"a":1,"ex":"‘꿈속 같지만 꿈이 아닌 걸 안다’는 점이 정신병적 상태와의 결정적 차이다."},{"n":31,"q":"관계사고, 마술적 사고, 기이한 지각 경험과 친밀한 관계에 대한 불편감을 특징으로 하는 성격장애는?","opts":["조현성 성격장애","회피성 성격장애","편집성 성격장애","조현형 성격장애","경계선 성격장애"],"a":3,"ex":"조현성(schizoid)은 관계 무관심과 정서 제한이 핵심이고, 조현형(schizotypal)은 인지·지각의 왜곡이 더해진다."},{"n":32,"q":"친밀한 관계를 원하면서도 거절과 비난에 대한 두려움 때문에 대인 접촉을 회피하는 성격장애는?","opts":["조현성 성격장애","의존성 성격장애","회피성 성격장애","강박성 성격장애","편집성 성격장애"],"a":2,"ex":"조현성과의 감별 포인트는 ‘관계에 대한 욕구의 유무’이다. 회피성은 원하지만 두려워서 피한다."},{"n":33,"q":"공감 능력의 결여를 보일 수 있다는 점은 유사하지만, 타인의 감탄과 인정에 대한 과도한 욕구가 두드러진다는 점에서 반사회성과 구별되는 성격장애는?","opts":["자기애성 성격장애","반사회성 성격장애","연극성 성격장애","경계선 성격장애","편집성 성격장애"],"a":0,"ex":"반사회성은 착취가 물질적 이득과 규범 위반으로, 자기애성은 우월감 확인과 특권의식으로 나타나는 경향이 있다."},{"n":34,"q":"DSM-5 지적장애에 대한 설명으로 옳지 않은 것은?","opts":["개념적·사회적·실행적 영역의 적응기능 결함이 있어야 한다.","심각도는 IQ 점수만으로 결정된다.","발달 시기에 발병해야 한다.","표준화된 지능검사와 임상적 평가가 모두 필요하다.","심각도 수준은 필요한 지원의 정도와 관련된다."],"a":1,"ex":"DSM-5의 큰 변화 중 하나로, 심각도 분류 기준이 IQ에서 적응기능으로 이동했다."},{"n":35,"q":"투렛장애의 진단기준에 대한 설명으로 옳지 않은 것은?","opts":["여러 가지 운동틱과 한 가지 이상의 음성틱이 나타난다.","틱이 1년 이상 지속되어야 한다.","18세 이전에 발병해야 한다.","틱은 악화와 완화를 반복할 수 있다.","운동틱과 음성틱이 반드시 동시에 나타나야 한다."],"a":4,"ex":"두 종류의 틱이 질병 경과 중 모두 존재하면 되고, 동시에 나타날 필요는 없다."},{"n":36,"q":"조증삽화와 경조증삽화의 감별에 대한 설명으로 옳지 않은 것은?","opts":["조증삽화는 최소 1주, 경조증삽화는 최소 4일의 기간 기준을 갖는다.","조증삽화는 현저한 기능 손상을 초래하거나 입원이 필요할 수 있다.","경조증삽화에는 정신병적 양상이 없다.","정신병적 양상이 있으면 기간과 무관하게 조증삽화로 본다.","경조증삽화도 반드시 입원이 필요하다."],"a":4,"ex":"입원이 필요할 정도면 정의상 더 이상 경조증이 아니라 조증삽화이다."},{"n":37,"q":"베일런트(Vaillant)의 분류에서 성숙한 방어기제에 해당하는 것을 모두 고른 것은?","box":"ㄱ. 승화\nㄴ. 이타주의\nㄷ. 유머\nㄹ. 투사\nㅁ. 억제(suppression)","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㅁ","ㄴ, ㄷ, ㄹ, ㅁ"],"a":3,"ex":"투사는 미성숙한 방어이다. 억제는 의식적으로 잠시 미뤄두는 것으로, 무의식적인 억압(repression)과 구별되는 성숙한 방어이다."},{"n":38,"q":"인간을 과학자에 비유하며, 개인이 자신의 구성개념을 통해 사건을 예측하고 해석한다고 본 이론가는?","opts":["켈리(Kelly)","로터(Rotter)","미셸(Mischel)","올포트(Allport)","매슬로(Maslow)"],"a":0,"ex":"개인구성개념 이론은 Rep 검사(역할구성개념 목록검사)라는 고유한 평가법을 가지고 있다."},{"n":39,"q":"로터(Rotter)의 사회학습이론에 대한 설명으로 옳지 않은 것은?","opts":["행동잠재력은 기대와 강화가치의 함수로 본다.","통제소재(locus of control) 개념을 제시하였다.","내적 통제자는 결과를 주로 운이나 외부 요인의 탓으로 돌린다.","기대는 과거의 학습 경험을 통해 형성된다.","심리적 욕구 개념을 포함한다."],"a":2,"ex":"내적 통제자는 결과를 자신의 능력과 노력으로 귀인한다. 외적 통제자가 운·타인·상황으로 귀인한다."},{"n":40,"q":"DSM-5에 대한 설명으로 옳지 않은 것은?","opts":["다축진단체계를 폐지하였다.","5개의 축으로 평가하도록 규정하고 있다.","장애 범주를 발달적 순서를 고려하여 배열하였다.","ICD 체계와의 조화를 고려하였다.","일부 장애에 차원적 평가 요소를 도입하였다."],"a":1,"ex":"5축 체계는 DSM-IV까지의 방식이다. DSM-5는 이를 폐지하고 비축적(nonaxial) 기록으로 전환했다."},{"n":41,"q":"다른 공포증과 달리 혈압과 심박이 떨어지는 이상성(diphasic) 반응으로 실신까지 이를 수 있는 특정공포증의 하위유형은?","opts":["동물형","혈액-주사-손상형","자연환경형","상황형","기타형"],"a":1,"ex":"다른 공포는 교감신경 항진(빈맥) 일변도지만, 이 유형은 혈관미주신경성 실신이 동반될 수 있어 응용 긴장법이 활용된다."},{"n":42,"q":"범불안장애(GAD)의 진단기준에 대한 설명으로 옳지 않은 것은?","opts":["걱정의 주제가 한 가지 특정 영역에 국한된다.","걱정을 스스로 통제하기 어렵다고 느낀다.","과도한 불안과 걱정이 6개월 이상 지속된다.","근긴장, 수면 곤란 등의 신체 증상이 동반된다.","기능의 손상이나 현저한 고통을 초래한다."],"a":0,"ex":"GAD의 걱정은 여러 사건·활동에 걸쳐 떠다니는(free-floating) 것이 특징이다. 한 주제에 국한되면 다른 장애를 먼저 고려한다."},{"n":43,"q":"선택적 함구증에 대한 설명으로 옳지 않은 것은?","opts":["사회불안장애와의 공병이 흔하다.","말할 능력이 있음에도 특정 사회적 상황에서 일관되게 말하지 않는다.","최소 1개월 이상 지속되어야 한다(입학 후 첫 1개월은 제외).","DSM-5에서 불안장애 범주로 분류된다.","언어발달의 지연이 원인일 때만 진단할 수 있다."],"a":4,"ex":"언어 능력 부족으로 설명되면 오히려 진단이 배제된다. 핵심은 ‘능력이 아니라 불안’의 문제라는 점이다."},{"n":44,"q":"외상 사건 노출 후 증상이 3일에서 1개월 사이의 기간 동안 나타날 때 고려되는 진단은?","opts":["외상후 스트레스장애","반응성 애착장애","적응장애","급성 스트레스장애","지속성 우울장애"],"a":3,"ex":"같은 증상이 1개월을 넘기면 PTSD로 진단이 전환된다. 기간이 두 진단을 가르는 축이다."},{"n":45,"q":"적응장애에 대한 설명으로 옳지 않은 것은?","opts":["확인 가능한 스트레스 요인에 대한 반응으로 발생한다.","스트레스 요인 발생 후 3개월 이내에 증상이 시작된다.","DSM의 외상 기준 A를 충족하는 사건이 필수적이다.","요인이 종결되면 증상이 6개월 이상 지속되지 않는다.","우울 기분 동반형, 불안 동반형 등의 명시자가 있다."],"a":2,"ex":"적응장애의 스트레스 요인은 이직, 이별 같은 일상적 사건도 가능하다. 기준 A 사건이 필수인 것은 PTSD·급성 스트레스장애이다."},{"n":46,"q":"낯선 성인에게 주저 없이 다가가 지나친 친밀감을 보이며 따라나서는 행동을 특징으로 하는, 불충분한 양육과 관련된 장애는?","opts":["반응성 애착장애","탈억제성 사회적 유대감 장애","분리불안장애","자폐스펙트럼장애","사회불안장애"],"a":1,"ex":"같은 병인(돌봄 결핍)에서 반응성 애착장애는 위축·억제형으로, 탈억제성 유대감 장애는 무분별한 접근형으로 나타난다."},{"n":47,"q":"신경성 폭식증의 진단기준에 대한 설명으로 옳지 않은 것은?","opts":["반복적인 폭식 삽화가 나타난다.","폭식 동안 통제 상실감을 경험한다.","자기평가가 체형과 체중에 과도하게 영향을 받는다.","폭식과 보상행동이 평균 주 1회 이상, 3개월간 나타난다.","유의하게 낮은 체중이 필수 기준이다."],"a":4,"ex":"신경성 폭식증 환자는 대개 정상 체중 범위에 있다. 저체중이면 신경성 식욕부진증 폭식/제거형을 먼저 고려한다."},{"n":48,"q":"신경성 폭식증과 구별되는 폭식장애(binge eating disorder)의 핵심 특징은?","opts":["부적절한 보상행동의 부재","폭식 중 통제 상실감","폭식 삽화의 존재","비만의 동반","체형에 대한 불만족"],"a":0,"ex":"폭식 후 구토·하제·과도한 운동 같은 보상행동이 없다는 점이 감별의 축이다."},{"n":49,"q":"DSM-5에서 ‘물질 관련 및 중독 장애’ 범주에 공식 진단으로 포함된 비물질 관련 장애는?","opts":["성중독","인터넷게임장애","쇼핑중독","도박장애","운동중독"],"a":3,"ex":"인터넷게임장애는 ‘추가 연구가 필요한 진단적 상태’에 수록되어 있을 뿐 공식 진단이 아니다."},{"n":50,"q":"알코올 금단에 대한 설명으로 옳지 않은 것은?","opts":["사용 중단 후 수 시간에서 수일 내에 나타난다.","자율신경계 항진과 손떨림이 나타날 수 있다.","장기간 다량 사용 후 중단하더라도 금단 증상은 발생하지 않는다.","일시적인 환각이 나타날 수 있다.","심한 경우 경련이나 섬망으로 진행될 수 있다."],"a":2,"ex":"금단은 장기·다량 사용 후 중단 시에 발생하며, 진전섬망은 치명적일 수 있어 의학적 관리가 필요하다."},{"n":51,"q":"충분한 근거 없이 타인의 동기를 악의적인 것으로 해석하는 광범위한 불신과 의심을 특징으로 하는 성격장애는?","opts":["조현성 성격장애","편집성 성격장애","조현형 성격장애","반사회성 성격장애","강박성 성격장애"],"a":1,"ex":"A군의 편집성은 ‘불신’, 조현성은 ‘무관심’, 조현형은 ‘기이함’으로 핵심을 구분하면 된다."},{"n":52,"q":"강박성 성격장애가 강박장애(OCD)와 구별되는 특징으로 가장 적절한 것은?","opts":["완벽주의와 통제에 대한 전반적이고 자아동질적인 성격 패턴이다.","증상이 자아이질적으로 경험된다.","침투적인 강박사고가 핵심 증상이다.","의례적인 강박행동이 반드시 동반된다.","노출 및 반응방지가 일차적 치료법이다."],"a":0,"ex":"OCD는 원치 않는 침투 사고와 싸우지만, 강박성 성격은 자신의 완벽주의를 옳다고 여기는 삶의 방식이다."},{"n":53,"q":"돌봄을 받으려는 과도한 욕구로 복종적으로 매달리며, 하나의 관계가 끝나면 돌봄의 원천이 될 다른 관계를 급히 찾는 성격장애는?","opts":["연극성 성격장애","경계선 성격장애","의존성 성격장애","회피성 성격장애","자기애성 성격장애"],"a":2,"ex":"경계선의 유기 불안은 분노·자해 등 극적 반응으로, 의존성은 복종과 책임 위임으로 나타나는 경향이 있다."},{"n":54,"q":"연극성 성격장애에 대한 설명으로 옳지 않은 것은?","opts":["대인관계를 실제보다 더 친밀한 것으로 생각한다.","주의의 중심에 있지 못하면 불편해한다.","감정 표현이 빠르게 변하며 피상적이다.","신체적 외모를 이용해 주의를 끌고자 한다.","반복적인 자살 시도와 만성적 공허감이 진단기준에 포함된다."],"a":4,"ex":"자살 행동과 만성적 공허감은 경계선 성격장애의 진단기준이다. 두 장애는 B군 내에서 자주 감별 대상이 된다."},{"n":55,"q":"발달정신병리학에서 서로 다른 발달 경로와 원인이 동일한 장애나 결과로 이어질 수 있음을 지칭하는 개념은?","opts":["민감기","다중결과성(multifinality)","발달적 연속성","등결과성(equifinality)","적소 찾기"],"a":3,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 다중결과성은 반대로 동일한 위험요인(예: 학대)이 서로 다른 결과(우울, 품행문제, 적응)로 갈라지는 것을 말한다."},{"n":56,"q":"취약성-스트레스 모델에 대한 설명으로 가장 적절한 것은?","opts":["유전적 소인만으로 발병이 결정된다.","환경적 스트레스만으로 발병이 결정된다.","개인의 취약성과 환경적 스트레스의 상호작용으로 발병을 설명한다.","취약성이 높으면 스트레스 수준과 무관하게 반드시 발병한다.","조현병에는 적용되지 않는 모델이다."],"a":2,"ex":"취약성이 높을수록 더 낮은 수준의 스트레스에서도 발병 역치를 넘을 수 있다는 상호작용적 설명이다."},{"n":57,"q":"올포트(Allport)의 특질 위계에서 소수의 사람에게서 삶 전반을 지배할 만큼 강력하게 나타나는 특질은?","opts":["공통특질","중심특질(central trait)","이차특질(secondary trait)","주특질(cardinal trait)","표면특질"],"a":3,"ex":"중심특질은 한 사람을 기술하는 5~10개의 대표 특질, 이차특질은 특정 상황에서만 드러나는 특질이다."},{"n":58,"q":"아이젱크(Eysenck)가 제시한 성격의 기본 차원을 모두 고른 것은?","box":"ㄱ. 외향성-내향성\nㄴ. 신경증 성향(정서적 안정성)\nㄷ. 정신병적 경향성\nㄹ. 경험에 대한 개방성","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ"],"a":3,"ex":"개방성은 5요인 모델의 차원이다. 아이젱크의 PEN 모델과 Big Five를 섞어 내는 함정이 흔하다."},{"n":59,"q":"매슬로의 욕구위계에서 결핍욕구에 해당하지 않는 것은?","opts":["생리적 욕구","안전의 욕구","소속과 사랑의 욕구","존중의 욕구","자아실현의 욕구"],"a":4,"ex":"결핍욕구는 충족되면 동기가 줄지만, 성장욕구인 자아실현은 충족될수록 오히려 더 강해진다."},{"n":60,"q":"자살 위험성 평가에서 위험요인으로 보기 어려운 것은?","opts":["견고한 사회적 지지체계","구체적인 계획과 치명적 수단에의 접근 가능성","최근의 중대한 상실 경험","과거의 자살 시도력","미래에 대한 절망감"],"a":0,"ex":"사회적 지지는 대표적인 보호요인이다. 평가 시에는 위험요인과 보호요인을 함께 사정해 균형 있게 판단한다."},{"n":61,"q":"2개월 전 실직한 40대 남성이 거의 매일 우울한 기분, 흥미 상실, 불면, 식욕 저하, 무가치감, 죽음에 대한 반복적 생각을 보인다. 가장 적절한 진단적 고려는?","opts":["적응장애 우울 동반형","주요우울장애","파괴적 기분조절부전장애","지속성 우울장애","순환성장애"],"a":1,"ex":"확인 가능한 스트레스 요인이 있어도 주요우울삽화의 기준을 모두 충족하면 적응장애가 아닌 주요우울장애로 진단한다."},{"n":62,"q":"30대 여성이 5일간 들뜬 기분과 수면 욕구 감소, 말이 많아짐을 보였으나 직장 생활은 유지되었고 정신병적 증상이나 입원 필요성은 없었다. 해당하는 삽화는?","opts":["조증삽화","경조증삽화","혼재성 양상","순환성장애","주요우울삽화"],"a":1,"ex":"기간(4일 이상), 기능 유지, 정신병적 증상 부재가 경조증의 요건이다. 셋 중 하나라도 넘으면 조증삽화가 된다."},{"n":63,"q":"교통사고 2주 후부터 사고 장면의 침습적 회상, 운전 회피, 과각성, 멍한 비현실감을 보이고 있다. 현 시점에서 가장 적절한 진단은?","opts":["외상후 스트레스장애","적응장애","급성 스트레스장애","공황장애","범불안장애"],"a":2,"ex":"기준 A 사건 후 3일~1개월 사이이므로 급성 스트레스장애이다. 1개월이 지나도 지속되면 PTSD로 재평가한다."},{"n":64,"q":"출근길 지하철에서 갑작스러운 심계항진과 질식감, 죽을 것 같은 공포가 10분간 지속되었고, 이후 한 달 넘게 발작 재발을 걱정하며 지하철을 피하고 있다. 가장 적절한 진단은?","opts":["공황장애","사회불안장애","특정공포증","범불안장애","질병불안장애"],"a":0,"ex":"예기치 못한 공황발작과 1개월 이상의 예기불안·행동 변화가 핵심 기준이다. 회피가 광장공포증 동반 여부의 단서가 된다."},{"n":65,"q":"대학생이 발표 때마다 떨림과 홍조를 보이며, 남들이 자신을 부정적으로 평가할 것이 두려워 발표 수업을 모두 회피해 학점 손해를 보고 있다. 가장 적절한 진단은?","opts":["특정공포증","광장공포증","공황장애","조현성 성격장애","사회불안장애"],"a":4,"ex":"두려움의 핵심이 ‘타인의 부정적 평가’라는 점이 사회불안장애의 정의적 특징이다."},{"n":66,"q":"오염에 대한 생각이 떠오르면 심한 불안을 느껴 하루 3시간 이상 손을 씻는다. 본인도 지나치다는 것을 알지만 멈출 수 없다. 가장 적절한 진단은?","opts":["범불안장애","질병불안장애","강박장애","신체이형장애","저장장애"],"a":2,"ex":"침습적 강박사고-불안-중화 행동의 고리와 자아이질성이 전형적이다. 병식이 있다는 점도 진단과 양립한다."},{"n":67,"q":"BMI 14의 현저한 저체중인 10대 여성이 체중 증가를 극도로 두려워하고 자신이 뚱뚱하다고 지각하며 음식 섭취를 심하게 제한한다. 가장 적절한 진단은?","opts":["신경성 폭식증","폭식장애","회피적·제한적 음식섭취장애","신체이형장애","신경성 식욕부진증"],"a":4,"ex":"저체중+체중증가 공포+신체상 왜곡의 3요소가 핵심이다. 회피적·제한적 음식섭취장애는 체중·체형 염려가 없다는 점에서 다르다."},{"n":68,"q":"8세 아동이 6개월 이상 가정과 학교 모두에서 과제 회피, 물건 분실, 착석 곤란, 차례를 기다리지 못하고 끼어드는 행동을 보인다. 가장 적절한 진단적 고려는?","opts":["적대적 반항장애","특정학습장애","품행장애","주의력결핍 과잉행동장애","틱장애"],"a":3,"ex":"부주의와 과잉행동-충동성 증상이 두 장면 이상에서 6개월 이상 지속되는 전형적 양상이다."},{"n":69,"q":"13세 청소년이 1년 이상 동물 학대, 또래 폭행, 상점 절도, 무단결석을 반복하고 있다. 가장 적절한 진단은?","opts":["주의력결핍 과잉행동장애","품행장애","간헐적 폭발장애","적대적 반항장애","반사회성 성격장애"],"a":1,"ex":"타인의 권리 침해와 규범 위반이 핵심이다. 반사회성 성격장애는 18세 이상에서, 15세 이전 품행장애력을 요건으로 진단한다."},{"n":70,"q":"20대 남성이 7개월간 자신을 비난하는 목소리의 환청과 피해망상을 보이며 학업과 대인관계 기능이 크게 저하되었다. 가장 적절한 진단은?","opts":["조현병","단기 정신병적 장애","조현양상장애","망상장애","조현정동장애"],"a":0,"ex":"활성기 증상을 포함한 장해가 6개월을 초과하였으므로 조현병 기준을 충족한다."},{"n":71,"q":"30대 직장인이 비판이 두려워 승진 면접과 새로운 모임을 모두 회피하고 스스로를 부족한 사람이라 확신하지만, 소수의 친한 친구와는 친밀하게 지낸다. 가장 적절한 진단적 고려는?","opts":["조현성 성격장애","조현형 성격장애","의존성 성격장애","회피성 성격장애","강박성 성격장애"],"a":3,"ex":"관계를 원하지만 거절이 두려워 피하는 양상이다. ‘수용이 확실하면 관계 가능’이 조현성과의 차이를 보여준다."},{"n":72,"q":"규칙과 목록, 순서에 집착하느라 업무 기한을 놓치고, 자기 방식대로 하지 않으면 불안해 일을 위임하지 못하며 여가 없이 일만 한다. 침투적 강박사고는 없다. 가장 적절한 진단적 고려는?","opts":["강박장애","강박성 성격장애","A군 성격장애","자기애성 성격장애","회피성 성격장애"],"a":1,"ex":"침투적 사고와 의례 없이 완벽주의·통제가 전반적 성격 양식으로 나타나며 자아동질적이라는 점이 핵심이다."},{"n":73,"q":"직장 상사에게 질책을 받은 사람이 집에 돌아와 어린 자녀에게 사소한 일로 크게 화를 냈다. 해당하는 방어기제는?","opts":["투사","반동형성","퇴행","동일시","전치"],"a":4,"ex":"감정의 대상이 위협적인 원천에서 더 안전한 대상으로 옮겨진다. 감정의 ‘방향’이 아니라 ‘대상’이 바뀌는 것이다."},{"n":74,"q":"동생이 태어난 후 5세 아동이 끊었던 손가락 빨기와 야뇨를 다시 보이기 시작했다. 해당하는 방어기제는?","opts":["고착","부인","퇴행","해리","신체화"],"a":2,"ex":"스트레스 상황에서 이전 발달단계의 행동으로 되돌아가는 것이다. 고착은 특정 단계에 ‘머무는’ 것이라는 점에서 다르다."},{"n":75,"q":"통제 불가능한 혐오 자극을 반복 경험한 유기체가 이후 회피 가능한 상황에서도 시도조차 하지 않게 되는 현상으로, 우울증 모델로 제안된 개념은?","opts":["학습된 무기력","관찰학습","준비성 이론","고전적 조건형성","잠재학습"],"a":0,"ex":"셀리그만의 개기 실험에서 출발했으며, 이후 귀인 양식을 결합한 무망감 이론으로 발전했다."},{"n":76,"q":"우울 취약성과 관련하여 부정적 사건에 대해 우울한 사람이 보이는 전형적인 귀인 양식은?","opts":["외부적-불안정적-특수적","내부적-불안정적-특수적","외부적-불안정적-전반적","외부적-안정적-전반적","내부적-안정적-전반적"],"a":4,"ex":"‘내 탓이고(내부), 늘 그럴 것이며(안정), 모든 일이 그렇다(전반)’는 양식이 무망감과 우울을 키운다."},{"n":77,"q":"조현병의 양성증상과 가장 관련이 깊은 것으로 제안된 신경전달물질 가설은?","opts":["세로토닌 과활성","도파민 과활성","GABA 결핍","아세틸콜린 과잉","엔도르핀 결핍"],"a":1,"ex":"중뇌변연계 도파민 경로의 과활성이 양성증상과 관련된다는 가설로, 항정신병 약물의 작용기전이 간접 증거가 되었다."},{"n":78,"q":"행동의 통시적 일관성에 의문을 제기하며 상황 특수성을 강조하여 특질 이론을 비판하고 ‘개인-상황 논쟁’을 촉발한 학자는?","opts":["미셸","카텔","아이젱크","올포트","융"],"a":0,"ex":"이후 논쟁은 개인×상황 상호작용론으로 수렴되었고, 미셸 자신도 인지-정동 성격체계(CAPS)를 제안했다."},{"n":79,"q":"반두라가 제시한 자기효능감의 원천에 해당하지 않는 것은?","opts":["성공(숙달) 경험","대리 경험","무조건적 긍정적 존중","언어적 설득","생리적·정서적 상태"],"a":2,"ex":"무조건적 긍정적 존중은 로저스의 개념이다. 네 원천 중 효능감에 가장 강력한 것은 직접적인 숙달 경험이다."},{"n":80,"q":"정신장애에 대한 낙인을 줄이는 표현으로 가장 적절한 것은?","opts":["“정신분열자”","“조현병자”","“비정상인”","“조현병을 가진(앓고 있는) 사람”","“문제 인간”"],"a":3,"ex":"사람 우선 언어(person-first language)는 진단이 그 사람의 전부가 아님을 표현 수준에서 구현한다."},{"n":81,"q":"DSM-5의 문화 관련 내용에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 문화적 개념화 면접(CFI)이 포함되어 있다.\nㄴ. 고통의 문화적 개념(문화적 증후군, 고통의 관용구 등)을 기술하고 있다.\nㄷ. 문화는 증상의 표현과 해석에 영향을 주지 않는다고 본다.\nㄹ. 화병은 문화 관련 고통 개념의 예로 논의되어 왔다.","opts":["ㄱ, ㄴ","ㄱ, ㄹ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"같은 우울도 문화에 따라 신체 증상이나 화의 언어로 표현될 수 있다는 인식이 DSM-5의 문화적 전환이다."},{"n":82,"q":"조이너(Joiner)의 자살에 대한 대인관계이론에서 제시하는 핵심 구성개념을 모두 고른 것은?","box":"ㄱ. 좌절된 소속감\nㄴ. 짐이 된다는 지각\nㄷ. 습득된 자살 잠재력\nㄹ. 높은 자기효능감","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":3,"ex":"욕구(소속 좌절+짐스러움)와 능력(습득된 잠재력)이 함께 있을 때 위험이 커진다는 모델로, 평가와 개입 지점을 구분해 준다."},{"n":83,"q":"같은 사람을 어떤 날은 ‘전적으로 좋은 사람’으로, 다른 날은 ‘전적으로 나쁜 사람’으로 지각하며 중간 지대를 견디지 못한다. 해당하는 원초적 방어기제는?","opts":["투사적 동일시","신체화","부인","전능 통제","분리(splitting)"],"a":4,"ex":"좋음과 나쁨의 통합 실패로, 경계선 수준 성격 조직의 핵심 방어로 논의된다."},{"n":84,"q":"내담자가 자신의 견딜 수 없는 감정을 무의식적으로 상담자 안에 불러일으켜, 상담자가 실제로 그 감정(예: 무력감, 분노)을 체험하게 되는 현상은?","opts":["투사적 동일시","단순한 역전이","전이","의식적 동일시","전치"],"a":0,"ex":"투사를 받은 대상이 실제로 그 감정을 ‘느끼고 행동하게 되는’ 대인관계적 압력까지 포함한다는 점에서 단순 투사와 다르다."},{"n":85,"q":"조현병의 경과와 예후에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 전구기에는 기능 저하와 역치 이하의 증상이 나타날 수 있다.\nㄴ. 남성이 여성보다 발병 연령이 이른 경향이 있다.\nㄷ. 음성증상은 양성증상보다 항정신병 약물에 대한 반응이 좋다.\nㄹ. 병전 기능 수준은 예후와 관련된다.","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"음성증상은 약물 반응이 상대적으로 낮아 심리사회적 재활의 주요 표적이 된다."},{"n":86,"q":"주요우울장애에서 기분 반응성이 유지되고, 과수면·과식·거절 민감성이 두드러지는 명시자는?","opts":["멜랑콜리아 양상","정신병적 양상","긴장성 양상","계절성 동반","비전형적 양상"],"a":4,"ex":"멜랑콜리아(무쾌감, 새벽 악화, 식욕 저하)와 거울상처럼 대비된다. ‘비전형’이지만 실제로는 드물지 않다."},{"n":87,"q":"DSM-5에서 기분삽화의 ‘주산기 발병’ 명시자가 적용되는 시기는?","opts":["출산 후 1년 이내","임신 중 또는 출산 후 4주 이내","출산 후 6개월 이내","임신 전 1년","수유 종료 시까지"],"a":1,"ex":"임상적으로는 산후 1년까지 관심을 두지만, DSM-5의 공식 명시자 기준은 ‘임신 중~산후 4주’이다."},{"n":88,"q":"불안장애에서 안전행동(safety behavior)이 증상을 유지시키는 기제로 가장 적절한 것은?","opts":["공포 반응을 영구적으로 소거하기 때문이다.","노출치료에서 적극 권장되기 때문이다.","불안을 즉시 증가시키기만 하기 때문이다.","위협이 일어나지 않은 것을 안전행동 덕분으로 귀인하게 만들어 공포 신념이 반증될 기회를 차단하기 때문이다.","신체 증상과 무관하게 작동하기 때문이다."],"a":3,"ex":"‘기둥을 잡아서 쓰러지지 않았다’고 믿는 한, ‘잡지 않아도 쓰러지지 않는다’는 학습은 일어나지 않는다."},{"n":89,"q":"DSM-5의 PTSD에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 이인증·비현실감을 동반하는 해리 하위유형이 있다.\nㄴ. 6세 이하 아동을 위한 별도의 진단기준이 마련되어 있다.\nㄷ. 직무 수행 중 외상의 혐오스러운 세부에 반복 노출되는 것(예: 초동대응자)도 기준 A에 포함된다.\nㄹ. 업무와 무관하게 TV로 재난 장면을 시청한 것도 일반적으로 기준 A에 포함된다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"전자매체를 통한 노출은 업무 관련인 경우에만 인정된다. 기준 A의 경계가 자주 출제되는 지점이다."},{"n":90,"q":"DSM-5 III편의 성격장애 대안 모델에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 성격 기능 수준(자기·대인관계)과 병리적 성격 특질로 평가한다.\nㄴ. 범주 모델의 높은 공병률과 경계 문제에 대한 대응으로 제안되었다.\nㄷ. DSM-5 본문(II편)의 공식 범주 진단체계를 대체하였다.\nㄹ. 특질 영역에는 부정적 정서성, 탈억제 등이 포함된다.","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"대안 모델은 ‘추가 연구용’으로 III편에 수록되었고, 공식 진단은 여전히 범주 모델이다. 이 위상이 핵심 함정이다."},{"n":91,"q":"DSM-5 불면장애의 빈도와 기간 기준으로 옳은 것은?","opts":["주 1회 이상, 1개월 이상","주 3회 이상, 3개월 이상","매일, 6개월 이상","월 3회 이상, 1년 이상","빈도·기간 기준이 없다"],"a":1,"ex":"‘3-3 규칙’(주 3회·3개월)으로 기억하면 된다. 일시적 불면과 장애 수준을 가르는 선이다."},{"n":92,"q":"낮 동안의 억누를 수 없는 수면발작과 함께, 웃음 등 강한 정서에 의해 유발되는 갑작스러운 근긴장 소실(탈력발작)을 보인다. 가장 적절한 진단은?","opts":["기면증","과다수면장애","불면장애","폐쇄성 수면무호흡","하지불안 증후군"],"a":0,"ex":"탈력발작은 기면증의 특징적 증상으로, 단순 과다수면과의 감별 포인트가 된다."},{"n":93,"q":"명백한 외적 보상이 없는데도 환자 역할을 하기 위해 증상을 위장하거나 유발하는 경우에 해당하는 진단은?","opts":["꾀병","전환장애","인위성(허위성)장애","신체증상장애","질병불안장애"],"a":2,"ex":"꾀병은 보상(병역, 보험금 등)이라는 외적 유인이 있다는 점에서 구별되며, 진단명이 아니라 V코드 상황이다."},{"n":94,"q":"NEO-PI-R에서 신경증(N) 요인의 하위 국면에 해당하지 않는 것은?","opts":["불안","적대감","우울","심미성","충동성"],"a":3,"ex":"심미성은 개방성(O)의 국면이다. 국면 수준까지 묻는 것이 5요인 심화 문항의 전형이다."},{"n":95,"q":"TCI의 성격 차원 중 영성, 우주와의 일체감, 자기 망각적 몰입과 관련되는 차원은?","opts":["자기초월","연대감","자율성","사회적 민감성","자극추구"],"a":0,"ex":"성격 3차원(자율성·연대감·자기초월) 중 하나로, 종교성·창조적 몰입과의 관련이 논의된다."},{"n":96,"q":"그레이(Gray)의 강화민감성 이론에서 처벌과 무보상 단서에 민감하게 반응하며 불안과 관련되는 동기 체계는?","opts":["행동활성화체계(BAS)","진정(soothing) 체계","투쟁-도피-동결체계(FFFS)만의 작용","추동(drive) 체계","행동억제체계(BIS)"],"a":4,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 BAS는 보상 단서에 대한 접근 동기와 충동성, BIS는 갈등 신호에 대한 억제와 불안 취약성에 대응된다."},{"n":97,"q":"토마스와 체스(Thomas & Chess)의 기질 연구에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 순한 기질, 까다로운 기질, 더딘(slow to warm up) 기질의 유형을 제시하였다.\nㄴ. 기질과 환경의 조화의 적합성(goodness of fit)이 적응을 좌우한다고 보았다.\nㄷ. 기질이 환경과 무관하게 발달 결과를 단독으로 결정한다고 보았다.\nㄹ. 까다로운 기질은 그 자체로 하나의 장애 진단명이다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄹ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ"],"a":0,"ex":"같은 기질도 환경의 요구와 맞으면 강점이 된다. 기질은 위험 ‘요인’이지 진단도, 운명도 아니다."},{"n":98,"q":"정신병리의 위계적 분류체계(HiTOP)에 대한 설명으로 가장 적절한 것은?","opts":["DSM 범주 진단의 신뢰도를 높이기 위해 만든 공식 부록이다.","특정 치료 매뉴얼의 명칭이다.","뇌영상 검사만으로 진단하는 체계이다.","증상과 특질의 경험적 공변(상관) 구조에 기반한 차원적 분류 체계이다.","아동에게만 적용되는 분류이다."],"a":3,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 내재화·외현화 같은 상위 스펙트럼 아래 증상 차원을 위계적으로 배열하며, 범주 진단의 공병 문제에 대한 대안으로 제안되었다."},{"n":99,"q":"NIMH의 RDoC(연구영역기준)에 대한 설명으로 옳지 않은 것은?","opts":["부적 유인가 체계 등 기능 영역을 중심으로 조직된다.","정신병리 연구를 위한 프레임워크이다.","유전자에서 행동까지 여러 분석 수준을 포함한다.","차원적 접근을 취한다.","DSM을 공식적으로 대체한 임상 진단 매뉴얼이다."],"a":4,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 RDoC는 진단체계가 아니라 연구의 틀이다. ‘DSM 대체’는 흔한 오해이자 전형적 함정 선지다."},{"n":100,"q":"정신장애의 회복(recovery) 패러다임에 대한 설명으로 가장 적절한 것은?","opts":["증상의 완전한 소거만을 회복으로 인정한다.","회복의 주체는 전문가이며 당사자는 수동적 수혜자이다.","증상이 남아 있더라도 의미 있는 삶을 재구축해 가는 과정을 강조한다.","사회 참여보다 시설 보호를 우선한다.","만성화를 수용하도록 설득하는 접근이다."],"a":2,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 증상 중심에서 삶 중심으로, 전문가 주도에서 당사자 주도로의 전환이 회복 패러다임의 핵심이다."},{"n":101,"q":"DSM-5-TR에서 새롭게 공식 진단으로 추가된 장애는?","opts":["번아웃 증후군","인터넷게임장애","복합 외상후 스트레스장애","감각처리장애","지속적 비탄장애"],"a":4,"ex":"인터넷게임장애는 여전히 ‘추가 연구가 필요한 상태’이고, 복합 PTSD는 ICD-11의 진단이다. TR의 대표 변화가 지속적 비탄장애다."},{"n":102,"q":"DSM-5-TR 지속적 비탄장애의 성인 기간 기준으로 옳은 것은?","opts":["사별 후 1개월 이상","사별 후 3개월 이상","사별 후 6개월 이상","사별 후 12개월 이상","기간 기준이 없다"],"a":3,"ex":"성인은 12개월, 아동·청소년은 6개월이다. 정상적 애도와의 경계 논쟁 속에서 기간 기준이 핵심 장치가 되었다."},{"n":103,"q":"DSM-5-TR에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 텍스트 개정판으로서 DSM-5의 기본 구조와 진단 체계를 유지한다.\nㄴ. 지속적 비탄장애가 공식 진단으로 추가되었다.\nㄷ. 자살행동과 비자살적 자해가 임상적 주의의 초점이 될 수 있는 상태로 다루어진다.\nㄹ. 다축진단체계가 부활하였다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"TR은 혁명이 아니라 정비다. 다축체계 부활 같은 구조 변화는 없었으며, 문화·인종 관련 기술과 용어가 다듬어졌다."},{"n":104,"q":"DSM-5 유뇨증의 진단기준으로 옳은 것은?","opts":["5세 이상(또는 동등한 발달수준), 주 2회 이상 3개월 지속 또는 임상적 고통·기능 손상","3세 이상, 주 1회 이상, 1개월 지속","7세 이상, 매일, 6개월 지속","연령 기준 없음","야간 유뇨만 진단 대상이다"],"a":0,"ex":"5세는 배뇨 통제가 발달적으로 기대되는 연령이다. 주간형·야간형·주야간형 모두 진단 가능하다."},{"n":105,"q":"수술 후 입원 중인 노인이 갑자기 시간·장소를 혼동하고, 주의가 산만하며, 증상이 하루 중에도 좋아졌다 나빠졌다를 반복한다. 가장 적절한 진단적 고려는?","opts":["주요 신경인지장애(치매)","섬망","주요우울장애","해리성 둔주","조현병"],"a":1,"ex":"급성 발병, 주의·의식 수준의 손상, 하루 중 변동(fluctuation)이 섬망의 3대 단서로, 치매와의 핵심 감별점이다."},{"n":106,"q":"알츠하이머형 신경인지장애의 전형적 경과로 가장 적절한 것은?","opts":["갑작스러운 발병과 계단식 악화","하루 중 극심한 의식 변동","서서히 시작되어 점진적으로 진행되며 최근 기억의 손상이 두드러진다","완전한 가역성","운동 증상이 인지 증상보다 선행"],"a":2,"ex":"서서히·점진적·기억 우선의 3요소가 전형이다. 갑작스럽고 계단식이면 혈관성을 먼저 의심한다."},{"n":107,"q":"혈관성 신경인지장애를 알츠하이머형과 감별하는 단서로 가장 적절한 것은?","opts":["뇌혈관 사건과 시간적으로 연관된 계단식 악화와 국소 신경학적 징후","서서히 진행되는 경과","기억 손상이 항상 가장 먼저 나타남","청년기 발병","증상의 완전한 자연 회복"],"a":0,"ex":"경과의 모양(점진 vs 계단식)과 신경학적 소견의 유무가 두 유형을 가르는 고전적 감별축이다."},{"n":108,"q":"호나이(Horney)가 제시한 신경증적 대인관계 경향의 세 방향을 모두 고른 것은?","box":"ㄱ. 사람을 향해 다가가기(순응형)\nㄴ. 사람에게 맞서기(공격형)\nㄷ. 사람에게서 멀어지기(회피형)\nㄹ. 사람 위에 군림하기(지배형)","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"건강한 사람은 세 방향을 유연하게 쓰지만, 신경증적인 사람은 한 방향에 경직되게 고착된다고 보았다."},{"n":109,"q":"호나이의 ‘기본 불안(basic anxiety)’의 의미로 가장 적절한 것은?","opts":["죽음에 대한 실존적 공포","리비도의 좌절","시험 상황의 일시적 긴장","유전적으로 결정된 기질","적대적인 세상에서 고립되고 무력하다고 느끼는 아동기의 감정"],"a":4,"ex":"부모의 무관심·거부 등에서 비롯된 기본 불안에 대처하는 방식이 신경증적 경향으로 굳어진다고 설명한다."},{"n":110,"q":"설리반(Sullivan)의 대인관계 이론에 대한 설명으로 가장 적절한 것은?","opts":["성격을 개인 내부의 고정된 구조로만 본다.","성격은 대인관계 상황에서 드러나는 비교적 지속적인 패턴이며, 자기체계는 불안을 줄이기 위해 형성된다.","리비도의 단계적 이동을 핵심 동력으로 본다.","집단무의식의 원형을 강조한다.","조작적 조건형성으로 성격을 설명한다."],"a":1,"ex":"‘좋은 나-나쁜 나-내가 아닌 나’의 인격화 개념처럼, 불안 관리가 자기 형성의 축이라고 본 대인관계 정신의학의 출발점이다."},{"n":111,"q":"카텔(Cattell)의 특질 이론에서 표면특질과 원천특질의 구별로 옳은 것은?","opts":["표면특질은 요인분석으로 추출된 기저 차원이고, 원천특질은 겉으로 관찰되는 행동 군집이다.","원천특질은 환경에 의해서만 형성된다.","두 개념은 동일하다.","표면특질은 겉으로 함께 나타나는 행동들의 군집이고, 원천특질은 요인분석으로 추출된 그 기저의 근원적 차원이다.","표면특질이 16PF의 측정 대상이다."],"a":3,"ex":"16PF는 원천특질 16개를 측정한다. ‘표면 아래의 원천’이라는 공간적 은유로 기억하면 헷갈리지 않는다."},{"n":112,"q":"머레이(Murray)의 이론에서 행동에 영향을 미치는 환경의 힘을 지칭하는 개념은?","opts":["욕구(need)","리비도","주제(thema)","압력(press)","원형"],"a":3,"ex":"욕구(개인 내부)와 압력(환경)의 상호작용 단위가 주제(thema)이며, TAT 해석의 이론적 틀이 된다."},{"n":113,"q":"간헐적 폭발장애에 대한 설명으로 옳지 않은 것은?","opts":["금전적 이득이나 위협 목적의 계획된 공격도 포함된다.","폭발은 충동적이며 미리 계획된 것이 아니다.","언어적 공격이 평균 주 2회, 3개월 이상 나타나는 경우 기준을 충족할 수 있다.","공격성의 폭발이 유발 자극이나 스트레스에 비해 현저히 지나치다.","6세 이상에서 진단된다."],"a":0,"ex":"도구적·계획적 공격은 배제 기준이다. ‘비례하지 않는, 충동적인’ 폭발이 정의의 핵심이다."},{"n":114,"q":"발모광(털뽑기장애)과 피부뜯기장애가 DSM-5에서 속하는 진단 범주는?","opts":["충동조절장애","강박 및 관련 장애","불안장애","신체증상 및 관련 장애","급식 및 섭식장애"],"a":1,"ex":"반복 행동을 줄이려는 시도와 긴장-해소의 고리가 강박스펙트럼과 공유되어 DSM-5에서 재배치되었다."},{"n":115,"q":"저장장애(hoarding disorder)의 핵심 진단 특징으로 가장 적절한 것은?","opts":["고가품만 선별적으로 보관","수집품의 체계적인 정리와 전시","물건 구매의 단순한 절약 습관","계절별 대청소의 회피","물건의 실제 가치와 무관하게 소지품을 버리거나 분리되는 것에 대한 지속적인 곤란"],"a":4,"ex":"버리는 것에 대한 고통과 보관 욕구가 핵심이며, 그 결과 생활 공간이 본래 용도로 쓰이지 못하게 된다."},{"n":116,"q":"신체 증상이 없거나 경미한데도 심각한 질병에 걸렸거나 걸릴 것이라는 집착이 6개월 이상 지속되며, 반복적인 건강 확인 행동을 보인다. 가장 적절한 진단은?","opts":["신체증상장애","전환장애","질병불안장애","인위성장애","공황장애"],"a":2,"ex":"신체증상장애와의 감별축은 ‘증상의 현저성’이다. 증상이 두드러지면 신체증상장애, 집착이 두드러지면 질병불안장애다."},{"n":117,"q":"정신병적 양상을 동반한 주요우울장애에서 ‘기분과 일치하는’ 정신병적 양상의 예로 가장 적절한 것은?","opts":["자신이 세계를 구원할 신이라는 과대망상","죄책감, 무가치함, 마땅한 처벌에 대한 망상","외계인이 생각을 주입한다는 망상","사고 전파","연애 망상"],"a":1,"ex":"우울의 주제(죄책·무가치·질병·죽음)와 내용이 일치하면 기분일치성이다. 불일치 양상은 더 나쁜 예후와 관련된다."},{"n":118,"q":"라자루스(Lazarus)의 스트레스 인지평가 이론에서 일차 평가와 이차 평가의 내용으로 옳은 것은?","opts":["일차: 대처 자원의 평가 / 이차: 위협 여부의 평가","두 평가는 동시에 일어날 수 없다","일차: 신체 반응 / 이차: 정서 반응","일차: 과거 회상 / 이차: 미래 예측","일차: 사건이 나에게 위협·도전·상실인지의 평가 / 이차: 내가 가진 대처 자원과 선택지의 평가"],"a":4,"ex":"같은 사건도 평가에 따라 스트레스가 되기도, 도전이 되기도 한다. 순서 뒤집기가 단골 함정이다."},{"n":119,"q":"셀리에(Selye)의 일반적응증후군(GAS) 단계를 순서대로 바르게 나열한 것은?","opts":["경고 → 저항 → 소진","저항 → 경고 → 소진","경고 → 소진 → 저항","소진 → 저항 → 경고","저항 → 소진 → 경고"],"a":0,"ex":"저항 단계에서 겉보기 적응이 일어나지만 자원이 고갈되면 소진으로 넘어간다. 만성 스트레스 질환의 설명 틀이다."},{"n":120,"q":"스트레스 대처에 대한 설명으로 가장 적절한 것은?","opts":["정서중심 대처는 항상 부적응적이다.","대처 양식은 상황과 무관하게 고정된다.","문제중심 대처는 항상 우월하다.","통제 가능한 상황에서는 문제중심 대처가, 통제 불가능한 상황에서는 정서중심 대처가 상대적으로 적응적인 경향이 있다.","회피는 모든 상황에서 최선의 대처다."],"a":3,"ex":"대처의 적응성은 종류가 아니라 ‘상황과의 부합’에서 나온다. 바꿀 수 없는 상실 앞에서는 정서 작업이 곧 문제 해결이다."},{"n":121,"q":"발달수준에 부적절하게 영양가 없는 비음식 물질(흙, 종이 등)을 1개월 이상 지속적으로 먹는 장애는?","opts":["이식증","되새김장애","회피적·제한적 음식섭취장애","신경성 식욕부진증","폭식장애"],"a":0,"ex":"되새김장애는 삼킨 음식의 반복적 역류·재섭취라는 점에서 구별된다. 둘 다 급식 및 섭식장애 범주다."},{"n":122,"q":"아동기 발병 유창성장애(말더듬)에 대한 설명으로 옳지 않은 것은?","opts":["음과 음절의 반복, 연장 등이 나타난다.","지능 저하가 원인이므로 지적장애와 항상 공존한다.","DSM-5에서 의사소통장애(신경발달장애)에 속한다.","스트레스나 압박 상황에서 악화될 수 있다.","말하기 상황에 대한 불안과 회피가 동반될 수 있다."],"a":1,"ex":"유창성의 문제는 지능과 별개다. ‘항상’, ‘반드시’가 붙은 선지는 일단 의심하는 것이 시험 기술이기도 하다."},{"n":123,"q":"편집성 성격장애와 망상장애(피해형)의 감별 기준으로 가장 적절한 것은?","opts":["둘은 동일한 진단이다.","편집성 성격장애는 약물로만 치료된다.","망상장애는 청소년기에만 발병한다.","편집성 성격장애는 광범위한 불신의 ‘성격 패턴’이고, 망상장애는 체계화된 ‘망상’이라는 정신병적 증상이 존재한다.","망상장애는 기능 손상이 항상 전반적이다."],"a":3,"ex":"불신·의심(해석의 편향)과 확고한 거짓 신념(망상)은 수준이 다르다. 성격 vs 증상의 축으로 감별한다."},{"n":124,"q":"프로이트의 성격 구조와 작동 원리의 연결이 옳은 것은?","opts":["원초아-도덕원리, 자아-쾌락원리, 초자아-현실원리","원초아-도덕원리, 자아-현실원리, 초자아-쾌락원리","원초아-현실원리, 자아-도덕원리, 초자아-쾌락원리","세 구조 모두 현실원리를 따른다","원초아-쾌락원리, 자아-현실원리, 초자아-도덕원리"],"a":4,"ex":"자아는 원초아의 욕구를 현실의 조건과 초자아의 요구 사이에서 중재하는 ‘말 탄 기수’의 위치에 있다."},{"n":125,"q":"초자아의 두 하위 체계에 대한 설명으로 옳은 것은?","opts":["양심은 보상 경험에서, 자아이상은 처벌 경험에서 형성된다.","두 체계는 동일한 것이다.","양심은 처벌받은 행동에서 형성되어 죄책감을, 자아이상은 칭찬받은 행동에서 형성되어 자긍심을 관장한다.","자아이상은 청소년기 이후에만 존재한다.","양심은 의식에만 존재한다."],"a":2,"ex":"‘하면 안 되는 것’의 내면화가 양심, ‘되어야 할 모습’의 내면화가 자아이상이다. 위반 시 각각 죄책감과 수치심이 따른다."},{"n":126,"q":"클라크(Clark)의 공황장애 인지모델에서 공황발작을 유지시키는 핵심 기제는?","opts":["양성 신체감각에 대한 파국적 오해석과 그로 인한 불안 상승의 악순환","무의식적 갈등의 전환","도파민 과활성","사회적 기술의 결핍","외상 기억의 침습"],"a":0,"ex":"심계항진을 ‘심장마비의 신호’로 읽는 순간 불안이 신체감각을 키우고, 커진 감각이 해석을 강화하는 고리가 돈다."},{"n":127,"q":"클라크와 웰스의 사회불안 인지모델에서 수행을 저해하고 불안을 유지시키는 핵심 과정으로 제시된 것은?","opts":["외부 청중에 대한 객관적 관찰","과도한 외향성","자기초점적 주의로 인해 내적 정보(심상, 감각)로 자기 인상을 구성하고 외부의 실제 반응 정보를 놓치는 것","기억력 저하","낮은 지능"],"a":2,"ex":"청중을 보지 않고 ‘떨고 있는 내 모습의 심상’을 보는 상태다. 주의를 외부로 돌리는 훈련이 개입의 한 축이 된다."},{"n":128,"q":"놀렌-혹세마(Nolen-Hoeksema)의 반응양식이론에 대한 설명으로 가장 적절한 것은?","opts":["반응양식은 우울 경과와 무관하다.","반추는 우울을 빠르게 해소한다.","주의분산은 우울을 항상 악화시킨다.","우울 기분에 대한 반추적 반응양식은 우울을 연장·심화시키며, 여성에서 더 흔하게 나타나 성차를 부분적으로 설명한다.","남성이 여성보다 반추를 많이 한다."],"a":3,"ex":"‘왜 나는 이럴까’를 곱씹는 것은 문제해결처럼 느껴지지만 실제로는 우울 기분의 인큐베이터가 된다."},{"n":129,"q":"무망감 우울증(hopelessness depression) 이론에서 우울의 가장 근접한 원인으로 제시되는 것은?","opts":["세로토닌 결핍","과도한 운동","아동기 외상 그 자체","사회적 기술 부족","바람직한 결과는 일어나지 않고 부정적 결과는 일어날 것이며 자신이 그것을 바꿀 수 없다는 기대"],"a":4,"ex":"부정적 귀인양식(소질)이 스트레스를 만나 무망감(근접 원인)을 낳는 경로 모델로, 귀인이론의 정교화판이다."},{"n":130,"q":"조현병의 재발과 관련하여 가족의 표출정서(EE)에 대한 설명으로 가장 적절한 것은?","opts":["EE는 가족의 경제 수준을 뜻한다.","비판, 적대감, 정서적 과잉관여가 높은 가족 환경은 퇴원 환자의 재발률 상승과 관련된다.","높은 EE는 회복을 촉진한다.","EE는 환자 본인의 정서 표현을 말한다.","EE는 측정이 불가능한 개념이다."],"a":1,"ex":"가족 심리교육 개입이 조현병 치료의 표준 요소가 된 경험적 근거가 EE 연구다. 가족을 원인 제공자가 아닌 협력자로 본다."},{"n":131,"q":"DSM-5 적대적 반항장애(ODD) 증상의 세 차원을 모두 고른 것은?","box":"ㄱ. 분노/과민한 기분\nㄴ. 논쟁적/반항적 행동\nㄷ. 보복적 특성\nㄹ. 타인의 기본 권리 침해","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"타인의 권리 침해(공격, 절도 등)는 품행장애의 정의다. ODD는 권위에 대한 거부·과민이 핵심으로 수준이 다르다."},{"n":132,"q":"DSM-5 특정학습장애에 대한 설명으로 옳지 않은 것은?","opts":["읽기, 쓰기, 수학 영역의 학업 기술 습득에 지속적인 어려움이 있다.","어려움이 표적 개입에도 불구하고 6개월 이상 지속되어야 한다.","학업 기술이 연령 기대보다 현저하게 낮아야 한다.","지적장애나 감각 결손으로 더 잘 설명되지 않아야 한다.","전반적 지능이 평균 이상이면 진단할 수 없다."],"a":4,"ex":"학습장애의 본질은 전반 지능 대비 특정 기술의 ‘예상 밖 저성취’다. 지능이 높아도 진단될 수 있다."},{"n":133,"q":"운동 협응 기술의 습득과 수행이 연령 기대보다 현저히 떨어져 일상 활동(글씨 쓰기, 단추 잠그기 등)을 방해하는 신경발달장애는?","opts":["틱장애","발달성 협응장애","상동증적 운동장애","뚜렛장애","운동 실어증"],"a":1,"ex":"‘서툰 아이’로 치부되기 쉽지만, 학업·자존감에 광범위한 영향을 주는 진단 가능한 상태다."},{"n":134,"q":"지속성(만성) 운동 또는 음성 틱장애와 잠정적 틱장애를 가르는 기간 기준은?","opts":["1개월","3개월","6개월","1년","2년"],"a":3,"ex":"1년 미만이면 잠정적, 1년 이상이면 지속성이다. 운동틱과 음성틱이 모두 1년 이상이면 투렛장애를 고려한다."},{"n":135,"q":"수면 중 비명을 지르며 깨어나 강한 공포 반응을 보이지만 다음 날 그 일을 기억하지 못하는 아동에게 가장 적절한 진단적 고려는?","opts":["NREM수면 각성장애(야경증형)","악몽장애","기면증","불면장애","REM수면 행동장애"],"a":0,"ex":"악몽은 REM수면에서 일어나 내용 회상이 생생하다는 점과 정반대다. ‘기억 없음+밤 전반부’가 야경증의 단서다."},{"n":136,"q":"수면보행증(몽유병)이 주로 발생하는 수면 단계는?","opts":["REM 수면","얕은 1단계 수면의 후반부","입면 직전 각성기","NREM 서파수면(밤의 전반부)","낮잠에서만 발생"],"a":3,"ex":"야경증과 같은 NREM 각성장애군이다. REM수면 행동장애(꿈 행동화, 노년 남성)와의 감별이 출제 포인트다."},{"n":137,"q":"HEXACO 성격 모델이 5요인 모델과 구별되는 핵심은?","opts":["요인 수를 3개로 줄였다.","정직-겸손(Honesty-Humility) 요인을 추가한 6요인 구조이다.","유형론으로 전환했다.","아동 전용 모델이다.","투사법으로 측정한다."],"a":1,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 착취·기만 경향의 개인차를 포착하는 정직-겸손 요인은 조직 장면의 비윤리 행동 예측에서 주목받는다."},{"n":138,"q":"회복탄력성(resilience)에 대한 설명으로 가장 적절한 것은?","opts":["유의한 역경에도 불구하고 긍정적 적응을 이루는 역동적 과정으로, 고정된 특질이라기보다 개인-환경 자원의 상호작용 결과로 본다.","역경을 경험하지 않는 상태를 말한다.","타고난 소수의 사람에게만 존재한다.","스트레스에 대한 무감각을 의미한다.","성인기 이후에만 발달한다."],"a":0,"ex":"‘강철 아이’ 신화에서 ‘과정으로서의 탄력성’으로 관점이 이동했다. 키울 수 있다는 함의가 개입의 근거다."},{"n":139,"q":"다음 중 아동 발달의 보호요인으로 보기 어려운 것은?","opts":["한 명 이상의 지지적인 성인과의 안정된 관계","또래 관계에서의 수용 경험","만성적인 부부 갈등에의 노출","학교에서의 소속감","자기조절 기술"],"a":2,"ex":"보호요인은 위험의 영향을 완충하는 자원이다. 만성적 갈등 노출은 대표적 위험요인으로, 이혼 그 자체보다 강력하다."},{"n":140,"q":"클로닝거(Cloninger)의 모델에서 기질과 성격의 구별로 옳은 것은?","opts":["기질은 성인기에 학습되고 성격은 유전된다.","기질은 7세 이후 형성된다.","두 개념은 동일하다.","성격은 측정할 수 없다.","기질은 자극에 대한 자동적 정서 반응의 유전적 경향이고, 성격은 자기개념을 중심으로 의도적으로 발달하는 자기조절 차원이다."],"a":4,"ex":"기질(자극추구·위험회피·사회적 민감성·인내력)과 성격(자율성·연대감·자기초월)의 이층 구조가 TCI의 설계 원리다."},{"n":141,"q":"시점 유병률과 평생 유병률의 구별로 옳은 것은?","opts":["시점 유병률은 일생 중 한 번이라도 장애를 경험한 비율이다.","시점 유병률은 특정 시점에 장애를 가진 사람의 비율이고, 평생 유병률은 일생 중 한 번이라도 그 장애를 경험한 사람의 비율이다.","두 지표는 항상 같은 값이다.","평생 유병률이 시점 유병률보다 항상 낮다.","유병률은 새로 발생한 사례만 센다."],"a":1,"ex":"정의상 평생 유병률 ≥ 시점 유병률이다. ‘새로 발생한 사례’를 세는 것은 발생률(발병률)이다."},{"n":142,"q":"발생률(incidence)과 유병률(prevalence)의 구별로 가장 적절한 것은?","opts":["두 지표는 동일하다.","발생률은 전체 사례, 유병률은 새 사례를 센다.","발생률은 일정 기간 동안 새로 발생한 사례의 비율이고, 유병률은 특정 시점·기간에 존재하는 전체 사례의 비율이다.","유병률은 치료율과 같다.","발생률은 사망률의 다른 이름이다."],"a":2,"ex":"만성 장애는 새 사례가 적어도 누적되어 유병률이 높아진다. 두 지표의 괴리가 경과의 만성성을 시사한다."},{"n":143,"q":"신경증과 정신증의 고전적 구분에서 가장 핵심적인 감별 기준으로 사용되어 온 것은?","opts":["현실검증력의 손상 여부","증상의 지속 기간","발병 연령","성별","지능 수준"],"a":0,"ex":"망상·환각처럼 현실과의 접점이 무너졌는가가 고전적 분기점이다. DSM은 이 이분법을 공식 폐기했지만 임상 언어로는 살아 있다."},{"n":144,"q":"교통사고 목격 후 사고 전후 몇 시간의 기억을 잃었으나 그 외의 기억과 정체성은 유지되고, 새로운 학습 능력도 정상이다. 가장 적절한 진단적 고려는?","opts":["주요 신경인지장애","꾀병","해리성 정체성장애","코르사코프 증후군","해리성 기억상실(국소적 유형)"],"a":4,"ex":"외상 사건 주변의 자전적 기억이 선택적으로 차단되는 심인성 기억상실로, 새 정보 학습은 보존된다는 점이 기질성과의 단서다."},{"n":145,"q":"해리성 기억상실에서 자신의 정체성에 대한 혼란과 함께 갑작스럽게 집을 떠나 목적 있는 여행을 하는 양상이 동반될 때 부여하는 명시자는?","opts":["긴장증 동반","급성 발병","비전형적 양상","해리성 둔주 동반","주산기 발병"],"a":3,"ex":"DSM-5에서 둔주는 독립 진단에서 해리성 기억상실의 명시자로 재배치되었다. 분류 변화 자체가 출제 포인트다."},{"n":146,"q":"순환성장애(cyclothymic disorder)의 진단기준으로 옳은 것은?","opts":["조증삽화와 주요우울삽화가 번갈아 나타난다.","6개월의 기간 기준을 갖는다.","1회의 경조증삽화로 진단된다.","2년(아동·청소년 1년) 이상, 경조증 기준과 우울삽화 기준에 미달하는 증상들이 기간의 절반 이상 지속된다.","정신병적 양상이 필수적이다."],"a":3,"ex":"양극성의 ‘기분저하증 판’이다. 삽화 기준을 채우는 순간 제1형/제2형 양극성으로 진단이 이동한다."},{"n":147,"q":"월경전불쾌감장애(PMDD)에 대한 설명으로 옳지 않은 것은?","opts":["증상의 주기성 확인 없이 회고 보고만으로 확진한다.","월경 시작 후 수일 내에 호전되기 시작한다.","DSM-5에서 우울장애 범주에 포함되었다.","현저한 정서 불안정성, 과민성 등이 핵심 증상이다.","월경 시작 전 마지막 주에 증상이 시작된다."],"a":0,"ex":"최소 2주기 이상의 전향적 일일 평정으로 주기성을 확인하는 것이 진단의 요건이다."},{"n":148,"q":"인지 기능의 현저한 변동, 반복적인 생생한 환시, 파킨슨증을 특징으로 하는 신경인지장애의 원인 질환은?","opts":["알츠하이머병","프라이온병","혈관성 질환","헌팅턴병","루이소체병"],"a":4,"ex":"환시와 인지 변동의 조합이 단서이며, 항정신병 약물에 대한 심한 민감성이 임상적으로 중요하다."},{"n":149,"q":"기억 저하보다 성격 변화, 탈억제, 부적절한 사회적 행동이 먼저 두드러지는 신경인지장애의 유형은?","opts":["알츠하이머형","전두측두엽 변성(행동 변이형)","혈관성","루이소체형","외상성 뇌손상"],"a":1,"ex":"‘기억은 멀쩡한데 사람이 변했다’가 초기 호소의 전형이다. 비교적 이른 발병 연령도 단서가 된다."},{"n":150,"q":"일란성 쌍생아의 장애 일치율이 이란성 쌍생아보다 유의하게 높다는 결과가 시사하는 바는?","opts":["환경 요인만이 원인이다.","장애가 학습된 행동임을 입증한다.","해당 장애에 유전적 요인이 기여한다.","일치율 차이는 우연이다.","출생 순위가 원인이다."],"a":2,"ex":"유전자 공유율(100% vs 평균 50%)의 차이를 지렛대로 유전 기여를 추정하는 행동유전학의 기본 논리다."},{"n":151,"q":"“이 장애의 유전율이 50%”라는 진술의 올바른 해석은?","opts":["해당 집단에서 장애 관련 개인차 변량의 약 50%가 유전적 차이로 설명된다는 뜻이다.","개인 증상의 절반이 유전 때문이다.","환자의 50%가 유전으로 발병했다.","자녀에게 50% 확률로 유전된다.","치료 가능성이 50%라는 뜻이다."],"a":0,"ex":"유전율은 ‘집단의 변량’에 대한 통계이지 개인의 운명에 대한 진술이 아니다. 가장 흔한 오독을 겨냥한 문항이다."},{"n":152,"q":"동일한 효과를 얻기 위해 점점 더 많은 용량이 필요해지거나, 같은 용량의 효과가 감소하는 현상은?","opts":["금단","갈망","내성","플래시백","교차 의존"],"a":2,"ex":"내성과 금단은 생리적 의존의 두 축으로, 물질사용장애 진단기준의 항목이기도 하다."},{"n":153,"q":"장기간 사용하던 물질을 중단하거나 감량했을 때 나타나는 물질 특유의 생리적·인지적 증상군은?","opts":["위약 반응","내성","중독(intoxication)","민감화","금단"],"a":4,"ex":"중독은 사용 ‘중’의 가역적 증후군, 금단은 중단 ‘후’의 증후군으로 시간 축이 반대다."},{"n":154,"q":"환각과 망상, 와해된 언어가 5개월째 지속되고 있는 환자에게 현 시점에서 가장 적절한 진단은?","opts":["단기 정신병적 장애","조현양상장애","조현병","망상장애","조현정동장애"],"a":1,"ex":"1개월~6개월 구간은 조현양상장애다. 6개월을 넘는 순간 조현병으로 재진단되는 ‘대기 구간’ 진단이다."},{"n":155,"q":"3일간 들뜬 기분과 수면 욕구 감소, 말 많아짐을 보인 후 정상 기분으로 돌아왔다. 경조증삽화 진단과 관련한 판단으로 옳은 것은?","opts":["기간과 무관하게 경조증삽화다.","즉시 제1형 양극성장애로 진단한다.","조증삽화에 해당한다.","최소 4일의 기간 기준에 미달하므로 경조증삽화 기준을 충족하지 않는다.","주요우울삽화다."],"a":3,"ex":"경조증 4일, 조증 1주의 숫자 기준은 사례형으로 반복 출제된다. 숫자를 사례 속에서 적용하는 연습이 필요하다."},{"n":156,"q":"비행기 탑승만을 극도로 두려워해 회피하며, 그 두려움의 초점이 ‘탈출 곤란’이 아니라 추락 그 자체에 있다. 가장 적절한 진단은?","opts":["광장공포증","공황장애","특정공포증(상황형)","사회불안장애","범불안장애"],"a":2,"ex":"같은 ‘비행기 회피’도 두려움의 초점(대상 자체 vs 탈출 곤란 vs 평가)에 따라 진단이 갈린다."},{"n":157,"q":"여러 사람 앞에서 음식을 먹는 상황을 ‘남들이 내 손 떨림을 보고 흉볼까 봐’ 회피한다. 두려움의 핵심 인지에 근거한 가장 적절한 진단은?","opts":["사회불안장애","광장공포증","특정공포증","강박장애","신체이형장애"],"a":0,"ex":"공포 상황의 표면이 아니라 ‘부정적 평가에 대한 두려움’이라는 핵심 인지가 사회불안의 정의적 표지다."},{"n":158,"q":"원치 않는 침투적 사고에 대한 설명으로 가장 적절한 것은?","opts":["침투사고의 경험 자체가 곧 강박장애의 증거다.","침투사고는 일반인 대다수도 경험하며, 그 사고에 부여하는 파국적 의미와 통제 시도가 장애로의 분기점이 된다.","건강한 사람에게는 침투사고가 없다.","침투사고는 항상 행동으로 이어진다.","침투사고는 의지로 완전히 차단할 수 있다."],"a":1,"ex":"‘생각했다는 것’이 아니라 ‘그 생각을 어떻게 다루는가’가 병리를 가른다. 사고-행위 융합 개념과 연결된다."},{"n":159,"q":"DSM-5 PTSD의 증상 군집을 모두 고른 것은?","box":"ㄱ. 침습 증상\nㄴ. 외상 관련 자극의 지속적 회피\nㄷ. 인지와 기분의 부정적 변화\nㄹ. 각성과 반응성의 현저한 변화","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":4,"ex":"DSM-IV의 3군집에서 ‘인지·기분의 부정적 변화’가 분리되어 4군집이 되었다. 군집 수 자체가 출제된다."},{"n":160,"q":"버림받지 않으려는 필사적 노력, 이상화와 평가절하를 오가는 불안정한 관계, 정체성 혼란과 만성적 공허감을 보인다. 가장 적절한 진단적 고려는?","opts":["연극성 성격장애","자기애성 성격장애","의존성 성격장애","경계선 성격장애","순환성장애"],"a":3,"ex":"유기 공포-관계 불안정-정체성 혼란-정동 불안정-충동성의 묶음이 경계선의 임상 초상이다."},{"n":161,"q":"반사회성 성격장애의 진단 요건으로 옳은 것은?","opts":["12세부터 진단할 수 있다.","18세 이상이어야 하며 15세 이전에 시작된 품행장애의 증거가 있어야 한다.","품행장애 병력은 필요하지 않다.","범죄 전과가 필수 요건이다.","여성에게는 진단할 수 없다."],"a":1,"ex":"발달적 연속성(품행장애→반사회성)을 진단기준 안에 새겨 넣은 유일한 성격장애다."},{"n":162,"q":"신경성 식욕부진증의 두 하위유형을 가르는 기준은?","opts":["발병 연령","체중 감소의 속도","지난 3개월간 폭식이나 제거 행동의 반복 여부(제한형 vs 폭식/제거형)","입원 여부","병식의 유무"],"a":2,"ex":"같은 저체중이라도 ‘안 먹어서’와 ‘먹고 게워서’는 경과와 의학적 위험 프로파일이 다르다."},{"n":163,"q":"성인(17세 이상)의 ADHD 진단에 요구되는 증상 개수 기준은?","opts":["각 영역 9개 모두","각 영역 7개 이상","3개 이상","부주의 또는 과잉행동-충동성 영역에서 5개 이상","성인은 진단할 수 없다"],"a":3,"ex":"아동의 6개 기준이 성인에서는 5개로 완화된다. 12세 이전 발병 증거 요건과 함께 기억해 두자."},{"n":164,"q":"DSM-5 자폐스펙트럼장애의 두 가지 핵심 증상 영역은?","opts":["사회적 의사소통·상호작용의 결함과 제한적·반복적 행동(감각 이상 포함)","기억 손상과 언어 상실","과잉행동과 충동성","환각과 망상","기분 삽화와 불안"],"a":0,"ex":"DSM-IV의 3요인(사회성·언어·상동행동)이 2요인으로 재편되며 감각 증상이 공식 기준에 포함되었다."},{"n":165,"q":"섬망의 위험요인으로 보기 어려운 것은?","opts":["고령","주요 수술과 입원","다약제 복용","기저의 신경인지장애","젊고 건강할수록 위험이 커진다"],"a":4,"ex":"섬망은 취약한 뇌에 부하가 걸릴 때 발생한다. 취약성(고령, 치매)과 유발요인(수술, 감염, 약물)의 결합 모델로 이해한다."},{"n":166,"q":"노화에 따른 지능 변화에 대한 설명으로 가장 적절한 것은?","opts":["모든 지적 능력이 동일한 속도로 쇠퇴한다.","유동지능은 노년에 상승한다.","결정지능이 가장 먼저 무너진다.","지능은 노화와 무관하다.","유동지능은 비교적 일찍 감퇴하는 경향이 있으나, 어휘·지식 같은 결정지능은 노년기까지 유지되거나 상승하기도 한다."],"a":4,"ex":"‘처리의 기계’와 ‘축적된 자산’의 노화 곡선이 다르다는 것으로, 노인 평가에서 과제 선택의 근거가 된다."},{"n":167,"q":"에릭슨의 심리사회적 발달에서 중년기의 핵심 과업 갈등은?","opts":["친밀감 대 고립감","생산성(생성감) 대 침체감","정체감 대 역할혼미","자아통합 대 절망감","근면성 대 열등감"],"a":1,"ex":"다음 세대를 기르고 남기는 일에서 의미를 찾는가, 자기 안에 고이는가의 갈림길이다."},{"n":168,"q":"에릭슨 이론에서 노년기에 자신의 삶을 의미 있는 전체로 수용하는 과업과 그 실패의 결과는?","opts":["신뢰 대 불신","생산성 대 침체감","자아통합 대 절망감","주도성 대 죄책감","친밀감 대 고립감"],"a":2,"ex":"‘다시 살아도 이 삶을 살겠다’는 수용이 자아통합이며, 그 좌절이 죽음 공포와 절망으로 나타난다고 보았다."},{"n":169,"q":"학대받던 아동이 자라서 자신을 때리던 어른의 말투와 행동을 그대로 보인다. 해당하는 방어기제는?","opts":["공격자와의 동일시","승화","이타주의","전환","퇴행"],"a":0,"ex":"무력한 피해자 위치의 공포를 가해자 위치를 내면화함으로써 처리하는 기제로, 폭력의 세대 전수를 설명하는 한 고리다."},{"n":170,"q":"강한 공격적 충동을 가진 사람이 격투기 선수가 되어 사회적 인정과 성취를 얻고 있다. 해당하는 방어기제는?","opts":["반동형성","치환","합리화","승화","부인"],"a":3,"ex":"충동의 에너지를 사회적으로 가치 있는 통로로 변형한, 가장 성숙한 방어의 전형이다."},{"n":171,"q":"내사(introjection)와 성숙한 동일시(identification)의 구별로 가장 적절한 것은?","opts":["두 개념은 동일하다.","내사는 성인에게만 나타난다.","동일시가 더 병리적이다.","내사는 대상의 특성을 소화 없이 통째로 삼키는 원초적 과정이고, 동일시는 선택적으로 통합하여 자기 구조의 일부로 만드는 보다 성숙한 과정이다.","동일시는 의식적 모방만을 뜻한다."],"a":3,"ex":"게슈탈트의 ‘씹지 않고 삼킨 내사’ 비유와 연결하면 기억하기 쉽다."},{"n":172,"q":"5요인 모델에서 성실성(C)이 매우 낮은 사람의 전형적 특징은?","opts":["체계적 계획과 끈기","규범 준수와 신중함","충동적이고 무계획적이며 과제 완수가 어려움","질서정연한 작업 습관","높은 성취 지향"],"a":2,"ex":"성실성은 학업·직업 수행의 가장 일관된 성격 예측 변인으로, 낮은 극단은 자기조절의 어려움과 연결된다."},{"n":173,"q":"5요인 모델에서 외향성 차원의 낮은 극단(내향)에 대한 해석으로 가장 적절한 것은?","opts":["사회불안장애와 동일하다.","사회적 자극에 대한 선호와 활력 수준이 낮은 것으로, 그 자체로는 병리가 아니다.","조현성 성격장애의 진단 근거가 된다.","반드시 치료가 필요한 상태다.","우울증의 다른 이름이다."],"a":1,"ex":"차원적 개인차와 범주적 장애를 구분하는 문항이다. 내향성은 선호이고, 회피·고통이 더해질 때 임상 문제가 된다."},{"n":174,"q":"DSM-5의 지속성 우울장애가 통합한 DSM-IV의 두 진단은?","opts":["기분저하증(기분부전장애)과 만성 주요우울장애","주요우울장애와 양극성장애","적응장애와 PTSD","순환성장애와 제2형 양극성","월경전불쾌감장애와 산후우울증"],"a":0,"ex":"경과의 만성성을 축으로 두 진단을 묶은 것이 지속성 우울장애의 탄생 배경이다."},{"n":175,"q":"신체증상장애의 진단에서 핵심이 되는 기준은?","opts":["증상을 의학적으로 설명할 수 없어야 한다는 점","의도적 위장의 증거","증상의 개수가 8개 이상일 것","반드시 통증이 포함될 것","신체 증상 자체보다 그 증상에 대한 과도한 사고, 불안, 시간·에너지 투여라는 심리행동적 반응"],"a":4,"ex":"DSM-5의 전환점이다. ‘설명 불가능성’ 요건을 버리고 ‘반응의 과도함’으로 축을 옮겨, 의학 질환 공존 시에도 진단이 가능해졌다."},{"n":176,"q":"심리학에서 성격을 정의할 때 공통적으로 포함되는 요소로 보기 어려운 것은?","opts":["시간과 상황에 걸친 비교적 일관된 행동 경향","개인을 다른 사람과 구별해 주는 독특성","사고, 정서, 행동을 조직하는 내적 체계","외부로 관찰되는 행동만으로 한정된 기술","환경과의 상호작용 속에서 드러나는 적응 양식"],"a":3,"ex":"성격은 행동 기술을 넘어 그 밑의 내적 조직과 역동까지 포괄하는 구성개념이다."},{"n":177,"q":"프로이트의 심리성적 발달 단계에 대한 설명으로 옳지 않은 것은?","opts":["구강 가학기는 수동적 낙천성이 형성되는 시기다.","항문기의 핵심 갈등은 배변훈련을 둘러싼 통제와 자율의 문제다.","남근기에는 오이디푸스 갈등과 동일시가 일어난다.","잠복기에는 성적 추동이 비교적 잠잠해진다.","구강기 후기에는 깨물기 등으로 공격성이 표현될 수 있다."],"a":0,"ex":"수동적 낙천성은 구강 ‘수용기’의 고착 특성이다. 가학기(후기)는 깨무는 공격성과 냉소·착취 경향에 연결된다."},{"n":178,"q":"에릭슨의 발달단계-심리사회적 위기-덕목(강점)의 연결로 옳지 않은 것은?","opts":["영아기 - 신뢰 대 불신 - 희망","유아기 - 자율성 대 수치심 - 의지","학령전기 - 주도성 대 죄책감 - 목적","청소년기 - 정체감 대 역할혼미 - 충실","학령기 - 근면성 대 열등감 - 충실"],"a":4,"ex":"학령기의 덕목은 유능감이다. 충실(fidelity)은 정체감 위기를 통과한 청소년기의 강점이다."},{"n":179,"q":"융 이론에서 시대와 문화를 넘어 신화, 꿈, 예술에 반복적으로 나타나는 보편적 심상의 원천으로, 집단무의식을 구성하는 것은?","opts":["콤플렉스","원형(archetype)","페르소나","개인무의식","자아"],"a":1,"ex":"영웅, 어머니, 그림자 같은 원형은 경험의 ‘내용’이 아니라 경험을 조직하는 보편적 ‘틀’로 상정된다."},{"n":180,"q":"올포트의 특질 위계에서 한 개인의 거의 모든 행동에 영향을 미치는 지배적 열정으로, 소수의 사람에게서만 발견되는 것은?","opts":["중심특질","이차적 특질","주특질(기본특질)","공통특질","표면특질"],"a":2,"ex":"슈바이처의 인도주의처럼 삶 전체를 관통하는 단일 주제다. 보통 사람의 성격은 5~10개의 중심특질로 기술된다."},{"n":181,"q":"켈리(Kelly)의 이론에서 개인이 사건을 해석하고 예측하기 위해 사용하는 자기 나름의 인식 틀을 지칭하는 개념은?","opts":["개인적 구성개념","스키마 양식","생활양식","원형","자기효능감"],"a":0,"ex":"‘과학자로서의 인간’이 세운 가설 체계가 구성개념이며, 레퍼토리 격자(Rep test)가 그 측정 도구다."},{"n":182,"q":"달라드와 밀러(Dollard & Miller)가 제시한 학습의 네 가지 핵심 요소는?","opts":["모델, 주의, 파지, 재생","자극, 유기체, 반응, 결과","동화, 조절, 평형, 도식","추동, 단서, 반응, 강화","욕구, 압력, 주제, 통각"],"a":3,"ex":"정신분석 개념을 학습이론 언어로 번역한 시도로, ‘원하고(추동) 알아차리고(단서) 행하고(반응) 얻는다(강화)’로 요약된다."},{"n":183,"q":"호나이가 말한 기본 적대감과 기본 불안의 관계로 가장 적절한 것은?","opts":["기본 불안이 해소되면 적대감이 생긴다.","기본 불안은 성인기에만 나타난다.","두 개념은 무관하다.","기본 적대감은 유전된다.","부모의 거부와 무관심에 대한 적대감을 표현할 수 없어 억압하면, 그것이 적대적 세상에 홀로 남겨진 듯한 기본 불안으로 전환된다."],"a":4,"ex":"‘화낼 수 없는 아이’의 분노가 안으로 접혀 불안이 된다는 정서 전환의 논리가 호나이 신경증 이론의 출발점이다."},{"n":184,"q":"자기효능감에 대한 설명으로 옳지 않은 것은?","opts":["특정 과제를 해낼 수 있다는 능력에 대한 신념이다.","과제 선택, 노력의 양, 지속성에 영향을 준다.","자신의 전반적 가치에 대한 평가와 동일한 개념이다.","숙달 경험이 가장 강력한 원천이다.","영역에 따라 다르게 형성될 수 있다."],"a":2,"ex":"‘할 수 있는가’(효능감)와 ‘가치 있는가’(자존감)는 다른 축이다. 수학 효능감이 낮아도 자존감은 건재할 수 있다."},{"n":185,"q":"카텔의 자료 수집 분류에서 생활기록, 학교 성적, 출결처럼 개인의 실제 삶의 기록에서 얻는 자료는?","opts":["Q-data","L-data","T-data","S-data","O-data"],"a":1,"ex":"L(생활기록)-Q(자기보고 질문지)-T(객관적 검사 상황)의 세 자료원이 수렴할 때 특질의 실재성이 강해진다고 보았다."},{"n":186,"q":"프롬(Fromm)이 제시한 비생산적 성격 지향에 해당하지 않는 것은?","opts":["수용 지향","착취 지향","저장 지향","시장 지향","생산 지향"],"a":4,"ex":"생산 지향은 비생산적 네 유형의 대척점에 있는 건강한 지향이다. ‘비생산적’ 목록에 슬쩍 끼워 넣는 것이 함정 패턴이다."},{"n":187,"q":"신경증적 수준과 정신증적 수준의 장애에 대한 고전적 구분으로 옳지 않은 것은?","opts":["신경증 수준에서는 현실검증력이 대체로 유지된다.","불안장애 환자는 자신의 증상이 비합리적임을 전혀 인식하지 못한다.","불안장애는 전통적으로 신경증 수준으로 분류되어 왔다.","신경증 수준에서는 자신의 증상에 대한 병식이 비교적 유지된다.","정신증 수준에서는 망상, 환각 등 현실과의 단절이 나타날 수 있다."],"a":1,"ex":"‘지나친 줄 알면서도 멈출 수 없는’ 자아이질성이 신경증 수준의 표지다. 병식의 존재가 정신증과의 고전적 경계선이다."},{"n":188,"q":"지적발달장애의 심각도 분류에서 중등도(moderate) 수준에 대한 기술로 가장 적절한 것은?","opts":["성인기에 대체로 독립적인 직업 생활과 자녀 양육이 가능하다.","모든 자기관리가 불가능하여 전적인 보호가 필요하다.","언어와 학업 기술의 습득이 초등 저학년 수준에 머무르는 경향이 있으며, 지속적 지원 속에 단순 작업과 일상 기술의 수행이 가능하다.","지능은 평균이나 적응행동만 낮다.","성인기에 증상이 자연 소실된다."],"a":2,"ex":"DSM-5는 심각도를 IQ 숫자가 아니라 개념적·사회적·실행적 적응 기능으로 판정한다는 점도 함께 기억하라."},{"n":189,"q":"수업 중 주의산만과 과제 회피를 보이는 초등학생의 주의력 문제를 평가하기 위한 도구로 적절하지 않은 것은?","opts":["일반직업적성검사(GATB)","부모·교사용 행동평정척도","지능검사를 통한 전반적 인지 평가","행동관찰","연속수행검사(CPT)"],"a":0,"ex":"GATB는 성인·청소년의 직업 적성 분류 도구다. 평가 도구는 의뢰 질문(주의력)에 봉사해야 한다."},{"n":190,"q":"다음 정신장애 중 행동유전학 연구에서 유전적 기여가 가장 큰 것으로 일관되게 보고되는 것은?","opts":["적응장애","특정공포증","급성 스트레스장애","양극성장애","품행장애"],"a":3,"ex":"양극성장애와 조현병은 쌍생아 일치율 연구에서 가장 높은 유전율이 보고되는 대표 장애군이다."},{"n":191,"q":"응급실에 실려 온 청년이 며칠째 거의 움직이지 않은 채 한 자세를 유지하고, 말을 걸어도 함구하며, 타인이 팔을 들어 올리면 그 자세 그대로 머문다. 이 임상 양상은?","opts":["해리성 둔주","긴장증(catatonia)","공황발작","전환 마비","꾀병"],"a":1,"ex":"혼미, 함구증, 강경증(자세 유지), 납굴증이 긴장증의 고전적 징후다. DSM-5에서는 여러 장애에 붙는 명시자로 다룬다."},{"n":192,"q":"조증 삽화에서 흔히 관찰되는 ‘사고의 비약’에 대한 설명으로 옳은 것은?","opts":["연상이 빠르게 꼬리를 물고 주제가 잇따라 바뀌어 말의 흐름을 따라가기 어렵다.","사고가 멈추어 말이 끊긴다.","동일한 생각이 강박적으로 반복된다.","외부에서 생각이 주입된다고 믿는다.","말수가 줄고 반응이 느려진다."],"a":0,"ex":"압출언어와 함께 나타나는 사고 과정의 가속이다. 연상이완(조현병)과 달리 연결 고리는 따라갈 수 있는 경우가 많다."},{"n":193,"q":"“우울은 반응유발적 정적 강화의 감소에서 비롯되며, 우울 행동은 주변의 동정과 관심으로 단기적으로 유지된다”는 설명에 해당하는 이론은?","opts":["벡의 인지이론","정신분석적 대상상실 이론","무망감 이론","레빈손(Lewinsohn)의 행동주의 이론","도파민 가설"],"a":3,"ex":"활동 감소→강화 감소→기분 저하→활동 추가 감소의 하강 나선 모델로, 행동활성화 치료의 이론적 모태다."},{"n":194,"q":"컨버그(Kernberg)의 관점에서 경계선 성격조직의 만성적 공허감과 가장 깊이 관련되는 것은?","opts":["과도하게 통합된 자기상","현실검증력의 완전한 붕괴","성숙한 방어의 과사용","안정된 대상항상성","정체성 혼미(자기와 대상 표상의 통합 실패)"],"a":4,"ex":"좋은 나/나쁜 나로 쪼개진 표상이 하나의 연속된 ‘나’로 통합되지 못할 때, 그 중심의 빈자리가 공허감으로 경험된다."},{"n":195,"q":"체중이 일정 수준을 유지하려는 생리적 설정점(set point)에서 벗어날 때 신체가 저항한다는 이론이 주로 설명하는 장애 영역은?","opts":["수면-각성장애","불안장애","섭식장애","신경인지장애","배설장애"],"a":2,"ex":"극단적 절식이 생리적 반동(폭식 충동)을 부르는 기제를 설명하며, 다이어트-폭식 악순환의 생물학적 근거가 된다."},{"n":196,"q":"자폐스펙트럼장애의 원인에 대한 설명으로 옳지 않은 것은?","opts":["유전적 요인의 기여가 크다는 증거가 축적되어 있다.","신경발달적 요인이 핵심으로 간주된다.","부모의 차가운 양육 태도가 원인이라는 ‘냉장고 엄마’ 가설은 기각되었다.","남아에서 더 높은 비율로 진단된다.","출생 후 부모의 성격과 양육 방식이 일차적 원인이다."],"a":4,"ex":"양육 원인론은 부모에게 부당한 죄책감을 안긴 역사적 오류로 남았다. 현재의 합의는 신경발달적·유전적 기원이다."},{"n":197,"q":"특정학습장애에 대한 설명으로 옳지 않은 것은?","opts":["읽기, 쓰기, 수학 등 특정 학업 영역의 기술 결함이 핵심이다.","지능 저하와 자폐 증상이 진단의 필수 요건이다.","감각 결손이나 교육 기회 부족으로 더 잘 설명되면 진단하지 않는다.","조기 선별과 개입이 예후에 중요하다.","전반적 지능은 정상 범위일 수 있다."],"a":1,"ex":"학습장애의 정의 자체가 ‘전반 능력으로 설명되지 않는 특정 영역의 저성취’다. 필수 요건을 뒤집은 선지다."},{"n":198,"q":"신체 증상은 없거나 경미한데도 ‘심각한 병에 걸렸을 것’이라는 생각에 사로잡혀 반복적으로 검진을 받거나 반대로 병원을 회피한다. 가장 적절한 진단은?","opts":["신체증상장애","전환장애","질병불안장애","인위성장애","공황장애"],"a":2,"ex":"확인 추구형과 회피형이 모두 가능하다는 점이 흥미로운 부분이다. 축은 ‘증상’이 아니라 ‘질병에 대한 집착’이다."},{"n":199,"q":"DSM-5 물질관련장애에서 다루는 물질 범주에 해당하지 않는 것은?","opts":["항우울제","카페인","아편계","진정제·수면제·항불안제","알코올"],"a":0,"ex":"항우울제는 남용 약물 10범주에 포함되지 않는다. ‘정신과 약물=중독 물질’이라는 통념을 겨냥한 문항이다."},{"n":200,"q":"망상과 환각의 구별로 옳은 것은?","opts":["망상은 지각의 장애이고 환각은 사고의 장애다.","망상은 외부 자극 없이 발생하는 거짓 지각이다.","환각은 논리적 설득으로 교정된다.","망상은 반증에도 견고한 잘못된 신념(사고 내용의 장애)이고, 환각은 외부 자극 없이 일어나는 지각 경험(지각의 장애)이다.","두 증상은 동일한 현상의 다른 이름이다."],"a":3,"ex":"‘믿음의 문제’와 ‘감각의 문제’라는 축으로 가르면 혼동이 사라진다. 둘은 흔히 공존하지만 별개의 증상 차원이다."}]},{"name":"집단상담 및 가족치료","questions":[{"n":1,"q":"집단원이 자신만 그런 문제를 겪는 것이 아님을 깨닫게 되는 얄롬의 치료적 요인은?","opts":["이타주의","보편성","희망의 고취","카타르시스","응집력"],"a":1,"ex":"보편성은 ‘나만 그런 게 아니구나’라는 깨달음으로 고립감을 줄여준다."},{"n":2,"q":"집단응집력에 대한 설명으로 옳지 않은 것은?","opts":["소속감과 수용받는 느낌을 포함한다.","자기개방과 위험 감수를 촉진한다.","출석률 및 집단 지속성과 관련된다.","응집력이 높은 집단에서는 갈등이 발생하지 않는다.","다른 치료적 요인이 작동하는 토대가 된다."],"a":3,"ex":"응집력이 높은 집단은 갈등이 없는 집단이 아니라 갈등을 건설적으로 다룰 수 있는 집단이다."},{"n":3,"q":"한 집단원의 이야기를 다른 집단원의 경험이나 관심사와 연관 짓는 집단상담자의 기술은?","opts":["차단하기","반영하기","연결하기","직면하기","지지하기"],"a":2,"ex":"연결하기는 집단원 간 상호작용과 응집력을 촉진하는 집단 고유의 기술이다."},{"n":4,"q":"집단상담자가 ‘차단하기(blocking)’를 사용해야 할 상황으로 적절하지 않은 것은?","opts":["한 집단원이 다른 집단원의 사생활을 캐물을 때","한 집단원이 장황한 이야기로 시간을 독점할 때","집단원이 다른 집단원의 비밀을 누설하려 할 때","집단 밖 사람에 대한 험담이 계속될 때","집단원이 고통스러운 감정을 진솔하게 표현할 때"],"a":4,"ex":"진솔한 감정 표현은 차단이 아니라 촉진해야 할 행동이다."},{"n":5,"q":"집단상담 사전동의에 포함될 내용으로 적절하지 않은 것은?","opts":["다른 집단원들의 개인 신상정보","비밀보장과 그 한계","참여와 중도 탈퇴에 관한 권리","집단 참여로 예상되는 위험","집단의 목적과 절차"],"a":0,"ex":"다른 집단원의 신상정보 제공은 오히려 비밀보장 위반이다."},{"n":6,"q":"심리극에서 주인공의 등 뒤에서 주인공의 내면 목소리와 숨겨진 감정을 대신 표현해 주는 역할은?","opts":["연출자","보조자아","역할교대","거울기법","이중자아"],"a":4,"ex":"이중자아(double)는 주인공이 미처 표현하지 못한 내면을 음성화한다."},{"n":7,"q":"집단의 구성에 대한 설명으로 옳지 않은 것은?","opts":["집단 인원이 많을수록 치료 효과는 항상 커진다.","청소년 집단은 성인 집단보다 작게 구성하는 것이 일반적이다.","폐쇄집단은 응집력과 신뢰 형성에 유리하다.","개방집단은 새로운 구성원의 유입이 가능하다.","성인 상담집단은 보통 6~12명 정도로 구성한다."],"a":0,"ex":"인원이 너무 많으면 개별 참여 기회가 줄고 하위집단이 형성되기 쉽다."},{"n":8,"q":"집단발달단계 중 갈등, 저항, 주도권 다툼, 상담자에 대한 도전이 두드러지는 단계는?","opts":["초기단계","과도기(전환)단계","작업단계","종결단계","추수단계"],"a":1,"ex":"과도기의 갈등을 생산적으로 다루는 것이 작업단계로 넘어가는 관건이다."},{"n":9,"q":"미누친(Minuchin)의 구조적 가족치료에 대한 설명으로 옳지 않은 것은?","opts":["경계선을 명확한 경계, 밀착된 경계, 유리된 경계로 구분한다.","상담자가 가족에 합류(joining)하는 것을 중시한다.","다세대에 걸친 정서과정 분석이 핵심 기법이다.","하위체계의 재구조화를 목표로 한다.","가족의 상호작용을 상담 장면에서 실연(enactment)하게 한다."],"a":2,"ex":"다세대 전수과정은 보웬(Bowen) 이론의 핵심 개념이다."},{"n":10,"q":"사티어(Satir)의 의사소통 유형 중 자기, 타인, 상황을 모두 존중하는 기능적 유형은?","opts":["회유형","비난형","초이성형","일치형","산만형"],"a":3,"ex":"나머지 네 유형은 자존감이 위협받을 때 나타나는 역기능적 생존 유형이다."},{"n":11,"q":"사티어의 의사소통 유형 중 자신의 가치를 무시하고 타인과 상황에 맞추어 비위를 맞추는 유형은?","opts":["초이성형","비난형","회유형","산만형","일치형"],"a":2,"ex":"회유형은 자기를 배제하고, 비난형은 타인을 배제하며, 초이성형은 자기와 타인 모두를 배제한다."},{"n":12,"q":"보웬 이론에서 두 사람 사이의 불안과 긴장이 높아질 때 제3자를 끌어들여 긴장을 처리하는 현상은?","opts":["융해","삼각관계","정서적 단절","가족투사과정","형제순위"],"a":1,"ex":"삼각관계는 일시적 안정을 주지만 근본 갈등 해결을 막는다. 상담자는 탈삼각화를 돕는다."},{"n":13,"q":"전략적 가족치료에서 내담자에게 증상을 의도적으로 수행하도록 지시함으로써 증상의 자발성을 무너뜨리는 기법은?","opts":["실연","외재화","경계 만들기","가족조각","역설적 지시(증상처방)"],"a":4,"ex":"증상이 통제 가능한 것임을 경험하게 하거나, 지시에 반발해 증상을 포기하게 만드는 이중구속적 개입이다."},{"n":14,"q":"해결중심 가족치료에서 ‘문제가 모두 해결된 다음 날 아침’을 구체적으로 상상하게 하는 질문은?","opts":["예외질문","대처질문","척도질문","기적질문","악몽질문"],"a":3,"ex":"기적질문은 문제 중심 대화에서 해결 중심 대화로 전환하고 목표를 구체화한다."},{"n":15,"q":"이야기치료의 외재화 대화에 대한 설명으로 옳지 않은 것은?","opts":["문제를 개인 내부의 성격적 결함으로 명확히 규정한다.","‘사람이 문제가 아니라 문제가 문제다’라는 전제에 기반한다.","문제에 대한 내담자의 통제감과 주체성을 회복시킨다.","독특한 결과를 탐색하는 토대가 된다.","사람과 문제를 분리한다."],"a":0,"ex":"외재화는 문제를 내적 결함으로 보는 지배적 이야기를 해체하는 작업이다."},{"n":16,"q":"밀란(Milan) 학파의 순환질문에 대한 설명으로 가장 적절한 것은?","opts":[
