"과거의 외상 경험을 탐색하는 질문이다.","예/아니오로 답하는 폐쇄형 질문이다.","상담자의 가설을 직접 확인시키는 유도질문이다.","한 가족원에게 다른 가족원들 간의 관계나 차이에 대해 묻는 질문이다.","구체적인 행동 과제를 지시하는 질문이다."],"a":3,"ex":"순환질문은 가족원들이 서로의 관점 차이를 듣게 하여 관계의 순환적 패턴을 드러낸다."},{"n":17,"q":"가계도(genogram)에 대한 설명으로 옳지 않은 것은?","opts":["일반적으로 3세대 이상의 가족 정보를 도식화한다.","가족의 현재 상호작용을 실시간으로 관찰하는 기법이다.","남성은 사각형, 여성은 원으로 표시한다.","결혼, 이혼, 사망 등의 주요 사건을 기록한다.","세대 간 반복되는 관계 패턴을 파악할 수 있다."],"a":1,"ex":"실시간 상호작용 관찰은 실연(enactment) 등에 해당한다. 가계도는 구조와 역사의 도식화 도구이다."},{"n":18,"q":"가족조각(family sculpting)에 대한 설명으로 가장 적절한 것은?","opts":["언어적 토론을 중심으로 하는 인지적 기법이다.","가족의 유전 정보를 도식화하는 사정 도구이다.","가족관계와 정서를 신체 자세와 공간 배치로 표현하는 비언어적 경험 기법이다.","행동계약을 체결하는 행동주의 기법이다.","가족에게 이론을 가르치는 심리교육 기법이다."],"a":2,"ex":"사티어 등 경험적 가족치료에서 활용하며, 언어 방어를 우회해 관계 역동을 생생하게 드러낸다."},{"n":19,"q":"공동지도자(co-leader) 체제의 장점으로 보기 어려운 것은?","opts":["지도자 간의 경쟁과 갈등도 집단에 항상 유익하게 작용한다.","서로의 역전이를 점검하고 피드백할 수 있다.","한 지도자가 불참해도 집단의 연속성이 유지된다.","집단 역동을 다양한 관점에서 파악할 수 있다.","건강한 상호작용의 모델링을 제공할 수 있다."],"a":0,"ex":"지도자 간 미해결 갈등은 집단을 분열시킬 수 있어 정기적인 협의가 필요하다."},{"n":20,"q":"비자발적으로 의뢰된 집단원에 대한 개입으로 가장 적절한 것은?","opts":["집단 분위기를 위해 즉시 제외한다.","비자발성을 무시하고 정해진 프로그램을 진행한다.","다른 집단원들이 설득하도록 맡겨 둔다.","강한 직면으로 참여를 압박한다.","저항을 자연스러운 것으로 수용하고 참여에 대한 생각과 감정을 표현하도록 격려한다."],"a":4,"ex":"비자발적 집단원의 양가감정을 다루고 집단 내에서의 선택권을 인정하는 것이 참여 동기를 높인다."},{"n":21,"q":"어린 시절 가족 내에서 형성된 갈등이 집단에서 재현되고 이를 교정적으로 재경험하게 되는 얄롬의 치료적 요인은?","opts":["보편성","이타주의","일차(초기) 가족집단의 교정적 재현","사회화 기술의 발달","실존적 요인"],"a":2,"ex":"집단은 가족을 닮는다. 상담자·집단원에게 부모·형제 전이가 일어나고 이를 새로운 방식으로 다룰 기회가 생긴다."},{"n":22,"q":"집단상담 종결단계의 과업으로 적절하지 않은 것은?","opts":["미해결 과제를 다룬다.","학습한 것의 일상 적용과 실행 계획을 다룬다.","서로 피드백을 주고받는다.","이별에 따르는 감정을 다룬다.","새로운 깊은 문제를 본격적으로 개방하도록 촉진한다."],"a":4,"ex":"종결 직전의 새로운 깊은 개방은 다룰 시간이 없어 오히려 위험하며, 필요시 개인상담 의뢰가 적절하다."},{"n":23,"q":"집단상담의 비밀보장에 대한 설명으로 옳지 않은 것은?","opts":["상담자는 모든 집단원의 비밀유지를 완전히 보장할 수 있다.","집단 장면에서는 비밀보장이 완전하게 보장될 수 없음을 알린다.","자해·타해 위험 등 비밀보장의 한계를 사전에 고지한다.","집단원에 의한 비밀 누설 가능성은 집단상담 고유의 위험요소이다.","상담자는 비밀보장의 중요성을 반복적으로 교육한다."],"a":0,"ex":"상담자가 통제할 수 있는 것은 자신의 비밀유지뿐이며, 이 한계의 고지가 윤리적 의무이다."},{"n":24,"q":"터크만(Tuckman)의 집단발달 단계를 순서대로 바르게 나열한 것은?","opts":["형성기 → 격동기 → 수행기 → 규범기","형성기 → 규범기 → 격동기 → 수행기","격동기 → 형성기 → 규범기 → 수행기","형성기 → 격동기 → 규범기 → 수행기","규범기 → 형성기 → 격동기 → 수행기"],"a":3,"ex":"forming-storming-norming-performing. 갈등(격동) 후에 규범이 형성된다는 순서가 함정 포인트이다."},{"n":25,"q":"모레노(Moreno) 심리극의 구성요소를 모두 고른 것은?","box":"ㄱ. 주인공\nㄴ. 연출자\nㄷ. 보조자아\nㄹ. 관객\nㅁ. 무대","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ, ㅁ","ㄱ, ㄴ, ㄷ, ㄹ, ㅁ","ㄴ, ㄷ, ㄹ, ㅁ"],"a":3,"ex":"다섯 요소가 모두 포함된다. 관객도 공명과 나눔을 통해 치료 과정에 참여하는 구성요소이다."},{"n":26,"q":"심리극에서 주인공이 무대 밖으로 나와 보조자아가 연기하는 자신의 모습을 객관적으로 관찰하게 하는 기법은?","opts":["역할교대","거울기법","이중자아","독백","미래투사"],"a":1,"ex":"역할교대는 상대방의 입장이 되어보는 것, 거울기법은 자기 자신을 밖에서 바라보는 것이다."},{"n":27,"q":"집단원이 감정 표현 없이 추상적이고 지적인 토론으로만 일관할 때 상담자의 개입으로 가장 적절한 것은?","opts":["토론 주제에 대한 전문 지식을 보강해 준다.","해당 집단원을 집단에서 제외한다.","무시하고 다음 주제로 넘어간다.","지적 토론 금지 규칙을 선언한다.","“그 이야기를 하면서 지금 이 순간 어떤 감정이 느껴지는지” 묻는다."],"a":4,"ex":"지성화는 감정 회피의 방어이므로, 내용에서 ‘지금-여기’의 감정으로 초점을 옮기는 개입이 필요하다."},{"n":28,"q":"보웬(Bowen) 이론의 주요 개념을 모두 고른 것은?","box":"ㄱ. 자기분화\nㄴ. 삼각관계\nㄷ. 핵가족 정서체계\nㄹ. 가족투사과정\nㅁ. 실연(enactment)","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ, ㅁ","ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"],"a":2,"ex":"실연은 미누친의 구조적 가족치료 기법이다. 보웬의 8개 개념(분화, 삼각관계, 핵가족 정서체계, 가족투사, 다세대전수, 정서적 단절, 형제순위, 사회적 퇴행)과 구별해야 한다."},{"n":29,"q":"자기분화 수준이 낮은 사람의 특징으로 옳지 않은 것은?","opts":["감정반사적으로 행동하기 쉽다.","사고와 감정이 잘 분리되어 스트레스 상황에서도 침착함을 유지한다.","만성불안에 취약하다.","주변의 인정에 좌우되는 거짓자기가 발달하기 쉽다.","관계에서 융해되거나 정서적으로 단절되기 쉽다."],"a":1,"ex":"사고-감정의 분리와 선택 능력은 분화 수준이 ‘높은’ 사람의 특징이다."},{"n":30,"q":"가족 내 위계와 권력, 세대 간 연합의 문제에 주목하며 증상 해결을 위한 지시적 기법을 사용한 전략적 가족치료자는?","opts":["헤일리(Haley)","사티어(Satir)","보웬(Bowen)","화이트(White)","위태커(Whitaker)"],"a":0,"ex":"헤일리는 부모-자녀 간 세대를 가로지르는 연합을 역기능의 핵심으로 보았다."},{"n":31,"q":"문제 자체보다 ‘시도된 해결책’이 오히려 문제를 유지·악화시킨다고 보고, 기존 해결 시도를 차단하는 데 초점을 두는 접근은?","opts":["보웬 다세대 가족치료","구조적 가족치료","MRI 상호작용 모델","정신역동적 가족치료","맥락적 가족치료"],"a":2,"ex":"잔소리(해결 시도)가 반항(문제)을 키우는 악순환처럼, ‘더 많은 같은 시도’를 멈추게 하는 것이 개입의 핵심이다."},{"n":32,"q":"밀란(Milan) 학파의 치료 원칙에 대한 설명으로 옳지 않은 것은?","opts":["치료팀이 일방경 뒤에서 관찰하며 협력한다.","가설설정, 순환성, 중립성을 면담의 원칙으로 삼는다.","증상을 포함한 가족 행동에 긍정적 의미부여를 한다.","상담자가 특정 가족원의 편을 들어 변화를 압박한다.","회기 간격을 길게 두는 장기 단기치료 형식을 취한다."],"a":3,"ex":"특정인의 편을 드는 것은 중립성 원칙에 어긋난다. 의도적 편들기(균형 깨뜨리기)는 구조적 치료의 기법이다."},{"n":33,"q":"경계가 지나치게 경직되어 가족원 간 정서적 교류와 지지가 부족한 상태를 지칭하는 구조적 가족치료의 개념은?","opts":["밀착(enmeshment)","유리(disengagement)","연합(coalition)","우회(detouring)","위계(hierarchy)"],"a":1,"ex":"밀착은 경계가 모호해 자율성이 침해되는 상태로, 유리와 쌍을 이루는 개념이다."},{"n":34,"q":"어머니와 아들이 밀착되고 아버지가 소외된 가족에서, 부부 하위체계를 강화하고 모-자 간 경계를 명료화하려는 구조적 개입은?","opts":["합류","실연","탈삼각화","긍정적 의미부여","경계 만들기"],"a":4,"ex":"경계 만들기는 하위체계 간 경계의 투과성을 조정하는 재구조화 기법이다."},{"n":35,"q":"사티어의 빙산 탐색에서 수면 아래의 내적 경험 요소에 해당하지 않는 것은?","opts":["행동","지각(관점)","기대","열망","감정"],"a":0,"ex":"행동은 수면 위에 드러나는 부분이고, 그 아래 감정·감정에 대한 감정·지각·기대·열망·자기가 층을 이룬다."},{"n":36,"q":"“그렇게 힘든 상황에서 어떻게 지금까지 버텨 오실 수 있었나요?”에 해당하는 해결중심 질문 기법은?","opts":["기적질문","예외질문","대처질문","척도질문","관계성질문"],"a":2,"ex":"대처질문은 위기 상황의 내담자에게서 이미 작동 중인 생존 자원을 발견하게 한다."},{"n":37,"q":"해결중심치료의 내담자-상담자 관계 유형 중, 문제는 인식하지만 해결의 책임을 타인에게 두는 유형은?","opts":["방문형","회피형","고객형","저항형","불평형"],"a":4,"ex":"방문형은 문제 인식 자체가 없고, 고객형은 자신을 해결의 주체로 본다. 유형에 따라 과제 부여 방식이 달라진다."},{"n":38,"q":"이야기치료에서 ‘독특한 결과(unique outcome)’에 대한 설명으로 가장 적절한 것은?","opts":["문제의 원인이 된 외상 사건","지배적인 문제 이야기에 부합하지 않는 예외적 사건이나 경험","내담자에게 부여된 공식 진단명","가족이 숨겨온 비밀","상담자가 구성한 전문가적 해석"],"a":1,"ex":"문제 이야기의 줄거리에서 빠져 있던 ‘빛나는 사건’을 찾아 대안적 이야기의 출발점으로 삼는다."},{"n":39,"q":"존슨(Johnson)의 정서중심 부부치료(EFT)에 대한 설명으로 옳지 않은 것은?","opts":["행동계약과 토큰경제가 핵심 기법이다.","추적-철수와 같은 부정적 상호작용 고리를 추적한다.","이차 정서 아래의 일차 정서에 접근하여 표현하게 한다.","상호작용의 재구조화를 통해 안정된 정서적 유대를 형성한다.","성인 애착이론에 기반을 둔다."],"a":0,"ex":"행동계약·토큰경제는 행동주의 부부치료의 기법이다. EFT는 정서적 교감 경험의 재구성에 초점을 둔다."},{"n":40,"q":"보웬 이론에서 부모의 미분화와 불안이 특정 자녀에게 집중적으로 전달되는 과정을 지칭하는 개념은?","opts":["다세대 전수과정","사회적 퇴행","정서적 단절","가족투사과정","형제순위"],"a":3,"ex":"가족투사과정이 여러 세대에 걸쳐 누적되어 분화 수준이 점차 낮아지는 것이 다세대 전수과정이다."},{"n":41,"q":"집단 규범에 대한 설명으로 옳지 않은 것은?","opts":["초기에 형성된 규범은 이후에 바꾸기 어렵다.","명시적 규범과 암묵적 규범이 모두 존재한다.","규범은 상담자가 일방적으로 정하며 집단원은 형성에 관여할 수 없다.","치료적 규범 형성에는 상담자의 모델링이 중요하다.","‘지금-여기’의 상호작용을 촉진하는 규범은 치료적이다."],"a":2,"ex":"규범은 상담자와 집단원의 상호작용 속에서 함께 만들어지며, 초기 회기가 규범 형성의 결정적 시기이다."},{"n":42,"q":"집단상담자의 자기개방에 대한 설명으로 옳지 않은 것은?","opts":["집단원들에게 자기개방의 모델이 될 수 있다.","상담자 자신의 미해결 문제를 해소하기 위해 활용할 수 있다.","개방의 시기와 정도의 적절성을 판단해야 한다.","집단의 목적과 집단원의 유익에 부합해야 한다.","과거사 개방보다 ‘지금-여기’에서의 반응 개방이 더 유용한 경우가 많다."],"a":1,"ex":"상담자의 욕구 충족을 위한 개방은 역할 전도이며, 그 욕구는 수퍼비전과 자기분석에서 다루어야 한다."},{"n":43,"q":"집단이 한 집단원을 희생양으로 삼아 부정적 감정을 집중시키고 있을 때 상담자의 개입으로 가장 적절한 것은?","opts":["공격의 ‘내용’에서 집단 ‘과정’으로 주의를 돌려 역동의 의미를 다루고 해당 집단원을 보호한다.","카타르시스를 위해 공격적 표현을 계속 허용한다.","집단의 자율적 역동이므로 그대로 둔다.","희생양이 된 집단원을 집단에서 내보낸다.","상담자도 다수의 피드백에 동참한다."],"a":0,"ex":"희생양 만들기는 집단 전체의 불안을 한 사람에게 투사하는 과정이므로, 표적이 아닌 집단 역동 자체를 다루어야 한다."},{"n":44,"q":"집단에서의 침묵에 대한 설명으로 옳지 않은 것은?","opts":["통합과 숙고가 일어나는 생산적 침묵도 있다.","침묵이 갖는 의미를 집단과 함께 탐색할 수 있다.","상담자가 자신의 불안 때문에 침묵을 성급히 깨지 않도록 유의한다.","침묵은 언제나 저항이므로 즉시 중단시켜야 한다.","침묵 후의 발언이 더 깊어지는 경우도 있다."],"a":3,"ex":"침묵의 의미는 시점과 맥락에 따라 다르다. 견디기 어려운 것이 집단인지 상담자 자신인지 구분이 필요하다."},{"n":45,"q":"청소년 집단상담의 운영에 대한 설명으로 옳지 않은 것은?","opts":["활동 중심 요소를 활용하면 참여를 촉진할 수 있다.","회기를 비교적 짧게 하고 구조화 수준을 높이는 것이 도움이 된다.","보호자 고지 등과 관련된 비밀보장의 한계를 명확히 안내한다.","또래 역동이 강력한 치료적 자원이 된다.","성인 집단과 동일한 방식과 시간 구조를 그대로 적용하는 것이 바람직하다."],"a":4,"ex":"주의 지속시간, 언어적 표현 능력, 발달과업이 다르므로 형식과 매체를 발달수준에 맞게 조정해야 한다."},{"n":46,"q":"집단상담 연구에서 성과(outcome)변인에 해당하는 것을 모두 고른 것은?","box":"ㄱ. 집단응집력\nㄴ. 회기의 깊이에 대한 평정\nㄷ. 증상의 감소\nㄹ. 개인 목표 달성도","opts":["ㄱ, ㄴ","ㄷ, ㄹ","ㄱ, ㄷ","ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"응집력과 회기 평정은 변화가 일어나는 ‘과정’변인이고, 증상 감소와 목표 달성은 집단이 끝난 뒤 확인하는 ‘성과’변인이다."},{"n":47,"q":"심리극의 진행 단계를 순서대로 바르게 나열한 것은?","opts":["준비(웜업) → 실연(행동화) → 나눔(공유)","실연 → 준비 → 나눔","준비 → 나눔 → 실연","나눔 → 준비 → 실연","실연 → 나눔 → 준비"],"a":0,"ex":"나눔 단계에서는 분석과 충고가 아니라 관객 자신의 경험을 나누는 것이 원칙이다."},{"n":48,"q":"구조화된 집단상담 프로그램의 개발 절차로 가장 적절한 것은?","opts":["목표 수립 → 평가 → 요구분석 → 활동 구성 → 예비 실시","활동 구성 → 요구분석 → 목표 수립 → 평가 → 예비 실시","요구분석 → 목표 수립 → 활동 구성 → 예비 실시와 수정 → 평가","요구분석 → 활동 구성 → 목표 수립 → 평가 → 예비 실시","예비 실시 → 요구분석 → 목표 수립 → 활동 구성 → 평가"],"a":2,"ex":"대상의 요구에서 출발해 목표-내용-검증의 순서로 진행되며, 파일럿 실시가 본 실시에 앞선다."},{"n":49,"q":"1차 사이버네틱스와 2차 사이버네틱스의 차이에 대한 설명으로 가장 적절한 것은?","opts":["2차 사이버네틱스는 기계 체계에만 적용된다.","1차는 치료자를 체계의 일부로, 2차는 외부 관찰자로 본다.","두 관점 모두 치료자의 객관성을 전제한다.","1차는 치료자를 체계 밖의 객관적 관찰자로, 2차는 치료자도 관찰하는 체계의 일부로 본다.","1차 사이버네틱스가 사회구성주의에 기반한다."],"a":3,"ex":"2차 사이버네틱스로의 전환은 치료자의 중립적 전문가 위치에 대한 의문, 나아가 포스트모던 치료의 토대가 되었다."},{"n":50,"q":"아내의 잔소리가 남편의 회피를 부르고, 남편의 회피가 다시 아내의 잔소리를 심화시키는 상호작용을 설명하는 개념은?","opts":["직선적 인과성","합류","다중결과성","위계","순환적 인과성"],"a":4,"ex":"누가 먼저인가(원인 찾기)보다 고리를 어디서 끊을 것인가가 체계론적 개입의 질문이 된다."},{"n":51,"q":"가족체계가 변화의 압력 속에서도 기존의 안정 상태를 유지하려는 경향을 지칭하는 개념은?","opts":["항상성","형태변형성","개방체계","하위체계","순환성"],"a":0,"ex":"증상의 개선에도 불구하고 가족이 이전 패턴으로 되돌아가려는 현상을 설명해 준다. 형태변형성은 변화 능력을 의미한다."},{"n":52,"q":"체계의 일탈이나 변화를 증폭시켜 새로운 상태로의 변화를 가져오는 환류(feedback)는?","opts":["부적 환류","메타소통","이중구속","정적 환류","위장"],"a":3,"ex":"정적/부적은 좋고 나쁨이 아니라 일탈의 ‘증폭/감소’를 의미한다. 부적 환류는 항상성 유지에 기여한다."},{"n":53,"q":"서로 모순되는 두 메시지가 상이한 수준에서 동시에 전달되고, 수신자가 그 모순을 지적하거나 장을 떠날 수도 없는 의사소통 상황은?","opts":["재구성","대칭적 관계","보완적 관계","순환질문","이중구속"],"a":4,"ex":"베이트슨 등이 조현병 가족 연구에서 제안한 개념으로, 의사소통 가족치료의 출발점이 되었다."},{"n":54,"q":"한쪽이 우위에 서고 다른 쪽이 순응하는 상호작용 패턴이 고착된 관계 유형은?","opts":["대칭적 관계","병렬적 관계","보완적 관계","융해된 관계","단절된 관계"],"a":2,"ex":"대칭적 관계는 동등함을 추구하다 경쟁적으로 상승(escalation)할 수 있다는 점에서 대비된다."},{"n":55,"q":"위태커(Whitaker)의 상징적-경험적 가족치료에 대한 설명으로 옳지 않은 것은?","opts":["이론보다 치료자의 인간적 참여와 자발성을 강조한다.","엄격하게 매뉴얼화된 절차의 준수를 핵심으로 한다.","‘치료적 부조리’와 같은 직관적 개입을 활용한다.","공동치료자와 함께 작업하는 것을 선호한다.","정서적 경험의 확장을 변화의 통로로 본다."],"a":1,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 위태커는 ‘이론이 치료자를 보호할 뿐 가족을 돕지 못한다’고 할 만큼 기법화에 비판적이었다."},{"n":56,"q":"해결중심치료의 후속 회기 진행 틀인 EARS에서 A가 의미하는 것은?","opts":["평가하기(Assess)","수용하기(Accept)","실행하기(Act)","확장하기(Amplify)","분석하기(Analyze)"],"a":3,"ex":"잘된 것을 이끌어내고(Elicit), 확장하고(Amplify), 강화하고(Reinforce), 다시 시작한다(Start again)."},{"n":57,"q":"이야기치료에서 내담자의 새로운 대안적 이야기를 외부증인 청중 앞에서 말하고 인정받게 하는 절차는?","opts":["회원재구성","해체적 질문","문제의 외재화","입장 진술 지도","정의예식"],"a":4,"ex":"회원재구성(re-membering)은 자기 삶의 ‘인생 클럽’ 회원을 재구성하는 대화라는 점에서 구별된다."},{"n":58,"q":"치료팀이 가족이 지켜보는 가운데 자신들의 관찰과 생각을 공개적으로 대화하듯 나누고, 가족이 다시 그에 반응하게 하는 접근은?","opts":["전략적 지시","일방경 비밀 관찰","반영팀","심리교육 강의","구조적 실연"],"a":2,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 앤더슨(Andersen)의 반영팀은 치료자-가족 간 위계를 낮추는 포스트모던적 실천이다."},{"n":59,"q":"재혼가족(혼합가족)에 대한 설명으로 옳지 않은 것은?","opts":["초혼 핵가족과 발달과업이 동일하므로 같은 방식으로 접근한다.","계부모-자녀 관계 형성에는 충분한 시간이 필요하다.","전 배우자와의 협력적 부모역할이 과제가 될 수 있다.","자녀는 친부모와 계부모 사이에서 충성심 갈등을 겪을 수 있다.","가족 경계의 모호성이 적응 과제가 된다."],"a":0,"ex":"재혼가족은 상실의 역사 위에서 시작하는 체계로, 초혼 가족 모델을 기준으로 삼으면 ‘결핍’으로만 보게 된다."},{"n":60,"q":"가족상담의 비밀보장에 대한 설명으로 옳지 않은 것은?","opts":["‘누가 내담자인가’라는 고유한 윤리적 쟁점이 발생한다.","한 가족원이 개별적으로 말한 비밀을 상담자가 임의로 다른 가족원에게 공개할 수 있다.","아동학대 등 법적 신고 의무 사항은 비밀보장의 예외이다.","기록의 공개는 관련 법령과 동의 절차에 따라 이루어진다.","개별 접촉에서 얻은 정보의 취급 방침을 사전에 합의해 둔다."],"a":1,"ex":"비밀 취급 방침(공유한다/하지 않는다)은 어느 쪽이든 가능하나, 반드시 사전 구조화로 합의되어야 한다."},{"n":61,"q":"집단 회기 중 한 집단원이 다른 집단원에게 “너 같은 사람 때문에 짜증나”라고 공격적으로 말했다. 상담자의 개입으로 가장 적절한 것은?","opts":["집단 분위기를 위해 즉시 해당 집단원을 퇴장시킨다.","감정의 이면을 탐색하고, 구체적 행동에 대한 나-전달 피드백으로 바꾸어 표현하도록 돕는다.","갈등을 못 본 척하고 다음 주제로 넘어간다.","두 사람이 알아서 싸우도록 그대로 둔다.","회기를 조기에 종료한다."],"a":1,"ex":"갈등은 작업의 재료다. ‘너 비난’을 ‘구체적 행동에 대한 내 감정’으로 번역시키면 공격이 피드백으로 바뀐다."},{"n":62,"q":"집단원이 “지난주에 여기서 한 얘기를 밖에서 다른 사람에게 들었다”라고 호소한다. 상담자의 개입으로 가장 적절한 것은?","opts":["집단 전체 장면에서 규범 위반과 신뢰의 문제로 공개적으로 다루고 회복 방안을 논의한다.","해당 집단원과 개별 면담만 하고 집단에서는 다루지 않는다.","누설자를 색출해 공개적으로 처벌한다.","증거가 없으므로 무시한다.","집단을 즉시 해산한다."],"a":0,"ex":"비밀보장 위반은 한 사람의 문제가 아니라 집단 전체의 안전 기반이 흔들린 사건이므로, 집단 수준에서 다루어야 한다."},{"n":63,"q":"집단 초기, 집단원들이 서로 눈치만 보며 긴 침묵이 이어지고 있다. 상담자의 개입으로 가장 적절한 것은?","opts":["깊은 자기개방을 한 명씩 강제로 시킨다.","불안이 커지도록 침묵을 의도적으로 길게 방치한다.","집단의 실패로 규정하고 종결을 논의한다.","상담자가 강의로 회기를 채운다.","위험 수준이 낮은 활동과 구조화를 제공하여 신뢰 형성을 돕는다."],"a":4,"ex":"초기 침묵은 저항이라기보다 안전감 부족의 신호인 경우가 많다. 초기에는 구조화가 불안을 줄여 참여를 돕는다."},{"n":64,"q":"집단발달의 작업단계에 대한 설명으로 옳지 않은 것은?","opts":["깊은 수준의 자기개방이 일어난다.","집단원 간 피드백 교환이 활발하다.","응집력을 바탕으로 위험 감수 행동이 늘어난다.","신뢰 대 불신의 문제가 처음으로 형성되는 시기이다.","통찰을 행동 변화로 옮기는 작업이 이루어진다."],"a":3,"ex":"신뢰 대 불신은 초기(시작)단계의 중심 과제다. 작업단계는 그 토대 위에서 진행된다."},{"n":65,"q":"등교를 거부하는 중학교 2학년 자녀 문제로 가족이 의뢰되었는데, 면담 중 부부의 만성적 갈등이 드러났다. 가족치료적 관점에서 가장 적절한 접근은?","opts":["자녀 개인의 의지 부족 문제로 본다.","즉시 등교를 강제하도록 부모에게 지시한다.","자녀의 증상이 부부 갈등과 가족체계 안에서 갖는 기능을 탐색한다.","부모의 양육 실패로 규정하고 강하게 직면한다.","또래관계 문제로만 한정하여 다룬다."],"a":2,"ex":"증상은 체계의 산물일 수 있다. IP의 증상이 부부 갈등을 우회시키는 기능을 하는지가 체계론적 핵심 질문이다."},{"n":66,"q":"상담 장면에서 가족이 평소의 갈등 상호작용을 실제로 해 보게 하고, 상담자가 이를 관찰하며 개입하는 구조적 가족치료 기법은?","opts":["합류","추적","유지","실연","모방"],"a":3,"ex":"보고된 상호작용과 실제 상호작용은 다르다. 실연은 진단(사정)과 개입이 동시에 일어나는 기법이다."},{"n":67,"q":"아버지는 “전부 네가 문제야”라며 손가락질하고, 어머니는 “제가 다 잘못했어요”라며 움츠러든다. 사티어의 의사소통 유형으로 옳게 짝지은 것은?","opts":["비난형 - 회유형","초이성형 - 산만형","회유형 - 비난형","일치형 - 회유형","비난형 - 초이성형"],"a":0,"ex":"비난형은 자기를 지키려 타인을 깎아내리고, 회유형은 자기를 지워 관계를 지키려 한다. 둘은 흔히 상보적 짝을 이룬다."},{"n":68,"q":"결혼 후에도 어머니의 일상적 지시에 그대로 따르며, 이로 인해 배우자와 반복적으로 갈등하는 남성의 상태를 보웬 이론으로 설명하면?","opts":["정서적 단절","탈삼각화","사회적 퇴행","형제순위 효과","자아의 미분화(융해)"],"a":4,"ex":"원가족과의 정서적 융해가 새 가족 체계의 경계 형성을 방해하는 전형적 사례이다."},{"n":69,"q":"원가족과의 갈등을 피하려 10년째 연락을 끊고 지내지만, 새로 꾸린 가족 안에서 유사한 갈등 패턴이 반복되고 있다. 보웬 이론의 개념으로 가장 적절한 것은?","opts":["자기분화의 완성","탈삼각화","정서적 단절","가족투사과정","항상성"],"a":2,"ex":"단절은 분화처럼 보이지만 미해결 융해의 다른 얼굴이다. 물리적 거리가 정서적 해결을 대신하지 못함을 보여준다."},{"n":70,"q":"불면을 호소하는 내담자에게 “오늘 밤은 잠들려고 애쓰지 말고 일부러 깨어 있어 보세요”라고 제안했다. 해당하는 기법은?","opts":["재구성","증상처방(역설적 개입)","시련기법","가장(pretend) 기법","순환질문"],"a":1,"ex":"수행불안이 증상을 유지할 때, 증상을 의도하게 하면 그 악순환이 끊긴다. 잠은 애쓰지 않을 때 온다."},{"n":71,"q":"헤일리가 사용한 기법으로, 증상을 유지하는 것이 포기하는 것보다 더 수고스럽도록 건설적인 과제를 부과하는 것은?","opts":["증상처방","재구성","가장기법","실연","시련기법"],"a":4,"ex":"예컨대 불면 때마다 새벽에 일어나 집안 청소를 하게 한다. 증상의 ‘대가’를 올려 증상을 비경제적으로 만든다."},{"n":72,"q":"“간섭이 심한 엄마”라는 가족의 규정을 “걱정이 많은 엄마”로 바꾸어 제시하였다. 해당하는 기법은?","opts":["재구성(재명명)","명료화","외재화","실연","추적"],"a":0,"ex":"행동은 그대로 두고 의미 틀을 바꾼다. 새로운 의미는 새로운 반응의 가능성을 연다."},{"n":73,"q":"아내가 “문제는 남편이고, 남편이 변해야 한다”라고만 말한다(불평형). 해결중심 접근에서 가장 적절한 과제 부여는?","opts":["남편을 변화시키라고 강하게 직면한다.","남편의 상담 동반 참여를 강제한다.","남편이 조금이라도 잘하는 때(예외)를 관찰해 오는 과제를 제안한다.","아내에게 즉시 행동 변화 과제를 부과한다.","변화 의지가 없으므로 상담을 거절한다."],"a":2,"ex":"불평형에게 행동 과제는 이르고, 관찰 과제가 적합하다. 예외 관찰은 시선을 문제에서 해결로 옮긴다."},{"n":74,"q":"상담자가 아동에게 “‘분노’가 너를 또 찾아왔을 때, 너는 어떻게 분노에 맞서니?”라고 물었다. 해당하는 이야기치료 기법은?","opts":["회원재구성","정의예식","재진술","외재화 대화","문서화 작업"],"a":3,"ex":"문제를 인격화된 외부 존재로 명명하면, 아동은 ‘문제아’가 아니라 ‘문제와 싸우는 주인공’의 위치에 서게 된다."},{"n":75,"q":"가계도를 분석하니 3세대에 걸쳐 장남들이 모두 알코올 문제와 부부불화를 보이고 있었다. 가장 적절한 가설적 개념은?","opts":["가족신화","다세대 전수과정","사회적 퇴행","희생양 만들기","가족규칙"],"a":1,"ex":"미분화와 그에 따른 관계 패턴이 세대를 건너 반복·누적되는 양상으로, 가계도가 이를 시각화해 준다."},{"n":76,"q":"집단상담 프로그램 홍보에 대한 설명으로 옳지 않은 것은?","opts":["집단의 목적, 대상, 일정을 명확히 안내한다.","지도자의 자격과 경력 정보를 제공한다.","사전 선별(스크리닝) 절차를 안내한다.","“100% 효과 보장”과 같은 문구로 참여를 유도한다.","비용과 환불 규정을 명시한다."],"a":3,"ex":"효과 보장 문구는 비윤리적 과장 광고이며, 충분한 정보에 근거한 자발적 선택을 침해한다."},{"n":77,"q":"부부상담 중 한 배우자가 개별 전화로 외도 사실을 알리며 비밀로 해 달라고 요청했다. 가장 적절한 대처는?","opts":["다음 회기에 즉시 배우자에게 폭로한다.","어떤 경우에도 영구히 비밀을 보장하겠다고 약속한다.","사전에 합의한 비밀 취급 방침에 따르고, 방침이 없었다면 그 비밀이 상담 구조에 미치는 영향을 다룬다.","아무 일도 없었던 것처럼 상담을 계속한다.","상담 기록에서 해당 내용을 삭제한다."],"a":2,"ex":"개별 정보 취급 방침의 사전 구조화가 핵심이다. 상담자가 비밀의 공동 보유자가 되면 중립성과 치료 구조가 잠식된다."},{"n":78,"q":"가족조각을 실시한 후 가장 중요하게 다루어야 할 작업은?","opts":["각자가 그 위치에서 느낀 감정과 지각을 충분히 나눈다.","각 가족원의 자세에 점수를 매긴다.","상담자가 정답 자세로 교정해 준다.","조각 장면을 사진으로 남긴다.","곧바로 다음 활동으로 넘어간다."],"a":0,"ex":"조각은 자료 산출 도구일 뿐, 치료적 작업은 그 경험에 대한 나눔(처리 과정)에서 일어난다."},{"n":79,"q":"초등학교 저학년 아동 집단상담의 적정 인원으로 가장 적절한 것은?","opts":["15~20명","10~12명","4~6명","반드시 12명 이상","인원과 무관하다"],"a":2,"ex":"주의 폭과 개입 필요성을 고려해 연령이 어릴수록 집단은 작게, 회기는 짧게 구성한다."},{"n":80,"q":"마지막 회기에 한 집단원이 “끝나는 게 아쉽고 막막하다”라고 말했다. 상담자의 반응으로 가장 적절한 것은?","opts":["“좋은 게 좋은 거죠”라며 화제를 돌린다.","아쉬움을 달래기 위해 집단 연장을 즉석에서 약속한다.","개인상담 계약을 권유하며 마무리한다.","연락처 교환을 의무화한다.","이별의 감정을 종결 과정의 자연스러운 부분으로 수용하고 충분히 다룬다."],"a":4,"ex":"종결의 상실감을 다루는 경험 자체가 건강한 이별의 모델이 된다. 회피하거나 무마하면 학습 기회를 잃는다."},{"n":81,"q":"얄롬의 치료적 요인에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 치료요인의 상대적 중요도는 집단의 유형과 발달단계에 따라 달라진다.\nㄴ. 응집력은 개인상담의 치료동맹에 상응하는 요인으로 간주된다.\nㄷ. 카타르시스는 단독으로도 충분한 변화 기제이다.\nㄹ. 대인관계 학습은 집단을 사회의 축소판으로 보는 관점과 관련된다.","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"얄롬은 정서 표출만으로는 부족하며 인지적 처리와 결합될 때 치료적이라고 보았다. ‘카타르시스 단독 충분’이 함정이다."},{"n":82,"q":"얄롬이 말한 ‘과정 조명(process illumination)’의 의미로 가장 적절한 것은?","opts":["상호작용의 내용이 아니라 그 교류가 관계에 대해 말해주는 의미를 함께 검토하는 것","회기에서 다룬 내용을 요약해 주는 것","집단실의 조도를 조절하는 환경 관리","집단원의 과거사를 연대기적으로 해석하는 것","다음 회기 주제를 예고하는 것"],"a":0,"ex":"‘무엇을 말했는가’에서 ‘방금 우리 사이에 무슨 일이 일어났는가’로 시선을 옮기는 것이 지금-여기 작업의 두 번째 단계다."},{"n":83,"q":"집단 내 하위집단에 대한 설명으로 옳지 않은 것은?","opts":["집단 규범 설정 시 집단 밖 접촉의 공개 원칙을 합의해 둘 수 있다.","집단 밖 사교가 비밀이 되면 집단 작업을 방해할 수 있다.","하위집단과 관련된 주제는 집단 안에서 공개적으로 다루는 것이 원칙이다.","하위집단에 속하지 못한 집단원의 소외감을 다룰 필요가 있다.","하위집단의 형성은 언제나 파괴적이므로 발견 즉시 해체시켜야 한다."],"a":4,"ex":"문제는 하위집단 자체가 아니라 ‘비밀’이다. 공개되어 다루어지는 하위집단 역동은 오히려 풍부한 작업 재료가 된다."},{"n":84,"q":"공동지도 체제에서 두 지도자의 개입 방향이 회기 중 충돌하였다. 가장 적절한 대처는?","opts":["집단 앞에서 누가 옳은지 결판을 낸다.","회기 밖 정기 협의에서 다루되, 적절한 경우 이견을 건설적으로 조율하는 모습 자체를 집단에 모델링할 수 있다.","한 지도자가 이후 회기 내내 침묵하기로 한다.","즉시 공동지도 체제를 해체한다.","수퍼비전에서는 다루지 않는다."],"a":1,"ex":"갈등의 은폐도, 집단 앞 권력 다툼도 해롭다. 차이를 존중하며 조율하는 모습은 그 자체로 강력한 교육 자료다."},{"n":85,"q":"집단의 구조화 수준에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 비구조화 집단은 지금-여기 상호작용 자료가 풍부하게 산출된다.\nㄴ. 위기 청소년 대상 단기 개입에는 대체로 구조화된 형식이 적합하다.\nㄷ. 구조화 집단은 사전에 계획된 활동에 따라 진행된다.\nㄹ. 비구조화 집단은 지도자에게 요구되는 역량 수준이 낮다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"구조가 없을수록 순간순간의 역동을 읽고 개입하는 지도자 역량이 더 요구된다. ㄹ이 반대로 서술된 함정이다."},{"n":86,"q":"집단 시작 전 개별 면담(스크리닝)의 목적으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 집단 적합성의 평가\nㄴ. 집단에 대한 기대의 구조화\nㄷ. 개인 목표 설정의 시작\nㄹ. 집단원의 진단명을 다른 집단원에게 공표할 준비","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"스크리닝은 ‘거르기’만이 아니라 ‘준비시키기’다. 사전 준비된 집단원일수록 초기 탈락이 적다."},{"n":87,"q":"올슨(Olson)의 순환 모델에 대한 설명으로 옳지 않은 것은?","opts":["FACES 척도와 연결되어 있다.","가족 응집성과 유연성(적응성)의 두 차원으로 가족을 평가한다.","밀착·유리, 경직·혼돈과 같은 극단이 역기능과 관련된다고 본다.","두 차원 모두 높을수록 무조건 기능적인 가족이다.","의사소통은 두 차원의 이동을 돕는 촉진 차원이다."],"a":3,"ex":"순환 모델의 핵심은 곡선 가설, 즉 ‘중간 수준이 기능적’이라는 것이다. ‘높을수록 좋다’는 선형 가정이 함정이다."},{"n":88,"q":"맥매스터 모델에서 ‘자극의 성질에 맞는 적절한 질과 양의 정서로 반응할 수 있는 가족의 능력’을 지칭하는 차원은?","opts":["문제해결","의사소통","역할","정서적 반응성","행동통제"],"a":3,"ex":"정서적 ‘관여’(서로에 대한 관심의 양과 질)와 구별해야 한다. 반응성은 정서 산출 능력, 관여는 관계 투자다."},{"n":89,"q":"마다네스(Madanes)가 사용한 기법으로, 아동에게 증상을 ‘가진 척’ 놀이처럼 수행하게 하여 실제 증상이 갖던 기능을 무력화하는 것은?","opts":["가장(pretend) 기법","증상처방","시련기법","순환질문","문서화 작업"],"a":0,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 ‘진짜’가 ‘놀이’가 되는 순간 증상의 보호 기능(부모의 관심 끌기 등)이 유지될 필요가 없어진다."},{"n":90,"q":"직접적인 지시 대신, 문제와 유사한 구조를 가진 다른 활동이나 이야기를 통해 변화를 간접적으로 유도하는 기법은?","opts":["직접 지시","경계 만들기","심리교육","실연","은유적 과제"],"a":4,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 에릭슨(Erickson)의 전통에서 발전했으며, 저항을 우회하는 간접 개입의 대표 기법이다."},{"n":91,"q":"구조적 가족치료에서 상담자가 의도적으로 특정 가족원의 편을 들어 고착된 체계의 균형을 흔드는 기법은?","opts":["합류","추적","유지","균형 깨뜨리기","모방"],"a":3,"ex":"중립성의 의도적·일시적 포기다. 밀란 학파의 중립성 원칙과 대비해 두면 변별 문항에 강해진다."},{"n":92,"q":"보웬 학파 치료자의 역할에 대한 설명으로 옳지 않은 것은?","opts":["가족의 정서 삼각형에 말려들지 않는 탈삼각화된 위치를 유지한다.","정서 반사를 줄이고 사고를 촉진하는 과정 질문을 사용한다.","치료자가 가족의 정서 체계에 깊이 융합되어 함께 동요할수록 효과적이다.","치료의 장기 목표는 가족원의 분화 수준 향상이다.","가계도를 주요 도구로 활용한다."],"a":2,"ex":"치료자 자신의 분화 수준이 치료의 도구다. 융합된 치료자는 또 하나의 삼각형 꼭짓점이 될 뿐이다."},{"n":93,"q":"포스트모던 가족치료 접근들에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 해결중심치료와 이야기치료는 포스트모던·사회구성주의 흐름에 속한다.\nㄴ. 두 접근 모두 내담자를 자기 삶의 전문가로 본다.\nㄷ. 이야기치료는 문제의 원인 규명을 핵심 절차로 삼는다.\nㄹ. ‘알지 못함(not-knowing)’의 자세는 앤더슨과 굴리시안의 협력적 언어체계 접근과 관련된다.","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"포스트모던 접근은 원인 탐색보다 의미와 해결의 ‘구성’에 관심을 둔다. ㄷ은 모더니즘적 서술이다."},{"n":94,"q":"가족치료의 효과 연구에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 가족 기반 개입은 청소년의 품행 문제와 물질 문제에서 근거가 축적되어 있다.\nㄴ. 가족 단위의 변화 측정은 개인 측정으로 충분히 대체된다.\nㄷ. 초기의 합류와 참여 유지(탈락 방지)가 성과와 관련된다.","opts":["ㄱ","ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"],"a":2,"ex":"개인 증상 척도만으로는 관계·체계 수준의 변화를 포착하지 못한다. 측정 수준의 문제는 가족치료 연구의 고유 쟁점이다."},{"n":95,"q":"국제결혼 가정과의 상담에 대한 설명으로 옳지 않은 것은?","opts":["문화 간 차이를 곧바로 병리로 단정하지 않는다.","필요시 통역과 언어 지원을 고려한다.","확대가족과 문화적 위계가 갖는 의미를 탐색한다.","문화적응 스트레스를 평가에 포함한다.","주류문화 방식으로의 동화를 치료 목표로 설정한다."],"a":4,"ex":"목표는 동화가 아니라 가족이 합의하는 적응 방식의 구성이다. 치료자의 문화적 가치 강요는 윤리 문제가 된다."},{"n":96,"q":"온라인(화상) 집단상담의 운영에 대한 설명으로 옳지 않은 것은?","opts":["대면 집단과 동일하므로 별도의 규범 합의는 필요하지 않다.","집단원이 독립된 공간에서 참여하도록 안내한다.","기술 문제 발생 시의 대처 규칙을 사전에 정한다.","비언어 단서가 제한됨을 고려하여 개입을 보완한다.","녹화·제3자 노출 가능성 등 비밀보장의 추가적 한계를 고지한다."],"a":0,"ex":"화면 밖 가족의 청취 가능성, 캡처 위험 등 온라인 고유의 위험이 있어 별도 규범(카메라, 공간, 녹화 금지)이 필요하다."},{"n":97,"q":"부모는 적극적인데 청소년 자녀는 팔짱을 낀 채 침묵하고 있다. 가족상담자의 개입으로 가장 적절한 것은?","opts":["침묵을 버릇없음으로 규정하고 훈계한다.","끌려온 입장의 비자발성을 타당화하고, 개별적 합류와 발언권 보장을 통해 참여 동기를 키운다.","청소년을 제외하고 부모하고만 상담을 진행한다.","발언할 때까지 지명을 반복한다.","침묵 1회당 과제를 추가한다."],"a":1,"ex":"‘오기 싫었을 텐데 와 줬다’는 인정이 합류의 시작이다. 청소년에게는 부모와 다른 별도의 동맹 형성이 필요하다."},{"n":98,"q":"부부상담 진행 중 한쪽 배우자의 신체적 폭력과 공포에 의한 통제가 드러났다. 가장 적절한 대처는?","opts":["어떤 경우에도 부부 합동 회기를 그대로 유지한다.","중립성을 위해 폭력 주제는 다루지 않는다.","즉각적인 화해와 용서를 권한다.","피해를 입은 쪽에게 원인 제공 행동을 탐색하게 한다.","안전을 최우선으로 평가하고, 위험이 있는 동안에는 합동 회기 대신 개별적 개입과 안전 계획을 고려한다."],"a":4,"ex":"공포에 의한 통제가 있는 관계에서 합동 회기의 ‘솔직한 개방’은 피해자를 보복 위험에 노출시킬 수 있다."},{"n":99,"q":"집단상담자 훈련의 핵심 요소로 옳은 것을 모두 고른 것은?","box":"ㄱ. 집단원으로 직접 참여해 보는 경험\nㄴ. 숙련된 지도자의 집단 관찰과 공동지도 경험\nㄷ. 자신이 운영한 집단에 대한 수퍼비전\nㄹ. 이론 학습 없이 자격증 취득만으로 충분한 준비","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"참여자 경험-관찰-공동지도-단독지도-수퍼비전으로 이어지는 단계적 훈련이 표준적 경로로 제시된다."},{"n":100,"q":"집단 종결 직후 상담자가 한 집단원과 사업 동업을 시작하려 한다. 윤리적 판단으로 가장 적절한 것은?","opts":["전문적 관계의 영향력이 종결 후에도 지속될 수 있으므로 다중관계의 착취 가능성을 신중히 평가해야 한다.","상호 이익이 된다면 아무 문제가 없다.","종결 즉시 전문적 관계가 끝났으므로 자유롭게 가능하다.","집단원들에게 비밀로 하면 문제되지 않는다.","상담 성과를 높이기 위해 권장된다."],"a":0,"ex":"관계의 권력 비대칭은 종결 도장과 함께 사라지지 않는다. ‘누구의 이익인가’가 판단의 중심 질문이다."},{"n":101,"q":"집단 회기를 마무리하는 단계에서 상담자의 과업으로 적절하지 않은 것은?","opts":["회기에서 다룬 내용과 경험을 요약한다.","집단원들이 배운 것을 한 마디씩 나누게 한다.","다음 회기와의 연결점을 만든다.","마무리 직전에 새로운 깊은 주제를 개방하도록 적극 격려한다.","미해결된 강한 감정이 있는지 확인한다."],"a":3,"ex":"회기 종료 직전의 ‘문고리 개방(doorknob disclosure)’은 다룰 시간이 없다. 다음 회기의 시작 주제로 연결하는 것이 적절하다."},{"n":102,"q":"심리극과 사회극(sociodrama)의 구별로 가장 적절한 것은?","opts":["심리극은 집단이 공유하는 사회적 주제와 역할을, 사회극은 개인의 사적 문제를 다룬다.","심리극은 관객 없이 진행된다.","두 기법은 명칭만 다르다.","사회극에는 연출자가 없다.","심리극은 개인의 사적인 문제와 갈등을, 사회극은 집단 공통의 사회적 주제와 집합적 역할을 다룬다."],"a":4,"ex":"주인공이 ‘한 개인’인가 ‘집단이 공유한 역할·주제’인가가 구별의 축이다."},{"n":103,"q":"집단 토의가 과열되었을 때 농담으로 긴장을 풀고 양측의 절충안을 제안하는 집단원의 행동은 어떤 역할에 해당하는가?","opts":["집단 유지(사회정서적) 역할","과업 역할","개인중심(자기중심적) 역할","차단자 역할","공격자 역할"],"a":0,"ex":"과업 역할은 목표 달성(정보 제공, 의견 정리)에, 유지 역할은 관계와 분위기(격려, 긴장 완화, 중재)에 기여한다."},{"n":104,"q":"집단상담 종결 후 일정 기간이 지나 갖는 추수(follow-up) 모임의 목적으로 적절하지 않은 것은?","opts":["변화의 유지와 일반화 정도를 점검한다.","집단에서 세운 실행 계획의 진행을 확인한다.","필요한 경우 추가적인 도움을 연계한다.","종결한 집단을 무기한 정규 모임으로 전환한다.","집단 경험에 대한 평가 자료를 얻는다."],"a":3,"ex":"추수 모임은 종결의 연장선에 있는 ‘점검’이지 집단의 부활이 아니다. 종결의 경계가 흐려지면 의존이 길어진다."},{"n":105,"q":"한 집단원이 “저만 이렇게 못난 부모인 줄 알았어요”라고 말하자, 상담자가 다른 집단원들의 유사한 경험을 연결해 주었다. 촉진하려는 치료적 요인은?","opts":["이타주의","모방행동","보편성","정보 전달","실존적 요인"],"a":2,"ex":"보편성은 저절로 생기지 않는다. 연결하기 기술이 ‘나만 그런 게 아니구나’의 경험을 의도적으로 직조한다."},{"n":106,"q":"집단 초기에 상담자가 적절한 자기개방을 먼저 보여주는 것의 일차적 기능은?","opts":["개방 행동의 시범(모델링)을 통해 집단 규범 형성에 기여","상담자의 유능함 과시","회기 시간 채우기","집단원 평가 자료 수집","상담자 자신의 정화"],"a":0,"ex":"집단원은 말보다 행동에서 규범을 배운다. 지도자의 절제된 개방은 ‘이곳에서는 이런 이야기를 해도 된다’는 허가가 된다."},{"n":107,"q":"마라톤 집단의 특징으로 가장 적절한 것은?","opts":["주 1회 50분씩 단기간 진행된다.","지도자 없이 진행되는 것이 원칙이다.","장시간 연속 진행으로 피로와 함께 사회적 가면과 방어가 약화되어 진솔한 상호작용이 촉진된다고 가정한다.","문서 작업 중심으로 진행된다.","아동에게 가장 적합한 형태다."],"a":2,"ex":"강렬한 경험을 만들 수 있으나, 같은 이유로 심리적 위험 관리와 선별이 더욱 중요해진다."},{"n":108,"q":"집단응집력을 높이는 요인으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 집단 목표와 개인 목표의 연결\nㄴ. 출석과 시간 약속 등 신뢰로운 구조\nㄷ. 성공적인 갈등 해결의 경험\nㄹ. 지도자의 편애와 비교","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"갈등의 부재가 아니라 갈등을 함께 통과한 경험이 응집력을 만든다. 편애는 하위집단화와 경쟁을 부른다."},{"n":109,"q":"여러 회기 동안 거의 말하지 않는 집단원에 대한 개입으로 가장 적절한 것은?","opts":["발언 전까지 회기를 끝내지 않는다고 선언한다.","상담자가 그의 마음을 대신 해석해 발표한다.","다른 집단원들이 그를 비판하도록 유도한다.","집단에서 제외한다.","침묵의 의미를 존중하며, 비언어적 참여를 인정해 주고 부담이 적은 방식(돌아가며 한 단어 나누기 등)으로 참여의 문을 열어 준다."],"a":4,"ex":"침묵하는 집단원도 관찰을 통해 배우고 있을 수 있다. 압박은 참여가 아니라 탈락을 부른다."},{"n":110,"q":"“당신이 지금 그 말을 하는 방식이 명령처럼 들려요”처럼, 의사소통 자체에 대해 소통하는 것을 지칭하는 개념은?","opts":["이중구속","디스카운트","위장","메타커뮤니케이션","반영"],"a":3,"ex":"관계 수준의 메시지를 명시적으로 다루는 것으로, 가족치료와 집단상담 모두에서 핵심적인 개입 통로가 된다."},{"n":111,"q":"“아버지의 기분이 나쁜 날에는 아무도 그 이야기를 꺼내지 않는다”처럼, 말해진 적은 없지만 가족 모두가 따르는 행동 규정을 지칭하는 개념은?","opts":["명시적 가족규칙","암묵적 가족규칙","가족신화","가족의례","위계"],"a":1,"ex":"역기능 가족일수록 규칙이 암묵적이고 경직되어 있으며, 이를 언어화하는 것 자체가 개입이 된다."},{"n":112,"q":"실제로는 갈등이 많은 가족이 “우리 가족은 한 번도 싸운 적이 없는 화목한 가족”이라는 신념을 공유하며 불일치하는 경험을 부인한다. 해당 개념은?","opts":["가족규칙","합류","가족의례","경계선","가족신화"],"a":4,"ex":"가족신화는 가족 항상성을 지키는 공유된 왜곡으로, 신화에 어긋나는 감정의 표현을 금지한다."},{"n":113,"q":"비버스(Beavers) 모델에서 구성원을 가족 밖으로 밀어내는 경향이 있어 자녀가 조기에 독립하거나 행동화하기 쉬운 가족 양식은?","opts":["구심성(centripetal) 가족","최적 가족","중간형 가족","원심성(centrifugal) 가족","경직 가족"],"a":3,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 구심성 가족은 안으로 끌어당겨 분리를 어렵게 하고(내재화 문제), 원심성 가족은 밖으로 밀어낸다(외현화 문제)."},{"n":114,"q":"사티어의 가족재구성(family reconstruction)의 일차적 목적으로 가장 적절한 것은?","opts":["원가족 3세대의 맥락을 재경험·재해석하여 현재의 역기능적 학습에서 벗어나도록 돕는다.","유산 분배의 합의","가족사진의 정리","법적 친자 확인","가족 호칭의 정리"],"a":0,"ex":"원가족 삼인군(부-모-자)에서 학습된 대처와 규칙을 심리극적 방법으로 재방문하는 사티어의 대표 기법이다."},{"n":115,"q":"보웬 이론에서 ‘사회적 퇴행’ 개념의 의미로 가장 적절한 것은?","opts":["개인의 발달 단계가 어려지는 것","만성 불안이 높아진 사회가 가족과 마찬가지로 분화 수준이 낮은 방식(감정반사적 의사결정)으로 기능하는 현상","경기 침체로 인한 소득 감소","가족 구성원 수의 감소","치료의 중단"],"a":1,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 보웬은 가족 정서 과정의 원리를 사회 수준으로 확장했다. 사회도 불안할수록 단기적·감정적 해법에 의존한다."},{"n":116,"q":"부모의 갈등 속에서 12세 자녀가 어머니의 정서적 배우자 역할과 동생들의 양육을 떠맡고 있다. 이 현상을 지칭하는 개념은?","opts":["건강한 책임감 발달","개별화의 완성","정상적 형제 위계","부모화(parentification)","탈삼각화"],"a":3,"ex":"위계의 역전이다. 아동이 체계의 필요를 메우느라 자신의 발달 과업을 유예하게 되며, 구조적 개입의 표적이 된다."},{"n":117,"q":"미누친의 구조적 관점에서 건강한 가족 위계에 대한 설명으로 가장 적절한 것은?","opts":["부모 하위체계가 명확한 경계와 함께 자녀 하위체계보다 상위의 실행 권한을 갖는다.","모든 구성원이 완전히 동등한 권한을 갖는다.","가장 연장자가 모든 결정을 독점한다.","자녀가 부모를 평가하고 통제한다.","위계는 역기능의 원인이므로 제거해야 한다."],"a":0,"ex":"위계 자체가 아니라 위계의 ‘혼란’(역전, 세대 간 연합)이 문제다. 평등과 무위계는 다른 개념이다."},{"n":118,"q":"고든(Gordon)의 부모효율성훈련(PET)에서 나-전달법의 구성 요소를 모두 고른 것은?","box":"ㄱ. 문제가 되는 상대방의 구체적 행동\nㄴ. 그 행동이 나에게 미치는 구체적 영향\nㄷ. 그로 인해 내가 느끼는 감정\nㄹ. 상대방의 성격에 대한 평가","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"행동-영향-감정의 3요소다. ‘너는 게을러’(성격 평가)가 아니라 ‘옷이 거실에 있으면(행동) 내가 치워야 해서(영향) 지친다(감정)’."},{"n":119,"q":"드라이커스(Dreikurs)의 논리적 결과가 처벌과 구별되는 특징으로 가장 적절한 것은?","opts":["더 큰 고통을 주는 것이 목적이다.","행동과 무관한 불이익을 준다.","아동 몰래 갑작스럽게 부과한다.","부모의 화풀이 수단으로 사용한다.","행동과 결과 사이에 논리적 관련이 있고, 사전에 합의되며, 존중의 태도로 일관되게 적용된다."],"a":4,"ex":"‘우유를 쏟으면 닦는다’는 논리적 결과, ‘우유를 쏟으면 게임 금지’는 처벌이다. 관련성·합의·존중이 구별 기준이다."},{"n":120,"q":"가족치료 첫 회기의 과업으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 모든 가족원과 고르게 합류하기\nㄴ. 각자의 관점에서 문제 정의 듣기\nㄷ. 가족의 상호작용 패턴 관찰하기\nㄹ. 가족 비밀에 대한 심층 해석 제시하기","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"첫 회기의 해석은 시기상조이며, 특정인과만 동맹을 맺는 것은 균형 잡힌 합류를 깨뜨린다."},{"n":121,"q":"인간중심 집단상담에서 지도자의 역할로 가장 적절한 것은?","opts":["구조화된 활동을 순서대로 지시하는 훈련가","집단의 과정을 신뢰하며 진솔성·수용·공감의 태도로 함께하는 촉진자","비합리적 신념을 논박하는 교사","증상을 처방하는 전략가","해석을 제공하는 분석가"],"a":1,"ex":"로저스는 ‘지도자’ 대신 ‘촉진자(facilitator)’라는 말을 썼다. 기법보다 존재 방식이 개입이라는 관점이다."},{"n":122,"q":"게슈탈트 집단에서 한 집단원이 지도자와 집중적인 개인 작업을 하고 다른 집단원들은 이를 지켜보다 자신의 경험을 나누는 방식은?","opts":["핫시트(hot seat) 작업","라운드 로빈","브레인스토밍","소시오메트리","역할 고정"],"a":0,"ex":"펄스 시대의 전형적 방식이다. 관찰하는 집단원에게도 공명을 통한 대리 작업이 일어난다고 본다."},{"n":123,"q":"REBT 집단상담의 고유한 장점으로 가장 적절한 것은?","opts":["전이 분석이 용이하다.","침묵 수행이 핵심이다.","무의식 탐색이 깊어진다.","신체 작업이 중심이 된다.","집단원들이 서로의 비합리적 신념을 찾아 논박하는 연습을 통해 합리적 사고 기술을 상호 학습한다."],"a":4,"ex":"타인의 신념을 논박해 보는 경험이 자기 신념에 대한 메타 인식을 키운다. 집단이 곧 합리성의 연습장이 된다."},{"n":124,"q":"사회기술훈련(SST)의 일반적인 진행 순서로 가장 적절한 것은?","opts":["모델링 → 과제 → 교육 → 역할연습 → 피드백","역할연습 → 교육 → 과제 → 모델링 → 피드백","과제 → 피드백 → 역할연습 → 모델링 → 교육","교육 → 모델링 → 역할연습 → 피드백 → 실생활 과제","피드백 → 교육 → 모델링 → 과제 → 역할연습"],"a":3,"ex":"보고(모델링)-해보고(역할연습)-다듬고(피드백)-옮기는(과제) 행동주의 학습 공식이다. 일반화는 과제 단계에서 결정된다."},{"n":125,"q":"단주모임(AA)과 같은 자조집단에 대한 전문 상담자의 적절한 태도는?","opts":["전문가가 없으므로 효과를 인정하지 않는다.","자조집단의 고유한 치료적 가치를 인정하고, 필요시 내담자를 연계하며 협력적 관계를 유지한다.","상담자가 자조집단의 운영권을 인수한다.","치료집단으로 전환하도록 압박한다.","자조집단 참여를 금지시킨다."],"a":1,"ex":"동병상련의 상호 지지와 희망 고취는 전문 집단이 대체하기 어려운 자원이다. 경쟁이 아니라 연계의 대상이다."},{"n":126,"q":"심리교육집단의 특징으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 정보 제공과 기술 훈련이 중심이 된다.\nㄴ. 예방적 목적으로 널리 활용된다.\nㄷ. 구조화 수준이 비교적 높다.\nㄹ. 깊은 성격 재구성이 일차 목표이다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"성격 재구성은 치료집단의 영역이다. 심리교육집단은 ‘배움’의 형식으로 심리적 자원을 보급한다."},{"n":127,"q":"치료집단과 과업집단의 구별로 가장 적절한 것은?","opts":["과업집단은 위원회 형태로만 존재한다.","과업집단은 감정을 다루지 않는다는 점에서 비인간적이다.","치료집단에는 목표가 없다.","두 집단의 지도 원리는 완전히 동일하다.","치료집단은 구성원의 심리적 변화와 성장을, 과업집단은 구체적 산출물이나 목표 달성을 일차 목적으로 한다."],"a":4,"ex":"무엇이 ‘성과’인가가 다르다. 다만 과업집단에서도 과정 역동의 이해는 성과에 직결된다."},{"n":128,"q":"보스조르메니-나지(Boszormenyi-Nagy)의 맥락적 가족치료에서 핵심 개념은?","opts":["행동 강화 계획","세대 간 관계윤리, 공정성의 원장부(ledger), 충성심과 유산","순환질문과 가설설정","기적질문","경계 만들기"],"a":1,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 가족을 ‘주고받음의 장부’가 기록되는 윤리적 체계로 본다. 보이지 않는 충성심이 증상의 동력이 될 수 있다."},{"n":129,"q":"맥락적 가족치료에서 치료자가 특정인의 편에 서지 않으면서도 각 가족원의 입장과 이익을 차례로 옹호하는 태도는?","opts":["중립성의 포기","삼각화","균형 깨뜨리기","다방향 편파성(multidirected partiality)","합류 거부"],"a":3,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 ‘아무 편도 안 들기(중립)’가 아니라 ‘모두의 편을 차례로 들기’다. 부재한 가족원과 다음 세대의 이익까지 고려한다."},{"n":130,"q":"대상관계 부부치료에서 부부 갈등을 설명하는 핵심 기제로 제시되는 것은?","opts":["각자의 내적 대상관계가 투사적 동일시를 통해 상호 맞물리며 과거의 관계 드라마가 현재 부부 사이에서 재연되는 것","강화 계획의 불일치","의사소통 기술의 단순 부족","유전적 부적합성","경제적 요인만"],"a":0,"ex":"‘하필 그 사람’과 결혼하는 이유를 설명한다. 배우자는 무의식적으로 선택된 옛 대상의 대역일 수 있다."},{"n":131,"q":"행동주의 부부치료의 행동교환(behavior exchange) 기법에 대한 설명으로 가장 적절한 것은?","opts":["부정적 행동을 서로 지적하는 훈련","과거 상처의 정화 의식","서로에게 즐거움을 주는 긍정적 행동을 확인하고 의도적으로 늘리도록 계약하여 관계의 강화 비율을 높이는 것","증상처방의 일종","침묵 훈련"],"a":2,"ex":"‘배려의 날(caring days)’ 과제가 대표적이다. 감정이 바뀌길 기다리지 않고 행동의 수지타산부터 바꾼다."},{"n":132,"q":"인지행동 가족치료에서 개입의 표적이 되는 ‘가족 도식’의 의미로 가장 적절한 것은?","opts":["가족사진의 배치도","유전자 지도","가구 배치 도면","가족과 가족관계에 대해 구성원이 가진 비교적 안정된 신념 체계로, 사건 해석과 귀인에 영향을 준다.","가계도의 다른 이름"],"a":3,"ex":"‘가족이라면 모든 것을 공유해야 한다’ 같은 도식이 일상 사건의 의미를 채색한다. 행동 개입에 인지 작업을 더한 틀이다."},{"n":133,"q":"다체계치료(MST)에 대한 설명으로 옳지 않은 것은?","opts":["심각한 반사회적 행동을 보이는 청소년을 주 대상으로 한다.","청소년을 시설에 장기 수용하는 것을 일차 전략으로 삼는다.","가정 방문 등 현장 중심으로 서비스를 전달한다.","치료자가 적은 사례 수를 맡아 집중적으로 개입한다.","가정, 학교, 또래, 지역사회를 포괄하는 생태체계적 개입이다."],"a":1,"ex":"MST의 출발점이 바로 시설 수용의 대안이다. 문제가 발생하는 자연 환경 안에서의 변화를 추구한다."},{"n":134,"q":"이혼 가정 자녀의 적응을 예측하는 가장 강력한 요인으로 연구들이 일관되게 지목하는 것은?","opts":["이혼 전후 부모 간 갈등의 수준과 자녀의 갈등 노출 정도","이혼이라는 사건 그 자체","자녀의 출생 순위","거주 지역의 크기","부모의 학력"],"a":0,"ex":"‘이혼한 화목’이 ‘유지된 전쟁’보다 낫다는 함의다. 개입의 표적은 이혼 여부가 아니라 갈등 관리와 협력적 부모역할이다."},{"n":135,"q":"자녀가 모두 독립한 ‘빈 둥지’ 시기의 핵심 발달 과업으로 가장 적절한 것은?","opts":["자녀 양육 기술의 강화","확대가족과의 단절","자녀의 귀환 준비","은퇴의 회피","부부 두 사람 관계의 재협상과 재투자, 새로운 역할과 의미의 발견"],"a":4,"ex":"양육 동맹으로 지탱되던 부부가 ‘둘만의 체계’로 되돌아가는 전환기로, 황혼 갈등의 분기점이 되기도 한다."},{"n":136,"q":"한부모 가족 상담에 대한 설명으로 가장 적절한 것은?","opts":["양부모 가족을 기준으로 한 결손의 관점에서 접근한다.","구조의 결핍이 아니라 가족의 강점과 자원, 현실적 부담(역할 과부하, 경제 등)을 함께 보는 강점 관점으로 접근한다.","재혼을 일차 치료 목표로 설정한다.","자녀 문제의 원인을 한부모 구조 자체로 단정한다.","확대가족 자원은 배제한다."],"a":1,"ex":"‘깨진 가정’ 프레임 자체가 개입의 장애물이다. 기능하는 한부모 가족은 결핍 모델의 반례로 무수히 존재한다."},{"n":137,"q":"조부모가 손자녀를 양육하는 조손가족 상담에서 우선적으로 고려할 사항으로 옳지 않은 것은?","opts":["조부모의 신체적·경제적 양육 부담을 사정한다.","세대 차이로 인한 훈육·소통의 어려움을 다룬다.","조부모 양육은 비정상이므로 시설 위탁을 우선 권한다.","지역사회 지지 자원과의 연계를 모색한다.","손자녀의 부모 부재 경험과 상실감을 다룬다."],"a":2,"ex":"조손가족은 위기이자 동시에 보호 자원이다. 결손 시선이 아니라 부담 경감과 자원 강화가 개입의 축이다."},{"n":138,"q":"집단원의 의사에 반하는 퇴출(제명)을 포함한 집단 구성 변경에 대한 윤리적 원칙으로 가장 적절한 것은?","opts":["지도자의 재량으로 언제든 즉시 통보 없이 가능하다.","퇴출 사실을 다른 집단원에게 비밀로 한다.","다수결 투표로 결정한다.","퇴출은 어떤 경우에도 불가능하다.","사전에 고지된 규준과 절차에 따르고, 당사자에게 이유를 설명하며, 필요한 경우 개인상담 등 대안적 도움을 연계한다."],"a":4,"ex":"집단 보호와 개인 보호의 균형 문제다. 퇴출이 유기가 되지 않으려면 대안 연계가 함께 가야 한다."},{"n":139,"q":"성인 대상 집단상담의 일반적인 회기 운영 기준으로 가장 적절한 것은?","opts":["주 1회, 회기당 90~120분 내외","매일 6시간","월 1회 20분","연 2회 종일","기준이 전혀 없다"],"a":0,"ex":"워밍업과 작업, 마무리가 가능한 최소 시간과 피로 한계 사이의 절충이다. 아동은 더 짧고 자주가 원칙이다."},{"n":140,"q":"현대 가족치료의 동향에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 정서중심치료(EFT), MST 등 증거기반 모델들이 성과 연구를 축적하고 있다.\nㄴ. 학파 간 경계가 완화되며 통합적 접근이 확산되고 있다.\nㄷ. 공통요인(동맹, 희망 등)에 대한 관심이 가족치료 영역에서도 커지고 있다.\nㄹ. 단일 학파의 순수성 유지가 유일한 발전 방향으로 합의되었다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"창시자 시대의 학파 전쟁은 끝났다. ‘무엇이 누구에게 작동하는가’라는 질문이 학파 충성보다 앞서는 것이 현재의 합의다."},{"n":141,"q":"“저만 이런 줄 알았는데, 다들 비슷한 고민을 하시는군요”라는 집단원의 경험과, “이 집단이 내 편이라는 느낌이 들어서 어려운 얘기도 할 수 있었어요”라는 경험에 각각 해당하는 치료요인의 짝은?","opts":["이타주의 - 보편성","희망 고취 - 보편성","응집력 - 정화","보편성 - 응집력","대인관계 학습 - 모방"],"a":3,"ex":"‘나만이 아니구나’는 보편성, ‘여기가 내 자리구나’는 응집력이다. 체험의 결로 요인을 구분하는 연습 문항이다."},{"n":142,"q":"자신의 경험을 나누어 다른 집단원을 도운 뒤 “나도 누군가에게 쓸모가 있구나”라며 자존감이 회복되었다. 해당하는 치료요인은?","opts":["정보 전달","정화","실존적 요인","이타주의","모방행동"],"a":3,"ex":"받는 것만이 아니라 ‘주는 경험’이 치료적이라는 것이 집단 고유의 기제다. 우울한 집단원에게 특히 강력하다."},{"n":143,"q":"집단원이 격렬하게 울며 분노를 쏟아낸 후 “시원하긴 한데 뭐가 달라졌는지 모르겠다”고 말한다. 이에 대한 이해로 가장 적절한 것은?","opts":["정서 표출은 인지적 이해와 통합될 때 치료적이므로, 그 경험의 의미를 함께 탐색하는 작업이 필요하다.","정화가 일어났으므로 치료는 완결되었다.","울음은 저항이므로 차단했어야 한다.","집단을 즉시 종결할 신호다.","약물 의뢰가 필요한 신호다."],"a":0,"ex":"얄롬의 정화-인지 결합 명제를 사례로 옮긴 문항이다. ‘쏟아내기’ 다음에 ‘무슨 일이 있었는가’가 와야 한다."},{"n":144,"q":"다음 중 ‘지금-여기’ 활성화 개입에 해당하는 것은?","opts":["“어린 시절 아버지와의 관계를 연대기로 말씀해 주세요.”","“방금 그 말을 하면서 OO님 쪽을 한 번도 보지 않으셨는데, 지금 두 분 사이에 무슨 일이 일어나고 있나요?”","“다음 주까지 감사일기를 써 오세요.”","“그 문제의 사회구조적 원인을 분석해 봅시다.”","“검사 결과를 먼저 보겠습니다.”"],"a":1,"ex":"과거(then-and-there)의 보고가 아니라 회기 안(here-and-now)의 살아 있는 자료를 다루는 것이 집단의 엔진이다."},{"n":145,"q":"MRI 모델의 1차 변화와 2차 변화에 대한 설명으로 옳은 것은?","opts":["1차 변화가 체계의 규칙 자체의 변화다.","1차 변화가 항상 우월하다.","두 변화는 동일하다.","2차 변화는 불가능하다.","2차 변화는 체계의 규칙과 전제 자체가 바뀌는 변화이고, 1차 변화는 규칙 안에서의 양적 변화(더 많이/더 세게)이다."],"a":4,"ex":"잔소리를 ‘더 자주’ 하는 것은 1차, 잔소리-회피 게임 자체를 그만두는 것은 2차 변화다. 역설적 개입은 2차 변화 장치다."},{"n":146,"q":"등교거부 자녀가 호전되기 시작하자 그동안 잠잠하던 부부갈등이 다시 표면화되고, 이어 다른 자녀가 문제 행동을 보이기 시작했다. 이 현상을 설명하는 체계 개념은?","opts":["2차 변화","합류","탈삼각화","경계 명료화","가족 항상성"],"a":4,"ex":"증상은 체계의 균형 장치일 수 있다. IP의 호전이 체계 전체의 재균형 작업을 촉발하는 전형적 장면이다."},{"n":147,"q":"부부가 갈등이 고조될 때마다 막내의 성적과 건강 걱정으로 대화의 주제를 옮기며 긴장을 낮춘다. 보웬 이론의 개념으로 가장 적절한 것은?","opts":["삼각관계(삼각화)","다세대 전수","정서적 단절","사회적 퇴행","형제순위"],"a":0,"ex":"두 사람의 불안이 제3자를 끌어들여 안정화되는 가장 작은 안정 단위가 삼각형이다. 자녀가 가장 흔한 꼭짓점이 된다."},{"n":148,"q":"보웬 학파 치료자가 부부 갈등 면담에서 각자의 감정에 휩쓸리지 않고 “그때 어떤 생각의 과정을 거치셨나요?”라고 차분히 묻는 위치를 유지했다. 해당하는 치료자 과업은?","opts":["합류","탈삼각화된 위치의 유지와 과정 질문","균형 깨뜨리기","증상처방","긍정적 의미부여"],"a":1,"ex":"치료자가 세 번째 꼭짓점으로 빨려 들어가지 않는 것 자체가 가족에게 분화의 모델이 된다."},{"n":149,"q":"모-자 밀착 가족에서 (가) 회기 좌석을 조정해 부부가 마주 보고 대화하게 하는 개입과, (나) 일시적으로 아버지의 입장만을 지지하며 체계를 흔드는 개입의 명칭 짝으로 옳은 것은?","opts":["합류 - 추적","실연 - 모방","경계 만들기 - 균형 깨뜨리기","유지 - 합류","추적 - 유지"],"a":2,"ex":"(가)는 하위체계 경계의 재조정, (나)는 의도적 편들기다. 두 기법 모두 구조 재편이 목적이지만 수단이 다르다."},{"n":150,"q":"가족의 언어 습관과 대화 속도, 분위기에 자신을 맞추어 가족 체계에 수용되는 구조적 가족치료의 기법은?","opts":["역설적 개입","직면","해석","합류(joining)","문서화"],"a":3,"ex":"미누친은 ‘가족에게 받아들여지기 전의 개입은 없다’고 보았다. 추적·모방·적응이 합류의 세 통로다."},{"n":151,"q":"가족에게 갈등 장면을 말로 보고하게 하는 대신 상담실에서 직접 그 대화를 해 보도록 요청하는 실연(enactment)의 일차적 가치는?","opts":["회기 시간의 절약","가족의 죄책감 유발","진단명 부여의 근거 확보","보고의 왜곡을 우회하여 실제 상호작용 패턴을 관찰하고, 그 자리에서 수정 시도를 할 수 있다는 것","치료자의 권위 과시"],"a":3,"ex":"‘말해진 가족’과 ‘행동하는 가족’은 다르다. 실연은 평가와 개입이 동시에 일어나는 창이다."},{"n":152,"q":"기적질문에 대해 내담자가 “아침에 일어나면 마음이 가벼울 것 같아요”라고 답했다. 가장 적절한 후속 개입은?","opts":["“그건 비현실적이네요”라고 교정한다.","기적은 없다고 설명한다.","“마음이 가벼워졌다는 걸 무엇을 보고 알 수 있을까요? 가장 먼저 무엇을 다르게 하고 있을까요?”라며 구체적 행동 신호로 확장한다.","다음 주제로 넘어간다.","과거 원인 분석으로 전환한다."],"a":2,"ex":"기적질문의 산출물은 ‘기분’이 아니라 ‘관찰 가능한 다른 하루’다. 추상적 답을 행동 언어로 번역하는 후속이 기법의 절반이다."},{"n":153,"q":"“문제가 일어날 법했는데 일어나지 않았던 때는 언제였나요? 그때는 무엇이 달랐나요?”에 해당하는 해결중심 기법은?","opts":["척도질문","예외질문","대처질문","관계성질문","악몽질문"],"a":1,"ex":"해결의 재료는 미래의 기적만이 아니라 이미 일어난 예외 속에 있다는 것이 해결중심의 출발 전제다."},{"n":154,"q":"이야기치료의 외재화 대화에 해당하는 질문은?","opts":["“‘미루기’가 당신을 설득해 올 때 주로 어떤 말로 다가오나요?”","“부모님의 양육 방식 중 무엇이 문제였나요?”","“당신의 성격 결함을 목록으로 만들어 봅시다.”","“당신은 왜 그렇게 게으른가요?”","“진단 기준에 몇 개나 해당하는지 세어 봅시다.”"],"a":0,"ex":"사람과 문제를 분리하는 문법이다. 문제가 ‘주어’가 되고 사람이 그에 ‘대응하는 행위자’가 된다."},{"n":155,"q":"“어머니가 화를 내실 때 아버지는 주로 무엇을 하시고, 그때 동생은 어떤 표정이 되나요?”라는 질문의 기법과 목적으로 옳은 것은?","opts":["직선적 질문 - 원인 규명","폐쇄질문 - 사실 확인","기적질문 - 해결 구성","유도질문 - 자백 획득","순환질문 - 가족원 간 상호작용과 관계 패턴에 대한 정보의 산출과 체계적 관점의 도입"],"a":4,"ex":"밀란 학파의 순환질문은 ‘차이에 대한 질문’으로, 답하는 과정 자체가 가족에게 체계의 거울이 된다."},{"n":156,"q":"가계도(genogram) 작성과 활용에 대한 설명으로 옳지 않은 것은?","opts":["통상 3세대 이상의 가족 정보를 도식화한다.","결혼, 이혼, 사망 등 주요 사건과 날짜를 기록한다.","밀착, 갈등, 단절 같은 관계의 질을 선의 형태로 표시한다.","반복되는 가족 패턴에 대한 가설 생성에 활용된다.","유전자 검사 결과 첨부가 필수 요건이다."],"a":4,"ex":"가계도는 의학적 검사 도구가 아니라 관계 패턴의 지도다. 작성 과정의 대화 자체가 개입이 되기도 한다."},{"n":157,"q":"사티어의 일치형 의사소통에 대한 설명으로 가장 적절한 것은?","opts":["갈등을 피하기 위해 자기 욕구를 숨기는 것","주제를 바꾸어 긴장을 흩뜨리는 것","논리와 자료만으로 말하는 것","자기, 타인, 상황의 세 요소를 모두 존중하며 내적 경험과 외적 표현이 합치되는 소통","상대를 비난하여 자기를 지키는 것"],"a":3,"ex":"네 가지 생존 유형은 셋 중 무언가를 지운다(회유=자기, 비난=타인, 초이성=자기·타인, 산만=셋 다). 일치형만 셋을 다 든다."},{"n":158,"q":"가족 갈등 상황에서 감정을 철저히 배제한 채 통계와 원칙만을 인용하며 “객관적으로 보면 누구의 잘못도 아니다”라고 말하는 가족원의 사티어 유형은?","opts":["초이성형","회유형","산만형","비난형","일치형"],"a":0,"ex":"초이성형은 자기와 타인을 모두 지우고 ‘상황(맥락)’만 남긴다. 컴퓨터형이라고도 불린다."},{"n":159,"q":"가족 갈등이 고조될 때마다 갑자기 농담을 하거나 전혀 무관한 화제를 꺼내 긴장의 초점을 흩뜨리는 유형은?","opts":["회유형","산만형","초이성형","비난형","일치형"],"a":1,"ex":"산만형은 자기·타인·상황 셋 모두와 접촉을 끊는다. 긴장은 피했지만 아무것도 다뤄지지 않는다."},{"n":160,"q":"가트만(Gottman)의 부부 연구에서 관계 악화와 이혼을 예측하는 네 가지 의사소통(묵시록의 네 기수) 중 가장 강력한 단일 예측 요인으로 지목된 것은?","opts":["비난","방어","경멸","담쌓기","과묵"],"a":2,"ex":"경멸은 상대를 내려다보는 위치에서 나오는 소통으로, 관계의 면역 체계를 가장 깊이 무너뜨린다고 보고되었다."},{"n":161,"q":"집단 규범의 형성에 대한 설명으로 가장 적절한 것은?","opts":["종결 단계에 가장 활발히 형성된다.","초기 회기에서 형성된 규범이 이후 집단 문화의 틀이 되므로, 지도자는 초기에 치료적 규범 형성에 의도적으로 관여한다.","규범은 명문화된 것만 유효하다.","규범은 한번 형성되면 절대 바뀌지 않는다.","규범 형성에 지도자는 관여할 수 없다."],"a":1,"ex":"첫 회기들의 작은 선례(지각 처리, 피드백 방식)가 굳어 문화가 된다. 초기 개입이 가장 값싸고 강력하다."},{"n":162,"q":"집단 발달의 과도기(전환) 단계에서 전형적으로 나타나는 현상은?","opts":["불안과 저항, 지도자에 대한 도전과 통제력 시험, 갈등의 표면화","깊은 자기개방과 활발한 피드백 교환","학습의 일반화와 이별 작업","즉각적인 응집력의 완성","무조건적 신뢰"],"a":0,"ex":"폭풍 없이 작업 단계로 가는 집단은 드물다. 갈등의 건설적 통과가 응집력의 원료가 된다."},{"n":163,"q":"집단응집력과 자기개방의 관계에 대한 설명으로 가장 적절한 것은?","opts":["둘은 무관하다.","개방은 응집력을 항상 해친다.","응집력이 높으면 개방은 불필요하다.","적절한 자기개방이 응집력을 키우고, 커진 응집력이 더 깊은 개방을 가능하게 하는 상호 강화의 나선을 이룬다.","응집력은 개방을 항상 억제한다."],"a":3,"ex":"다만 시기에 맞지 않는 과도한 개방은 오히려 집단을 위축시킨다. ‘적정 수위’의 조절이 지도자의 일이다."},{"n":164,"q":"집단에서 효과적인 피드백의 원칙으로 옳지 않은 것은?","opts":["관찰 가능한 구체적 행동에 대해 말한다.","행동이 일어난 시점과 가까운 때에 전달한다.","받는 사람이 소화할 수 있는 양과 방식을 고려한다.","긍정적 피드백과 교정적 피드백의 균형을 고려한다.","‘너는 원래 그런 사람’식의 성격 단정으로 전달한다."],"a":4,"ex":"피드백의 단위는 ‘행동’이지 ‘존재’가 아니다. 성격 단정은 피드백이 아니라 낙인이다."},{"n":165,"q":"성인 대상 비구조화 상담집단의 일반적인 적정 인원으로 가장 널리 권장되는 범위는?","opts":["2~3명","6~10명 내외","15~20명","25명 이상","인원 제한 없음"],"a":1,"ex":"전원이 상호작용의 그물에 들어올 수 있는 상한과, 결석에도 집단이 유지되는 하한 사이의 절충이다."},{"n":166,"q":"폐쇄집단이 개방집단에 비해 갖는 상대적 장점은?","opts":["새 구성원의 새로운 관점이 계속 유입된다.","중도 탈락 시 즉시 충원이 가능하다.","구성원 고정으로 신뢰와 응집력, 발달단계의 연속성이 확보되기 쉽다.","대기자 관리가 쉽다.","운영 기간을 무한히 늘릴 수 있다."],"a":2,"ex":"개방집단의 장점(충원, 새 자극)과 거울상이다. 무엇을 지키고 무엇을 포기할지의 설계 선택이다."},{"n":167,"q":"공동지도(co-leadership)의 장점으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 건강한 상호작용의 모델링 제공\nㄴ. 한 지도자가 개입하는 동안 다른 지도자가 집단 전체를 관찰\nㄷ. 한 지도자의 부재 시에도 집단의 연속성 유지\nㄹ. 인건비 절감","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"공동지도는 오히려 비용이 더 든다. 그 비용을 상쇄하는 것이 관찰·모델링·연속성의 가치다."},{"n":168,"q":"법원 명령으로 의뢰된 비자발적 집단원의 참여 동기를 높이는 개입으로 가장 적절한 것은?","opts":["“어차피 와야 하니 조용히 앉아 있으라”고 안내한다.","참여 거부 시 즉시 법원에 보고하겠다고 위협한다.","비자발성을 공개적으로 질책한다.","의무 참여라는 현실은 인정하되, 집단 안에서 무엇을 다룰지에 대한 선택권과 달성 가능한 작은 개인 목표를 함께 찾는다.","아무 개입도 하지 않는다."],"a":3,"ex":"‘오는 것’은 강제되었어도 ‘무엇을 가져갈지’는 선택할 수 있다. 통제감의 부분적 회복이 동기화의 지렛대다."},{"n":169,"q":"매 회기 발언을 독점하는 집단원에 대한 개입으로 가장 적절한 것은?","opts":["발언 금지령을 내린다.","공개적으로 망신을 준다.","집단에서 즉시 제외한다.","그 집단원이 지칠 때까지 둔다.","부드럽게 차단하고 다른 집단원의 반응을 초대하며, 적절한 시점에 독점 행동의 의미(불안, 욕구)와 그것이 집단에 미치는 영향을 다룬다."],"a":4,"ex":"독점은 보통 불안의 관리 전략이다. 행동의 차단과 의미의 탐색, 집단 반응의 활용이 한 세트로 간다."},{"n":170,"q":"구조화 활동(아이스브레이킹, 연습문제 등)의 사용에 대한 설명으로 가장 적절한 것은?","opts":["활동은 집단 목적에 봉사하는 수단이며, 과잉 사용은 자발적 상호작용과 자연스러운 역동의 발생을 차단할 수 있다.","많을수록 무조건 좋다.","비구조화 집단에서는 어떤 활동도 금지된다.","활동의 목적은 시간 소모다.","활동 후 나눔은 생략해도 된다."],"a":0,"ex":"활동이 역동을 여는 열쇠가 될 수도, 역동을 피하는 도피처가 될 수도 있다. 기준은 언제나 ‘무엇을 위한 활동인가’다."},{"n":171,"q":"집단 종결 단계에서 피드백 교환의 초점으로 가장 적절한 것은?","opts":["그동안 쌓인 불만의 청산","새로운 갈등의 개시","각자가 보여 준 변화와 성장의 구체적 확인, 그리고 남은 과제에 대한 건설적 피드백","지도자에 대한 평가만","형식적 덕담의 교환"],"a":2,"ex":"종결의 피드백은 ‘선물 주기’에 비유된다. 변화의 증거를 구체적으로 비춰 주는 것이 일반화의 마지막 연료가 된다."},{"n":172,"q":"전문가의 개입 없이 공통 경험을 가진 구성원들의 상호 지지로 운영되는 자조집단에 의뢰하기에 가장 부적절한 사람은?","opts":["단주를 유지하려는 회복기의 알코올 사용자","심한 우울과 활발한 자살사고를 보이는 사람","자녀 양육 정보를 나누려는 한부모","유사한 만성질환을 관리 중인 환자","사별 후 적응 중인 유가족"],"a":1,"ex":"급성 위기와 활발한 자살사고는 전문적 평가와 치료가 필요한 상태다. 자조집단은 치료의 보완재이지 대체재가 아니다."},{"n":173,"q":"집단상담 시작 전 집단원에게 고지해야 할 권리와 정보에 대한 설명으로 옳지 않은 것은?","opts":["불편한 진실을 피하기 위해 위험 정보는 고지받지 않을 권리","집단 참여에 따르는 심리적 위험에 대해 미리 안내받을 권리","비밀보장과 그 한계에 대해 설명받을 권리","집단 활동의 참여를 거부할 권리","집단의 목적과 절차에 대한 정보를 받을 권리"],"a":0,"ex":"위험의 비고지는 보호가 아니라 사전동의의 침해다. 충분한 정보 위에서만 참여 결정이 자발적일 수 있다."},{"n":174,"q":"개인상담과 비교한 집단상담의 한계로 가장 적절한 것은?","opts":["대인관계 학습의 기회가 부족하다.","피드백의 원천이 한 명뿐이다.","비용 효율이 개인상담보다 항상 낮다.","현실 검증의 장이 없다.","개인의 깊은 문제를 다루는 시간과 비밀의 보호 수준에 제약이 있을 수 있다."],"a":4,"ex":"집단의 힘(다양한 피드백, 소속감)과 한계(개인별 시간 제약, 비밀보장의 구조적 취약성)는 같은 구조에서 나온다."},{"n":175,"q":"로저스 전통의 참만남집단(encounter group)에 대한 설명으로 옳지 않은 것은?","opts":["지금-여기의 솔직한 감정 교류를 중시한다.","구성원의 성장과 잠재력 실현을 지향한다.","촉진자는 비지시적 태도로 집단 과정을 신뢰한다.","표준화된 매뉴얼의 순서에 따라 정보 전달 강의로 진행된다.","비교적 비구조화된 방식으로 진행된다."],"a":3,"ex":"참만남집단의 자료는 강의 내용이 아니라 구성원 사이에 ‘지금 흐르는 것’이다."},{"n":176,"q":"T그룹(훈련집단)의 일차적 학습 목표로 가장 적절한 것은?","opts":["정신장애의 치료","가족 갈등의 해결","직무 기술 자격증 취득","학업 성적의 향상","집단 역동과 대인 과정에 대한 체험적 학습과 자기 인식의 증진"],"a":4,"ex":"NTL의 실험실 교육 전통에서 출발했으며, ‘과정의 학습(learning how to learn)’이 핵심 표어다. 치료집단과 목적이 다르다."},{"n":177,"q":"얄롬의 치료요인 중 집단 후기로 갈수록, 그리고 상호작용 중심 집단일수록 중요도가 높게 평가되는 경향이 보고되는 요인은?","opts":["대인관계 학습","정보 전달","희망의 고취","보편성","지도(guidance)"],"a":0,"ex":"초기에는 희망·보편성이, 작업이 깊어질수록 대인관계 학습과 응집력이 전면에 나선다는 단계별 비중 변화가 연구의 요지다."},{"n":178,"q":"집단상담자의 역할로 보기 어려운 것은?","opts":["치료적 규범의 형성을 돕는 문화 조성자","상호작용을 촉진하는 촉진자","집단원을 보호하는 안전 관리자","집단원의 문제를 대신 해결해 주는 해결사","과정을 비추어 주는 거울"],"a":3,"ex":"지도자가 해답을 줄수록 집단의 근육은 약해진다. 해결의 주체는 집단원과 집단 그 자체다."},{"n":179,"q":"집단상담 참여가 부적절할 수 있는 경우를 모두 고른 것은?","box":"ㄱ. 급성 정신증적 상태에 있는 사람\nㄴ. 극심한 위기 상태로 즉각적 개별 개입이 필요한 사람\nㄷ. 타인에 대한 적대감과 공격성이 극도로 높은 사람\nㄹ. 대인관계 기술을 향상시키고 싶은 사람","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"ㄹ은 오히려 집단의 최적 적응증이다. 부적합 판단의 축은 ‘집단이 감당할 수 있는가, 본인이 집단을 활용할 수 있는가’다."},{"n":180,"q":"집단 발달단계와 중심 과업의 연결로 옳지 않은 것은?","opts":["시작 단계 - 오리엔테이션과 신뢰의 형성","시작 단계 - 깊은 직면과 핵심 갈등의 해소","작업 단계 - 응집력을 토대로 한 깊은 탐색과 변화 시도","종결 단계 - 학습의 공고화와 이별 감정의 처리","과도기 단계 - 저항과 갈등의 건설적 처리"],"a":1,"ex":"안전이 만들어지기 전의 깊은 직면은 탈락을 부른다. 단계마다 ‘지금 가능한 일’이 다르다."},{"n":181,"q":"집단상담 기법에 대한 설명으로 옳지 않은 것은?","opts":["적극적 경청 - 들은 내용을 즉시 다른 집단원에게 전달해 평가하게 한다.","차단하기 - 해로운 상호작용을 정중하게 가로막는다.","반영하기 - 말과 행동에 담긴 감정을 비추어 준다.","명료화하기 - 모호한 진술의 의미를 분명히 한다.","연결하기 - 집단원들의 경험 사이의 공통 주제를 이어 준다."],"a":0,"ex":"적극적 경청은 전달이 아니라 ‘온전히 듣고 있음’의 전달이다. 마지막 선지는 기법이 아니라 왜곡이다."},{"n":182,"q":"대인불안이 높은 대학생 8명을 모집하여 매주 1회씩 10주간, 회기마다 정해진 활동지로 진행하는 자기표현 훈련 집단을 운영한다. 이 집단의 분류로 옳은 것은?","opts":["비구조화 - 이질적 - 집중적 집단","비구조화 - 동질적 - 집중적 집단","반구조화 - 이질적 - 마라톤 집단","구조화 - 동질적 - 분산적 집단","구조화 - 이질적 - 폐쇄 마라톤 집단"],"a":3,"ex":"계획된 활동(구조화), 유사한 호소(동질), 주 1회 장기 분산(분산적)의 세 축으로 분류한다."},{"n":183,"q":"집단원의 문제행동과 상담자 대처의 연결로 옳지 않은 것은?","opts":["습관적 충고하기 - 충고 이면의 욕구를 탐색하고 자기 이야기로 초점을 돌린다.","일시적 구원(상처 싸매기) - 고통을 빨리 덮으려는 시도가 작업을 막을 수 있음을 다룬다.","소극적 참여 - 발언할 때까지 전체 회기를 중단하고 기다린다.","독점하기 - 정중히 차단하고 다른 집단원을 초대한다.","적대적 공격 - 감정의 이면을 탐색하고 행동 규범을 재확인한다."],"a":2,"ex":"전체를 볼모로 한 압박은 개입이 아니다. 소극적 참여는 안전감·관찰학습의 맥락에서 점진적으로 다룬다."},{"n":184,"q":"아들러 학파 집단상담의 기법과 설명의 연결로 옳은 것은?","opts":["수렁 피하기 - 내담자를 더 깊은 수렁에 빠뜨린다.","단추 누르기 - 유쾌한 기억과 불쾌한 기억을 번갈아 떠올리게 하여 감정에 대한 선택권을 체험시킨다.","마치 ~인 것처럼 - 과거를 그대로 재연한다.","역설 기법 - 증상을 즉시 금지한다.","초기기억 - 미래 계획표를 작성한다."],"a":1,"ex":"단추 누르기의 메시지는 ‘감정은 당하는 것이 아니라 만드는 것’이다. 나머지 선지는 기법의 정의를 뒤집어 놓았다."},{"n":185,"q":"“방금 OO님이 말씀하실 때 목소리가 떨리고 주먹을 쥐고 계셨어요”라는 피드백에 적용된 효과적 피드백의 원리는?","opts":["추상적 성격 평가의 제공","간접적 암시","조언과 해결책의 즉시 제시","과거 행동의 누적 평가","관찰 가능한 사실적 행동의 기술과 판단의 유보"],"a":4,"ex":"평가 없는 관찰 기술은 받는 사람이 방어 없이 자기를 볼 수 있는 거울이 된다."},{"n":186,"q":"“가족의 문제는 객관적으로 ‘존재’하는 것이 아니라 가족과 치료자가 언어를 통해 함께 구성하고 또 해체할 수 있는 것이다.” 이 전제에 기반한 가족치료의 흐름은?","opts":["구조적 가족치료","사회구성주의(포스트모던) 가족치료","행동주의 가족치료","정신역동적 가족치료","보웬의 다세대 가족치료"],"a":1,"ex":"문제를 ‘발견’하는 치료에서 문제를 ‘재구성’하는 치료로의 전환이며, 해결중심·이야기치료·협력적 접근이 이 흐름에 속한다."},{"n":187,"q":"가족 스트레스 연구에서 스트레스원의 누적(pile-up)과 가족의 자원·인식의 변화를 포함하여 위기 이후의 적응 과정까지 설명하도록 힐(Hill)의 모델을 확장한 이중 ABCX 모델의 제안자는?","opts":["미누친","보웬","맥커빈(McCubbin)","사티어","헤일리"],"a":2,"ex":"A(스트레스원)-B(자원)-C(인식)-X(위기)의 원형에 시간 축과 누적 개념을 더한 것이 이중 ABCX다."},{"n":188,"q":"카터와 맥골드릭의 가족생활주기에서 가족체계의 ‘밖에서’ 시작되는 첫 단계는?","opts":["신혼 부부기","자녀 아동기","자녀 청소년기","결혼 전 독립된 젊은 성인기","노년기"],"a":3,"ex":"원가족에서의 분화라는 과업을 안고 있는 미혼 독립기가 출발점이다. 이 단계의 미해결 과제가 이후 단계로 이월된다."},{"n":189,"q":"보웬 이론의 개념 설명으로 옳지 않은 것은?","opts":["분화 - 가족과의 모든 정서적 유대를 끊어내는 것","융해 - 가족의 정서에 휩쓸려 자기 경계가 흐려진 상태","삼각관계 - 두 사람의 불안이 제3자를 끌어들여 안정화되는 구조","다세대 전수 - 분화 수준과 관계 패턴이 세대를 넘어 전달되는 과정","분화 - 사고와 감정을 구분하고 친밀 속에서도 자기를 유지하는 능력"],"a":0,"ex":"분화는 단절이 아니라 ‘연결된 채로 자기로 있기’다. 단절은 오히려 미분화의 다른 얼굴이다."},{"n":190,"q":"가족원들의 경계가 지나치게 흐려져 서로의 감정과 일에 과도하게 얽혀 있고, 자녀가 자율성과 독립적 판단을 발달시키지 못하는 가족의 역기능 양상은?","opts":["유리(disengagement)","정서적 단절","희생양 만들기","위계의 명료화","속박(밀착, enmeshment)"],"a":4,"ex":"밀착 가족의 자녀는 ‘내 마음’과 ‘가족의 마음’의 경계를 배우지 못한다. 반대 극단이 유리(방임적 거리)다."},{"n":191,"q":"맥매스터 모델이 평가하는 가족기능의 차원에 해당하지 않는 것은?","opts":["문제해결","의사소통","역할","가족의 월평균 소득 수준","행동통제"],"a":3,"ex":"여섯 차원(문제해결·의사소통·역할·정서적 반응성·정서적 관여·행동통제)은 모두 ‘과정’ 변인이다. 소득은 기능 차원이 아니다."},{"n":192,"q":"해결중심 가족치료에서 두 번째 회기 이후를 여는 표준적인 첫 질문은?","opts":["“지난주에 무엇이 문제였습니까?”","“오늘은 어떤 위기가 있었나요?”","“누가 가장 잘못했습니까?”","“어린 시절 이야기를 다시 해볼까요?”","“지난 회기 이후 조금이라도 나아진 것은 무엇입니까?”"],"a":4,"ex":"EARS(끌어내기-확장-강화-다시 시작)의 첫 단추다. 질문의 방향이 회기 전체의 시선을 해결 쪽으로 정렬시킨다."},{"n":193,"q":"자녀가 초등학교에 다니는 시기의 가족이 점검해야 할 발달 과업으로 가장 적절한 것은?","opts":["배우자 선택과 결혼 적응","자녀의 학교 적응 지원과 학업·또래 세계로의 확장을 수용하는 경계 조정","은퇴 후 역할 재편","자녀의 배우자 가족과의 관계 형성","빈 둥지 적응"],"a":1,"ex":"가족생활주기의 각 단계는 체계의 경계를 다시 그리는 작업이다. 학동기는 학교라는 외부 체계가 처음 깊이 들어오는 시기다."},{"n":194,"q":"이야기치료의 인간관에 대한 설명으로 옳지 않은 것은?","opts":["인간의 정체성은 청소년기에 완성되어 평생 고정된다.","사람과 문제를 분리하여 본다.","지배적 이야기에 가려진 독특한 결과(예외)에 주목한다.","내담자는 자기 삶의 이야기의 저자가 될 수 있다.","정체성은 사회적 관계와 이야기 속에서 구성된다."],"a":0,"ex":"이야기치료의 희망은 정체성의  대한 설명으로 옳지 않은 것은?","opts":["-1에서 +1 사이의 값을 갖는다.","0은 선형적 관계가 없음을 의미한다.","부호는 관계의 방향을, 절대값은 관계의 강도를 나타낸다.","상관관계만으로는 인과관계를 입증할 수 없다.","상관이 충분히 높으면 인과관계가 입증된 것으로 본다."],"a":4,"ex":"인과 추론에는 시간적 선행성, 공변성, 제3변인 배제가 모두 필요하다."},{"n":10,"q":"독립변인이 종속변인에 영향을 미치는 경로나 기제를 설명해 주는 제3의 변인은?","opts":["조절변인","가외변인","매개변인","통제변인","억제변인"],"a":2,"ex":"조절변인은 관계의 ‘강도나 방향’을 변화시키고, 매개변인은 ‘왜/어떻게’를 설명한다."},{"n":11,"q":"사전검사를 받은 경험이 사후검사 점수에 영향을 미치는 내적타당도 저해요인은?","opts":["역사","성숙","도구화","검사(반복검사) 효과","탈락"],"a":3,"ex":"솔로몬 4집단 설계는 이 검사효과를 확인·통제하기 위해 고안되었다."},{"n":12,"q":"통계적 회귀에 대한 설명으로 옳은 것은?","opts":["극단적인 점수로 선발된 집단이 재측정 시 평균 방향으로 이동하는 현상이다.","측정도구나 채점 기준이 변하는 것이다.","시간 경과에 따른 참여자의 자연적 변화이다.","연구 도중 참여자가 이탈하는 것이다.","연구 기간 중 발생한 외부 사건의 영향이다."],"a":0,"ex":"극단 점수에는 우연 오차가 포함되어 있어 재측정 시 평균 쪽으로 되돌아가는 경향이 있다."},{"n":13,"q":"진실험설계와 준실험설계를 구분하는 가장 핵심적인 기준은?","opts":["표본의 크기","무선배치(무선할당) 여부","사전검사의 유무","측정 횟수","연구 기간"],"a":1,"ex":"무선표집(외적타당도)과 무선배치(내적타당도)를 혼동하지 않도록 주의한다."},{"n":14,"q":"솔로몬 4집단 설계의 주된 목적은?","opts":["측정 비용의 절감","표본 수의 축소","사전검사 효과의 확인과 통제","외적타당도의 포기","성숙 효과의 제거 불가능성 입증"],"a":2,"ex":"사전검사 유무와 처치 유무를 조합한 4집단으로 사전검사와 처치의 상호작용까지 확인할 수 있다."},{"n":15,"q":"모집단을 동질적인 하위집단으로 나눈 후 각 하위집단에서 무선표집하는 방법은?","opts":["단순무선표집","체계적 표집","눈덩이표집","군집표집","층화(유층)표집"],"a":4,"ex":"군집표집은 자연적 집단(학교·학급) 자체를 표집 단위로 추출한다는 점에서 다르다."},{"n":16,"q":"눈덩이표집이 가장 적합한 연구 상황은?","opts":["전국 규모의 여론조사","모집단의 명부가 완비되어 있는 경우","전수조사","실험 참여자의 무선할당","가출청소년처럼 접근하기 어려운 집단에 대한 연구"],"a":4,"ex":"초기 참여자의 소개를 통해 표본을 확장하는 비확률 표집으로, 은폐된 모집단 연구에 유용하다."},{"n":17,"q":"개방코딩-축코딩-선택코딩의 절차를 통해 자료로부터 이론을 생성하는 질적 연구방법은?","opts":["현상학적 연구","문화기술지","사례연구","근거이론","내러티브 연구"],"a":3,"ex":"근거이론은 이론적 표집과 지속적 비교분석을 통해 자료에 근거한(grounded) 이론을 구축한다."},{"n":18,"q":"한 번의 검사 실시만으로 문항들 간의 일관성을 통해 신뢰도를 추정하는 방법은?","opts":["검사-재검사 신뢰도","문항내적합치도","동형검사 신뢰도","채점자간 신뢰도","예측 신뢰도"],"a":1,"ex":"Cronbach α가 대표적이며, 재검사나 동형검사 제작의 부담이 없다는 장점이 있다."},{"n":19,"q":"효과크기에 대한 설명으로 옳지 않은 것은?","opts":["p값이 작을수록 효과크기도 반드시 크다.","통계적 유의성과 별개로 효과의 실질적 크기에 대한 정보를 제공한다.","Cohen의 기준으로 d=0.8 이상이면 큰 효과로 해석한다.","메타분석에서 연구 결과 통합의 기본 단위가 된다.","Cohen's d가 대표적인 지표이다."],"a":0,"ex":"표본이 매우 크면 작은 효과도 유의해질 수 있어 p값과 효과크기는 별개로 보고해야 한다."},{"n":20,"q":"연구 참여자의 사전동의(informed consent)에 포함될 내용으로 적절하지 않은 것은?","opts":["연구의 목적과 절차","예상되는 위험과 이익","연구자가 기대하는 결과에 부합하도록 응답하는 요령","개인정보 비밀보장 방법","언제든 참여를 중단할 수 있는 자유"],"a":2,"ex":"특정 방향의 응답을 유도하는 것은 연구윤리 위반이자 자료의 타당성을 훼손하는 행위이다."},{"n":21,"q":"다음 중 비율척도에 해당하는 것은?","opts":["섭씨온도","지능지수","과제 수행의 반응시간","학급 석차","만족도 5점 평정"],"a":2,"ex":"반응시간은 절대영점(0초)이 존재하여 ‘두 배 느리다’ 같은 비율 해석이 가능하다."},{"n":22,"q":"평균 > 중앙값 > 최빈값의 관계가 나타나는 분포는?","opts":["정적(우측꼬리) 편포","정규분포","부적(좌측꼬리) 편포","이봉분포","균일분포"],"a":0,"ex":"꼬리가 오른쪽으로 길면 극단값이 평균을 오른쪽으로 끌어당긴다. 부적편포에서는 부등호가 반대가 된다."},{"n":23,"q":"표본평균들의 분포(표집분포)가 갖는 표준편차를 지칭하는 용어는?","opts":["표준편차","평균의 표준오차","측정의 표준오차","사분편차","변동계수"],"a":1,"ex":"표준오차 = SD/√n 으로, 표본이 클수록 작아진다. 측정의 표준오차(SEM)와 혼동하지 않도록 주의."},{"n":24,"q":"표본의 크기가 충분히 크면 모집단의 분포 형태와 무관하게 표본평균의 분포가 정규분포에 가까워진다는 원리는?","opts":["대수의 법칙","베이즈 정리","체비셰프 부등식","중심극한정리","평균으로의 회귀"],"a":3,"ex":"중심극한정리는 모집단이 정규분포가 아니어도 모수 추리통계를 적용할 수 있게 하는 근거가 된다."},{"n":25,"q":"95% 신뢰구간에 대한 해석으로 가장 적절한 것은?","opts":["표본평균의 95%가 이 구간에 포함된다.","신뢰수준을 높이면 구간의 폭은 좁아진다.","수집된 자료의 95%가 이 구간 안에 있다.","이 구간 밖의 값은 존재할 수 없다.","동일한 방법으로 반복 표집하여 구간을 구하면 그중 약 95%가 모평균을 포함한다."],"a":4,"ex":"신뢰수준은 ‘구간 산출 절차’의 장기적 적중률에 대한 진술이다. 신뢰수준을 높이면 구간은 오히려 넓어진다."},{"n":26,"q":"유의수준을 .05에서 .01로 낮추면 일어나는 변화로 옳은 것은?","opts":["1종 오류와 2종 오류 가능성이 모두 감소한다.","1종 오류 가능성은 증가하고 2종 오류 가능성은 감소한다.","1종 오류 가능성은 감소하고 2종 오류 가능성은 증가한다.","1종 오류와 2종 오류 가능성이 모두 증가한다.","두 오류 모두 변화가 없다."],"a":2,"ex":"두 오류는 상충 관계이다. 기각 기준을 엄격히 하면 잘못 기각할 위험은 줄지만 못 잡아낼 위험은 커진다."},{"n":27,"q":"단측검정과 양측검정에 대한 설명으로 옳지 않은 것은?","opts":["방향이 명시된 가설은 단측검정으로 검증한다.","연구가설과 반대 방향의 극단적 결과도 단측검정에서 기각된다.","양측검정의 기각역은 분포의 양쪽 극단에 α/2씩 설정된다.","같은 유의수준에서 단측검정은 가설 방향에 대한 검증력이 더 높다.","방향에 대한 사전 근거가 없는 탐색적 연구에서는 양측검정이 적절하다."],"a":1,"ex":"단측검정의 기각역은 가설 방향 한쪽에만 설정되므로, 반대 방향의 결과는 아무리 극단적이어도 기각되지 않는다."},{"n":28,"q":"독립표본 t검정의 기본 가정에 해당하지 않는 것은?","opts":["종속변인의 정규성","두 집단의 등분산성","관찰의 독립성","구형성(sphericity)","종속변인이 등간척도 이상일 것"],"a":3,"ex":"구형성은 반복측정 분산분석의 가정이다. 위반 시 Greenhouse-Geisser 교정 등을 적용한다."},{"n":29,"q":"분산분석에서 F값이 유의할 때, 구체적으로 어느 집단들 간에 차이가 있는지 확인하기 위한 절차는?","opts":["사전검사","교차타당화","공변량 투입","요인회전","사후검증(다중비교)"],"a":4,"ex":"Tukey HSD, Scheffé, Bonferroni 등이 대표적이며, 다중비교에 따른 1종 오류 누적을 통제한다."},{"n":30,"q":"이원분산분석에서 상호작용효과가 유의하다는 것의 의미로 가장 적절한 것은?","opts":["한 독립변인의 효과가 다른 독립변인의 수준에 따라 달라진다.","두 독립변인의 효과가 단순히 합산된다.","두 종속변인 간의 상관이 높다.","두 독립변인의 주효과가 모두 유의하다.","오차분산이 증가한다."],"a":0,"ex":"상호작용이 유의하면 주효과의 단독 해석은 오해를 부를 수 있어 단순주효과 분석이 뒤따른다."},{"n":31,"q":"두 집단의 사전점수 차이를 통계적으로 통제한 상태에서 사후점수를 비교하고자 할 때 적절한 분석방법은?","opts":["일원분산분석","다변량분산분석","반복측정 분산분석","공분산분석(ANCOVA)","판별분석"],"a":3,"ex":"사전점수를 공변인으로 투입하여 처치 효과의 추정에서 초기 차이의 영향을 제거한다."},{"n":32,"q":"두 변인 간 상관계수가 r = .60일 때, 한 변인이 다른 변인의 변량을 설명하는 비율은?","opts":["36%","60%","40%","64%","6%"],"a":0,"ex":"결정계수 r² = .36이다. 상관의 크기와 설명량을 혼동하게 만드는 단골 문항이다."},{"n":33,"q":"중다회귀분석에서 독립변인들 간의 상관이 지나치게 높을 때 회귀계수 추정이 불안정해지는 문제는?","opts":["자기상관","다중공선성","이분산성","비선형성","억제효과"],"a":1,"ex":"분산팽창계수(VIF) 등으로 진단하며, 변인 제거·합성 등으로 대처한다."},{"n":34,"q":"정규성 가정을 충족하기 어려운 소표본에서 두 독립집단의 차이를 검증하기에 적절한 비모수 통계방법은?","opts":["독립표본 t검정","Wilcoxon 부호순위 검정","Mann-Whitney U 검정","McNemar 검정","피어슨 적률상관"],"a":2,"ex":"Wilcoxon 부호순위는 대응 2집단, Kruskal-Wallis는 독립 3집단 이상에 해당한다."},{"n":35,"q":"단일사례연구의 ABAB(반전) 설계에 대한 설명으로 옳지 않은 것은?","opts":["처치 효과를 반복적으로 입증할 수 있다.","효과적인 처치를 철회하는 데 따른 윤리적 문제가 제기될 수 있다.","행동이 비가역적인 경우 적용이 곤란하다.","안정된 기초선의 확보가 중요하다.","집단 간 무선배치가 필수적이다."],"a":4,"ex":"단일사례설계는 개인 내 비교 설계로, 집단 구성과 무선배치를 전제하지 않는다."},{"n":36,"q":"처치를 철회하지 않고 여러 행동·상황·대상에 걸쳐 시차를 두고 처치를 순차적으로 도입하여 효과를 입증하는 단일사례설계는?","opts":["ABAB 설계","교대처치설계","중다기초선설계","기준변경설계","사전-사후 통제집단설계"],"a":2,"ex":"반전설계의 윤리 문제(처치 철회)를 피할 수 있다는 것이 대표적 장점이다."},{"n":37,"q":"판단중지(epoché)와 본질직관을 통해 참여자가 겪은 체험의 의미 구조를 기술하고자 하는 질적 연구방법은?","opts":["근거이론","사례연구","문화기술지","현상학적 연구","실행연구"],"a":3,"ex":"‘그 경험의 본질은 무엇인가’를 묻는 접근으로, 연구자의 선이해를 괄호치는 것이 방법론적 핵심이다."},{"n":38,"q":"질적 연구의 신빙성(trustworthiness) 확보 전략에 해당하지 않는 것은?","opts":["삼각검증(triangulation)","무선표집과 무선할당","동료 검토(peer debriefing)","장기간의 관여와 지속적 관찰","참여자 확인(member check)"],"a":1,"ex":"무선표집·무선할당은 양적 연구의 타당도 전략이다. 질적 연구는 의도적 표집을 사용한다."},{"n":39,"q":"통계적으로 유의한 결과 위주로 학술지에 게재되어 메타분석의 효과크기가 과대추정되는 문제는?","opts":["출판 편향","선택 편향","확증 편향","회상 편향","실험자 편향"],"a":0,"ex":"깔때기 도표(funnel plot)의 비대칭성 등으로 탐지하며, 미출판 연구 수집으로 보완한다."},{"n":40,"q":"좋은 연구가설의 조건으로 옳지 않은 것은?","opts":["둘 이상의 변인 간 관계로 진술된다.","경험적으로 검증 가능해야 한다.","명료하고 간결하게 진술되어야 한다.","자료에 의해 반증될 수 있어야 한다.","옳고 그름에 대한 가치판단을 포함해야 한다."],"a":4,"ex":"‘~해야 한다’는 당위 진술은 경험적으로 검증할 수 없으므로 과학적 가설이 될 수 없다."},{"n":41,"q":"조작적 정의에 대한 설명으로 옳지 않은 것은?","opts":["추상적 개념을 측정 가능한 절차로 구체화한 것이다.","동일한 개념에 대해 여러 가지 조작적 정의가 가능하다.","연구의 반복검증을 가능하게 한다.","하나의 조작적 정의는 개념의 의미 전체를 완전히 포괄한다.","‘공격성을 타격 횟수로 정의한다’는 그 예이다."],"a":3,"ex":"조작적 정의는 개념의 한 단면을 포착할 뿐이므로, 구성개념과 측정 간의 간극이 항상 존재한다."},{"n":42,"q":"상담성과에 대한 작업동맹의 효과가 내담자의 성별에 따라 다르게 나타났다. 이때 성별의 역할은?","opts":["조절변인","매개변인","종속변인","잠재변인","통제변인"],"a":0,"ex":"‘누구에게(언제) 효과가 다른가’는 조절, ‘왜(어떤 경로로) 효과가 나는가’는 매개의 질문이다."},{"n":43,"q":"아이스크림 판매량과 익사 사고 수의 높은 상관이 실은 기온이라는 제3변인 때문일 때, 두 변인의 관계를 지칭하는 용어는?","opts":["비선형 관계","억제 효과","매개 효과","상호작용 효과","허위(spurious) 관계"],"a":4,"ex":"제3변인을 통제하면 사라지는 상관이다. 상관에서 인과로 건너뛸 수 없는 대표적 이유가 된다."},{"n":44,"q":"표집 관련 용어에 대한 설명으로 옳지 않은 것은?","opts":["모집단은 연구 결과를 일반화하고자 하는 전체 집합이다.","표집틀은 항상 모집단과 완벽하게 일치한다.","표집오차는 표본 통계치와 모수 간의 차이를 말한다.","요소는 정보 수집의 기본 단위이다.","표집틀은 표본을 추출하는 모집단 요소의 목록이다."],"a":1,"ex":"전화번호부로 전체 시민을 표집하면 미등재자가 빠지듯, 표집틀과 모집단의 불일치는 포함오차(coverage error)를 낳는다."},{"n":45,"q":"체계적 표집에 대한 설명으로 옳지 않은 것은?","opts":["첫 번째 요소는 무선적으로 선정한다.","표집 간격은 모집단 크기를 표본 크기로 나누어 정한다.","비확률 표집방법에 해당한다.","단순무선표집보다 실시가 간편하다.","명부에 주기성이 있으면 표본이 편향될 수 있다."],"a":2,"ex":"시작점을 무선으로 정하므로 확률 표집으로 분류된다. 명부의 주기성만 주의하면 된다."},{"n":46,"q":"모집단의 주요 특성 구성비에 맞추어 범주별 인원을 정한 뒤, 각 범주 안에서는 조사자가 임의로 대상을 선정하는 표집방법은?","opts":["할당표집","층화표집","군집표집","체계적 표집","단순무선표집"],"a":0,"ex":"층화표집과 구조는 닮았지만 범주 내 추출이 무선적이지 않아 비확률 표집이라는 점이 결정적 차이다."},{"n":47,"q":"문항 내용과 무관하게 ‘그렇다’로 답하는 묵종 경향성을 줄이는 방법으로 가장 적절한 것은?","opts":["모든 문항을 긍정문으로 통일한다.","긍정 진술과 부정 진술 문항을 혼합하여 배치한다.","검사 시간을 단축한다.","리커트 응답 단계를 줄인다.","익명성을 제거한다."],"a":1,"ex":"역채점 문항을 섞으면 일관된 묵종 반응이 점수에 상쇄되고, 비일관성 탐지도 가능해진다."},{"n":48,"q":"‘좋은-나쁜’, ‘강한-약한’과 같은 양극 형용사 쌍을 이용해 개념에 대한 의미 공간을 평정하게 하는 척도는?","opts":["리커트 척도","거트만 척도","써스톤 척도","의미변별(어의차이) 척도","보가더스 사회적 거리 척도"],"a":3,"ex":"오스굿이 개발했으며 평가·능력·활동의 세 차원으로 의미 구조를 분석한다."},{"n":49,"q":"문항들이 단일 차원에서 누적적으로 배열되어, 강한 문항에 동의한 사람은 그보다 약한 문항에도 동의한다고 가정하는 척도는?","opts":["써스톤 척도","리커트 척도","거트만 척도","의미변별 척도","스타펠 척도"],"a":2,"ex":"재생계수로 누적성을 평가한다. 보가더스 사회적 거리 척도가 대표적인 누적 척도의 예이다."},{"n":50,"q":"통제집단이 실험집단에 제공되는 처치의 내용을 알게 되어 이를 모방함으로써 집단 간 차이가 축소되는 내적타당도 위협은?","opts":["도구화","보상적 경쟁","사기 저하","선발-성숙 상호작용","처치의 확산(모방)"],"a":4,"ex":"같은 기관 안에서 두 집단이 교류할 때 흔하다. 존 헨리 효과(보상적 경쟁)와 묶어 비교 학습하면 좋다."},{"n":51,"q":"자신이 관찰되고 있다는 인식 자체가 참여자의 행동을 변화시키는 현상은?","opts":["후광 효과","위약 효과","피그말리온 효과","존 헨리 효과","호손 효과"],"a":4,"ex":"피그말리온은 실험자(교사)의 기대 효과, 존 헨리는 통제집단의 분발 효과로 주체가 각각 다르다."},{"n":52,"q":"실험자의 기대가 결과에 영향을 미치는 것을 통제하기 위해 실험자와 참여자 모두 집단 배정 정보를 모르게 하는 방법은?","opts":["이중맹목 설계","단일맹목 설계","짝짓기","역균형화","무선반응기법"],"a":0,"ex":"단일맹목은 참여자만 모르는 것으로, 실험자 기대 효과까지는 통제하지 못한다."},{"n":53,"q":"반복측정 설계에서 처치 제시 순서에 따른 연습·피로 효과를 통제하기 위해 참여자마다 처치 순서를 달리하는 방법은?","opts":["짝짓기","층화","역균형화","이월효과 분석","맹목화"],"a":2,"ex":"라틴정방형 설계는 역균형화를 체계적으로 구현하는 대표적 방식이다."},{"n":54,"q":"카이제곱 검정의 가정과 유의사항에 대한 설명으로 옳지 않은 것은?","opts":["각 관찰은 서로 독립적이어야 한다.","기대빈도는 작을수록 바람직하다.","범주들은 상호배타적이어야 한다.","빈도 자료에 적용하는 분석이다.","기대빈도가 5 미만인 칸이 많으면 결과가 부정확해질 수 있다."],"a":1,"ex":"기대빈도가 너무 작으면 χ² 분포 근사가 깨진다. 이 경우 Fisher의 정확검정 등을 고려한다."},{"n":55,"q":"독립표본 t검정에서 두 집단의 사례 수가 각각 20명과 22명일 때 자유도는?","opts":["42","41","40","39","21"],"a":2,"ex":"df = (n₁-1)+(n₂-1) = 19+21 = 40이다."},{"n":56,"q":"측정 단위가 서로 다른 예측변인들이 종속변인에 미치는 상대적 영향력을 비교할 때 사용하는 회귀계수는?","opts":["비표준화 계수(b)","잔차","절편","표준화 계수(β)","수정된 결정계수"],"a":3,"ex":"β는 모든 변인을 z점수화한 상태의 계수이므로 단위의 영향을 받지 않는다."},{"n":57,"q":"이론에 근거하여 사전에 설정한 요인구조가 실제 자료에 부합하는지를 검증하는 분석방법은?","opts":
