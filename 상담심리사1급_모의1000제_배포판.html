"피어슨 적률상관","정준상관","중다상관","스피어만 등위상관","부분상관"],"a":3,"ex":"서열 자료에는 순위 기반의 스피어만 상관(또는 켄달의 타우)이 적합하다."},{"n":68,"q":"성별(남/여)과 자격시험 합격 여부(합격/불합격)의 관련성을 나타내기에 적절한 상관계수는?","opts":["피어슨 적률상관","스피어만 등위상관","파이(φ) 계수","점이연 상관","에타 계수"],"a":2,"ex":"두 변인이 모두 진성 이분변인일 때는 파이 계수를 사용하며, 2×2 카이제곱과 직접 연결된다."},{"n":69,"q":"시험점수(연속변인)와 성별(이분변인)의 상관을 구하기에 적절한 계수는?","opts":["파이 계수","사분상관","스피어만 상관","정준상관","점이연 상관"],"a":4,"ex":"연속변인과 진성 이분변인의 조합에는 점이연 상관이 쓰이며, 독립표본 t검정과 수리적으로 동치이다."},{"n":70,"q":"실험집단 평균 80, 통제집단 평균 70, 통합 표준편차가 10일 때 Cohen's d는?","opts":["0.1","0.5","1.0","2.0","10.0"],"a":2,"ex":"d=(80-70)/10=1.0으로, 관례상 큰 효과(0.8 이상)에 해당한다."},{"n":71,"q":"표본 10,000명의 연구에서 p=.03이 나왔다. 가장 적절한 해석적 태도는?","opts":["대표본에서는 미미한 효과도 유의해질 수 있으므로 효과크기를 함께 검토한다.","인과관계가 입증되었다.","p가 작으므로 효과가 크다는 뜻이다.","계산 오류이므로 무시한다.","반복연구가 더 이상 필요 없다."],"a":0,"ex":"p값은 효과의 크기가 아니라 우연성에 대한 증거의 강도다. 실질적 의미는 효과크기와 신뢰구간이 말해준다."},{"n":72,"q":"p=.06이 나온 연구 결과의 해석으로 옳지 않은 것은?","opts":["관례적 기준에서 영가설 기각에 실패했다고 기술한다.","검증력과 표본 크기를 함께 검토할 가치가 있다.","효과크기와 신뢰구간을 보고하는 것이 유용하다.","추후 반복연구를 고려할 수 있다.","효과가 없음이 증명되었다고 결론 내린다."],"a":4,"ex":"유의하지 않음은 ‘효과 없음의 증명’이 아니라 ‘증거 불충분’이다. 영가설은 채택되는 것이 아니라 기각에 실패할 뿐이다."},{"n":73,"q":"“이 상담 프로그램은 유익하고 재미있습니까?”라는 설문 문항의 문제점은?","opts":["유도질문","위협적 질문","이중부정 질문","이중적(double-barreled) 질문","개방형 질문"],"a":3,"ex":"유익함과 재미라는 두 속성을 한 문항에 담아, ‘유익하지만 재미없는’ 응답자는 답할 수 없게 된다."},{"n":74,"q":"“대부분의 전문가들이 찬성하는 이 정책에 대해 귀하도 찬성하십니까?”라는 문항의 문제점은?","opts":["이중적 질문","유도질문","이중부정 질문","모호한 질문","행렬형 질문"],"a":1,"ex":"권위나 다수 의견을 끌어와 특정 방향의 응답을 압박하는 전형적 유도질문이다."},{"n":75,"q":"면접조사의 장점으로 보기 어려운 것은?","opts":["익명성이 가장 잘 보장된다.","복잡한 질문과 보조자료 활용이 가능하다.","응답률이 비교적 높다.","응답자 본인 여부를 확인할 수 있다.","불명확한 응답에 추가 탐문이 가능하다."],"a":0,"ex":"면대면 상황은 익명성이 가장 낮아 민감한 주제에서 사회적 바람직성 편향이 커질 수 있다."},{"n":76,"q":"1995년에 태어난 사람들을 2015년, 2020년, 2025년에 각각 ‘새로운 표본’으로 추출하여 조사하였다. 이 연구 유형은?","opts":["패널연구","추세(경향)연구","횡단연구","회고적 연구","동류집단(코호트)연구"],"a":4,"ex":"동일 출생 코호트를 추적하되 매번 같은 사람일 필요는 없다. 매번 같은 사람이면 패널연구가 된다."},{"n":77,"q":"매년 서로 다른 표본을 추출하여 전국 청소년의 스마트폰 사용 시간 변화를 조사하였다. 이 연구 유형은?","opts":["패널연구","추세(경향)연구","사례연구","코호트연구","실험연구"],"a":1,"ex":"동일 모집단의 변화를 시점마다 새 표본으로 추적한다. 개인 내 변화는 알 수 없다는 한계가 있다."},{"n":78,"q":"내용분석에 대한 설명으로 옳지 않은 것은?","opts":["코더 간 신뢰도는 확인할 필요가 없다.","분석 단위를 사전에 정의한다.","범주는 상호배타적이고 포괄적이어야 한다.","의사소통 내용을 객관적·체계적·수량적으로 분석한다.","이미 존재하는 자료를 활용할 수 있어 비반응적이다."],"a":0,"ex":"코딩의 일관성이 내용분석의 신뢰도 그 자체이므로, 코더 간 일치도 보고는 필수 요건이다."},{"n":79,"q":"델파이 기법에 대한 설명으로 옳지 않은 것은?","opts":["참여 전문가의 익명성을 보장한다.","수 차례의 반복적 환류 과정을 거친다.","응답의 통계적 집계 결과를 제공한다.","전문가들을 한자리에 모아 공개 토론으로 합의를 도출한다.","소수 의견도 검토 자료로 보존한다."],"a":3,"ex":"델파이는 대면 토론의 동조 압력과 권위 효과를 피하기 위해 고안된 ‘비대면·익명’ 방식이다."},{"n":80,"q":"중학생을 대상으로 한 설문 연구를 계획하고 있다. 연구윤리상 가장 적절한 동의 절차는?","opts":["아동 본인의 구두 동의만으로 충분하다.","미성년자이므로 동의 절차를 생략할 수 있다.","법정대리인의 동의와 함께 아동 본인의 승낙(assent)을 모두 구한다.","담임교사의 동의로 대체한다.","조사 후에 통보하면 된다."],"a":2,"ex":"보호자 동의가 아동의 의사를 대체하지 않는다. 발달수준에 맞게 설명하고 본인의 승낙을 별도로 구하는 것이 원칙이다."},{"n":81,"q":"가설검증에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. p값은 영가설이 참일 확률이 아니다.\nㄴ. p값은 영가설이 참이라는 가정 하에 관찰된 결과 이상의 극단적 결과가 나올 확률이다.\nㄷ. 유의수준은 자료를 수집하고 p값을 확인한 후에 정하는 것이 원칙이다.\nㄹ. 평균차의 95% 신뢰구간이 0을 포함하지 않는 것은 5% 수준의 유의성과 대응된다.","opts":["ㄱ, ㄴ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":1,"ex":"유의수준은 자료 수집 ‘전’에 정해야 한다. 사후 결정은 p-해킹의 한 형태가 된다."},{"n":82,"q":"신뢰도와 타당도에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 측정의 신뢰도는 타당도 계수의 상한을 제약한다.\nㄴ. 동질적인 문항을 추가하면 일반적으로 신뢰도가 높아진다.\nㄷ. 속도검사의 반분신뢰도는 과대추정될 수 있다.\nㄹ. 타당도 계수는 신뢰도 계수보다 항상 크다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"스피어만-브라운 공식(ㄴ)과 속도검사에서 전후 반분의 문제(ㄷ)까지 묶은 통합형이다. ㄹ은 ㄱ과 정반대 진술이다."},{"n":83,"q":"능력 수준이 동일한 두 집단(예: 성별)에서 특정 문항의 정답률이 체계적으로 다르게 나타나는 현상은?","opts":["천장 효과","속도 요인","바닥 효과","연습 효과","차별기능문항(DIF)"],"a":4,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 문항 편파의 통계적 증거로, 검사의 공정성 검토에서 핵심적으로 분석되는 지표다."},{"n":84,"q":"회귀분석에서 잔차 산점도가 예측값이 커질수록 퍼지는 깔때기 모양을 보였다. 의심되는 문제는?","opts":["다중공선성","자기상관의 부재","완전한 정규성","이분산성","완전한 선형성"],"a":3,"ex":"오차 분산이 일정하다는 등분산 가정의 위반으로, 표준오차 추정이 왜곡되어 유의성 검정이 부정확해진다."},{"n":85,"q":"여러 예측변인으로 상담 종결 후 ‘재발 여부(예/아니오)’를 예측하고자 한다. 적절한 분석방법은?","opts":["로지스틱 회귀분석","중다회귀분석","반복측정 분산분석","피어슨 상관분석","요인분석"],"a":0,"ex":"이분 종속변인에는 선형회귀가 부적합하다. 로지스틱 회귀는 사건 발생의 오즈(odds)를 모형화한다."},{"n":86,"q":"학생들이 학급에, 학급이 학교에 내재된(nested) 자료에서 개인과 집단 수준의 효과를 동시에 분석하기에 적절한 방법은?","opts":["단순회귀분석","단일표본 t검정","다층모형(위계적 선형모형)","교차분석","군집분석"],"a":2,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 내재 구조를 무시하면 관찰 독립성 가정이 깨져 1종 오류가 커진다. 집단상담 연구(집단에 내재된 개인)에도 해당된다."},{"n":87,"q":"중도 탈락(중도절단) 사례를 포함하여 ‘사건 발생까지 걸린 시간’을 분석하는 통계 방법은?","opts":["요인분석","생존분석","판별분석","경향분석","정준상관분석"],"a":1,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 재발까지의 시간, 상담 지속 기간 연구 등에 활용되며, 끝까지 사건이 없던 사례도 정보로 쓸 수 있는 것이 강점이다."},{"n":88,"q":"무선할당이 불가능한 관찰 자료에서, 공변인 정보를 이용해 처치집단과 유사한 비교집단을 구성하는 방법은?","opts":["경향점수 매칭","단순무선표집","눈덩이표집","역균형화","델파이 기법"],"a":0,"ex":"〔저빈도 심화 — 출제 비중 낮음, 여유 있을 때 학습〕 처치를 받을 확률(경향점수)이 비슷한 사례끼리 짝지어 선발 편향을 줄이는 준실험적 인과 추론 기법이다."},{"n":89,"q":"대학원생의 석사학위논문 자료를 기반으로 학술지 논문을 출판하려고 한다. 저자 표시에 대한 판단으로 가장 적절한 것은?","opts":["지도교수가 관례에 따라 제1저자가 된다.","연구비를 지원한 사람이 제1저자가 된다.","소속 기관에서 직위가 높은 순서로 정한다.","저자 순서는 가나다순으로 정하는 것이 원칙이다.","논문의 주된 지적 기여자인 학생이 원칙적으로 주저자가 된다."],"a":4,"ex":"학위논문 기반 출판에서 학생의 주저자 원칙은 여러 학회 윤리규정에 명시되어 있다. 직위·관례는 저자 자격의 근거가 아니다."},{"n":90,"q":"연구 저자 표시의 윤리에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 저자 자격은 연구에 대한 실질적인 지적 기여에 근거한다.\nㄴ. 단순한 자료 수집 보조나 행정 지원만으로는 저자 자격이 부여되지 않는다.\nㄷ. 기여 없이 이름을 올리는 명예저자는 연구 부정행위에 해당한다.\nㄹ. 실질적 기여자를 저자에서 누락하는 유령저자도 부정행위에 해당한다.\nㅁ. 학과장은 소속 교원의 모든 논문에 공저자가 될 권리가 있다.","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ, ㅁ","ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"],"a":2,"ex":"직위에 따른 자동 저자권은 존재하지 않는다. 기여하지 않은 이름을 넣는 것과 기여한 이름을 빼는 것 모두 부정행위다."},{"n":91,"q":"중복게재와 출판 윤리에 대한 설명으로 옳지 않은 것은?","opts":["이미 출판한 자신의 문장을 출처 표시 없이 대량 재사용하는 것도 문제가 된다.","번역하여 출판하는 경우에도 원 출판 사실을 밝혀야 한다.","중복게재는 학술 자원을 낭비하고 메타분석 결과를 왜곡할 수 있다.","하나의 자료를 잘게 나누어 여러 편으로 출판하는 살라미 방식이 권장된다.","학위논문을 기반으로 한 학술지 게재는 그 사실을 밝히고 이루어질 수 있다."],"a":3,"ex":"분할 출판은 업적 부풀리기이자 독자 기만이다. 동일 자료에서 나온 논문 간 관계는 투명하게 공개되어야 한다."},{"n":92,"q":"검사 개발사로부터 연구비를 지원받은 연구자가 해당 검사의 효과 연구를 수행하려 한다. 가장 적절한 태도는?","opts":["이해상충이 있으므로 연구 수행 자체가 금지된다.","연구비 출처를 밝히지 않으면 문제가 없다.","연구비를 반납하는 것만이 유일한 해결책이다.","이해상충을 투명하게 공개하고 편향을 통제할 장치(독립 분석, 사전등록 등)를 마련한다.","불리한 결과는 공개하지 않아도 된다."],"a":3,"ex":"이해상충은 숨길 때 부정이 된다. 공개와 통제 장치가 연구의 신뢰성을 지키는 표준 절차다."},{"n":93,"q":"교수가 자신의 수강생을 연구에 참여시키려 한다. 연구윤리상 가장 적절한 조치는?","opts":["성적과 무관함을 보장하고 동등한 대안 과제를 제공하는 등 자발성 보호 장치를 마련한다.","수강생은 교육의 일부이므로 의무적으로 참여시킬 수 있다.","참여자에게만 가산점을 주어 참여를 압박한다.","불참자 명단을 강의 중에 공개한다.","사후에 통보하면 동의가 필요 없다."],"a":0,"ex":"평가 권한을 가진 관계에서는 동의의 자발성이 구조적으로 위협받는다. 대안 제공이 강요성을 해소하는 핵심 장치다."},{"n":94,"q":"연구에서의 기만(deception) 사용에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 과학적 가치가 크고 기만 없는 대안이 없을 때 제한적으로 정당화될 수 있다.\nㄴ. 심각한 신체적 고통이나 정서적 고통이 예상되는 기만은 허용되지 않는다.\nㄷ. 디브리핑은 가능한 한 신속하게 제공되어야 한다.\nㄹ. 디브리핑 이후에도 참여자는 자신의 자료 철회를 요구할 수 없다.","opts":["ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"기만을 알게 된 참여자에게는 자료 철회의 권리가 보장되어야 한다. 이것이 사후 동의의 실질적 의미다."},{"n":95,"q":"소규모 지역사회를 대상으로 한 질적 연구에서 풍부한 맥락 기술이 참여자의 신원을 노출시킬 위험이 있다. 가장 적절한 대처는?","opts":["질적 연구는 익명화 의무가 없으므로 그대로 기술한다.","맥락 정보를 전부 삭제하여 보고한다.","녹음과 전사를 금지한다.","참여자 실명 공개를 원칙으로 한다.","두꺼운 기술과 참여자 보호 사이의 긴장을 인식하고, 참여자와 합의된 수준의 변형·은폐를 적용한다."],"a":4,"ex":"좁은 공동체에서는 가명만으로 부족할 수 있다. 어떤 세부를 바꾸고 무엇을 남길지는 참여자와의 협의 사안이다."},{"n":96,"q":"양적 조사 결과에서 나타난 예상 밖의 패턴을 심층면접으로 설명하고자, 양적 자료를 먼저 수집·분석한 후 질적 단계를 진행하였다. 이 혼합방법 설계는?","opts":["수렴적 설계","설명적 순차 설계","탐색적 순차 설계","완전 내재 설계","단일방법 설계"],"a":1,"ex":"양→질 순서로 ‘설명’하면 설명적 순차, 질→양 순서로 도구를 ‘개발’하면 탐색적 순차 설계다."},{"n":97,"q":"연구 가설과 분석 계획을 자료 수집 전에 공개 저장소에 등록하는 사전등록(preregistration)의 주된 목적은?","opts":["사후에 가설을 바꾼 사실을 숨기기 위한 제도이다.","자료를 영구히 비공개하는 제도이다.","논문 출판을 금지하기 위한 제도이다.","동료 심사를 생략하기 위한 제도이다.","선택적 보고와 p-해킹을 줄여 연구의 투명성과 재현성을 높이기 위한 제도이다."],"a":4,"ex":"확증적 분석과 탐색적 분석을 구분 가능하게 만들어, ‘발견’과 ‘검증’의 경계를 투명하게 한다."},{"n":98,"q":"결과를 확인한 후에 만든 가설을 마치 자료 수집 전부터 세웠던 가설인 것처럼 제시하는 관행은?","opts":["p-해킹","무선화","살라미 출판","HARKing","삼각검증"],"a":3,"ex":"Hypothesizing After Results are Known의 약자로, 탐색적 발견을 확증적 검증으로 둔갑시켜 1종 오류를 은폐한다."},{"n":99,"q":"효과크기에 대한 설명으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 상관계수 r은 .10, .30, .50을 관례상 소·중·대 효과로 본다.\nㄴ. d와 r은 상호 변환이 가능하다.\nㄷ. 오즈비(odds ratio)도 효과크기 지표의 하나이다.\nㄹ. 효과크기는 표본 크기가 커질수록 체계적으로 커진다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"표본 크기에 따라 변하는 것은 p값이지 효과크기의 기댓값이 아니다. 이 구분이 효과크기 보고의 존재 이유다."},{"n":100,"q":"연구 설계 단계에서 수행하는 검증력 분석(power analysis)의 일차적 용도는?","opts":["수집된 자료의 p값을 사후 보정하는 것","기대 효과크기와 유의수준 하에서 필요한 표본 크기를 사전에 산출하는 것","측정도구의 신뢰도를 계산하는 것","타당도 증거를 수집하는 것","IRB 심의를 면제받는 것"],"a":1,"ex":"검증력 80%를 관례적 기준으로, 효과크기·α·검증력의 함수로 표본 크기를 결정한다. IRB도 그 근거를 요구하는 추세다."},{"n":101,"q":"측정 단위가 서로 다른 두 변인(예: 키와 몸무게)의 상대적 산포를 비교하기에 적절한 지수는?","opts":["변동계수(CV)","표준편차","범위","사분편차","분산"],"a":0,"ex":"CV=표준편차/평균으로 단위가 소거되어, 단위나 평균 수준이 다른 분포 간 산포 비교가 가능해진다."},{"n":102,"q":"왜도(skewness)가 0보다 큰 분포에 대한 설명으로 옳은 것은?","opts":["좌우 대칭이다.","꼬리가 왼쪽으로 길게 늘어진 부적 편포이다.","항상 이봉분포이다.","꼬리가 오른쪽으로 길게 늘어진 정적 편포이다.","평균이 항상 0이다."],"a":3,"ex":"왜도의 부호는 ‘긴 꼬리의 방향’이다. 정적(+)이면 오른쪽 꼬리, 소득 분포가 전형적 예다."},{"n":103,"q":"첨도(kurtosis)가 의미하는 바로 가장 적절한 것은?","opts":["정규분포 대비 분포의 뾰족한 정도와 꼬리의 두꺼움","분포의 중심 위치","분포의 좌우 비대칭 정도","표본의 크기","측정의 단위"],"a":0,"ex":"왜도는 ‘기울어짐’, 첨도는 ‘뾰족함과 꼬리’다. 둘은 정규성 검토의 기초 지표로 함께 보고된다."},{"n":104,"q":"원점수를 z점수로 변환했을 때에 대한 설명으로 옳은 것은?","opts":["분포의 모양이 자동으로 정규분포가 된다.","평균 0, 표준편차 1이 되지만 분포의 모양 자체는 변하지 않는다.","편포가 대칭으로 교정된다.","극단값이 제거된다.","서열 정보만 남는다."],"a":1,"ex":"z변환은 선형 변환이므로 모양을 바꾸지 못한다. ‘표준화=정규화’라는 오해가 단골 함정이다."},{"n":105,"q":"회귀분석에서 4개 범주를 가진 명명변인(예: 계열)을 예측변인으로 투입할 때 필요한 더미변수의 수는?","opts":["1개","2개","3개","4개","5개"],"a":2,"ex":"k개 범주는 k-1개의 더미변수로 표현하며, 제외된 범주가 비교의 기준(준거집단)이 된다."},{"n":106,"q":"반복측정 분산분석에서 구형성 가정이 위반되었을 때의 적절한 대처는?","opts":["분석을 포기한다.","독립표본 t검정으로 바꾼다.","표본을 무작위로 삭제한다.","유의수준을 .50으로 올린다.","Greenhouse-Geisser 등의 자유도 교정을 적용하거나 다변량 접근을 사용한다."],"a":4,"ex":"구형성 위반을 무시하면 1종 오류가 커진다. 엡실론(ε) 값으로 자유도를 보정하는 것이 표준 절차다."},{"n":107,"q":"계획비교(사전비교)와 사후비교의 구별로 가장 적절한 것은?","opts":["계획비교는 자료를 본 후, 사후비교는 자료 수집 전에 정한다.","사후비교는 통계적으로 금지되어 있다.","두 방식의 오류 통제 방식은 동일하다.","계획비교는 이론에 근거해 자료 수집 전에 특정 비교를 설정하는 것이고, 사후비교는 전체 검정이 유의한 후 가능한 비교들을 탐색하는 것이다.","계획비교는 항상 양측검정만 가능하다."],"a":3,"ex":"비교의 ‘시점과 근거’가 구별 축이다. 사후비교는 비교 수가 많아 더 보수적인 오류 통제를 요구한다."},{"n":108,"q":"카이제곱 적합도 검정과 독립성 검정의 구별로 옳은 것은?","opts":["적합도 검정은 두 변인의 관련성을, 독립성 검정은 한 변인의 분포를 다룬다.","적합도 검정은 한 변인의 관찰 분포가 이론적 기대 분포와 부합하는지를, 독립성 검정은 두 범주 변인 간의 관련성을 검정한다.","두 검정은 명칭만 다르다.","독립성 검정은 연속변인 전용이다.","적합도 검정은 t분포를 사용한다."],"a":1,"ex":"‘주사위가 공정한가’는 적합도, ‘성별과 선호가 관련 있나’는 독립성 검정이다."},{"n":109,"q":"동일한 대상을 세 가지 이상의 조건에서 반복 측정한 서열 자료를 비교하기에 적절한 비모수 검정은?","opts":["Mann-Whitney U","Kruskal-Wallis","피어슨 상관","독립표본 t검정","Friedman 검정"],"a":4,"ex":"Kruskal-Wallis의 반복측정 짝이 Friedman이다. ‘독립이냐 반복이냐, 둘이냐 셋 이상이냐’의 2×2로 정리하면 된다."},{"n":110,"q":"금연 캠페인 전후에 동일한 사람들의 흡연 여부(예/아니오) 변화를 검정하기에 적절한 방법은?","opts":["McNemar 검정","독립표본 t검정","Kruskal-Wallis 검정","피어슨 상관","일원분산분석"],"a":0,"ex":"대응된 이분 자료의 전후 변화에는 McNemar가 적합하다. 불일치 칸(변화한 사례)에 주목하는 검정이다."},{"n":111,"q":"두 명 이상의 평정자가 연속 척도로 평정한 점수들의 일치도를 평가하기에 적절한 지수는?","opts":["카파 계수","급내상관계수(ICC)","파이 계수","결정계수","변동계수"],"a":1,"ex":"범주 판단의 일치는 카파, 연속 평정의 일치는 ICC가 짝이다. 평정 자료의 척도 수준이 선택 기준이다."},{"n":112,"q":"설문 자료의 결측치 처리에 대한 설명으로 가장 적절한 것은?","opts":["다중대체(multiple imputation) 등의 방법은 단순 삭제보다 표본 손실과 편향을 줄일 수 있다.","결측이 있는 사례를 모두 삭제하는 것이 언제나 최선이다.","결측치는 모두 0으로 바꾼다.","결측 발생 기제는 고려할 필요가 없다.","결측이 30%를 넘어도 처리 방법은 동일하다."],"a":0,"ex":"완전제거법은 결측이 무선적이지 않을 때 편향을 낳는다. 결측 기제(MCAR/MAR/MNAR)의 검토가 처리법 선택에 선행한다."},{"n":113,"q":"질적 연구에서 ‘이론적 포화(saturation)’의 의미로 가장 적절한 것은?","opts":["참여자가 피로를 호소하는 시점","면접 시간이 1시간을 넘는 시점","미리 정한 표본 수 30명을 채운 시점","연구비가 소진된 시점","추가 자료 수집이 더 이상 새로운 범주나 속성을 산출하지 않는 시점"],"a":4,"ex":"질적 표본 크기의 논리는 ‘몇 명이면 충분한가’가 아니라 ‘새로움이 멈추는가’이다."},{"n":114,"q":"질적 연구에서 연구자 성찰성(reflexivity)의 실천으로 가장 적절한 것은?","opts":["통계 분석으로 대체한다.","연구자의 관점을 결과에서 완전히 제거할 수 있다고 전제한다.","참여자와의 접촉을 최소화한다.","연구자의 배경과 가정이 자료 수집·해석에 미치는 영향을 성찰 일지 등으로 지속적으로 검토하고 보고한다.","결과 보고에서 연구자 정보를 모두 삭제한다."],"a":3,"ex":"질적 전통에서 연구자는 도구 그 자체다. 영향의 ‘제거’가 아니라 ‘투명한 검토’가 신빙성 전략이다."},{"n":115,"q":"단일사례설계에서 목표 행동의 수행 기준을 단계적으로 변경해 가며 행동이 기준을 따라 변하는지를 통해 처치 효과를 입증하는 설계는?","opts":["ABAB 설계","중다기초선설계","기준변경설계","교대처치설계","사전사후설계"],"a":2,"ex":"흡연 감소처럼 점진적 변화가 적합한 표적에 유용하며, 행동이 기준선을 ‘추적’하는 것이 통제의 증거가 된다."},{"n":116,"q":"두 가지 개입의 상대적 효과를 한 대상에게 빠르게 번갈아 적용하며 비교하는 단일사례설계는?","opts":["ABAB 설계","기준변경설계","중다기초선설계","교대처치설계","AB 설계"],"a":3,"ex":"철회 없이 처치 간 비교가 가능하지만, 처치 간 간섭(이월효과)의 통제가 과제가 된다."},{"n":117,"q":"2×3 요인설계에 대한 설명으로 옳은 것은?","opts":["독립변인이 2개이며 각각 2개와 3개의 수준을 가져 총 6개의 처치 조합이 생긴다.","독립변인이 6개이다.","종속변인이 2개이다.","반드시 반복측정이어야 한다.","상호작용은 검증할 수 없다."],"a":0,"ex":"숫자의 ‘개수’는 독립변인의 수, 각 ‘숫자 값’은 수준의 수다. 주효과 2개와 상호작용 1개를 검증할 수 있다."},{"n":118,"q":"메타분석에서 연구 간 효과크기의 이질성이 크게 나타났을 때 가장 적절한 후속 작업은?","opts":["이질성을 무시하고 단순 평균을 보고한다.","표본이 작은 연구를 모두 제외한다.","효과가 가장 큰 연구 하나만 남긴다.","메타분석을 포기한다.","연구 특성(대상, 처치 길이, 측정 등)을 조절변인으로 한 분석으로 이질성의 원인을 탐색한다."],"a":4,"ex":"이질성은 골칫거리가 아니라 정보다. ‘누구에게, 어떤 조건에서 더 효과적인가’라는 임상적 질문으로 이어진다."},{"n":119,"q":"패널연구의 고유한 제한점으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 반복 참여로 인한 패널 조건화(검사 효과)\nㄴ. 시간 경과에 따른 패널 마모(탈락)\nㄷ. 개인 내 변화를 추적할 수 없음","opts":["ㄱ","ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ"],"a":1,"ex":"개인 내 변화 추적은 패널연구의 제한이 아니라 최대 강점이다. ㄷ을 섞는 것이 전형적 함정이다."},{"n":120,"q":"“우리 동네에 살게 한다 → 친구가 된다 → 결혼을 허락한다”처럼 수용 강도가 점차 높아지는 문항들로 집단 간 친밀감의 수용 수준을 측정하는 척도는?","opts":["리커트 척도","써스톤 척도","보가더스 사회적 거리 척도","의미변별 척도","스타펠 척도"],"a":2,"ex":"거트만식 누적 논리의 대표적 응용으로, 강한 문항의 수용은 약한 문항의 수용을 함의한다."},{"n":121,"q":"t분포에 대한 설명으로 옳은 것은?","opts":["자유도와 무관하게 모양이 고정된다.","표준정규분포보다 꼬리가 두꺼우며, 자유도가 커질수록 표준정규분포에 접근한다.","항상 비대칭이다.","평균이 1이다.","이산형 분포이다."],"a":1,"ex":"소표본에서 모분산을 모를 때의 불확실성이 두꺼운 꼬리로 반영된다. n이 커지면 z와 사실상 같아진다."},{"n":122,"q":"점추정과 구간추정의 구별로 가장 적절한 것은?","opts":["두 방법은 동일하다.","구간추정은 표본이 필요 없다.","점추정이 항상 더 많은 정보를 준다.","점추정은 모수를 하나의 값으로, 구간추정은 모수가 포함될 것으로 기대되는 범위를 신뢰수준과 함께 제시한다.","구간추정은 질적 연구 전용이다."],"a":3,"ex":"점추정은 간명하지만 불확실성 정보가 없다. 구간의 폭 자체가 추정의 정밀도를 말해준다."},{"n":123,"q":"영가설의 진술 형식으로 가장 적절한 것은?","opts":["“두 집단의 모평균 간에 차이가 없다.”","“두 집단 간에 차이가 있을 것이다.”","“실험집단이 더 우수할 것이다.”","“상관이 정적일 것이다.”","“효과가 클 것이다.”"],"a":0,"ex":"영가설은 ‘차이·관계 없음’의 형태로 진술되어 기각의 표적이 된다. 방향 진술은 대립(연구)가설의 몫이다."},{"n":124,"q":"입학 성적이 상위권으로 동질적인 집단에서 입학 성적과 학업 성취의 상관이 실제보다 낮게 나타났다. 이 현상을 설명하는 개념은?","opts":["통계적 회귀","다중공선성","천장 효과의 부재","측정 불변성","범위 제한(restriction of range)"],"a":4,"ex":"변량이 잘려 나가면 상관은 축소된다. 선발된 집단에서 선발 도구의 예측타당도가 과소평가되는 고전적 함정이다."},{"n":125,"q":"분산분석에서 F비의 구성으로 옳은 것은?","opts":["집단 내 변량을 집단 간 변량으로 나눈 값","두 집단 평균의 단순 차이","집단 간 변량(처치+오차)을 집단 내 변량(오차)으로 나눈 값","상관계수의 제곱","표준편차의 합"],"a":2,"ex":"처치 효과가 없다면 분자와 분모 모두 오차뿐이어서 F는 1 근처가 된다. 1보다 충분히 큰 F가 효과의 증거다."},{"n":126,"q":"회귀분석에서 잔차(residual)의 정의로 옳은 것은?","opts":["예측값에서 평균을 뺀 값","기울기의 표준오차","독립변인 간의 상관","절편의 크기","관찰값에서 회귀식에 의한 예측값을 뺀 값"],"a":4,"ex":"잔차는 모형이 설명하지 못한 부분이다. 잔차의 패턴 분석이 모형 진단(등분산성, 선형성)의 핵심 도구가 된다."},{"n":127,"q":"표본 크기와 표집오차의 관계로 옳은 것은?","opts":["표본 크기의 제곱근에 반비례하여 표집오차가 줄어든다.","표본이 커질수록 표집오차도 커진다.","둘은 무관하다.","표본이 100을 넘으면 오차는 0이 된다.","표집오차는 모집단 크기에만 의존한다."],"a":0,"ex":"오차를 절반으로 줄이려면 표본을 4배로 늘려야 한다는 √n의 법칙으로, 표본 증대의 한계효용 체감을 설명한다."},{"n":128,"q":"짝짓기(matching) 설계에 대한 설명으로 옳지 않은 것은?","opts":["주요 가외변인에서 유사한 참여자들을 짝지어 집단에 배치한다.","짝지은 변인 외의 모든 가외변인도 자동으로 통제된다.","짝지은 변인에 대한 집단 동등성을 높인다.","소표본에서 유용할 수 있다.","무선배치와 병행하면 통제력이 더 높아진다."],"a":1,"ex":"짝짓기는 ‘선택한 변인’만 통제한다. 나머지 무수한 변인의 통제는 여전히 무선화의 몫이다."},{"n":129,"q":"본조사 전에 실시하는 예비조사(pilot study)의 목적으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 문항의 이해 가능성과 모호성 점검\nㄴ. 응답 소요 시간의 추정\nㄷ. 절차상의 문제점 발견과 수정\nㄹ. 최종 가설 검증과 결론 도출","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"예비조사는 도구와 절차의 리허설이지 본 검증이 아니다. 예비 자료로 결론을 내리는 것은 목적의 혼동이다."},{"n":130,"q":"설문조사의 응답률을 높이는 방법으로 적절하지 않은 것은?","opts":["조사의 목적과 의의를 담은 사전 안내","적절한 시점의 독촉(리마인더) 발송","설문 길이의 간결화","불응자 명단의 공개와 불이익 고지","응답의 익명성 보장 안내"],"a":3,"ex":"강요로 얻은 응답은 응답률을 올려도 자료의 질(무성의 응답, 왜곡)을 떨어뜨린다. 자발성이 타당성의 토대다."},{"n":131,"q":"심층면접과 비교한 초점집단면접(FGI)의 고유한 강점은?","opts":["개인의 민감한 사생활 탐색에 가장 적합하다.","표준화 검사 점수가 산출된다.","참여자들 간의 상호작용 속에서 의견이 자극되고 정교화되는 집단 역동 자료를 얻을 수 있다.","무선표집이 자동으로 보장된다.","녹음이 필요 없다."],"a":2,"ex":"FGI의 분석 단위에는 발언 내용만이 아니라 ‘서로에 대한 반응’이 포함된다. 민감 주제는 오히려 개별 면접이 적합하다."},{"n":132,"q":"초점집단면접(FGI)의 운영에 대한 설명으로 옳지 않은 것은?","opts":["통상 6~10명 내외로 구성한다.","논의 주제와 관련해 비교적 동질적인 참여자로 구성하는 것이 일반적이다.","사회자는 소수의 발언 독점을 조절한다.","참여자가 많을수록 좋으므로 30명 이상이 표준이다.","반구조화된 질문 가이드를 사용한다."],"a":3,"ex":"인원이 늘면 발언 기회와 상호작용의 질이 급감한다. 큰 모집단은 집단 수를 늘려서 대응한다."},{"n":133,"q":"참여관찰에서 연구자 역할의 스펙트럼에 대한 설명으로 가장 적절한 것은?","opts":["연구자 역할은 한 가지뿐이다.","완전참여자와 완전관찰자의 양극 사이에 참여적 관찰자, 관찰적 참여자 등의 위치가 있으며, 각 위치는 자료 접근성과 반응성·윤리(공개 여부) 간의 상충을 동반한다.","완전참여자는 윤리 문제가 전혀 없다.","관찰은 양적 연구에서만 사용된다.","역할은 연구 도중 바꿀 수 없다."],"a":1,"ex":"깊이 들어갈수록 내부 자료는 풍부해지지만 신분 은폐의 윤리 문제와 객관성 상실 위험이 커지는 트레이드오프다."},{"n":134,"q":"2차자료 분석의 장점과 한계에 대한 설명으로 옳지 않은 것은?","opts":["연구자가 측정 도구와 문항을 자유롭게 수정할 수 있다.","비반응성 자료로 조사 반응성 문제가 적다.","대규모 표본 자료에 접근할 수 있다.","변인의 조작적 정의가 연구 목적과 정확히 일치하지 않을 수 있다.","자료 수집 비용과 시간을 절약할 수 있다."],"a":0,"ex":"이미 수집된 자료라는 점이 장점이자 족쇄다. ‘있는 변인으로 연구를 설계’해야 하는 제약이 핵심 한계다."},{"n":135,"q":"내용타당도를 확보하는 대표적인 절차는?","opts":["요인분석의 적합도 지수 확인","표본 크기의 확대","검사-재검사 상관 산출","예측 상관의 확인","측정하려는 구인의 영역을 정의하고 전문가 패널이 문항의 대표성과 적절성을 체계적으로 검토하는 것"],"a":4,"ex":"내용타당도는 통계가 아니라 ‘판단’의 타당도다. 영역 정의→문항 대응표→전문가 평정의 절차가 그 판단을 체계화한다."},{"n":136,"q":"매개효과 검증에서 최근 표준적 방법으로 권장되는 것은?","opts":["산포도 육안 검사","범위와 최빈값 보고","단순 평균 비교","카이제곱 적합도 검정","부트스트래핑을 이용한 간접효과의 신뢰구간 추정"],"a":4,"ex":"간접효과(a×b)의 분포는 정규성을 가정하기 어려워, 재표집으로 경험적 신뢰구간을 구하는 부트스트래핑이 소벨 검정을 대체해 왔다."},{"n":137,"q":"측정의 신뢰도가 낮을 때 두 변인 간 상관에 나타나는 현상은?","opts":["상관이 실제보다 과대추정된다.","상관이 항상 1이 된다.","상관의 부호가 반전된다.","측정오차로 인해 상관이 실제(진점수 간) 상관보다 축소되는 감쇠(attenuation)가 일어난다.","아무 영향이 없다."],"a":3,"ex":"관찰 상관의 상한은 두 측정 신뢰도의 기하평균이다. 신뢰도 보고가 상관 해석의 전제인 이유다."},{"n":138,"q":"“상담 회기 수가 청소년의 자존감에 미치는 영향” 연구에서 변인의 식별로 옳은 것은?","opts":["독립변인: 회기 수 / 종속변인: 자존감","독립변인: 자존감 / 종속변인: 회기 수","두 변인 모두 종속변인","두 변인 모두 가외변인","독립변인: 청소년"],"a":0,"ex":"‘영향을 주는 것으로 상정된 변인’이 독립변인이다. 문장 구조(~가 ~에 미치는 영향)에서 기계적으로 식별할 수 있다."},{"n":139,"q":"가외변인의 통제 방법으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 무선배치\nㄴ. 조건의 항상성 유지(표준화)\nㄷ. 짝짓기 및 구획화\nㄹ. 통계적 통제(공변량분석 등)","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":4,"ex":"설계 단계(무선화·표준화·짝짓기)와 분석 단계(통계적 통제)의 방법을 모두 갖추는 것이 통제의 다층 전략이다."},{"n":140,"q":"통계 분석 결과의 보고 윤리로 가장 적절한 것은?","opts":["유의한 결과만 선별하여 보고한다.","가정 검토, 이상치와 결측치의 처리 방식, 실시한 모든 주요 분석을 투명하게 보고한다.","효과크기는 작으면 생략한다.","가설과 다른 결과는 숨긴다.","p값을 반올림하여 .05 미만으로 만든다."],"a":1,"ex":"선택적 보고는 위·변조만큼 결과를 왜곡한다. 투명성은 재현 가능성의 최소 조건이다."},{"n":141,"q":"검사 점수의 신뢰도 추정 방법 중, 내용과 난이도가 동등하게 제작된 두 검사형을 같은 집단에 실시하여 얻는 것은?","opts":["검사-재검사 신뢰도","반분신뢰도","동형검사 신뢰도","채점자간 신뢰도","내적합치도"],"a":2,"ex":"기억·연습효과를 줄이는 대신 ‘진짜 동형’ 제작의 어려움을 비용으로 치른다."},{"n":142,"q":"요인분석에서 고유값을 요인 번호 순으로 그린 그래프의 기울기가 완만해지는 지점을 기준으로 요인 수를 정하는 방법은?","opts":["카이저 기준","스크리 검사(도표)","바리맥스 기준","최대우도 기준","사각회전"],"a":1,"ex":"‘팔꿈치’ 직전까지를 의미 있는 요인으로 본다. 판단의 주관성이 한계로 지적된다."},{"n":143,"q":"고유값(eigenvalue) 1 이상의 요인을 채택하는 요인 수 결정 기준은?","opts":["스크리 기준","평행분석","카이저 기준","교차타당화","적합도 지수"],"a":2,"ex":"‘문항 하나만큼의 정보도 설명 못 하는 요인은 버린다’는 논리이나, 요인 수를 과대추정하는 경향이 보고된다."},{"n":144,"q":"실제 자료의 고유값을 같은 크기의 무선 자료에서 얻은 고유값과 비교하여, 무선 수준을 초과하는 요인만 채택하는 방법은?","opts":["평행분석","카이저 기준","주축분해","사각회전","군집분석"],"a":0,"ex":"시뮬레이션 기반 기준으로, 카이저 기준보다 정확하다는 평가 속에 현대적 권장 방법으로 자리 잡았다."},{"n":145,"q":"이원분산분석에서 상호작용효과가 유의하게 나타난 후, 한 독립변인의 효과를 다른 변인의 각 수준별로 따로 검증하는 절차는?","opts":["사전비교","주효과 재검정","구형성 검정","단순주효과 분석","공변량 투입"],"a":3,"ex":"상호작용이 유의하면 ‘평균적 주효과’는 오해를 부른다. 수준별로 쪼개어 보는 것이 정직한 후속이다."},{"n":146,"q":"실험실에서 확인된 효과가 실제 상담 현장의 자연스러운 조건에서도 재현되는가의 문제를 지칭하는 타당도 개념은?","opts":["내적타당도","안면타당도","수렴타당도","생태학적 타당도","판별타당도"],"a":3,"ex":"효능(efficacy) 연구와 효과(effectiveness) 연구의 구분이 바로 이 축 위에 있다."},{"n":147,"q":"불안 유발 조건의 실험에서 참여자들이 실제로 불안을 더 느꼈는지를 별도 측정으로 확인하는 절차는?","opts":["조작 점검(manipulation check)","디브리핑","무선화 검증","사전동의","바닥효과 검증"],"a":0,"ex":"독립변인 ‘조작의 성공’이 확인되지 않으면 영결과의 해석이 불가능해진다(조작 실패인지 효과 부재인지)."},{"n":148,"q":"사전검사 실시 여부와 처치 여부를 조합한 네 집단을 구성하여, 사전검사의 효과와 사전검사-처치 상호작용까지 분리해 내는 설계는?","opts":["단일집단 사전사후 설계","솔로몬 4집단 설계","요인설계","정태집단 비교 설계","회귀불연속 설계"],"a":1,"ex":"사전검사가 처치 효과를 민감화시키는지까지 검증할 수 있는 가장 엄격한 고전 설계다."},{"n":149,"q":"통계적 검증력(power)의 정의로 옳은 것은?","opts":["영가설이 참일 때 기각할 확률","1종 오류의 확률","대립가설이 참일 때 영가설을 올바르게 기각할 확률, 즉 1-β","표본의 대표성","효과크기와 동일한 개념"],"a":2,"ex":"‘있는 효과를 잡아낼 확률’이다. α, 효과크기, 표본 크기의 함수로 결정된다."},{"n":150,"q":"실제로는 효과가 없는 프로그램인데 분석 결과 효과가 있다고 결론 내렸다. 해당하는 오류는?","opts":["3종 오류","2종 오류","표집오차","측정오차","1종 오류"],"a":4,"ex":"‘없는 것을 있다고’가 1종(α), ‘있는 것을 없다고’가 2종(β)이다. 사례의 방향을 읽는 연습이다."},{"n":151,"q":"실제로 효과가 있는 개입인데 표본이 작아 유의하지 않다고 결론 내렸다. 해당하는 오류와 주된 원인의 짝은?","opts":["2종 오류 - 낮은 검증력","1종 오류 - 유의수준 과대","1종 오류 - 다중비교","표집틀 오류 - 포함오차","측정오차 - 신뢰도 부족"],"a":0,"ex":"소표본 연구의 영결과는 ‘효과 없음’의 증거가 되기 어렵다. 검증력 분석이 설계 단계에 필요한 이유다."},{"n":152,"q":"Cohen's d = 0.5의 해석으로 가장 적절한 것은?","opts":["두 집단 평균이 0.5점 차이 난다.","효과가 없다는 뜻이다.","상관계수가 .5라는 뜻이다.","두 집단 평균이 통합 표준편차의 절반만큼 차이 나는 중간 크기의 효과다.","표본의 50%가 호전되었다는 뜻이다."],"a":3,"ex":"d의 단위는 ‘표준편차’다. 0.2/0.5/0.8의 관례적 기준과 함께 단위 감각을 묻는 문항이다."},{"n":153,"q":"두 변인의 상관계수가 r = .40일 때 공유하는 변량의 비율은?","opts":["40%","4%","16%","60%","80%"],"a":2,"ex":"r²=.16. ‘상관 .4면 꽤 크다’는 직관과 ‘설명량 16%’ 사이의 간극을 체감하는 것이 보고 해석의 기본기다."},{"n":154,"q":"“작업동맹이 내담자의 희망 수준을 높이고, 높아진 희망이 상담 성과로 이어진다”는 모형에서 희망의 역할은?","opts":["독립변인","외생변인","조절변인","통제변인","매개변인"],"a":4,"ex":"‘어떤 경로로’ 효과가 전달되는가에 대한 답이 매개다. 조절(누구에게/언제)과의 변별을 사례로 반복 훈련하라."},{"n":155,"q":"“집단 프로그램의 효과가 참여자의 초기 증상 심각도에 따라 다르게 나타났다”에서 초기 심각도의 역할은?","opts":["매개변인","조절변인","종속변인","잠재변인","결과변인"],"a":1,"ex":"효과의 ‘조건’을 묻는 변인이 조절변인이다. 상호작용항으로 검증된다."},{"n":156,"q":"다음 중 명명척도에 해당하는 것은?","opts":["반응시간","석차","섭씨온도","혈액형","무게"],"a":3,"ex":"숫자가 붙어 있어도(1=A형…) 그 숫자는 이름표일 뿐 크기 정보가 없다."},{"n":157,"q":"다음 중 서열척도 수준의 정보만을 제공하는 것은?","opts":["몸무게","화씨온도","마라톤 완주 순위","연간 소득","길이"],"a":2,"ex":"1등과 2등의 차이와 2등과 3등의 차이가 같다는 보장이 없다. 간격의 동일성이 서열과 등간을 가른다."},{"n":158,"q":"섭씨온도가 비율척도가 아닌 등간척도로 분류되는 이유는?","opts":["0도가 ‘온도의 부재’를 의미하는 절대영점이 아니기 때문","측정 단위가 작아서","숫자가 아니기 때문","서열 정보가 없기 때문","측정오차가 크기 때문"],"a":0,"ex":"그래서 ‘20도는 10도의 두 배로 덥다’는 비율 진술이 성립하지 않는다."},{"n":159,"q":"전국 중학교 중 30개 학교를 무선으로 뽑아 그 학교의 전체 학생을 조사하였다. 사용된 표집방법은?","opts":["단순무선표집","층화표집","체계적 표집","할당표집","군집표집"],"a":4,"ex":"층화는 ‘모든 층에서 일부씩’, 군집은 ‘일부 집락에서 전부(또는 다단계)’다. 추출 단위가 개인이 아니라 집락이라는 점이 핵심이다."},{"n":160,"q":"접근이 어려운 잠재적 모집단(예: 특정 소수 집단)을 연구할 때, 초기 참여자의 소개를 통해 표본을 확장해 가는 방법은?","opts":["체계적 표집","눈덩이 표집","층화표집","단순무선표집","군집표집"],"a":1,"ex":"표집틀이 존재하지 않는 모집단에 대한 현실적 대안이지만, 연결망 편향이 대표성의 한계로 남는다."},{"n":161,"q":"내적타당도와 외적타당도의 정의로 옳은 것은?","opts":["내적타당도는 관찰된 효과를 처치에 귀인할 수 있는 정도, 외적타당도는 결과를 다른 대상·상황·시기로 일반화할 수 있는 정도이다.","내적타당도는 일반화 가능성, 외적타당도는 인과 추론 가능성이다.","두 타당도는 동일하다.","외적타당도는 측정도구의 속성이다.","내적타당도는 표본 크기와 동의어다."],"a":0,"ex":"둘은 흔히 상충한다. 통제를 조일수록 인과는 선명해지고 현장 일반화는 멀어진다."},{"n":162,"q":"무선표집과 무선배치의 구별로 옳은 것은?","opts":["둘은 같은 절차의 다른 이름이다.","무선표집은 모집단 대표성(외적타당도)에, 무선배치는 집단 동등성(내적타당도)에 기여한다.","무선배치는 일반화 가능성을 보장한다.","무선표집은 실험에서만 사용된다.","무선배치는 조사연구의 절차다."],"a":1,"ex":"‘누구를 뽑는가’와 ‘뽑힌 사람을 어디에 넣는가’는 다른 단계이며, 각각 다른 타당도를 책임진다."},{"n":163,"q":"신설된 상담 프로그램의 효과 연구에서, 참여자들이 ‘특별한 관심을 받고 있다’는 인식만으로 보고가 좋아졌을 가능성이 제기되었다. 이를 통제하는 설계 전략으로 가장 적절한 것은?","opts":["통제집단을 두지 않는다.","사전검사를 생략한다.","아무 처치 없는 대기집단 외에, 관심과 시간만 동등하게 제공되는 주의-위약(attention placebo) 비교집단을 추가한다.","표본을 줄인다.","결과 측정을 연구자가 직접 면담으로만 한다."],"a":2,"ex":"호손·위약 효과의 통제는 ‘무처치’가 아니라 ‘비특이적 요인의 동등화’로 이루어진다."},{"n":164,"q":"위기 수준이 극단적으로 높은 시점에 접수된 내담자들이 개입 여부와 무관하게 시간이 지나며 호전되는 경향은 어떤 내적타당도 위협과 관련되는가?","opts":["도구화","선발-성숙 상호작용","처치 확산","통계적 회귀(평균으로의 회귀)","검사 효과"],"a":3,"ex":"‘가장 나쁠 때’ 측정된 점수는 다음 측정에서 평균 쪽으로 돌아온다. 위기개입 효과 연구의 고전적 함정이다."},{"n":165,"q":"크론바흐 알파 계수에 영향을 주는 요인으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 문항 수\nㄴ. 문항 간 상관(동질성)\nㄷ. 표본의 점수 변산\nㄹ. 검사지의 인쇄 품질","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"알파는 문항이 많고 동질적일수록, 표본의 변산이 클수록 커진다. 알파가 곧 ‘단일차원성의 증명’은 아니라는 점도 함께 기억하라."},{"n":166,"q":"신뢰도와 타당도의 관계에 대한 설명으로 옳은 것은?","opts":["신뢰도가 높으면 타당도는 자동으로 보장된다.","신뢰도가 낮아도 타당도는 높을 수 있다.","타당도가 신뢰도의 필요조건이다.","둘은 아무 관련이 없다.","신뢰도는 타당도의 필요조건이지만 충분조건은 아니다."],"a":4,"ex":"일관되게 ‘엉뚱한 것’을 잴 수 있다(신뢰롭지만 타당하지 않음). 반대로 일관성 없는 측정은 무엇도 타당하게 잴 수 없다."},{"n":167,"q":"동일한 연구 문제에 대해 설문조사 자료와 심층면접 자료를 함께 수집하여 결과를 교차 검토하였다. 이 전략의 명칭과 목적은?","opts":["맹목화 - 기대 효과 통제","무선화 - 인과 추론","층화 - 대표성 확보","삼각검증 - 단일 방법의 편향을 상호 보완하여 결론의 신빙성을 높임","포화 - 표본 크기 결정"],"a":3,"ex":"방법·자료원·연구자·이론의 삼각화가 가능하다. 수렴은 확신을, 불일치는 새로운 질문을 준다."},{"n":168,"q":"근거이론(grounded theory)의 분석 절차를 순서대로 바르게 나열한 것은?","opts":["선택코딩 → 축코딩 → 개방코딩","개방코딩 → 축코딩 → 선택코딩","축코딩 → 개방코딩 → 선택코딩","개방코딩 → 선택코딩 → 축코딩","코딩 순서는 무작위다"],"a":1,"ex":"자료를 쪼개 개념화하고(개방), 범주들을 관계로 엮고(축), 핵심범주를 중심으로 이론을 통합한다(선택)."},{"n":169,"q":"특정 집단의 문화와 일상을 이해하기 위해 연구자가 현장에 장기간 머물며 참여하고 관찰하는 질적 연구 전통은?","opts":["현상학","델파이","담론분석","사례연구","문화기술지(ethnography)"],"a":4,"ex":"‘그들의 눈으로 세계 보기’가 목적이며, 현장노트와 심층면접이 주된 자료가 된다."},{"n":170,"q":"기관생명윤리위원회(IRB) 심의에서 검토하는 핵심 요소로 옳은 것을 모두 고른 것은?","box":"ㄱ. 연구의 위험과 이익의 균형\nㄴ. 충분한 정보에 근거한 자발적 동의 절차\nㄷ. 취약한 참여자(아동, 수감자 등)에 대한 추가 보호\nㄹ. 개인정보와 비밀의 보호 계획","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":4,"ex":"네 요소 모두 심의의 표준 항목이다. IRB는 장애물이 아니라 연구자와 참여자를 함께 보호하는 장치다."},{"n":171,"q":"연구에서 익명성(anonymity)과 비밀보장(confidentiality)의 구별로 옳은 것은?","opts":["익명성은 연구자조차 응답자의 신원을 알 수 없는 상태이고, 비밀보장은 연구자는 신원을 알지만 공개하지 않기로 보호하는 것이다.","두 용어는 같은 뜻이다.","비밀보장이 익명성보다 항상 강한 보호다.","면접 연구에서는 익명성이 자동으로 확보된다.","익명 자료에는 보호 의무가 없다."],"a":0,"ex":"대면 면접은 정의상 익명이 불가능하므로 비밀보장으로 보호한다. 동의서에 어느 쪽을 약속하는지 정확히 써야 한다."},{"n":172,"q":"양적 연구 패러다임의 특징으로 옳은 것을 모두 고른 것은?","box":"ㄱ. 현상을 수량화하여 객관적으로 측정하고자 한다.\nㄴ. 가설의 검증과 일반화를 지향한다.\nㄷ. 연구자와 연구 대상의 분리(객관성)를 전제한다.\nㄹ. 소수 사례의 맥락적 의미 이해를 일차 목적으로 한다.","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"a":2,"ex":"ㄹ은 질적 패러다임의 정의다. 두 패러다임은 우열이 아니라 묻는 질문의 종류가 다르다."},{"n":173,"q":"“이론에서 가설을 끌어내 자료로 검증하는 추론은 ( ㄱ ), 개별 관찰에서 일반 원리를 끌어내는 추론은 ( ㄴ )이다.” 괄호의 짝으로 옳은 것은?","opts":["귀납법 - 연역법","귀납법 - 변증법","유추법 - 연역법","연역법 - 귀납법","연역법 - 환원법"],"a":3,"ex":"이론→자료가 연역, 자료→이론이 귀납이다. 실제 연구는 두 추론의 순환으로 굴러간다."},{"n":174,"q":"또래관계 발달을 알아보기 위해 같은 시점에 초등 4·5·6학년 각 150명을 표집하여 비교하였다. 이 설계에 대한 설명으로 옳은 것은?","opts":["동일 아동의 변화를 추적하는 종단설계다.","서로 다른 연령 집단을 한 시점에 비교하는 횡단설계로, 연령 효과와 출생동시집단 효과가 혼입될 수 있다.","실험설계이므로 인과 추론이 가능하다.","단일사례설계다.","시계열설계다."],"a":1,"ex":"횡단설계의 ‘연령 차이’에는 세대 차이가 섞여 있다. 빠르고 경제적이지만 개인 내 변화는 보지 못한다."},{"n":175,"q":"“상담센터 평균 만족도가 높은 지역일수록 주민 정신건강이 좋았다”는 지역 단위 결과를 근거로 “만족도가 높은 개인은 정신건강이 좋다”고 결론 내렸다. 이때 범할 수 있는 오류는?","opts":["생태학적 오류","개인주의적 오류","제3변인 오류","회귀 오류","표집 오류"],"a":0,"ex":"집단 수준의 상관을 개인 수준으로 끌어내리는 추론의 오류다. 반대 방향(개인→집단)은 개인주의적 오류라 한다."},{"n":176,"q":"대학 신입생 선발에 사용한 적성검사 점수가 4년 후의 졸업 평점을 얼마나 잘 예측하는지로 검사의 질을 평가하였다. 검토된 타당도는?","opts":["내용타당도","안면타당도","예언(예측)타당도","수렴타당도","구인타당도(요인구조)"],"a":2,"ex":"준거 자료를 ‘미래에’ 수집하면 예언타당도, ‘동시에’ 수집하면 공인타당도다. 시차가 구분 기준이다."},{"n":177,"q":"“교수법의 효과가 학생의 성별에 따라 다르게 나타났다”는 진술이 의미하는 것은?","opts":["교수법의 주효과만 존재한다.","성별의 주효과만 존재한다.","측정오차가 크다는 뜻이다.","두 변인 모두 효과가 없다.","교수법과 성별의 상호작용효과가 존재한다."],"a":4,"ex":"상호작용은 ‘한 변인의 효과가 다른 변인의 수준에 따라 달라지는 것’이다. 그래프에서 선이 평행하지 않은 상태다."},{"n":178,"q":"한 군(郡)의 전체 중학생 800명 ‘모두’를 조사하여 평균 스트레스 점수를 얻었다. 이 자료의 분석에 대한 설명으로 옳은 것은?","opts":["표본이므로 t검정으로 모평균을 추정해야 한다.","800명은 표본으로만 취급된다.","전수조사라도 반드시 신뢰구간을 보고해야 한다.","전수조사이므로 그 집단에 대해서는 표집오차가 없고, 모수 추정을 위한 추리통계가 필요하지 않다.","기술통계는 사용할 수 없다."],"a":3,"ex":"추리통계는 ‘부분으로 전체를 추측’할 때 필요하다. 전체를 다 쟀다면 그 집단에 관한 한 추측이 아니라 기술이다."},{"n":179,"q":"통계적 검증력을 높이는 방법으로 적절하지 않은 것은?","opts":["표본 크기를 늘린다.","같은 자료에 여러 검정을 반복 적용하여 유의한 것을 채택한다.","이론적 근거가 있다면 단측검정을 사용한다.","처치의 강도를 높여 기대 효과크기를 키운다.","측정의 신뢰도를 높여 오차 변량을 줄인다."],"a":1,"ex":"반복 검정은 검증력 향상이 아니라 1종 오류의 부풀리기(p-해킹)다. 검증력의 정당한 지렛대는 n·신뢰도·효과크기·α 설계다."},{"n":180,"q":"써스톤(Thurstone) 척도에 대한 설명으로 옳지 않은 것은?","opts":["모든 문항에 동일한 가중치 1점을 부여하는 방식이다.","유사동간(등현등간) 척도라고도 불린다.","응답자는 동의하는 문항을 선택하고, 선택 문항들의 척도값으로 태도 점수를 산출한다.","제작 절차에 많은 시간과 노력이 든다.","다수의 평가자가 문항의 호의성 정도를 판정하여 문항별 척도값을 부여한다."],"a":0,"ex":"문항마다 다른 척도값을 갖는 것이 써스톤의 정체성이다. 동일 가중 방식은 리커트 총화평정의 특징이다."},{"n":181,"q":"신뢰도 계수에 영향을 주는 요인에 대한 설명으로 옳지 않은 것은?","opts":["동질적인 문항을 추가하면 신뢰도가 높아지는 경향이 있다.","검사 시행 조건의 표준화는 오차 변량을 줄인다.","수검 집단의 점수 변산이 클수록 신뢰도 계수는 크게 추정되는 경향이 있다.","문항 곤란도가 극단적이면 신뢰도 추정에 불리하다.","능력이 동질적인 집단에서 신뢰도 계수는 더 높게 추정된다."],"a":4,"ex":"동질 집단은 진점수 변산이 작아 신뢰도 계수가 ‘낮게’ 나온다. 범위 제한이 상관(신뢰도 계수도 상관이다)을 깎는 원리다."},{"n":182,"q":"크론바흐 알파에 대한 설명으로 옳지 않은 것은?","opts":["문항 수가 적고 문항 간 상관이 낮을수록 알파는 커진다.","문항 수가 많을수록 커지는 경향이 있다.","리커트형 다분 문항에도 적용할 수 있다.","반분 방법에 따라 달라지는 반분신뢰도의 한계를 보완한다.","문항 간 평균 상관이 높을수록 커진다."],"a":0,"ex":"알파의 두 엔진은 문항 수와 문항 간 상관이다. 마지막 선지는 두 엔진을 모두 거꾸로 돌렸다."},{"n":183,"q":"신뢰도와 타당도의 관계에 대한 진술로 옳지 않은 것은?","opts":["신뢰도가 낮으면 높은 타당도를 기대하기 어렵다.","신뢰도는 타당도의 충분조건이다.","측정오차가 클수록 타당도 계수의 상한이 낮아진다.","신뢰도를 확보했다고 타당도가 보장되는 것은 아니다.","신뢰도는 타당도의 필요조건이다."],"a":1,"ex":"‘일관됨’은 ‘제대로 잼’을 보장하지 않는다. 필요조건과 충분조건의 구분 그 자체를 묻는 문항이다."},{"n":184,"q":"통계적 결론 타당도를 위협하는 요인으로 가장 적절한 것은?","opts":["처치와 결과 사이의 제3변인","연구 결과의 다른 지역으로의 일반화 문제","낮은 검증력과 통계 가정의 위반","측정 구인의 정의 문제","연구자의 기대가 참여자에게 전달되는 것"],"a":2,"ex":"‘공변이 실제로 있는데 놓치거나, 없는데 있다고 보는’ 통계적 판단 자체의 오류 가능성이 이 타당도의 관할이다."},{"n":185,"q":"연구 결과의 외적 타당도를 높이는 전략으로 보기 어려운 것은?","opts":["모집단을 잘 대표하는 표집","다양한 장면과 대상에서의 반복 검증","실제 현장과 유사한 조건에서의 연구","단일한 실험실 조건과 극도로 선별된 동질 표본만 사용","표본의 인구학적 다양성 확보"],"a":3,"ex":"통제의 극대화는 내적 타당도를 사고 외적 타당도를 파는 거래일 수 있다. 두 타당도의 긴장 관계를 묻는 문항이다."},{"n":186,"q":"자원자만으로 실험집단을 구성하고 비자원자를 비교집단으로 삼은 프로그램 효과 연구에서 내적 타당도를 가장 크게 위협하는 요인은?","opts":["성숙","선발 편향","역사","검사 효과","도구화"],"a":1,"ex":"동기라는 체계적 차이가 출발선에서부터 두 집단을 갈라놓았다. 사후의 차이를 처치 탓으로 돌릴 수 없게 된다."},{"n":187,"q":"참여자를 두 집단에 무선배치하고 사전검사 없이 처치 후 측정만 실시한 실험에서, 원리상 발생할 수 없는 내적 타당도 위협은?","opts":["역사","피험자의 차별적 탈락","실험자 기대 효과","처치 확산","검사 효과(사전검사의 영향)"],"a":4,"ex":"사전검사가 없으면 검사 효과도 없다. 설계의 구조가 어떤 위협을 원천 차단하는지를 읽는 연습이다."},{"n":188,"q":"지능 수준이 결과에 영향을 줄 것을 우려하여, 참여자들을 지능 수준별 블록으로 묶은 뒤 각 블록 안에서 처치집단과 통제집단에 무선배치하였다. 이 설계는?","opts":["완전 무선설계","교차설계","구획(블록)설계","회귀불연속설계","단일집단 설계"],"a":2,"ex":"알려진 가외변인을 블록으로 묶어 오차에서 떼어내면 검증력이 올라간다. ‘짝짓기의 집단 버전’으로 이해하면 쉽다."},{"n":189,"q":"가설검증에서 기각역에 대한 설명으로 옳지 않은 것은?","opts":["검정통계량이 그 영역에 떨어지면 영가설을 기각한다.","유의수준이 커지면 기각역도 넓어진다.","양측검정에서는 분포의 양쪽 꼬리에 설정된다.","기각역의 위치와 크기는 자료를 본 후에 정하는 것이 원칙이다.","F검정과 카이제곱 검정은 통상 분포의 오른쪽 꼬리만을 기각역으로 사용한다."],"a":3,"ex":"기각역은 자료 수집 ‘전’의 약속이다. 사후 조정은 1종 오류율의 조작이 된다."},{"n":190,"q":"(가) 동일 집단의 프로그램 전후 우울 점수 비교, (나) 남녀 두 집단의 스트레스 평균 비교에 적합한 분석의 짝은?","opts":["(가) 대응표본 t검정, (나) 독립표본 t검정","(가) 독립표본 t검정, (나) 대응표본 t검정","(가) 카이제곱 검정, (나) 상관분석","(가) 일원분산분석, (나) 회귀분석","(가) 부호검정, (나) 요인분석"],"a":0,"ex":"같은 사람의 반복 측정이면 대응, /* ---------- state ---------- */
const app=document.getElementById("app");
const timerEl=document.getElementById("timer");
let S=null, tick=null;

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function fmt(sec){const m=Math.floor(sec/60),s=sec%60;return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;}
function startTimer(){S.start=Date.now();timerEl.textContent="00:00";tick=setInterval(()=>{timerEl.textContent=fmt(Math.floor((Date.now()-S.start)/1000));},1000);}
function stopTimer(){if(tick){clearInterval(tick);tick=null;}if(S&&S.start)S.elapsed=Math.floor((Date.now()-S.start)/1000);}
function expHTML(q){return q.ex?`<div style="margin-top:10px;padding:12px 14px;background:#EEF4F1;border-radius:10px;font-size:14px;color:#33463F;line-height:1.6">💡 ${esc(q.ex)}</div>`:"";}

/* ---------- exam sets (모의고사 회차) ---------- */
const EXAM_ROUNDS=7;
function buildExamSet(r){
  let qs=[];
  MOCK.forEach((s,i)=>{
    const sorted=s.questions.slice().sort((a,b)=>a.n-b.n);
    const pick=sorted.filter((_,idx)=>idx%EXAM_ROUNDS===r).slice(0,25);
    pick.forEach(q=>qs.push({...q,subj:i,src:"모의"}));
  });
  return qs;
}

/* ---------- start screen ---------- */
function renderStart(){
  stopTimer(); timerEl.textContent=""; S=null;
  const mT=MOCK.reduce((t,s)=>t+s.questions.length,0);
  app.innerHTML=`
  <div class="card">
    <h1>상담심리사 1급 모의 문제은행</h1>
    <p class="lead">5과목 × 200문항 = 총 ${mT}문항 · 해설 포함 · 실전 모의고사 ${EXAM_ROUNDS}회차</p>
    <div style="margin:14px 0 18px;padding:14px 16px;background:#FBF7EE;border:1px solid #E8DFC8;border-radius:12px;font-size:13.5px;color:#5A523F;line-height:1.7">
      <b style="color:#3D3729">이용 안내</b><br>
      · 본 문항은 상담심리사 1급 출제기준(5과목)에 맞추어 <b>AI(Claude) 보조로 자체 제작한 모의문항</b>이며, 실제 기출문제를 포함하지 않습니다.<br>
      · 구조 검증을 거쳤으나 내용 오류가 있을 수 있습니다. <b>오류 발견 시 과목·문항 번호와 함께 댓글로 제보</b>해 주시면 다음 판에 반영합니다.<br>
      · 각 회차에는 암기·사례형부터 조합형(ㄱㄴㄷ)·이해형까지 고르게 섞여 있습니다. 해설의 <b>〔저빈도 심화〕</b> 표시는 출제 비중이 낮은 심화 문항입니다.<br>
      · 채점은 실제 기준(과목 40점 미만 과락 + 전체 평균 60점)을 따릅니다.<br>
      <span style="color:#8A8068">제작·배포 : 거북이심리상담센터</span>
    </div>
    <div class="sec-label">학습 방식</div>
    <div class="modes" id="ways">
      <div class="mode on" data-w="free" role="button" tabindex="0"><b>자유 연습</b><span>과목과 모드를 직접 선택</span></div>
      <div class="mode" data-w="exam" role="button" tabindex="0"><b>실전 모의고사</b><span>회차별 5과목 × 25문항 = 125문항</span></div>
    </div>
    <div id="freeOpts">
      <div class="sec-label">과목 선택</div>
      ${MOCK.map((s,i)=>`
        <label class="subj on" data-i="${i}">
          <input type="checkbox" checked>
          <span class="nm">${esc(s.name)}</span>
          <span class="ct">${s.questions.length}문항</span>
        </label>`).join("")}
      <div class="sec-label">모드 선택</div>
      <div class="modes" id="modes">
        <div class="mode on" data-m="practice" role="button" tabindex="0"><b>연습 모드</b><span>한 문제씩 풀고 바로 정답 확인</span></div>
        <div class="mode" data-m="exam" role="button" tabindex="0"><b>실전 모드</b><span>전체를 다 풀고 한 번에 채점</span></div>
      </div>
      <label class="opt-row"><input type="checkbox" id="chk-shuffle"> 문제 순서 섞기</label>
    </div>
    <div id="examOpts" style="display:none">
      <div class="sec-label">회차 선택</div>
      ${Array.from({length:EXAM_ROUNDS},(_,r)=>r).map(r=>`
        <label class="subj${r===0?" on":""} round" data-r="${r}">
          <input type="radio" name="round" ${r===0?"checked":""}>
          <span class="nm">모의고사 ${r+1}회차</span>
          <span class="ct">125문항 · 실전 채점</span>
        </label>`).join("")}
      <p class="lead" style="margin-top:12px;font-size:13px">회차 구성은 고정되어 있어 동료와 같은 회차를 풀고 점수를 비교할 수 있습니다. 실제 시험과 동일한 과목 순서·문항 수(과목당 25문항, 권장 40분)입니다.</p>
    </div>
    <button class="btn btn-main" id="btn-go">시작하기</button>
  </div>`;
  function bindPick(boxId,cb){
    document.querySelectorAll("#"+boxId+" .mode").forEach(el=>{
      const pick=()=>{document.querySelectorAll("#"+boxId+" .mode").forEach(m=>m.classList.remove("on"));el.classList.add("on");if(cb)cb(el);};
      el.addEventListener("click",pick);
      el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();}});
    });
  }
  bindPick("ways",el=>{
    const exam=el.dataset.w==="exam";
    document.getElementById("freeOpts").style.display=exam?"none":"";
    document.getElementById("examOpts").style.display=exam?"":"none";
  });
  bindPick("modes");
  app.querySelectorAll("#freeOpts .subj").forEach(el=>{
    el.addEventListener("change",()=>{
      el.classList.toggle("on",el.querySelector("input").checked);
      const any=[...app.querySelectorAll("#freeOpts .subj input")].some(c=>c.checked);
      document.getElementById("btn-go").disabled=!any;
    });
  });
  app.querySelectorAll(".round").forEach(el=>{
    el.addEventListener("click",()=>{
      app.querySelectorAll(".round").forEach(o=>{o.classList.remove("on");o.querySelector("input").checked=false;});
      el.classList.add("on"); el.querySelector("input").checked=true;
    });
  });
  document.getElementById("btn-go").addEventListener("click",()=>{
    const way=document.querySelector("#ways .mode.on").dataset.w;
    let qs;
    if(way==="exam"){
      const r=+document.querySelector(".round.on").dataset.r;
      qs=buildExamSet(r);
      S={mode:"exam",qs,cur:0,ans:new Array(qs.length).fill(null),checked:new Array(qs.length).fill(false)};
    }else{
      const subj=[...app.querySelectorAll("#freeOpts .subj")].filter(el=>el.querySelector("input").checked).map(el=>+el.dataset.i);
      const mode=document.querySelector("#modes .mode.on").dataset.m;
      const doShuffle=document.getElementById("chk-shuffle").checked;
      qs=[];
      subj.forEach(i=>MOCK[i].questions.forEach(q=>qs.push({...q,subj:i,src:"모의"})));
      if(doShuffle)qs=shuffle(qs);
      S={mode,qs,cur:0,ans:new Array(qs.length).fill(null),checked:new Array(qs.length).fill(false)};
    }
    startTimer(); renderQ();
  });
}

/* ---------- quiz ---------- */
function renderQ(){
  const i=S.cur, q=S.qs[i], n=S.qs.length, picked=S.ans[i], done=S.checked[i];
  const exam=S.mode==="exam";
  app.innerHTML=`
  <div class="card">
    <div class="qmeta">
      <span class="tag">${esc(MOCK[q.subj].name)}</span>
      <span>${i+1} / ${n} <small>(${q.src} ${q.n}번)</small></span>
    </div>
    <div class="prog"><i style="width:${((i+1)/n*100).toFixed(1)}%"></i></div>
    <div class="qtext"><span class="qnum">${i+1}.</span>${esc(q.q)}</div>
    ${q.box?`<div class="passage">${esc(q.box)}</div>`:""}
    <div class="opts">
      ${q.opts.map((o,k)=>{
        let cls="opt";
        if(exam){ if(picked===k)cls+=" sel"; }
        else if(done){ if(k===q.a)cls+=" good"; else if(picked===k)cls+=" bad"; }
        else if(picked===k)cls+=" sel";
        return `<button class="${cls}" data-k="${k}" ${(!exam&&done)?"disabled":""}><span class="mk">${CIRC[k]}</span><span>${esc(o)}</span></button>`;
      }).join("")}
    </div>
    <div id="fb"></div>
    <div class="navrow">
      <button class="btn btn-ghost" id="btn-prev" ${i===0?"disabled":""}>← 이전</button>
      ${exam
        ? (i===n-1?`<button class="btn btn-main" id="btn-submit" style="margin-top:0">제출하고 채점</button>`:`<button class="btn btn-ghost" id="btn-next">다음 →</button>`)
        : (done
            ? (i===n-1?`<button class="btn btn-main" id="btn-finish" style="margin-top:0">결과 보기</button>`:`<button class="btn btn-main" id="btn-next" style="margin-top:0">다음 →</button>`)
            : `<button class="btn btn-main" id="btn-check" style="margin-top:0" ${picked===null?"disabled":""}>정답 확인</button>`)
      }
    </div>
    ${exam?`<div class="pal-label">답안 표기 현황 (눌러서 이동)</div>
    <div class="pal">${S.qs.map((_,k)=>`<button data-j="${k}" class="${S.ans[k]!==null?"done":""}${k===i?" now":""}">${k+1}</button>`).join("")}</div>
    <button class="btn btn-ghost" id="btn-submit-any" style="width:100%;margin-top:14px">여기까지 제출하고 채점</button>`:""}
  </div>`;

  if(!exam&&done){
    document.getElementById("fb").innerHTML=
      (picked===q.a?`<div class="fb ok">정답입니다!</div>`
                   :`<div class="fb no">오답입니다. 정답은 ${CIRC[q.a]} ${esc(q.opts[q.a])}</div>`)
      +expHTML(q);
  }
  app.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{
    if(!exam&&S.checked[i])return;
    S.ans[i]=+b.dataset.k; renderQ();
  }));
  const prev=document.getElementById("btn-prev");
  if(prev)prev.addEventListener("click",()=>{S.cur--;renderQ();});
  const next=document.getElementById("btn-next");
  if(next)next.addEventListener("click",()=>{S.cur++;renderQ();});
  const chk=document.getElementById("btn-check");
  if(chk)chk.addEventListener("click",()=>{S.checked[i]=true;renderQ();});
  const fin=document.getElementById("btn-finish");
  if(fin)fin.addEventListener("click",renderResult);
  const sub=document.getElementById("btn-submit");
  if(sub)sub.addEventListener("click",confirmSubmit);
  const subAny=document.getElementById("btn-submit-any");
  if(subAny)subAny.addEventListener("click",confirmSubmit);
  app.querySelectorAll(".pal button").forEach(b=>b.addEventListener("click",()=>{S.cur=+b.dataset.j;renderQ();}));
}
function confirmSubmit(){
  const blank=S.ans.filter(a=>a===null).length;
  if(blank>0&&!confirm(`아직 ${blank}문항이 비어 있습니다. 그대로 제출할까요? (빈 문항은 오답 처리)`))return;
  renderResult();
}

/* ---------- result ---------- */
function renderResult(){
  stopTimer();
  const n=S.qs.length;
  let correct=0; const bySubj={}, wrong=[];
  S.qs.forEach((q,i)=>{
    if(!bySubj[q.subj])bySubj[q.subj]={ok:0,all:0};
    bySubj[q.subj].all++;
    if(S.ans[i]===q.a){correct++;bySubj[q.subj].ok++;}
    else wrong.push(i);
  });
  const pct=Math.round(correct/n*100);
  app.innerHTML=`
  <div class="card">
    <div class="score-hero">
      <div class="big">${pct}<small>점</small></div>
      <p>${n}문항 중 ${correct}문항 정답 · 소요시간 ${fmt(S.elapsed||0)}</p>
    </div>
    <div class="sec-label">과목별 결과</div>
    ${Object.keys(bySubj).map(k=>{
      const s=bySubj[k], p=Math.round(s.ok/s.all*100);
      const badge=p<40?`<span class="fail">과락(40 미만)</span>`:(p>=60?`<span class="pass">통과권</span>`:`<span class="fail">40~59 주의</span>`);
      return `<div class="sline"><span>${esc(MOCK[k].name)}${badge}</span><b>${s.ok}/${s.all} (${p}%)</b></div>`;
    }).join("")}
    ${(()=>{
      const ps=Object.keys(bySubj).map(k=>Math.round(bySubj[k].ok/bySubj[k].all*100));
      const avg=Math.round(ps.reduce((a,b)=>a+b,0)/ps.length);
      const gwarak=ps.filter(p=>p<40).length;
      const ok=avg>=60&&gwarak===0;
      return `<div class="sline" style="border-top:2px solid var(--line);margin-top:4px"><span>실제 시험 기준 <small style="color:var(--sub)">(각 과목 40점↑ + 평균 60점↑)</small></span><b style="color:${ok?"var(--teal)":"#B3261E"}">평균 ${avg}점 · ${ok?"합격권":(gwarak?`과락 ${gwarak}과목`:"평균 미달")}</b></div>`;
    })()}
    <div class="navrow" style="margin-top:22px">
      ${wrong.length?`<button class="btn btn-main" id="btn-retry" style="margin-top:0">틀린 ${wrong.length}문항 다시 풀기</button>`:""}
      <button class="btn btn-ghost" id="btn-home">처음으로</button>
    </div>
    ${wrong.length?`<div class="sec-label">오답 리뷰</div>
    ${wrong.map(i=>{
      const q=S.qs[i], my=S.ans[i];
      return `<div class="wrong-item">
        <div class="wq">${i+1}. ${esc(q.q)} <span style="color:var(--sub);font-weight:500">[${esc(MOCK[q.subj].name)} · ${q.src} ${q.n}번]</span></div>
        <div class="wa"><span class="you">내 답 : ${my===null?"무응답":CIRC[my]+" "+esc(q.opts[my])}</span><br><span class="ans">정답 : ${CIRC[q.a]} ${esc(q.opts[q.a])}</span></div>
        ${expHTML(q)}
      </div>`;
    }).join("")}`:`<p class="lead" style="text-align:center;margin-top:10px">전 문항 정답입니다. 완벽합니다! 🎉</p>`}
  </div>`;
  const retry=document.getElementById("btn-retry");
  if(retry)retry.addEventListener("click",()=>{
    const qs=wrong.map(i=>S.qs[i]);
    S={mode:S.mode,qs,cur:0,ans:new Array(qs.length).fill(null),checked:new Array(qs.length).fill(false)};
    startTimer(); renderQ();
  });
  document.getElementById("btn-home").addEventListener("click",renderStart);
}

renderStart();
</script>
</body>
</html>
